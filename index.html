生成AI時代の象徴的な経営者。"},{"id":96008,"q":"Warren Buffett（ウォーレン・バフェット）の投資スタイルとして正しいものはどれか？","c":["高頻度取引・デイトレード","短期投機・FX取引","ヘッジファンド型空売り戦略","長期バリュー投資・割安優良株への集中投資"],"a":3,"e":"バフェットはバークシャー・ハサウェイを率いる「オマハの賢人」。長期バリュー投資で世界有数の富豪に。"},{"id":96009,"q":"Appleを創業し「Think Different」を体現した人物は誰か？","c":["スティーブ・ジョブズ","スティーブ・ウォズニアック","ジョナサン・アイブ","ティム・クック"],"a":0,"e":"スティーブ・ジョブズはAppleを創業。Mac・iPod・iPhone・iPadでデジタル革命を起こしたビジョナリー。"},{"id":96010,"q":"Anthropic（Claudeの開発会社）を設立したのは誰か？","c":["サム・アルトマン","ダリオ・アモデイとダニエラ・アモデイ兄妹","イーロン・マスク","デミス・ハサビス"],"a":1,"e":"Anthropicは2021年にOpenAI出身のダリオ・アモデイ（CEO）とダニエラ・アモデイ（社長）兄妹が設立。AIの安全性研究を重視。"}]},{"section":"70. 現代の偉人（日本）","questions":[{"id":96011,"q":"ソフトバンクグループを創業した人物は誰か？","c":["孫正義","三木谷浩史","柳井正","永守重信"],"a":0,"e":"孫正義はソフトバンクを創業し通信・IT・投資（ビジョンファンド）で日本を代表するテック起業家に。"},{"id":96012,"q":"ユニクロ（ファーストリテイリング）の創業者・会長は誰か？","c":["鈴木敏文","柳井正","三木谷浩史","永守重信"],"a":1,"e":"柳井正はユニクロを擁するファーストリテイリングの創業者。「服を変え、常識を変え、世界を変えていく」が信条。"},{"id":96013,"q":"楽天グループを創業した人物は誰か？","c":["孫正義","藤田晋","三木谷浩史","南場智子"],"a":2,"e":"三木谷浩史は1997年に楽天市場を創業。EC・金融・通信・スポーツなど多角的に事業を展開。"},{"id":96014,"q":"DeNAを共同創業し現在も経営に関わる人物はどれか？","c":["藤田晋","笠原健治","古川健介","南場智子"],"a":3,"e":"南場智子はDeNA創業者。マッキンゼー出身で日本を代表する女性起業家。横浜DeNAベイスターズオーナーも務める。"},{"id":96015,"q":"サイバーエージェントを創業した人物は誰か？","c":["藤田晋","南場智子","三木谷浩史","堀江貴文"],"a":0,"e":"藤田晋は1998年にサイバーエージェントを創業。AbemaTV・Ameba・ゲーム事業で独自の地位を確立。"},{"id":96016,"q":"日本電産（現ニデック）を創業した「モーターの鬼」と呼ばれる人物はどれか？","c":["柳井正","永守重信","孫正義","出井伸之"],"a":1,"e":"永守重信は日本電産（現ニデック）を創業しモーター世界トップに育て上げた。「すぐやる・必ずやる・できるまでやる」で有名。"},{"id":96017,"q":"メルカリを創業した人物は誰か？","c":["古川健介","笠原健治","山田進太郎","南場智子"],"a":2,"e":"山田進太郎はフリマアプリ「メルカリ」を2013年に創業。日本発のユニコーン企業として米国にも展開。"},{"id":96018,"q":"「1兆円企業」を目指すSmartHRを創業した人物はどれか？","c":["山田進太郎","佐藤光紀","倉富佑也","宮田昇始"],"a":3,"e":"宮田昇始はSmartHRを創業。クラウド人事労務ソフトで日本のHRテック市場をリードするユニコーン企業。"},{"id":96019,"q":"「すべての人に、チャンスを。」を掲げるヘイ（BASE・STORES）の起業家として正しいのはどれか？","c":["鶴岡裕太","古川健介","笠原健治","前田裕二"],"a":0,"e":"鶴岡裕太はECプラットフォームBASEを創業。個人・小規模事業者のネットショップ開設を民主化した。"},{"id":96020,"q":"大谷翔平選手が示した「マンダラチャート」の目標設定で有名な概念はどれか？","c":["OKR（目標と主要結果）","目標達成のための8×8の思考整理ツール","KPI管理","バランス・スコアカード"],"a":1,"e":"マンダラチャートは8×8マスで目標と達成要素を整理する思考ツール。大谷選手が高校時代に活用し注目を集めた。"}]},{"section":"71. 日本の財閥企業","questions":[{"id":97001,"q":"日本の四大財閥として正しい組み合わせはどれか？","c":["三菱・三井・住友・安田","三菱・三井・住友・トヨタ","三菱・住友・日立・富士","三井・住友・安田・ソニー"],"a":0,"e":"戦前の四大財閥は三菱・三井・住友・安田。GHQにより解体されたが、戦後は企業グループとして再結集した。"},{"id":97002,"q":"三菱グループの総帥企業として中核に位置するのはどれか？","c":["三菱自動車","三菱UFJ銀行・三菱商事・三菱重工の3社","三菱電機のみ","三菱地所のみ"],"a":1,"e":"三菱グループの三本柱は三菱UFJ銀行（金融）・三菱商事（商社）・三菱重工（製造）。毎月曜会で連携。"},{"id":97003,"q":"三井グループの象徴的な金融機関はどれか？","c":["三菱UFJ銀行","みずほ銀行","三井住友銀行","りそな銀行"],"a":2,"e":"三井住友銀行は三井グループの中核金融機関。三井住友フィナンシャルグループとして国内第2位の規模。"},{"id":97004,"q":"住友グループの代表的な企業として正しいものはどれか？","c":["住友自動車","住友不動産のみ","住友生命のみ","住友商事・住友化学・住友電工"],"a":3,"e":"住友グループは住友商事・住友化学・住友電工・住友金属鉱山・住友生命など多岐にわたる企業群。"},{"id":97005,"q":"安田財閥を源流とする現在の金融グループはどれか？","c":["みずほフィナンシャルグループ","三井住友フィナンシャルグループ","三菱UFJフィナンシャルグループ","りそなグループ"],"a":0,"e":"安田財閥の安田銀行は戦後に富士銀行となり、第一勧業銀行・日本興業銀行と合併してみずほFGとなった。"},{"id":97006,"q":"財閥解体を命じたのはどの機関か？","c":["日本政府","GHQ（連合国軍最高司令官総司令部）","国際連合","アメリカ議会"],"a":1,"e":"第二次大戦後、GHQが財閥の経済支配を解体。持株会社の禁止・財閥家族の公職追放などが行われた。"},{"id":97007,"q":"「三菱」の社名・ブランドに共通するマークはどれか？","c":["桜・鶴・富士山","三本の矢","三つ菱（スリーダイヤモンド）","三角形三つ"],"a":2,"e":"三菱のスリーダイヤマークは創業者・岩崎弥太郎の土佐藩山内家の「三葉柏」と岩崎家の「三階菱」を組み合わせたもの。"},{"id":97008,"q":"三井財閥の源流となった江戸時代の商家はどれか？","c":["鴻池家","岩崎家","住友家の銅吹き事業","三井越後屋（呉服店）"],"a":3,"e":"三井財閥の起源は江戸時代の三井越後屋呉服店（現・三越）と両替商。現金掛け値なしの商法で発展。"},{"id":97009,"q":"住友財閥の起源として正しいものはどれか？","c":["江戸時代の銅の精錬・製錬業（住友家の別子銅山）","江戸時代の呉服商","明治時代の紡績業","鎌倉時代の武家商法"],"a":0,"e":"住友の起源は江戸初期の銅の精錬技術（南蛮吹き）と別子銅山（愛媛）の開発。300年以上の歴史を持つ。"},{"id":97010,"q":"財閥系企業グループの結束を維持する「社長会」として三菱グループのものはどれか？","c":["二木会","曜日会（月曜会）","白水会","芙蓉会"],"a":1,"e":"三菱グループの社長会は「金曜会」（月曜会とも）。三井は「二木会」、住友は「白水会」、芙蓉会は富士グループ。"}]},{"section":"72. 日本の主要企業・時価総額","questions":[{"id":97101,"q":"2024年時点で日本の時価総額1位の企業はどれか？","c":["トヨタ自動車","ソニーグループ","NTT","キーエンス"],"a":0,"e":"トヨタ自動車は日本の時価総額トップ。世界販売台数でも世界首位を争うグローバル自動車メーカー。"},{"id":97102,"q":"キーエンスの主な事業内容はどれか？","c":["自動車製造","FAセンサー・計測・制御機器の開発・販売","スマートフォン販売","医薬品製造"],"a":1,"e":"キーエンスは工場自動化（FA）向けセンサー・計測機器のトップ企業。高い利益率と社員の高年収で有名。"},{"id":97103,"q":"ソニーグループの主力事業として現在最も利益が大きい分野はどれか？","c":["テレビ・家電","スマートフォン","ゲーム（PlayStation）・音楽・映画のエンタメ事業","自動車部品"],"a":2,"e":"ソニーはゲーム（PS）・音楽（Sony Music）・映画（Columbia Pictures）などエンタメ事業が収益の柱。"},{"id":97104,"q":"三菱UFJフィナンシャル・グループの主な事業はどれか？","c":["自動車製造","保険・不動産","通信・インフラ","銀行・信託・証券などの金融サービス"],"a":3,"e":"MUFGは国内最大の金融グループ。三菱UFJ銀行を中核に信託・証券・海外展開も行うメガバンク。"},{"id":97105,"q":"NTTグループの主な事業はどれか？","c":["通信インフラ・ドコモ・データセンター・ITサービス","航空・物流","エネルギー・電力","自動車・モビリティ"],"a":0,"e":"NTTは日本最大の通信グループ。NTTドコモ（携帯）・NTTデータ（IT）・NTT東西（固定回線）などを傘下に持つ。"},{"id":97106,"q":"任天堂の主な事業と代表的な商品はどれか？","c":["スマートフォン製造","ゲーム機・ゲームソフト（Switch・マリオ・ポケモン等）","PC・サーバー販売","半導体製造"],"a":1,"e":"任天堂はゲーム機（Switch）とゲームソフト（マリオ・ゼルダ・ポケモン等）を主力とするエンタメ企業。"},{"id":97107,"q":"信越化学工業の主な製品として正しいものはどれか？","c":["食品・飲料","医薬品","塩化ビニル樹脂・半導体シリコンウェーハ","自動車部品"],"a":2,"e":"信越化学は塩化ビニル樹脂（世界トップ）と半導体シリコンウェーハ（世界シェア首位）が主力製品。"},{"id":97108,"q":"ファーストリテイリング（ユニクロ）のビジネスモデルの特徴はどれか？","c":["百貨店向けの高級ブランド展開","ECのみで実店舗なし","フランチャイズ展開のみ","SPA（製造小売業）モデルで企画・製造・販売を一貫して行う"],"a":3,"e":"ユニクロはSPA（製造小売）モデルを採用。自社で企画・素材開発・生産管理・販売まで一貫して行い高品質・低価格を実現。"},{"id":97109,"q":"リクルートホールディングスの主な事業として正しいものはどれか？","c":["HR（人材）・販促メディア・転職サービスのプラットフォーム","製造業・工場運営","医薬品販売","建設・不動産開発"],"a":0,"e":"リクルートはHRテクノロジー（Indeed等）・転職メディア（リクナビ）・販促メディア（じゃらん・ホットペッパー）が主力。"},{"id":97110,"q":"デンソーの主な事業内容はどれか？","c":["半導体の設計・販売","自動車部品（エアコン・センサー・電子制御）の製造","医療機器製造","食品・農業機械"],"a":1,"e":"デンソーはトヨタ系の自動車部品メーカー。カーエアコン・センサー・電子制御ユニットで世界トップ級のシェアを持つ。"}]},{"section":"73. 日本の経済史","questions":[{"id":98001,"q":"日本の高度経済成長期はおよそいつからいつか？","c":["1955年〜1973年","1930年代〜1945年","1980年〜1990年","1990年〜2000年"],"a":0,"e":"日本の高度経済成長期は1955年〜1973年。年平均10%前後の成長を続け、国民総生産が急拡大した。"},{"id":98002,"q":"1985年のプラザ合意の内容として正しいものはどれか？","c":["日本が核廃棄を宣言した条約","G5がドル高是正のため協調してドル安・円高誘導することで合意","日米安保の改定","貿易摩擦解消のための輸出自主規制"],"a":1,"e":"プラザ合意はG5（米・英・仏・独・日）がドル高を是正するため協調介入に合意。円は急激に上昇した。"},{"id":98003,"q":"バブル経済が崩壊した時期はいつか？","c":["1985年","1997年","1991年前後","2001年"],"a":2,"e":"日本のバブル経済は1986〜1991年頃。株価・地価が急騰後、1991年前後から崩壊し長期低迷へ。"},{"id":98004,"q":"「失われた30年」とは何を指すか？","c":["明治時代の経済停滞","昭和初期の不況","戦後の復興遅れ","バブル崩壊後の1990年代から続く日本の長期経済低迷"],"a":3,"e":"失われた30年はバブル崩壊後の1990年代から続く日本の低成長・デフレ・賃金停滞の時代を指す。"},{"id":98005,"q":"アベノミクスの「三本の矢」として正しいものはどれか？","c":["大胆な金融緩和・機動的な財政政策・成長戦略","増税・規制強化・貿易制限","緊縮財政・円高維持・輸出拡大","民営化・規制緩和・外資誘致"],"a":0,"e":"アベノミクスの三本の矢は①大胆な金融緩和②機動的な財政政策③民間投資を喚起する成長戦略。"},{"id":98006,"q":"1997年のアジア通貨危機で最初に通貨が急落した国はどれか？","c":["日本","タイ","中国","韓国"],"a":1,"e":"1997年アジア通貨危機はタイバーツの急落から始まり、韓国・インドネシア・マレーシアなどに波及した。"},{"id":98007,"q":"日本のデフレ脱却目標として日銀が設定した物価上昇率の目標はどれか？","c":["0%","1%","2%","5%"],"a":2,"e":"日本銀行は2013年以降、物価安定目標として消費者物価上昇率2%を掲げてきた。"},{"id":98008,"q":"2008年のリーマン・ショックの主な原因はどれか？","c":["日本の財政破綻","原油価格の急騰のみ","中国経済の急落","米国のサブプライムローン問題に端を発した金融危機"],"a":3,"e":"リーマン・ショックは米国の低所得者向けサブプライムローンの焦げ付きが世界金融危機に発展した事件。"},{"id":98009,"q":"日本の少子高齢化が経済に与える主な影響はどれか？","c":["労働力不足・社会保障費増大・経済縮小リスク","労働力増加・税収増加","消費拡大・GDP成長","輸出増加・貿易黒字拡大"],"a":0,"e":"少子高齢化は労働力不足・消費市場縮小・社会保障費増大を招き、日本経済の長期的な課題となっている。"},{"id":98010,"q":"日本のGDPの世界順位（2023年時点）はどれか？","c":["1位","3位（ドル建てでは4位に後退）","2位","5位"],"a":1,"e":"日本のGDPは長らく世界3位だったが、2023年にドル建てでドイツに抜かれ4位に後退した。"}]},{"section":"74. 世界の株式市場","questions":[{"id":98011,"q":"世界最大の株式取引所はどれか？","c":["NYSE（ニューヨーク証券取引所）","ロンドン証券取引所","JASDAQ（ジャスダック）","上海証券取引所"],"a":0,"e":"NYSEはニューヨーク証券取引所。上場企業の時価総額合計で世界最大。NASDAQと並び世界の金融の中心。"},{"id":98012,"q":"NASDAQの特徴として正しいものはどれか？","c":["農業・資源関連企業が中心","テクノロジー・成長企業が多く上場する電子株式市場","不動産専門の取引所","アジア企業専門市場"],"a":1,"e":"NASDAQはApple・Microsoft・Google・Amazonなどテクノロジー・成長企業が多く上場する電子取引所。"},{"id":98013,"q":"S&P500とは何か？","c":["米国の500の銀行の指数","世界500社の指数","米国の代表的な500社の株価指数","ナスダック上場500社の指数"],"a":2,"e":"S&P500は米国の主要500社の株価を時価総額加重平均した指数。米国経済の健全性を示す代表的な指標。"},{"id":98014,"q":"日経平均株価（日経225）とは何か？","c":["東証全銘柄の平均","日銀が管理する金利指標","日本の全上場企業の時価総額","東証プライムに上場する225銘柄の株価指数"],"a":3,"e":"日経平均は東証プライム上場の代表的225銘柄の株価指数。日本経済・株式市場の動向を示す代表指標。"},{"id":98015,"q":"PER（株価収益率）の説明として正しいものはどれか？","c":["株価を1株当たり純利益で割った値・割高・割安の目安","企業の純資産に対する株価の比率","配当金を株価で割った利回り","売上高に対する株価の比率"],"a":0,"e":"PER＝株価÷EPS（1株当たり純利益）。業界平均と比較して割高・割安を判断する指標。"},{"id":98016,"q":"「ブル相場」と「ベア相場」の違いはどれか？","c":["ブル=下落相場・ベア=上昇相場","ブル=上昇相場・ベア=下落相場","両方とも横ばい相場の別名","ブルは債券・ベアは株式市場を指す"],"a":1,"e":"ブル（雄牛）は角を下から上に突き上げることから上昇相場。ベア（熊）は爪を上から下に振り下ろすことから下落相場。"},{"id":98017,"q":"ETF（上場投資信託）の特徴として正しいものはどれか？","c":["1社の株のみに投資する商品","元本保証の金融商品","株式のように市場で売買できる分散投資型の投資信託","銀行預金の一種"],"a":2,"e":"ETFは株式市場に上場し取引所でリアルタイムに売買できる投資信託。指数連動型が多く分散投資に有効。"},{"id":98018,"q":"IPO（新規株式公開）とは何か？","c":["企業が倒産する手続き","株式の非公開化（MBO）","既上場企業の増資","未上場企業が株式市場に初めて株式を公開すること"],"a":3,"e":"IPOは未上場企業が証券取引所に株式を公開し、広く投資家から資金調達できるようにすること。"},{"id":98019,"q":"インデックス投資とアクティブ投資の違いはどれか？","c":["インデックスは指数に連動・アクティブは市場平均を超えることを目指す","インデックスは個別株・アクティブは指数連動","両者は同じ投資手法","インデックスは債券のみ"],"a":0,"e":"インデックス投資は市場指数に連動する低コスト運用。アクティブ投資は銘柄選択で市場平均超を狙う高コスト運用。"},{"id":98020,"q":"「時価総額」の計算式として正しいものはどれか？","c":["売上高×利益率","株価×発行済株式数","純資産÷株価","売上高÷株価"],"a":1,"e":"時価総額＝株価×発行済株式数。企業の市場での評価額を示す最も基本的な指標。"}]},{"section":"75. ベンチャー・スタートアップ用語","questions":[{"id":98021,"q":"「ユニコーン企業」とは何か？","c":["時価総額10億ドル以上の未上場スタートアップ","上場から10年以上経つ老舗企業","100億円以上の売上を持つ中小企業","従業員1000名以上のベンチャー"],"a":0,"e":"ユニコーン企業は評価額10億ドル（約1000億円）以上の未上場スタートアップ。希少性からユニコーンと呼ぶ。"},{"id":98022,"q":"VC（ベンチャーキャピタル）の役割はどれか？","c":["銀行から融資を受ける機関","成長が期待されるスタートアップに出資し株式取得・投資リターンを得る投資会社","国の補助金を分配する機関","企業の上場手続きを代行する会社"],"a":1,"e":"VCはスタートアップに資金提供し株式を取得。IPOやM&Aで株式を売却してリターンを得るビジネスモデル。"},{"id":98023,"q":"「バーンレート」とは何か？","c":["株価の下落速度","製品の欠陥率","スタートアップが資金を消費するペース（月次の現金流出額）","従業員の離職率"],"a":2,"e":"バーンレートは月間の資金消費額。バーンレートと残資金からランウェイ（資金が尽きるまでの期間）を計算する。"},{"id":98024,"q":"「シードラウンド」とは何か？","c":["企業が上場する最終段階","IPO後の追加調達","シリーズBの別名","スタートアップの最初期の資金調達ラウンド"],"a":3,"e":"シードラウンドはスタートアップの最初期の資金調達。プロダクト開発・市場検証前後の段階で行われることが多い。"},{"id":98025,"q":"「PMF（プロダクトマーケットフィット）」とは何か？","c":["製品・サービスが市場のニーズと合致しスケールできる状態","製品の価格設定完了","特許申請の完了","上場審査の通過"],"a":0,"e":"PMFとは製品が市場のニーズにフィットし、ユーザーに強く求められている状態。スタートアップ成長の転換点。"},{"id":98026,"q":"「エクイティ」と「デット」の違いはどれか？","c":["エクイティ=借金・デット=株式","エクイティ=株式による資金調達・デット=借入による資金調達","両者は同じ","エクイティは国内・デットは海外からの調達"],"a":1,"e":"エクイティは株式発行による調達（返済不要・株主に権利）。デットは借入（返済必要・利息発生）。"},{"id":98027,"q":"「ピボット」とはスタートアップにおいて何を意味するか？","c":["会社を清算すること","新しい社員を採用すること","事業の方向性や戦略を大きく転換すること","海外進出すること"],"a":2,"e":"ピボットは市場の反応を見て事業モデル・ターゲット・製品を大きく転換すること。失敗から学ぶ重要な戦略判断。"},{"id":98028,"q":"「MBO（マネジメント・バイアウト）」とは何か？","c":["経営会議の開催","M&Aの反対語","マーケティング戦略の一種","経営陣が自社株を買い取り独立・非公開化する手法"],"a":3,"e":"MBOは経営陣が投資ファンド等と組んで自社株を買い取り、親会社から独立・非公開化する手法。"},{"id":98029,"q":"「デカコーン企業」とは何か？","c":["時価総額100億ドル（約1兆円）以上の未上場スタートアップ","時価総額1億ドル以上の企業","上場後10年以内の企業","従業員1万人以上のスタートアップ"],"a":0,"e":"デカコーンはユニコーンの10倍、評価額100億ドル以上の未上場企業。SpaceX・Stripe・ByteDanceなどが該当。"},{"id":98030,"q":"「LTV（ライフタイムバリュー）」とは何か？","c":["企業の総資産価値","顧客が生涯を通じて企業にもたらす累計収益","特許の価値評価","株主への配当総額"],"a":1,"e":"LTVは1人の顧客が取引開始から終了までにもたらす累計収益。CAC（顧客獲得コスト）と比較しビジネスの健全性を判断。"}]},{"section":"76. マーケティング基礎","questions":[{"id":98031,"q":"マーケティングの「4P」として正しい組み合わせはどれか？","c":["Product・Price・Place・Promotion","People・Process・Physical・Profit","Plan・Perform・Progress・Profit","Purpose・Position・Power・Pull"],"a":0,"e":"4PはProduct（製品）・Price（価格）・Place（流通）・Promotion（販促）。マーケティングミックスの基本フレームワーク。"},{"id":98032,"q":"「STP分析」のSTPとは何の略か？","c":["Sales・Target・Profit","Segmentation・Targeting・Positioning","Strategy・Tactics・Planning","Search・Track・Promote"],"a":1,"e":"STPはSegmentation（市場細分化）・Targeting（ターゲット選定）・Positioning（立ち位置の設定）の3ステップ。"},{"id":98033,"q":"「NPS（ネット・プロモーター・スコア）」とは何か？","c":["新聞広告の効果指標","ネット広告のクリック率","顧客が他者に推薦する意向を0〜10点で測る顧客ロイヤルティ指標","売上成長率の指標"],"a":2,"e":"NPSは「この製品・サービスを友人や同僚に勧めますか？」と聞き0〜10点で測る顧客ロイヤルティの指標。"},{"id":98034,"q":"「コンテンツマーケティング」の特徴はどれか？","c":["大量のテレビCMを放映する手法","価格を下げて販売量を増やす手法","競合他社の広告を買収する手法","有益なコンテンツを提供し顧客との関係を構築するインバウンド型マーケティング"],"a":3,"e":"コンテンツマーケティングはブログ・動画・SNSで有益な情報を発信し顧客を引き寄せる手法。広告より信頼性が高い。"},{"id":98035,"q":"「CAC（顧客獲得コスト）」の説明として正しいものはどれか？","c":["新規顧客1人を獲得するためにかかった総コスト","商品の製造原価","顧客1人当たりの年間収益","広告の総予算"],"a":0,"e":"CACは新規顧客1人を獲得するためのマーケティング・営業コストの合計。LTVと比較してビジネスの効率を評価する。"},{"id":98036,"q":"「ブランドポジショニング」とは何か？","c":["工場の立地選定","競合と比較して自社ブランドをどこに位置づけるかを明確にすること","株価の位置付け","社員のポジション管理"],"a":1,"e":"ポジショニングは顧客の頭の中に競合と差別化された自社ブランドの独自の位置を確立する戦略。"},{"id":98037,"q":"「オウンドメディア」とは何か？","c":["競合他社のメディア","有料広告メディア","企業が自社で保有・運営するウェブサイト・ブログ・SNSアカウント等","テレビ・新聞などのマスメディア"],"a":2,"e":"オウンドメディアは企業が自社で所有・運営するメディア。コーポレートサイト・オウンドブログ・SNS公式アカウントなど。"},{"id":98038,"q":"「バイラルマーケティング」の特徴はどれか？","c":["テレビCMを大量投下する手法","値引きキャンペーンを大規模に行う手法","競合他社を批判する広告手法","消費者が口コミやSNSで自発的に情報を拡散する現象を活用するマーケティング"],"a":3,"e":"バイラルマーケティングはウイルスのように情報が人から人へ広がる現象を活用する手法。SNS時代に重要性が増した。"},{"id":98039,"q":"「ペルソナ」とはマーケティングにおいて何を指すか？","c":["ターゲット顧客の典型的な人物像を具体的に設定したもの","競合企業の経営者","広告のキャラクターの法律上の権利","商標登録されたブランド名"],"a":0,"e":"ペルソナは年齢・職業・価値観・悩みなどを具体化した架空の顧客像。マーケティング施策の精度を上げるために使用。"},{"id":98040,"q":"「ROI（投資対効果）」の計算式として正しいものはどれか？","c":["売上÷社員数","（利益－投資額）÷投資額×100%","売上÷広告費","純利益÷総資産"],"a":1,"e":"ROI＝（利益－投資額）÷投資額×100%。投資に対してどれだけのリターンが得られたかを示す指標。"}]},{"section":"77. 会計・財務の基礎","questions":[{"id":98041,"q":"「PL（損益計算書）」で分かることはどれか？","c":["一定期間の売上・費用・利益の状況","企業の資産・負債・純資産の状況","現金の流れ","株主構成"],"a":0,"e":"PLは一定期間（1年間など）の経営成績を示す。売上高・売上原価・販管費・営業利益・最終利益が分かる。"},{"id":98042,"q":"「BS（貸借対照表）」で分かることはどれか？","c":["1年間の売上と利益","ある時点の資産・負債・純資産（自己資本）の残高","現金の収支","経営者の報酬"],"a":1,"e":"BSはある時点（決算日）の財政状態を示す。左側に資産、右側に負債と純資産が記載される。"},{"id":98043,"q":"「ROE（自己資本利益率）」の説明として正しいものはどれか？","c":["総資産に対する利益の割合","売上高に対する利益の割合","自己資本（純資産）に対してどれだけの利益を生んだかの割合","株価に対する配当の割合"],"a":2,"e":"ROE＝純利益÷自己資本×100%。株主が投じた資本をどれだけ効率よく使って利益を生んだかを示す指標。"},{"id":98044,"q":"「EBITDA」とは何か？","c":["純利益の別名","キャッシュフローの別名","売上総利益の別名","利息・税金・減価償却費控除前利益。企業の本業の稼ぐ力を示す指標"],"a":3,"e":"EBITDAは税引前利益に支払利息・減価償却費を加算したもの。M&Aや企業価値評価でよく使われる指標。"},{"id":98045,"q":"「CF（キャッシュフロー計算書）」の3区分として正しいものはどれか？","c":["営業CF・投資CF・財務CF","売上・費用・利益","資産・負債・純資産","固定費・変動費・利益"],"a":0,"e":"CF計算書は営業活動（本業の現金収支）・投資活動（設備投資等）・財務活動（借入・返済等）の3区分で構成される。"},{"id":98046,"q":"「粗利（売上総利益）」の計算式はどれか？","c":["売上高－販売管理費","売上高－売上原価","営業利益＋減価償却費","経常利益＋特別利益"],"a":1,"e":"粗利（売上総利益）＝売上高－売上原価。商品・サービスを提供する基本的な儲けを示す。"},{"id":98047,"q":"「減価償却」とは何か？","c":["不良債権を帳消しにすること","売掛金の回収","固定資産の取得費用を耐用年数にわたって費用として分割計上すること","棚卸資産の評価損"],"a":2,"e":"減価償却は建物・機械など長期使用する資産の取得費を使用年数に応じて毎年費用として計上する会計処理。"},{"id":98048,"q":"「営業利益」と「経常利益」の違いはどれか？","c":["全く同じ指標","営業利益は税引後・経常利益は税引前","経常利益の方が必ず小さい","営業利益は本業の利益・経常利益は営業利益に金融損益等を加減したもの"],"a":3,"e":"営業利益は本業での利益。経常利益は営業利益に受取利息・支払利息などの営業外損益を加減した利益。"},{"id":98049,"q":"「自己資本比率」が高い企業の特徴はどれか？","c":["借入に依存せず財務的に安定・倒産リスクが低い","借入金が多く財務リスクが高い","売上が大きい","利益率が高い"],"a":0,"e":"自己資本比率＝自己資本÷総資産×100%。高いほど借入依存度が低く財務的に安定した企業といえる。"},{"id":98050,"q":"医療法人の決算で特に重要な指標はどれか？","c":["株価","医業収益・医業利益・現金預金残高・純資産の推移","配当金","株主資本コスト"],"a":1,"e":"医療法人は医業収益（診療収入等）・医業利益・現金残高・純資産の推移が経営健全性の主要指標となる。"}]},{"section":"78. ビジネスフレームワーク","questions":[{"id":98051,"q":"「3C分析」の3Cとは何か？","c":["Customer・Competitor・Company","Cost・Customer・Channel","Concept・Conduct・Control","Communication・Cooperation・Commitment"],"a":0,"e":"3C分析はCustomer（市場・顧客）・Competitor（競合）・Company（自社）の3要素で事業環境を分析するフレームワーク。"},{"id":98052,"q":"「SWOT分析」の4要素として正しいものはどれか？","c":["Speed・Work・Output・Target","Strengths・Weaknesses・Opportunities・Threats","Sales・Win・Operations・Total","Strategy・Way・Objective・Tactics"],"a":1,"e":"SWOTはStrengths（強み）・Weaknesses（弱み）・Opportunities（機会）・Threats（脅威）。内部・外部環境を整理する。"},{"id":98053,"q":"「MECE」とは何か？","c":["マーケティング効果検証の略","会計基準の名称","漏れなく・ダブりなく情報や要素を整理する考え方","採用面接の評価手法"],"a":2,"e":"MECEはMutually Exclusive Collectively Exhaustiveの略。ロジカルシンキングの基本で「漏れなくダブりなく」整理する手法。"},{"id":98054,"q":"「ロジックツリー」の主な用途はどれか？","c":["組織図の作成","採用計画の立案","財務諸表の分析","問題の原因分解・解決策の列挙を木構造で整理する思考ツール"],"a":3,"e":"ロジックツリーは問題をMECEに分解し原因特定や解決策検討に使うフレームワーク。コンサルで多用される。"},{"id":98055,"q":"「KPI」と「KGI」の違いはどれか？","c":["KGIは最終目標指標・KPIはKGI達成に向けた中間プロセス指標","全く同じ指標","KPIの方が重要","KGIは財務指標のみ"],"a":0,"e":"KGI（重要目標達成指標）は最終ゴール。KPI（重要業績評価指標）はKGI達成に向けた中間目標・行動指標。"},{"id":98056,"q":"「PDCAサイクル」の4ステップとして正しいものはどれか？","c":["Prepare・Design・Create・Assess","Plan・Do・Check・Action","Perform・Direct・Control・Adjust","Plan・Develop・Confirm・Achieve"],"a":1,"e":"PDCAはPlan（計画）・Do（実行）・Check（評価）・Action（改善）の繰り返しで継続的に業務を改善するサイクル。"},{"id":98057,"q":"「ファイブフォース分析」を提唱したのは誰か？","c":["ピーター・ドラッカー","フィリップ・コトラー","マイケル・ポーター","クレイトン・クリステンセン"],"a":2,"e":"マイケル・ポーターが提唱。業界の競争要因を①競合②新規参入③代替品④売り手交渉力⑤買い手交渉力の5つで分析。"},{"id":98058,"q":"「バリューチェーン」とは何か？","c":["サプライヤーの評価基準","ブランド価値の評価手法","株主への価値提供","製品・サービスが顧客に届くまでの各活動を連鎖として捉え価値創造を分析するフレームワーク"],"a":3,"e":"バリューチェーンはポーターが提唱。調達・製造・物流・販売・サービスなど価値を生む活動の連鎖を分析する。"},{"id":98059,"q":"「OKR」とは何か？","c":["目標（Objectives）と主要結果（Key Results）を設定し組織・個人の方向性を揃えるフレームワーク","決算書の一種","マーケティング効果指標","採用評価基準"],"a":0,"e":"OKRはObjectives（目標）とKey Results（主要結果）を設定する目標管理手法。Google・Intel等が導入し普及した。"},{"id":98060,"q":"「イシューツリー」の使い方として正しいものはどれか？","c":["組織の人員配置を決める","解くべき問題（イシュー）を特定し優先順位をつけるための分解ツール","在庫管理に使う","広告予算を配分する"],"a":1,"e":"イシューツリーは解決すべき問題を構造的に分解し、本質的な課題を特定するためのロジカルシンキングツール。"}]},{"section":"79. 世界の主要企業・ビジネス","questions":[{"id":98061,"q":"2024年時点で世界の時価総額1位の企業はどれか？","c":["Apple","Tesla","Amazon","Microsoft"],"a":0,"e":"Appleは時価総額で世界トップを争う。iPhone・Mac・サービス事業（App Store・Apple Music等）が収益の柱。"},{"id":98062,"q":"サウジアラムコの主な事業はどれか？","c":["自動車製造","原油・天然ガスの採掘・精製・販売","半導体製造","金融サービス"],"a":1,"e":"サウジアラムコはサウジアラビアの国営石油会社。世界最大の石油会社で時価総額でAppleと首位を争う。"},{"id":98063,"q":"McKinsey（マッキンゼー）・BCG・Bainの共通点はどれか？","c":["製薬会社","会計事務所","世界三大戦略コンサルティングファーム（MBB）","投資銀行"],"a":2,"e":"McKinsey・BCG・Bainは世界三大戦略コンサル（MBB）。経営戦略立案・組織変革・M&A支援などを行う。"},{"id":98064,"q":"「LVMH」はどのような企業か？","c":["世界最大の自動車メーカー","世界最大の銀行グループ","アメリカの軍事企業","ルイ・ヴィトン・モエ・ヘネシーを傘下に持つ世界最大の高級品コングロマリット"],"a":3,"e":"LVMHはルイ・ヴィトン・Dior・Givenchy・Moët & Chandonなど75以上の高級ブランドを擁するフランスの複合企業。"},{"id":98065,"q":"Teslaのビジネスモデルで他の自動車メーカーと異なる最大の特徴はどれか？","c":["直販モデル・ソフトウェアアップデート・エネルギー事業を組み合わせたテック企業的運営","ディーラー網を通じた販売","ガソリン車も同時製造","製造を全て外注する"],"a":0,"e":"TeslaはEV直販・OTAソフトウェア更新・太陽光・蓄電池事業を組み合わせたテック企業的ビジネスモデルが特徴。"},{"id":98066,"q":"BYDとはどのような企業か？","c":["アメリカの半導体メーカー","中国最大のEVメーカー・バッテリーメーカー","韓国の電子機器メーカー","日本の自動車部品メーカー"],"a":1,"e":"BYD（Build Your Dreams）は中国のEV・バッテリーメーカー。テスラを販売台数で上回る時期もある世界最大級のEV企業。"},{"id":98067,"q":"「Four Seasons」「Hilton」「Marriott」の共通点はどれか？","c":["世界的な航空会社","世界的な飲食チェーン","世界的なホテル・ホスピタリティグループ","世界的な保険会社"],"a":2,"e":"フォーシーズンズ・ヒルトン・マリオットは世界的なホテルグループ。グローバルな宿泊ブランドとして知られる。"},{"id":98068,"q":"「Goldman Sachs」の主な事業はどれか？","c":["スーパーマーケット運営","保険販売","自動車ローン専業","投資銀行・証券・資産運用"],"a":3,"e":"ゴールドマン・サックスは世界トップの投資銀行。M&Aアドバイザリー・証券引受・資産運用が主な事業。"},{"id":98069,"q":"「Airbnb」のビジネスモデルはどれか？","c":["個人が部屋・家を貸し出すプラットフォームを提供するシェアリングエコノミー","自社でホテルを所有・運営する","航空券の予約サービス","旅行保険の販売"],"a":0,"e":"AirbnbはC2Cの民泊プラットフォーム。自社で不動産を持たずホストとゲストをつなぐシェアリングエコノミーの代表例。"},{"id":98070,"q":"「ESG投資」とは何か？","c":["新興国のみへの投資","環境・社会・ガバナンスを考慮した持続可能な投資手法","財務指標のみで企業を評価する従来型投資","短期的な利益を最大化する投資戦略"],"a":1,"e":"ESG投資はEnvironment（環境）・Social（社会）・Governance（企業統治）を考慮して企業を評価・投資する手法。"}]},{"section":"80. 医療DX・ヘルステック","questions":[{"id":98071,"q":"「電子カルテ」の普及が日本の医療に与える主なメリットはどれか？","c":["情報共有の効率化・診療の質向上・医療安全の改善","医師の給与が上がる","病院の建設コストが下がる","薬剤費が自動的に下がる"],"a":0,"e":"電子カルテは多職種間の情報共有・診療履歴の一元管理・医療安全向上・事務効率化に貢献する。"},{"id":98072,"q":"オンライン診療が2020年以降に急拡大した主な背景はどれか？","c":["医療費の大幅値上がり","新型コロナウイルス感染症拡大による特例措置で規制が緩和されたため","医師の数が減ったため","スマートフォン普及が始まったため"],"a":1,"e":"コロナ禍の2020年に初診からのオンライン診療が特例として認められ急拡大。2022年以降は恒久化・拡充された。"},{"id":98073,"q":"m3（エムスリー）の主なビジネスモデルはどれか？","c":["病院を直接運営する","医療機器製造","医師向けプラットフォームで製薬会社等から広告・情報提供費を得るメディア＆ソリューション事業","保険診療の代行請求"],"a":2,"e":"m3は医師会員向けプラットフォームを基盤に製薬会社のMR支援・治験・医師転職など多様なサービスを展開。"},{"id":98074,"q":"「AI画像診断」が特に期待されている分野はどれか？","c":["精神科・カウンセリング","調剤薬局の在庫管理","手術ロボットの操作","放射線科・病理・眼科などの画像読影の精度向上と医師不足の補完"],"a":3,"e":"AI画像診断は胸部X線・CT・眼底写真・病理など画像読影への活用が進む。医師不足対策・精度向上が期待される。"},{"id":98075,"q":"「PHR（パーソナルヘルスレコード）」とは何か？","c":["個人が自分の健康・医療情報を一元管理・活用する仕組み","病院が保管する電子カルテ","製薬会社の研究データ","国の医療費統計"],"a":0,"e":"PHRは健診結果・服薬歴・バイタルデータなどを個人が一元管理し健康管理・医療機関との共有に活用する仕組み。"},{"id":98076,"q":"「Medley（メドレー）」の主なサービスはどれか？","c":["医療機器製造","医療介護の求人（ジョブメドレー）・オンライン診療・医薬品データベースのプラットフォーム","透析機器のリース","病院建設コンサル"],"a":1,"e":"メドレーはジョブメドレー（医療介護求人）・CLINICS（オンライン診療）・CLINICSカルテなど医療DXサービスを展開。"},{"id":98077,"q":"ウェアラブルデバイスが医療に活用される主な用途はどれか？","c":["手術の自動化","薬剤の自動投与","心拍・血糖・睡眠・活動量の継続モニタリングと早期異常検知","電子カルテへの自動入力のみ"],"a":2,"e":"Apple Watch等のウェアラブルは心電図・心拍・血中酸素・睡眠を継続計測し、不整脈早期発見などに活用が進む。"},{"id":98078,"q":"「遠隔ICU（tele-ICU）」の主なメリットはどれか？","c":["ICUを廃止できる","コストが全くかからない","患者の自己管理が可能になる","専門医が遠隔からICU患者を監視・支援し地方の医師不足を補完できる"],"a":3,"e":"tele-ICUは集中治療専門医が遠隔で複数ICUを監視・支援する仕組み。地方の医師不足・夜間体制の補完に有効。"},{"id":98079,"q":"「ゲノム医療」が注目される理由はどれか？","c":["個人の遺伝情報に基づいた最適な治療薬・予防策を選択できるから","治療費が安くなるから","全ての病気が治癒できるから","検査が簡単だから"],"a":0,"e":"ゲノム医療はがん・難病などで遺伝子変異を解析し最適な治療薬を選択する個別化医療。精度・副作用軽減に期待。"},{"id":98080,"q":"医療DXを推進する国の施策として2023年以降の動きとして正しいものはどれか？","c":["電子カルテの廃止","マイナンバーカードと健康保険証の一体化（マイナ保険証）の推進","オンライン診療の全面禁止","紙カルテへの回帰"],"a":1,"e":"政府は2023年以降マイナ保険証推進・電子処方箋・電子カルテ標準化など医療DX工程表に基づく施策を展開中。"}]},{"section":"81. 地政学","questions":[{"id":99001,"q":"地政学の創始者とされる人物はどれか？","c":["ハルフォード・マッキンダー","カール・マルクス","マックス・ウェーバー","アダム・スミス"],"a":0,"e":"マッキンダーはイギリスの地理学者。1904年にハートランド理論を発表し近代地政学の父と呼ばれる。"},{"id":99002,"q":"マッキンダーの「ハートランド」とはどの地域を指すか？","c":["西欧・地中海沿岸","南アジア・インド亜大陸","ユーラシア大陸内陸部","北米大陸中央部"],"a":2,"e":"ハートランドはユーラシア内陸部（現ロシア〜中央アジア）。「ハートランドを制する者が世界を制する」とされた。"},{"id":99003,"q":"シーパワーとランドパワーの対立構図で、現代のシーパワーの代表国はどれか？","c":["ロシア","中国","インド","アメリカ"],"a":3,"e":"アメリカは海軍力・海上覇権を基盤とするシーパワーの典型。対してロシア・中国はランドパワーの要素が強い。"},{"id":99004,"q":"チョークポイント（海峡・運河）として最も重要な貿易ルートはどれか？","c":["マラッカ海峡・スエズ運河・ホルムズ海峡","日本海・オホーツク海・ベーリング海峡","地中海・黒海・バルト海","カリブ海・メキシコ湾・パナマ湾"],"a":0,"e":"マラッカ・スエズ・ホルムズは世界の石油・物流の大動脈。封鎖されると世界経済に甚大な影響を与える。"},{"id":99005,"q":"「バッファーゾーン（緩衝国）」の説明として正しいものはどれか？","c":["軍事大国同士の間に位置し衝突を緩和する国・地域","経済的に最も豊かな中立国","国連が管理する非武装地帯","植民地から独立した新興国"],"a":0,"e":"バッファーゾーンは大国間の緩衝地帯。例：ウクライナ（NATO対ロシア）、アフガニスタン（英露のグレートゲーム）。"},{"id":99006,"q":"中国の「一帯一路」構想の地政学的目的として正しいものはどれか？","c":["日本との経済連携強化","アフリカへの人道支援拡大","陸・海のシルクロードで影響圏を拡大し米国主導秩序に対抗","東南アジア諸国との軍事同盟形成"],"a":2,"e":"一帯一路はインフラ投資を通じた影響力拡大戦略。陸路（中央アジア〜欧州）と海路（インド洋〜アフリカ）の2軸。"},{"id":99007,"q":"「リムランド理論」を唱えたアメリカの地政学者はどれか？","c":["ズビグネフ・ブレジンスキー","ニコラス・スパイクマン","サミュエル・ハンチントン","フランシス・フクヤマ"],"a":3,"e":"スパイクマンはリムランド（ユーラシア周縁部）の支配が世界覇権の鍵と主張。マッキンダーのハートランド論に対抗した。"},{"id":99008,"q":"「文明の衝突」を著したアメリカの政治学者はどれか？","c":["フランシス・フクヤマ","ジョン・ミアシャイマー","ヘンリー・キッシンジャー","サミュエル・ハンチントン"],"a":3,"e":"ハンチントンは冷戦後の対立軸を「文明」と定義。西洋・イスラム・中国・ロシアなど8つの文明圏の衝突を予測した。"},{"id":99009,"q":"北極海航路の地政学的重要性として正しいものはどれか？","c":["石油資源は存在しない","現在すでに完全に民間開放されている","温暖化による氷解で欧州〜アジア間の新航路・資源開発の場として注目","アメリカのみが利用権を持つ"],"a":2,"e":"北極海は温暖化で航行可能期間が拡大。スエズ運河経由より大幅に短縮でき、ロシア・中国・北欧が権益を争う。"},{"id":99010,"q":"「地政学リスク」が医師紹介ビジネスに与える影響として正しいものはどれか？","c":["戦争・紛争は国内採用市場に影響しない","資源価格上昇→病院の経営悪化→採用抑制という連鎖が起きうる","地政学リスクは金融市場のみの問題","外国人医師の採用増加につながる"],"a":1,"e":"紛争や資源高騰は医療機関のコスト増→採用予算縮小につながりうる。地政学リスクの医療業界への波及を理解することが重要。"}]},{"section":"82. 宗教","questions":[{"id":99011,"q":"世界三大宗教として正しい組み合わせはどれか？","c":["キリスト教・イスラム教・仏教","キリスト教・ユダヤ教・神道","イスラム教・ヒンドゥー教・仏教","キリスト教・儒教・道教"],"a":0,"e":"世界三大宗教はキリスト教（約24億人）・イスラム教（約19億人）・仏教（約5億人）。信者数・地理的広がりで規定される。"},{"id":99012,"q":"イスラム教の聖典はどれか？","c":["バガヴァッド・ギーター","旧約聖書","クルアーン（コーラン）","トーラー"],"a":2,"e":"クルアーンはアラビア語で「朗読」の意。預言者ムハンマドに下された神の言葉とされ、イスラム教の最高権威の聖典。"},{"id":99013,"q":"仏教における「四苦八苦」の「四苦」として正しいものはどれか？","c":["生・老・病・死","怒り・嫉妬・貪欲・無知","貧困・孤独・差別・戦争","愛別離苦・怨憎会苦・求不得苦・五蘊盛苦"],"a":0,"e":"仏教の四苦は生老病死。人間の根本的苦しみとされる。これに愛別離苦・怨憎会苦・求不得苦・五蘊盛苦を加えて八苦となる。"},{"id":99014,"q":"キリスト教における「三位一体」の説明として正しいものはどれか？","c":["父なる神・子なるキリスト・聖霊が一体であるという教義","父・母・子の家族的神観","旧約・新約・第三の聖典の三書","洗礼・聖餐・告白の三秘跡"],"a":0,"e":"三位一体（Trinity）はキリスト教の核心教義。父（神）・子（イエス）・聖霊の3者が本質的に一体であるとされる。"},{"id":99015,"q":"ユダヤ教・キリスト教・イスラム教に共通する特徴はどれか？","c":["輪廻転生を信じる","ヴェーダ聖典を持つ","多神教である","アブラハムを共通の祖とする一神教"],"a":3,"e":"3宗教はいずれもアブラハムの宗教（アブラハミックreligion）と呼ばれる。同じ神を信じながら教義が分岐した。"},{"id":99016,"q":"日本における「神仏習合」の説明として正しいものはどれか？","c":["神道とキリスト教の融合","仏教の廃止政策","神道と仏教が混合・共存してきた日本独自の宗教文化","明治政府が推進した国家神道政策"],"a":2,"e":"神仏習合は奈良時代以降に進んだ神道と仏教の融合現象。明治の神仏分離令まで1000年以上続いた日本独自の宗教形態。"},{"id":99017,"q":"医師との商談でイスラム教徒の医師を訪問する際の注意点として正しいものはどれか？","c":["豚肉料理を接待の定番として準備する","イスラム教徒の医師は日本にほとんどいない","礼拝は月1回のため商談への影響は少ない","ラマダン期間中は昼間の飲食を断食しているため配慮が必要"],"a":3,"e":"ラマダン（断食月）中は日没まで飲食断絶。昼の会食接待は避け、礼拝時間（1日5回）への配慮も重要なビジネスマナー。"},{"id":99018,"q":"ヒンドゥー教における「カースト制度」の説明として正しいものはどれか？","c":["インドで法律上現在も公式に認められている","仏教が導入した制度","バラモン・クシャトリヤ・ヴァイシャ・シュードラの4ヴァルナを基盤とする身分制度","商業・貿易のみを規定した制度"],"a":2,"e":"カーストはヴァルナ（色・階層）が起源。バラモン（司祭）・クシャトリヤ（武士）・ヴァイシャ（農商）・シュードラ（隷民）。インドでは法的に廃止されたが社会的慣習は残る。"},{"id":99019,"q":"「政教分離」の原則が重要視される理由として正しいものはどれか？","c":["宗教活動を全面禁止するため","国家が特定の宗教を優遇・弾圧しないよう信教の自由を守るため","宗教税を国が徴収するため","宗教指導者が政治に参加するため"],"a":1,"e":"政教分離は国家と宗教の分離原則。日本国憲法20条が定める。特定宗教への国家介入を禁じ、信教の自由を保障する。"},{"id":99020,"q":"宗教が医療現場に与える影響として正しいものはどれか？","c":["宗教は医療判断に一切影響しない","宗教と医療はビジネス上無関係","日本では宗教的理由の治療拒否は違法","輸血拒否・臓器移植の可否など宗教的信念が治療選択に影響することがある"],"a":3,"e":"エホバの証人の輸血拒否、イスラム教の豚由来製剤拒否など宗教的信念が治療に影響する。医師紹介でも患者・医師双方の宗教背景の理解が重要。"}]},{"section":"83. 米中AIの覇権争い","questions":[{"id":99021,"q":"ChatGPTを開発したアメリカのAI企業はどれか？","c":["Google","Meta","OpenAI","Microsoft"],"a":2,"e":"OpenAIは2015年設立の非営利AI研究機関発。GPT-4を開発し、ChatGPTは2022年11月のリリースで世界的ブームを起こした。"},{"id":99022,"q":"中国がアメリカの輸出規制に対抗して開発した代表的なAIモデルはどれか？","c":["Gemini","Claude","DeepSeek","Llama"],"a":2,"e":"DeepSeekは2025年初頭に公開された中国製LLM。低コストで高性能とされ、米国AI株が急落するほど市場に衝撃を与えた。"},{"id":99023,"q":"アメリカが中国へのAI半導体輸出を規制した主な目的はどれか？","c":["中国の軍事AI・スパイ技術への転用を防ぐため","中国との公正な競争環境を確保するため","半導体の国際価格を安定させるため","同盟国の日本企業の利益を守るため"],"a":0,"e":"米国はエヌビディア製高性能GPU（H100等）の対中輸出を規制。軍事・監視技術への転用リスクを主な理由とし、バイデン→トランプ政権でも継続・強化されている。"},{"id":99024,"q":"Googleが開発した大規模言語モデルの名称はどれか？","c":["Copilot","Mistral","Grok","Gemini"],"a":3,"e":"GeminiはGoogleのLLM。旧称Bard→Geminiに改称。GPT-4と並ぶ最上位モデルで、Google検索・Gmail等に統合されている。"},{"id":99025,"q":"中国の主要AIテック企業として正しい組み合わせはどれか？","c":["トヨタ・ソニー・NTT・ソフトバンク","バイドゥ・アリババ・テンセント・ファーウェイ","サムスン・LG・SKハイニックス・ヒュンダイ","TSMC・MediaTek・ASUSTeK・UMC"],"a":1,"e":"中国の主要AIテック企業はBAT（バイドゥ・アリババ・テンセント）+ファーウェイ。バイドゥはErnie Bot、アリババはQwen等のLLMを開発。"},{"id":99026,"q":"アメリカのAI開発を主導する「フロンティアAI企業」として正しい組み合わせはどれか？","c":["OpenAI・Anthropic・Google DeepMind・Meta AI","IBM・Oracle・Dell・HP・Cisco","Zoom・Slack・Dropbox・Stripe・Twilio","Twitter・Reddit・Pinterest・Snapchat・TikTok"],"a":0,"e":"フロンティアAIはOpenAI(GPT)・Anthropic(Claude)・Google(Gemini)・Meta(Llama)が主導。いずれも兆円規模の投資を受けている。"},{"id":99027,"q":"AIの「幻覚（ハルシネーション）」とはどれか？","c":["AIが事実と異なる情報を自信満々に生成する現象","AIが人間の感情を正確に読み取り共感する技術","AIが画像生成で幻想的で美しい絵を描く特殊機能","AIが視覚情報をリアルタイムで詳細に処理する能力"],"a":0,"e":"ハルシネーションはLLMが存在しない事実・引用・人物を「でたらめ」に生成する問題。医療・法律分野での活用で特に注意が必要。"},{"id":99028,"q":"「AGI（汎用人工知能）」の説明として正しいものはどれか？","c":["画像認識や翻訳など特定タスクに特化した人工知能","自動車の組み立てや溶接を行う工場の自動化ロボット","顔認証や物体検出を行う画像認識専用の人工知能","人間と同等以上の知能を持ち幅広いタスクをこなせる人工知能"],"a":3,"e":"AGI（Artificial General Intelligence）は特定分野を超えて人間並みの汎用的知能を持つAI。OpenAIはAGI実現を最終目標に掲げている。"},{"id":99029,"q":"米中AI覇権争いにおける日本の戦略として政府が推進しているものはどれか？","c":["安全保障上の懸念を理由にAI開発を全面的に禁止する方針","米国・欧州とのAI安全基準の連携とソブリンAI（国産AI）の育成","コスト面の優位性を評価し中国のAI技術を全面採用する方針","食料増産を目的としてAIを農業専用技術として限定利用する方針"],"a":1,"e":"日本はG7のAI広島プロセスを主導し、信頼できるAI（Trustworthy AI）の国際基準づくりに貢献。NTTのtsuzumi等の国産LLM開発も推進。"},{"id":99030,"q":"エヌビディアのGPUが生成AIに不可欠な理由はどれか？","c":["他社製品と比べて消費電力が圧倒的に少ないため","大量生産によりGPU製品の中で最も低価格を実現しているため","並列計算処理能力が高くAIの学習・推論に最適なため","日本の国家認定を受けた製品であり信頼性が保証されているため"],"a":2,"e":"GPUは元々ゲーム用グラフィック処理チップだが、大量の並列演算処理がAI学習に最適と判明。エヌビディアH100は1枚500万円超でも需給逼迫が続く。"}]},{"section":"84. 半導体","questions":[{"id":99031,"q":"世界最大の半導体受託製造（ファウンドリ）企業はどれか？","c":["サムスン電子（韓国・ソウル）","インテル（米国・カリフォルニア）","TSMC（台湾積体電路製造）","エヌビディア（米国・カリフォルニア）"],"a":2,"e":"TSMCは台湾の半導体ファウンドリ最大手。AppleのA/Mシリーズ・エヌビディアGPU・AMD等を受注製造。世界ファウンドリシェアの約60%を占める。"},{"id":99032,"q":"エヌビディア（NVIDIA）の主力製品はどれか？","c":["GPU（グラフィックス処理ユニット）","スマートフォン向けSoC（システムオンチップ）","DRAM（ダイナミックランダムアクセスメモリ）","5G通信基地局向けベースバンドチップ"],"a":0,"e":"エヌビディアはGPU設計の世界最大手。AI学習用H100・H200はデータセンター向け主力製品。時価総額は一時世界1位（約4兆ドル）に達した。"},{"id":99033,"q":"「ムーアの法則」の説明として正しいものはどれか？","c":["半導体の集積回路トランジスタ数は約2年ごとに2倍になる","半導体の製造コストと市場価格は毎年2倍に上昇する","半導体メーカーの売上利益は景気に関わらず毎年増加する","半導体デバイス全体の消費電力は技術革新により毎年半減する"],"a":0,"e":"1965年にインテル共同創業者ゴードン・ムーアが提唱。トランジスタの微細化による性能向上の経験則。近年は物理的限界に近づき「ムーアの法則の終焉」が議論される。"},{"id":99034,"q":"サムスン電子の半導体事業の特徴として正しいものはどれか？","c":["AIサーバー向けGPUのみを専門に設計・製造する半導体メーカー","自社では製造せず設計のみ行いTSMCなど外部工場に全量委託する","メモリ（DRAM・NAND）とファウンドリを両立する総合半導体メーカー","日本企業と共同出資で設立された半導体製造の国際合弁会社"],"a":2,"e":"サムスンはDRAM・NAND型フラッシュで世界首位級。さらにファウンドリ事業でTSMCに挑戦。設計から製造まで一貫する総合半導体（IDM）モデル。"},{"id":99035,"q":"インテルがAMDやエヌビディアに競争力を失いつつある主な理由はどれか？","c":["微細化プロセス技術の遅れとファブレス企業との競争激化","日本・東南アジア市場から段階的な撤退を進めているため","経営幹部による大規模な不正会計・汚職問題が発覚したため","主力製品の品質検査で重大な不具合が繰り返し発生したため"],"a":0,"e":"インテルは長年CPU市場を独占したが、7nm以降の製造技術でTSMCに遅れをとった。AMDがTSMCを活用して追い上げ、エヌビディアがAI半導体市場を制した。"},{"id":99036,"q":"半導体の「ファブレス」モデルの説明として正しいものはどれか？","c":["設計から製造・出荷まで全工程を自社工場で完結させるモデル","コスト削減のため研究開発を大学や外部機関に委託するモデル","自社では生産せず他社の半導体を仕入れて販売のみを行うモデル","設計のみ行い製造はTSMC等の外部ファウンドリに委託するモデル"],"a":3,"e":"ファブレス（Fabless）はFabrication（製造工場）を持たない設計専業モデル。エヌビディア・クアルコム・AMD等が該当。資本効率が高く近年主流化。"},{"id":99037,"q":"日本政府がラピダスを設立した目的として正しいものはどれか？","c":["輸出規制を回避して海外半導体企業との取引を拡大するため","2nm世代の先端半導体の国産化を目指すため","中国産半導体への依存度を高めて製造コストを削減するため","TSMCの日本子会社として技術・資金支援を受けるために設立された"],"a":1,"e":"ラピダスは2022年設立の日本の官民半導体新会社。IBMと連携し2nm世代の量産を目指す。経済安全保障の観点から政府が数千億円規模の補助金を投入。"},{"id":99038,"q":"半導体製造で使用するEUV露光装置を独占供給する企業はどれか？","c":["東京エレクトロン","アプライドマテリアルズ","ASML（オランダ）","ラム・リサーチ"],"a":2,"e":"ASMLはEUV（極端紫外線）リソグラフィ装置を世界唯一供給するオランダ企業。7nm以下の先端半導体製造に不可欠で、対中輸出規制の焦点にもなっている。"},{"id":99039,"q":"「HBM（高帯域幅メモリ）」が注目される理由はどれか？","c":["製造コストが他のメモリより圧倒的に安価なため","AI向けGPUに積層して搭載することで大量データを高速処理できるため","スマートフォンやタブレット専用に設計されたメモリのため","動作時の消費電力がほぼゼロで省エネ性能が最高水準のため"],"a":1,"e":"HBMはDRAMを縦に積層した高性能メモリ。エヌビディアH100に搭載され、AI学習の「記憶力」を担う。SKハイニックス・サムスンが主要供給者。"},{"id":99040,"q":"TSMCが台湾以外に工場（ファブ）を建設している理由はどれか？","c":["台湾島内の用地不足により新規工場の建設スペースが確保できないため","台湾政府から海外への生産移転を義務付ける法律が制定されたため","人件費や電力コストなど製造コストが海外の方が明らかに安いため","地政学リスク（台湾有事）分散と各国の経済安全保障要求に応えるため"],"a":3,"e":"TSMCは米国アリゾナ・日本熊本・ドイツに工場を建設中。台湾有事リスクへの懸念と、米国・日本・EUの補助金・安全保障上の要請に応えた戦略的分散。"}]},{"section":"85. 世界の大手コンサル","questions":[{"id":99041,"q":"「MBB」と呼ばれる戦略コンサル御三家として正しいものはどれか？","c":["マッキンゼー・BCG・ベイン","デロイト・PwC・EY","アクセンチュア・IBM・富士通","ボストン・バークレイズ・ブルームバーグ"],"a":0,"e":"MBBはMcKinsey・Boston Consulting Group・Bainの3社。戦略コンサル最高峰とされ、採用は東大・ハーバード等トップ大学卒が中心。"},{"id":99042,"q":"「BIG4」と呼ばれる会計系コンサルファームとして正しいものはどれか？","c":["マッキンゼー・BCG・ベイン・ATカーニー","野村・大和・三菱UFJ・みずほ","アクセンチュア・IBM・キャップジェミニ・インフォシス","デロイト・PwC・EY・KPMG"],"a":3,"e":"BIG4はDeloitte・PwC・EY・KPMGの4大会計事務所。監査・税務に加えコンサル部門も巨大化。日本ではそれぞれ有限責任監査法人が提携。"},{"id":99043,"q":"マッキンゼーが提唱した思考法「ゼロベース思考」の説明として正しいものはどれか？","c":["既存のやり方を前提として改善する思考法","予算をゼロから見直す財務手法","過去の慣習にとらわれず根本から問い直す思考法","ゼロリスクを目指すリスク管理手法"],"a":2,"e":"ゼロベース思考は「なぜそれをするのか」を根本から問い直す手法。マッキンゼー式問題解決の核心で、既存業務の正当性を常に検証する。"},{"id":99044,"q":"アクセンチュアの特徴として正しいものはどれか？","c":["戦略特化で実装は行わない","会計監査が主事業","ITコンサル・デジタル変革（DX）・アウトソーシングを強みとする総合ファーム","M&Aアドバイザリー専門ファーム"],"a":2,"e":"アクセンチュアは売上高世界最大級のコンサルファーム（約800億ドル）。戦略から実装・BPOまで一気通貫。日本でも主要企業のDX支援を多数担う。"},{"id":99045,"q":"BCG（ボストン・コンサルティング・グループ）が開発した有名なフレームワークはどれか？","c":["SWOT分析","7Sフレームワーク","PPM（プロダクト・ポートフォリオ・マネジメント）","バランス・スコアカード"],"a":2,"e":"PPMはBCGが1970年代に開発。「花形・金のなる木・問題児・負け犬」の4象限で事業ポートフォリオを分析する。今も世界中で使用される経営戦略ツール。"},{"id":99046,"q":"コンサルファームの「アップorアウト」制度の説明として正しいものはどれか？","c":["年収が上がるか会社を出るかの選択制","外資系企業から国内企業に転職する慣行","プロジェクトの成果によりボーナスが変動する制度","一定年次内に昇進できなければ退職を求められる人事制度"],"a":3,"e":"アップorアウトはコンサル業界の厳格な昇進制度。一定年次（通常2〜3年）で昇進できない場合は退職を促される。高い人材流動性とOBネットワーク形成につながる。"},{"id":99047,"q":"デロイト トーマツの日本における特徴として正しいものはどれか？","c":["監査・税務・コンサル・ファイナンシャルアドバイザリーを持つ日本最大級の総合プロフェッショナルファーム","外資系企業のみを顧客とする","IT導入支援のみを行う","政府機関には対応していない"],"a":0,"e":"デロイト トーマツは日本最大級のプロフェッショナルファーム。監査法人・税理士法人・コンサルティング・FASの各法人が連携。大手上場企業の約30%の監査を担う。"},{"id":99048,"q":"戦略コンサルタントの日本人採用で最も多い出身大学として正しいものはどれか？","c":["早稲田大学・慶應義塾大学・東京大学など","専門学校・短期大学","地方国公立大学のみ","海外大学出身者のみ"],"a":0,"e":"MBBの日本採用は東大・京大・一橋・慶應・早稲田等の上位校が中心。加えてMBA（海外ビジネススクール）卒業生も多い。近年は理系・データサイエンス人材の採用も増加。"},{"id":99049,"q":"コンサルファームが医療・ヘルスケア業界に関わる主な業務はどれか？","c":["医師の代わりに診察を行う","病院経営改革・医療政策立案・製薬会社の戦略策定・医療DX推進","医薬品の直接販売","医師免許の取得支援"],"a":1,"e":"医療系コンサルはマッキンゼー・BCG等が製薬会社の新薬戦略、政府の医療政策、病院の経営改革を支援。医師紹介業界でも競合・協業相手として意識が必要。"},{"id":99050,"q":"近年コンサル業界で注目される「生成AIの活用」として正しいものはどれか？","c":["コンサルタントを全員AIに置き換える","AIにより全コンサルファームが廃業する","クライアントへの提案をAIが自動的に行う","資料作成・データ分析・リサーチの効率化でコンサル業務を高速化"],"a":3,"e":"マッキンゼー・BCG等はCopilot・Claude・GPT等を社内導入し、スライド作成・市場調査・文書要約を効率化。人間のコンサルタントは高付加価値判断に集中する方向へ移行中。"}]},{"section":"86. 医師免許・国家試験","questions":[{"id":198001,"q":"医師国家試験の新卒合格率はおおよそ何%か？","c":["約70%","約80%","約90%","約99%"],"a":2,"e":"新卒の合格率は例年90%前後。既卒は60%台に下がる。合格後に医籍登録して初めて「医師」になれる。"},{"id":198002,"q":"医師免許の発行機関はどこか？","c":["厚生労働大臣","日本医師会","都道府県知事","文部科学大臣"],"a":0,"e":"医師法第2条により、医師免許は厚生労働大臣が付与する。医籍（医師名簿）への登録が必要。"},{"id":198003,"q":"医師国家試験は年に何回実施されるか？","c":["年4回","年2回","隔年1回","年1回"],"a":3,"e":"毎年2月に年1回実施。2日間にわたり約400問が出題される大規模な国家試験。"},{"id":198004,"q":"医師が行政処分を受けた場合、再免許を付与するかどうかを審議する機関はどれか？","c":["医道審議会","日本医師会","地方裁判所","厚生労働省医政局"],"a":0,"e":"医道審議会が審議し、厚生労働大臣が処分を決定。免許取消・業務停止などの処分がある。"},{"id":198005,"q":"医師国家試験の出題科目に含まれないものはどれか？","c":["内科学","外科学","法医学","経営学"],"a":3,"e":"医師国試は内科・外科・産婦人科・小児科・精神科・法医学など医学全般が出題。経営学は含まれない。"},{"id":198006,"q":"臨床研修を開始するために必要な資格はどれか？","c":["看護師免許","医師免許","博士号","専門医資格"],"a":1,"e":"医師国家試験合格・医籍登録後に医師免許を取得し、初めて初期臨床研修医として働ける。"},{"id":198007,"q":"「医師の届出義務」として正しいのはどれか？","c":["毎月1回、診療内容を厚労省に報告する","2年ごとに氏名・住所などを厚労省へ届け出る義務がある","5年ごとに免許を更新する","毎年、医師会に会費を納める"],"a":1,"e":"医師法第6条により、2年ごとの12月31日現在の住所・業務などを翌年1月15日までに届け出る義務がある。"},{"id":198008,"q":"歯科医師・薬剤師と異なり、医師だけが行える行為はどれか？","c":["投薬","調剤","外科的手術・診断","リハビリ指導"],"a":2,"e":"医師法第17条で「医業」は医師のみ。外科手術・診断・処方はすべて医師の独占業務。"},{"id":198009,"q":"医師国家試験の問題を作成しているのはどの組織か？","c":["医道審議会（医師分科会）","文部科学省","日本医学会","国立大学医学部連合"],"a":0,"e":"厚生労働省の医道審議会医師分科会が問題を作成・管理している。"},{"id":198010,"q":"外国の医師免許を持つ者が日本で医師として働くために必要なことはどれか？","c":["日本語能力試験N1合格","日本の医師国家試験合格と医籍登録","厚労省への申請のみ","都道府県知事の許可"],"a":1,"e":"外国医師免許保持者でも原則として日本の医師国家試験に合格し医籍登録が必要。ただし臨床修練制度など例外あり。"}]},{"section":"87. 在宅医療・緩和ケア","questions":[{"id":198011,"q":"在宅医療において「訪問診療」と「往診」の違いとして正しいのはどれか？","c":["訪問診療は緊急時のみ","往診は定期的な訪問、訪問診療は臨時対応","訪問診療は定期的・計画的な訪問、往診は臨時対応","両者に違いはない"],"a":2,"e":"訪問診療は計画的・定期的な医師の訪問。往診は患者の求めに応じた臨時の訪問。報酬体系も異なる。"},{"id":198012,"q":"ACP（アドバンス・ケア・プランニング）の別名として正しいのはどれか？","c":["人生会議","延命治療計画","在宅介護計画","終末期診断書"],"a":0,"e":"ACPは「人生会議」とも呼ばれる。本人・家族・医療者が今後の医療・ケアについて話し合うプロセス。"},{"id":198013,"q":"緩和ケアの目的として最も正しいのはどれか？","c":["がんを根治させる治療","延命治療を最大化する","手術を行わない治療法","痛みや苦痛を和らげQOLを高める"],"a":3,"e":"WHOの定義により、緩和ケアは生命を脅かす疾患の患者と家族のQOL改善が目的。がん以外にも適用される。"},{"id":198014,"q":"「在宅療養支援診療所」の要件として正しいのはどれか？","c":["病床数100床以上","24時間対応・連携体制・往診実施が要件","専門医が3名以上在籍","都市部にのみ設置可能"],"a":1,"e":"24時間の往診・訪問看護体制、緊急入院の連携体制などが要件。強化型と機能強化型もある。"},{"id":198015,"q":"ホスピスと緩和ケア病棟の関係として正しいのはどれか？","c":["ホスピスは緩和ケア病棟の日本での呼び名のひとつ","まったく別の施設","ホスピスは急性期病院の一部","緩和ケア病棟は在宅専門"],"a":0,"e":"ホスピスは英語由来で、日本では「緩和ケア病棟」と呼ばれることが多い。終末期の痛み緩和・心のケアが中心。"},{"id":198016,"q":"日本で在宅での死亡割合（看取り）はどのくらいか？","c":["約5%","約70%","約50%","約15%"],"a":3,"e":"約13〜15%（2022年）。政府は在宅死亡割合を高める方向で政策を推進中。病院死が依然として約65%を占める。"},{"id":198017,"q":"「オピオイド」とは何に使われる薬か？","c":["抗生物質","強力な鎮痛薬（がん性疼痛など）","抗うつ薬","降圧薬"],"a":1,"e":"モルヒネ・オキシコドン等のオピオイド系鎮痛薬。がん性疼痛の緩和に必須。適切使用で依存リスクを管理する。"},{"id":198018,"q":"「看取り加算」が算定できる場面はどれか？","c":["外来診療時","健康診断","救急搬送後の入院","在宅・施設での死亡直前の診療"],"a":3,"e":"在宅・施設での看取りを評価する診療報酬。在宅での看取りを推進するために設けられた加算。"},{"id":198019,"q":"緩和ケアの対象疾患として近年拡大されているものはどれか？","c":["感染症","がん以外の慢性疾患（心不全・COPD等）","骨折","外傷"],"a":1,"e":"従来はがん中心だったが、心不全・COPD・腎不全など非がん疾患への緩和ケア提供が推進されている。"},{"id":198020,"q":"「デスカンファレンス」とは何か？","c":["死亡診断書の書き方研修","遺族への説明会","患者が亡くなった後に医療チームで振り返りを行うカンファレンス","終末期治療の承認会議"],"a":2,"e":"患者の死後に医療・看護チームで振り返るカンファレンス。ケアの質向上やスタッフのグリーフケアに役立つ。"}]},{"section":"88. 地域医療・へき地医療","questions":[{"id":198021,"q":"医師偏在の解消を目的として設けられた「地域枠」とはどういう制度か？","c":["都市部の病院に優先入職できる枠","地方勤務を条件に奨学金を受けられる医学部入試の枠","へき地専門の医師免許","外国人医師の受け入れ枠"],"a":1,"e":"都道府県が設定。奨学金貸与の代わりに卒後一定期間（多くは9年程度）地域の医療機関で勤務する義務がある。"},{"id":198022,"q":"「医師偏在指標」を算出・公表しているのはどの機関か？","c":["厚生労働省","都道府県","日本医師会","総務省"],"a":0,"e":"厚生労働省が2018年から医師偏在指標を算出・公表。二次医療圏ごとに「少数区域」「多数区域」を指定。"},{"id":198023,"q":"「へき地診療所」の多くが属する病院の位置づけとして正しいのはどれか？","c":["特定機能病院","急性期病院","地域医療支援病院","へき地中核病院・へき地診療所ネットワーク"],"a":3,"e":"へき地医療拠点病院がへき地診療所を支援するネットワーク体制。医師派遣・代診・テレ医療なども含む。"},{"id":198024,"q":"「医師少数区域」で一定期間勤務した医師に付与される仕組みはどれか？","c":["医師少数区域等経験医師の認定","専門医資格の自動取得","税優遇制度","給与の国庫補助"],"a":0,"e":"2020年から開始。認定を受けた医師は将来の管理者要件を満たしやすくなるインセンティブ制度。"},{"id":198025,"q":"テレメディスン（遠隔医療）が地域医療で注目されている主な理由はどれか？","c":["保険適用外のため自由診療として収益増","医師不足地域でも専門医の診察を受けられるため","コスト削減のみが目的","大病院の患者集中を促進するため"],"a":1,"e":"2018年のオンライン診療解禁で遠隔診療が普及。へき地・離島・医師少数地域での医療アクセス改善に寄与。"},{"id":198026,"q":"「地域医療支援病院」の主な役割として正しいのはどれか？","c":["高度先進医療の提供のみ","美容医療の専門施設","紹介患者への医療提供と地域の診療所を支援すること","精神科専門病院"],"a":2,"e":"都道府県知事が承認。紹介率・逆紹介率の基準あり。地域の医師研修・施設設備の共同利用も役割のひとつ。"},{"id":198027,"q":"「プライマリ・ケア」の特徴として正しいのはどれか？","c":["高度専門医療の提供","患者の最初の相談窓口として包括的・継続的に診る医療","救急専門の医療","手術を主体とした外科的医療"],"a":1,"e":"地域に根ざした「初期対応・継続的・包括的」な医療。家庭医・総合診療医が担うことが多い。"},{"id":198028,"q":"「総合診療専門医」が新専門医制度で追加された背景として正しいのはどれか？","c":["大学病院の集約化","外科手術の高度化","美容医療の需要増","高齢化による複数疾患を持つ患者増加と地域医療の担い手不足"],"a":3,"e":"複数の慢性疾患を持つ高齢者増加と、地方の診療所・クリニックを支える医師不足に対応するため2018年に新設。"},{"id":198029,"q":"離島・へき地に医師を派遣する制度として「自治医科大学」が担う役割はどれか？","c":["専門医育成のみ","外科医の育成","卒業後9年間の地域医療義務従事を条件とした医師育成","大学病院への医師供給"],"a":2,"e":"1972年設立。全都道府県が共同設置。卒業生は9年間へき地・離島等の地域医療に従事する義務がある。"},{"id":198030,"q":"「地域包括ケアシステム」が目指す姿として正しいのはどれか？","c":["住み慣れた地域で医療・介護・生活支援を一体的に受けられる体制","全患者を大病院に集約する","専門医のみで地域医療を完結させる体制","医療費を削減するための入院制限"],"a":0,"e":"2025年を目途に構築。医療・介護・予防・生活支援・住まいを一体的に提供。「団塊の世代」が後期高齢者になる年を見据えた政策。"}]},{"section":"89. 医療安全・医療事故","questions":[{"id":198031,"q":"「ハインリッヒの法則」を医療に当てはめたとき、1件の重大事故の背後に何件のヒヤリハットがあるとされるか？","c":["10件","29件","300件","1000件"],"a":2,"e":"1:29:300の法則。1件の重大事故の背後に29件の軽微な事故、300件のヒヤリハットがあるとされる。"},{"id":198032,"q":"「インシデントレポート」の目的として正しいのはどれか？","c":["医療安全改善のための情報共有","ミスを隠蔽する","個人の責任追及","患者への謝罪文書"],"a":0,"e":"ヒヤリハット・軽微な事故を報告・共有し、組織として再発防止策を検討するためのツール。個人罰ではなくシステム改善が目的。"},{"id":198033,"q":"「RCA（根本原因分析）」とは何か？","c":["放射線量の計算方法","医療事故の背景にある根本原因を系統的に分析する手法","患者満足度調査","手術の成功率算定方法"],"a":1,"e":"Root Cause Analysis。事故の原因を「なぜ×5」などで掘り下げ、個人でなくシステムの問題を特定する手法。"},{"id":198034,"q":"医療事故調査制度（2015年施行）で調査を行う機関はどれか？","c":["裁判所","警察","医療事故調査・支援センター","厚生労働省"],"a":2,"e":"医療機関が院内調査を行い、センター（日本医療安全調査機構）に報告。原因究明と再発防止が目的で、刑事訴追とは切り離されている。"},{"id":198035,"q":"「タイムアウト」が手術室で行われる目的はどれか？","c":["手術チームの休憩時間","手術記録の入力","麻酔の効果確認","手術開始前に患者確認・術式確認を全員で行い取り違えを防ぐ"],"a":3,"e":"WHO安全な手術チェックリストにも組み込まれている。患者氏名・部位・術式を手術チーム全員で確認する安全確認行為。"},{"id":198036,"q":"医師が患者に説明し同意を得る「インフォームド・コンセント」が義務化された根拠として正しいのはどれか？","c":["医師法","労働基準法","医療法（1997年改正）","個人情報保護法"],"a":2,"e":"1997年の医療法改正でインフォームド・コンセントが法的に位置づけられた。説明・同意の記録保管も求められる。"},{"id":198037,"q":"「ノーリフティングポリシー」が医療・介護現場で推進される理由はどれか？","c":["患者の転倒防止","スタッフの腰痛・職業性疾患を予防するため","感染対策","医療費削減"],"a":1,"e":"人力による患者抱え上げを禁止し、リフト・スライディングシートなど福祉用具を使う方針。スタッフの腰痛が深刻な職業病のため推進。"},{"id":198038,"q":"「特定行為研修」を修了した看護師が実施できることとして正しいのはどれか？","c":["外科手術","医師の指示のもとで一部の医行為を自律的に実施","医師なしで処方","診断書の作成"],"a":1,"e":"2015年から制度化。38行為21区分。手順書に基づき医師の事前指示なしで特定の医行為を実施できる。"},{"id":198039,"q":"「有害事象」と「医療過誤」の違いとして正しいのはどれか？","c":["両者は同じ意味","有害事象は刑事事件のみ指す","医療過誤の方が範囲が広い","有害事象は過失を問わない全ての予期しない傷害、医療過誤は過失による有害事象"],"a":3,"e":"有害事象（Adverse Event）は過失の有無を問わない。医療過誤（Malpractice）は過失（注意義務違反）を伴う有害事象。"},{"id":198040,"q":"WHO患者安全の「手指衛生の5つのタイミング」に含まれないものはどれか？","c":["患者に触れる前","清潔・無菌操作の前","患者の周囲環境に触れた後","昼食前"],"a":3,"e":"WHOの5 Momentsは①患者接触前②清潔・無菌操作前③体液曝露後④患者接触後⑤患者周囲環境接触後。「昼食前」は含まれない。"}]},{"section":"90. 感染症・公衆衛生","questions":[{"id":198041,"q":"感染症法における「1類感染症」に該当しないのはどれか？","c":["エボラ出血熱","ペスト","結核","ラッサ熱"],"a":2,"e":"結核は2類感染症。1類はエボラ・ペスト・ラッサ熱・マールブルグ病など、致死率が高く強制隔離対象の疾患。"},{"id":198042,"q":"PCR検査（COVID-19対応で一般に知られるようになった）の正式名称はどれか？","c":["ポリメラーゼ連鎖反応","肺細胞反応","タンパク質凝集反応","プラズマ培養反応"],"a":0,"e":"Polymerase Chain Reaction（ポリメラーゼ連鎖反応）。微量のDNA/RNAを増幅して検出する技術。"},{"id":198043,"q":"「感染経路別予防策」のうち飛沫感染予防で正しい対策はどれか？","c":["陰圧室への隔離","手袋と長袖ガウンの着用","N95マスクの使用","患者から1m以上の距離とサージカルマスク"],"a":3,"e":"飛沫は1m以上は届かないとされる。サージカルマスク・距離の確保が主な対策。空気感染にはN95・陰圧室が必要。"},{"id":198044,"q":"「R0（基本再生産数）」が1を超えるとどうなるか？","c":["感染者数が増加し流行が拡大する","感染は自然に終息する","無症状感染者が増える","ワクチンが無効になる"],"a":0,"e":"R0は1人の感染者が何人に感染させるかの指標。R0>1で流行拡大、<1で終息に向かう。新型コロナの当初R0は約2〜3。"},{"id":198045,"q":"保健所の主な役割として正しいのはどれか？","c":["外来診療の提供","地域住民への医療保険の販売","公衆衛生・感染症対策・健康相談の地域拠点","医師免許の発行"],"a":2,"e":"地域保健法に基づく行政機関。感染症対策・精神保健・食品衛生・難病支援など公衆衛生を担う。COVID-19で役割が注目された。"},{"id":198046,"q":"「院内感染（HAI）」で最も多い原因菌として知られるのはどれか？","c":["MRSA（メチシリン耐性黄色ブドウ球菌）","インフルエンザウイルス","大腸菌O157","結核菌"],"a":0,"e":"MRSAは院内感染の代表的な起因菌。抗菌薬耐性が高く治療が困難。手指衛生が最大の予防策。"},{"id":198047,"q":"「ファクターX」とも呼ばれたが、日本でCOVID-19の重症化率が欧米より低かった要因として有力視されているのはどれか？","c":["日本の病院数が少ないため","マスク文化・BCGワクチン・交差免疫などの複合的要因","日本人の遺伝子が特殊","医師数が多いため"],"a":1,"e":"明確な結論は出ていないが、マスク文化・BCGワクチン接種・既存コロナウイルスへの交差免疫などが有力視されている。"},{"id":198048,"q":"「薬剤耐性（AMR）」問題が世界的に深刻化している理由はどれか？","c":["ワクチン接種率の低下","医師数の減少","抗菌薬の過剰・不適切使用により耐性菌が増加しているため","病院数の増加"],"a":2,"e":"WHO・国連が重大課題と位置づける。現状のペースが続くと2050年には年間1000万人が耐性菌で死亡するとの試算も。"},{"id":198049,"q":"「検疫」を日本で担当する機関はどれか？","c":["外務省","厚生労働省","警察庁","国土交通省"],"a":1,"e":"厚生労働省の検疫所が空港・海港で実施。感染症法・検疫法に基づき、海外からの感染症の国内侵入を防ぐ。"},{"id":198050,"q":"「ワクチンの集団免疫閾値」として正しい説明はどれか？","c":["全員接種が必要","人口の一定割合が免疫を持つと感染拡大が自然に抑制される状態","病院のベッド占有率","ワクチン副反応が消える割合"],"a":1,"e":"麻疹は95%、ポリオは80〜85%など疾患により異なる。ワクチン接種率を高めることで未接種者も守られる効果がある。"}]},{"section":"91. 医師の給与・年収","questions":[{"id":198051,"q":"日本の医師の平均年収（勤務医・2023年頃）はおおよそどのくらいか？","c":["約600万円","約800万円","約1,200万円","約2,000万円"],"a":2,"e":"厚労省「賃金構造基本統計調査」では医師の平均年収は約1,200〜1,500万円。診療科・雇用形態で大きく異なる。"},{"id":198052,"q":"一般的に年収が最も高い診療科はどれか？","c":["放射線科（IVR・読影）・美容外科系","精神科","小児科","リハビリテーション科"],"a":0,"e":"美容外科・自由診療系や放射線科専門医（IVR・読影）は年収2,000万円超も珍しくない。保険診療中心の小児科・精神科は低めの傾向。"},{"id":198053,"q":"「オンコール手当」とは何か？","c":["夜間・休日に呼び出しに応じる待機に対する手当","海外出張手当","専門医取得の一時金","管理職手当"],"a":0,"e":"待機中に緊急呼び出しが発生した際に出動できる体制をとることへの対価。救急・外科系・産婦人科などに多い。"},{"id":198054,"q":"「非常勤・アルバイト（スポット）」勤務の医師の時給はおおよそどのくらいか（一般的な相場）？","c":["時給1,500〜2,000円","時給5,000〜10,000円","時給1万〜3万円以上","時給500〜800円"],"a":2,"e":"医師のスポット・非常勤バイトは一般的に時給10,000〜30,000円程度。専門性・地域・施設により異なる。"},{"id":198055,"q":"開業医（診療所院長）の平均年収は勤務医と比較してどうか？","c":["勤務医より大幅に低い","ほぼ同じ","平均的には開業医の方が高い傾向","開業医の収入は保険適用外"],"a":2,"e":"厚労省調査では診療所経営者の平均所得は勤務医より高い傾向。ただし経営リスク・設備投資・スタッフ給与も負担する。"},{"id":198056,"q":"医師の給与を構成する要素として「当直料」が含まれるが、当直1回あたりの相場はおおよそどのくらいか？","c":["3,000〜5,000円","5〜10万円","1〜3万円","20万円以上"],"a":1,"e":"病院の規模・地域・診療科によるが、一般的な当直料は5万〜10万円程度。高額な場合は1回15万円超もある。"},{"id":198057,"q":"「フリーランス医師」が増加している背景として最も正しいのはどれか？","c":["医師数の過剰供給","医師の働き方改革による病院の非常勤ニーズ増加","医師免許の規制緩和","開業規制の強化"],"a":1,"e":"2024年の医師働き方改革（残業上限規制）で病院の常勤採用コストが増加。非常勤・スポット対応ニーズが高まっている。"},{"id":198058,"q":"医師紹介会社が関わる「年収交渉」で重要な指標として正しいのはどれか？","c":["医師の趣味・特技","類似条件の市場相場・前職年収・スキル・地域ニーズのバランス","病院の設立年","医師会への加入状況"],"a":1,"e":"年収交渉では市場相場（同診療科・同経験年数の相場）と前職年収のバランスが基準。地域需給も大きく影響する。"},{"id":198059,"q":"「総報酬」（年収に含まれるもの）として正しいのはどれか？","c":["基本給のみ","退職金のみ","税引後の手取り額","基本給＋賞与＋当直料＋各種手当の合計"],"a":3,"e":"年収交渉では基本給だけでなく、賞与・当直料・オンコール手当・宿舎提供などの現物給付も含めた総報酬で比較する。"},{"id":198060,"q":"「医師の年収と診療科選択」の関係として近年見られる傾向はどれか？","c":["年収に関係なく診療科を選ぶ傾向が強まっている","年収格差は縮小傾向","専門医資格があれば年収は一律","外科系・産婦人科など体力的に過酷な科は敬遠され、QOL重視の診療科が人気"],"a":3,"e":"若手医師の間でQOL重視が強まり、眼科・皮膚科・精神科などが人気。外科・産婦人科は医師不足が続いている。"}]},{"section":"92. 医師の転職理由","questions":[{"id":198061,"q":"医師が転職を考える最も多い理由の一つとして正しいのはどれか？","c":["駐車場がない","労働環境（長時間労働・当直過多）への不満","病院の建物が古い","院内食堂の質"],"a":1,"e":"厚労省・各転職エージェント調査でも「労働環境改善」「ワークライフバランス」が転職理由の上位。働き方改革でさらに顕在化。"},{"id":198062,"q":"「キャリアアップ目的」での転職として医師が求めるものとして正しいのはどれか？","c":["給与の現状維持","管理業務の回避","専門医資格取得・手術症例数の確保・高度医療施設への移動","通勤距離の短縮のみ"],"a":2,"e":"専攻科の症例数確保・認定施設への転職・学会発表機会など、スキル向上目的の転職は若手医師に多い傾向。"},{"id":198063,"q":"「人間関係」を転職理由に挙げる医師が多い理由として正しいのはどれか？","c":["医師は協調性が低い","閉鎖的な医局文化・科内ヒエラルキーによるストレス","病院が小さすぎる","診療科が多すぎる"],"a":1,"e":"大学医局や伝統的な病院では上下関係が厳しく、ハラスメント・人間関係問題が離職・転職を招くことが多い。"},{"id":198064,"q":"「ライフイベント」を機に転職する医師として多いパターンはどれか？","c":["定年退職後","副業規制のため","趣味のため","結婚・出産・育児・介護を機に勤務条件を変えたいケース"],"a":3,"e":"女性医師の産休・育休後の復職形態変更、パートナーの転勤に伴う転居など、ライフイベントが転職トリガーになることが多い。"},{"id":198065,"q":"転職を繰り返す医師（ジョブホッパー）の採用で病院が懸念する点はどれか？","c":["定着性・コミュニケーション能力・前職での問題の有無","学歴が高すぎること","専門医資格が多すぎること","年齢が若すぎること"],"a":0,"e":"短期間での転職歴が多い場合、採用側は「なぜ続かないか」を懸念。転職理由の明確な説明と次職でのキャリアプランが重要。"},{"id":198066,"q":"「ミスマッチ転職」が起きる原因として最も多いのはどれか？","c":["給与が高すぎた","通勤距離が違った","資格が足りなかった","入職前の情報（実際の業務・文化・患者層）と現実のギャップ"],"a":3,"e":"医師転職のミスマッチは「聞いていた業務と違う」「職場文化が合わない」が多い。事前の職場見学・詳細なヒアリングが重要。"},{"id":198067,"q":"医師紹介会社のRA（リクルーティングアドバイザー）が医療機関に対してヒアリングすべき最重要項目はどれか？","c":["院長の趣味","求める医師像・募集背景・職場環境・年収・患者層・働き方の詳細","病院の建物の築年数","駐車場の台数"],"a":1,"e":"求人票に出ない「なぜ今募集しているか」「どんな医師と相性が良いか」「職場の課題」などの深いヒアリングが転職成功の鍵。"},{"id":198068,"q":"「転職潜在層」とはどういう医師か？","c":["すでに転職活動中の医師","転職を絶対にしない医師","現在は転職活動をしていないが条件次第で動く可能性がある医師","研修医"],"a":2,"e":"医師転職市場では潜在層へのアプローチが重要。m3・民間医局などのプラットフォームでのスカウト型採用が有効。"},{"id":198069,"q":"「転職支援の成功報酬型」手数料の相場はおおよそどのくらいか？","c":["年収の15〜35%程度","年収の5〜10%","一律50万円","月給の3倍"],"a":0,"e":"医師紹介の成功報酬は一般的に年収の15〜35%。高額なため病院側の費用対効果の確認が重要なポイント。"},{"id":198070,"q":"「非公開求人」が医師転職市場で多い理由はどれか？","c":["法律で公開が禁止されている","病院が費用を節約するため","在職中の医師への配慮・競合への情報漏洩防止・採用競争の回避のため","医師会の規定"],"a":2,"e":"現勤務医への影響・同業他社との競合回避・急募対応などで非公開求人が多い。エージェントを通じてのみアクセスできる求人が転職市場の大半を占める。"}]},{"section":"93. 女性医師のキャリア","questions":[{"id":198071,"q":"日本の医師全体に占める女性医師の割合はおおよそどのくらいか？","c":["約20%","約5%","約35%","約50%"],"a":0,"e":"2022年時点で約23%。医学部入学者の女性比率は約30〜35%で、将来的に割合は増加見込み。"},{"id":198072,"q":"女性医師が多く選択する診療科として正しいのはどれか？","c":["外科・脳神経外科","泌尿器科・整形外科","救急科・心臓血管外科","皮膚科・眼科・小児科・精神科"],"a":3,"e":"当直・緊急手術が少なく、ライフイベントと両立しやすい診療科に女性医師が集まる傾向。外科系は依然として女性比率が低い。"},{"id":198073,"q":"「女性医師支援センター」を持つ都道府県医師会が提供する支援として正しいのはどれか？","c":["出産費用の補助","復職支援・保育施設紹介・相談窓口・研修プログラム","海外留学支援","開業資金の貸付"],"a":1,"e":"日本医師会・都道府県医師会が女性医師支援事業を展開。キャリア相談・復職研修・保育支援情報提供などを行う。"},{"id":198074,"q":"産休・育休後に復職する女性医師が「非常勤」を選ぶ最大の理由はどれか？","c":["収入を下げたいため","専門医資格が失効するため","育児と当直・オンコールを両立するために勤務時間の調整がしやすいため","病院の規定で非常勤しか認められないため"],"a":2,"e":"育児中の当直免除・時短勤務のニーズが高い。非常勤・パート形態での復職後、段階的に常勤に戻るパターンが多い。"},{"id":198075,"q":"「医学部入試での女性差別問題」が明らかになった年はどれか？","c":["2018年","2008年","2022年","2005年"],"a":0,"e":"2018年、東京医科大学を皮切りに複数の大学で女性・多浪生への得点操作が発覚。大きな社会問題となった。"},{"id":198076,"q":"「育児休業給付金」を受給できる条件として正しいのはどれか？","c":["正規雇用の医師のみ受給可能","収入に関係なく一律で受給できる","フリーランス医師も自動的に受給できる","雇用保険加入者が育休を取得した場合に受給可能"],"a":3,"e":"雇用保険の被保険者が対象。育休開始から180日は給付率67%、以降は50%。フリーランス・個人事業主は対象外。"},{"id":198077,"q":"「ロールモデル不足」が女性医師のキャリア形成に影響する理由として正しいのはどれか？","c":["管理職・部長・教授などの上位職に女性医師が少なく、キャリアのイメージが持ちにくいため","女性医師は協調性が低いため","女性医師は学会活動をしないため","病院規定で女性の管理職就任が禁止されているため"],"a":0,"e":"日本の医学部教授・病院長に占める女性割合は依然低く（10%以下）、ロールモデルの少なさがキャリア形成の障壁とされる。"},{"id":198078,"q":"「時短勤務」を活用する女性医師に対して医療機関が懸念することとして多いのはどれか？","c":["患者が不安がる","免許が制限される","当直・オンコールの穴埋めや業務調整が難しい","専門医資格が取得できない"],"a":2,"e":"時短・当直免除は他のスタッフへの負担増につながるため、医療機関にとって運用課題。チーム医療体制の整備が鍵。"},{"id":198079,"q":"「医師の配偶者の職業」で最も多い組み合わせはどれか？","c":["医師×看護師","医師×医師（医師同士のカップル）","医師×教師","医師×専業主婦（主夫）"],"a":1,"e":"医師同士の結婚が最も多いとされる。同じ職場・研修先での出会いが多く、互いのキャリアを理解しやすい半面、両者の転職・異動調整が課題。"},{"id":198080,"q":"「女性医師の燃え尽き症候群（バーンアウト）」のリスク要因として正しいのはどれか？","c":["給与が高すぎること","仕事・育児・家事の多重役割負担と職場でのサポート不足","患者数が少なすぎること","専門医資格が多すぎること"],"a":1,"e":"医師全体のバーンアウト率は高いが、女性医師は職場・家庭の二重負担でリスクが高い。職場の理解・サポート体制が重要。"}]},{"section":"94. 医師の開業・クリニック経営","questions":[{"id":198081,"q":"クリニックの開業に必要な初期費用はおおよそどのくらいか？","c":["3,000万〜1億円程度","500万〜1,000万円","100〜300万円","5億円以上"],"a":0,"e":"内科・小児科などで3,000〜5,000万円、医療機器が多い診療科では1億円超も。テナント内装・医療機器・運転資金が主な費用。"},{"id":198082,"q":"診療所（クリニック）と病院の違いとして法的に正しいのはどれか？","c":["診療所は入院できない","クリニックは保険診療できない","診療所は19床以下、病院は20床以上","病院は専門医のみ開設できる"],"a":2,"e":"医療法で診療所は0〜19床、病院は20床以上と定義されている。診療所でも有床（最大19床）は存在する。"},{"id":198083,"q":"「集患」で開業初期に最も効果的とされる方法はどれか？","c":["駅広告","地域の医師・ケアマネ・薬局との連携とホームページ・口コミ","テレビCM","チラシのみ"],"a":1,"e":"開業初期は地域連携と口コミが最重要。紹介元（近隣医師・ケアマネ・薬局）との関係構築と、わかりやすいウェブ情報が集患の基本。"},{"id":198084,"q":"クリニック経営で「レセプト」とは何か？","c":["患者への診断書","医療機関が保険者に提出する診療報酬の請求明細書","薬の処方箋","医師免許の更新書類"],"a":1,"e":"レセプト（診療報酬明細書）は毎月保険者に提出する請求書。審査支払機関（社保・国保）が審査し、査定・返戻もある。"},{"id":198085,"q":"「医療法人化」するメリットとして正しいのはどれか？","c":["患者数が自動的に増える","保険診療の点数が上がる","医師免許が不要になる","節税・退職金制度の活用・事業承継が容易になる"],"a":3,"e":"個人開業より法人の方が節税（役員報酬・退職金）、銀行融資のしやすさ、分院展開・事業承継で有利。ただし設立・運営の手続きが増える。"},{"id":198086,"q":"「電子カルテ」の導入が進む理由として正しいのはどれか？","c":["診療効率化・情報共有・レセプト連動・政府の普及推進","法律で義務化されている","コストが安い","患者が要求する"],"a":0,"e":"政府は2030年までに電子カルテ原則普及を目標。レセコン連動・オンライン資格確認との連携も推進されている。"},{"id":198087,"q":"クリニックの経営指標として「稼働率」の次に重要とされるのはどれか？","c":["院長の出身大学","開業年数","駐車場台数","1日あたり患者数（患者単価×患者数）"],"a":3,"e":"クリニック経営では1日患者数と患者単価（診療報酬点数）が収益の主要ドライバー。損益分岐点の計算に必須の指標。"},{"id":198088,"q":"「承継開業（M&A開業）」とはどういう開業方法か？","c":["病院のフランチャイズ","既存のクリニックを引き継いで開業する方法","新規で土地を購入して開業","医師会から診療所を買う"],"a":1,"e":"後継者がいない院長からクリニックを譲り受ける承継開業が増加中。患者基盤・スタッフ・設備を引き継げるメリットがある。"},{"id":198089,"q":"「自費診療（自由診療）」の特徴として正しいのはどれか？","c":["保険適用で3割負担","診療報酬点数が高い","健康保険を使わず全額患者負担・価格設定が自由","処方箋が不要"],"a":2,"e":"自由診療は保険外。美容外科・美容皮膚科・健診・ワクチン・AGA治療など。価格設定自由で収益性が高い半面、集患が課題。"},{"id":198090,"q":"クリニック開業後に廃業・閉院になる主な理由として多いのはどれか？","c":["医師免許の失効","スタッフ数が多すぎる","建物の老朽化のみ","患者数が集まらない・経営難と後継者不足"],"a":3,"e":"開業後5〜10年で集患不足・資金繰り悪化による廃業や、院長の高齢化・後継者難による閉院が増えている。"}]},{"section":"95. 研修医・若手医師","questions":[{"id":198091,"q":"初期臨床研修の期間は何年か？","c":["1年","2年","3年","5年"],"a":1,"e":"医師法により、医師免許取得後2年間の初期臨床研修が義務。内科・外科・救急・地域医療などのローテーションが必須。"},{"id":198092,"q":"初期研修医が「マッチング」で決まる仕組みとして正しいのはどれか？","c":["医師会が病院に割り当てる","大学が全員の研修先を決める","研修医と病院が希望を出し合い、アルゴリズムで最適なマッチングをする","抽選で決まる"],"a":2,"e":"医師臨床研修マッチング協議会が運営。研修医と病院双方の希望をアルゴリズム処理して研修先を決定する仕組み。"},{"id":198093,"q":"「スーパーローテート」とは何か？","c":["救急専門の研修方式","複数の診療科を順番にローテーションする研修方式","海外留学プログラム","専門医資格取得後の研修"],"a":1,"e":"2004年の研修制度改革で導入。内科・外科・救急・産婦・小児・精神・地域医療など必須科目をローテーションすることで幅広い臨床経験を積む。"},{"id":198094,"q":"「燃え尽き症候群（バーンアウト）」が研修医に起きやすい要因はどれか？","c":["過重労働・睡眠不足・理想と現実のギャップ・サポート不足","症例数が少なすぎる","給与が高すぎる","休日が多すぎる"],"a":0,"e":"研修医のバーンアウトは国際的にも問題視されている。長時間労働・精神的プレッシャー・孤立感が主要因とされる。"},{"id":198095,"q":"「後期研修（専攻医）」に進む際の選択で近年重視されているものはどれか？","c":["出身大学の医局への無条件入局","QOL・労働環境・症例数・指導体制のバランスを重視した選択","親の意見のみ","給与の高さのみ"],"a":1,"e":"若手医師の価値観変化により「働き方・生活の質」を診療科・施設選択の重要基準にする医師が増えている。"},{"id":198096,"q":"「医局離れ」が進む原因として正しいのはどれか？","c":["専門医制度の廃止","医局の規模が大きくなりすぎた","医師免許の更新制導入","大学院研究より臨床に集中したい・働き方の自由度を求める若手の増加"],"a":3,"e":"2004年の研修制度改革以降、医局に縛られない研修・就職が可能になり、医局離れが加速。市中病院・民間病院への就職が増えた。"},{"id":198097,"q":"研修医が「指導医から学べること」として最も重要とされるのはどれか？","c":["給与の交渉方法","病院の経営方針","事務手続きの方法","臨床推論・診断の思考プロセスと患者対応の実際"],"a":3,"e":"優れた指導医は「病態の考え方・診断プロセス・患者コミュニケーション」を実践で示す。研修先選びで指導医の質は最重要項目のひとつ。"},{"id":198098,"q":"「OSCEと CBT」は何の試験か？","c":["看護師国家試験の科目","医学部の共用試験（臨床実習前の知識・技能評価）","専門医試験","初期研修修了試験"],"a":1,"e":"CBT（知識）とOSCE（技能・態度）は医学部5〜6年次の臨床実習開始前に実施される共用試験。2023年から公的化・合格が実習要件に。"},{"id":198099,"q":"「ポリクリ（ポリクリニカル実習）」とは何か？","c":["医学部生が各診療科を回る臨床実習","複数科目の国家試験","複数の病院を転々とする転職","放射線診断のトレーニング"],"a":0,"e":"医学部5〜6年次に行うベッドサイドラーニング（臨床実習）の通称。各診療科を数週間ずつローテーションする。"},{"id":198100,"q":"若手医師が転職エージェントを利用し始める時期として最も多いのはどれか？","c":["医学部在学中","40代以降","初期研修2年目〜後期研修開始時・専攻医修了後","定年間際"],"a":2,"e":"初期研修修了・後期研修先選択・専門医取得後が転職相談のピーク。医師紹介会社のターゲット層として重要な時期。"}]},{"section":"96. 急性期・回復期・慢性期","questions":[{"id":198101,"q":"「急性期病院」の特徴として正しいのはどれか？","c":["長期療養が主目的","発症・手術直後など病状が不安定な患者を集中的に治療する病院","訪問診療専門","リハビリのみ提供"],"a":1,"e":"救命救急・手術・集中治療（ICU）など、病状が急激に変化する患者を短期間で治療する機能。在院日数は短く、医師・看護師の密度が高い。"},{"id":198102,"q":"「回復期リハビリテーション病棟」の入院対象として正しいのはどれか？","c":["急性心筋梗塞の発症直後","長期の認知症療養","脳梗塞・骨折などの急性期治療後、在宅復帰に向けてリハビリが必要な患者","精神疾患の治療"],"a":2,"e":"急性期を脱した脳血管疾患・大腿骨骨折等の患者が対象。180日以内の制限あり。ADL改善・在宅復帰が目標。"},{"id":198103,"q":"「地域包括ケア病棟」の主な役割はどれか？","c":["人工透析の専門病棟","急性期後の患者の在宅・施設復帰支援と在宅患者の緊急受け入れ","高度急性期手術の実施","感染症の隔離病棟"],"a":1,"e":"2014年新設。急性期からの受け入れ・在宅患者の緊急入院・在宅復帰支援の3機能を担う。60日以内の入院制限あり。"},{"id":198104,"q":"「慢性期（療養型）病床」の特徴として正しいのはどれか？","c":["平均在院日数が7日以内","外来のみ対応","救急専用病床","長期の療養が必要な患者（医療区分の高い患者）が対象"],"a":3,"e":"長期療養が必要な医療依存度の高い患者（経管栄養・人工呼吸器等）を受け入れる病床。医療療養病床と介護療養病床がある。"},{"id":198105,"q":"「2025年問題」に向けて病床機能報告制度が目指すものはどれか？","c":["病院数を増やすこと","高度急性期・急性期・回復期・慢性期の病床を地域ニーズに合わせて最適化","全ての病床を急性期化","民間病院を全廃すること"],"a":1,"e":"各医療機関が病床機能を毎年報告し、地域医療構想で必要量とのギャップを把握・調整。2025年以降の超高齢社会に備えた病床の最適化が目的。"},{"id":198106,"q":"「DPC（診断群分類包括払い）」が適用されるのはどの病棟か？","c":["回復期リハビリ病棟","急性期の一般病棟（DPC対象病院）","慢性期療養病棟","精神科病棟"],"a":1,"e":"DPCは急性期入院に適用。診断名と処置の組み合わせで1日定額を算定。出来高との混合方式。約1,800病院が対象。"},{"id":198107,"q":"「在宅復帰率」が病院の病床機能評価で重要な理由はどれか？","c":["回復期・地域包括等の病棟では在宅復帰率が診療報酬の加算要件になるため","病院の収益に直結しないから","急性期では意味がないから","政府が廃止を検討しているから"],"a":0,"e":"回復期リハビリ病棟・地域包括ケア病棟では在宅復帰率が一定基準以上でないと上位区分の報酬が算定できない。"},{"id":198108,"q":"「サブアキュート（亜急性期）」の概念として正しいのはどれか？","c":["急性期より重い状態","完全に回復した状態","在宅での自己管理期間","急性期と慢性期の中間段階で、地域包括ケア病棟等が担う"],"a":3,"e":"急性期を脱したが慢性期でもない中間的な状態。地域包括ケア病棟・回復期リハビリ等が担う役割。"},{"id":198109,"q":"「平均在院日数」が日本で他国より長い理由として正しいのはどれか？","c":["日本の患者は病気が重い","医師数が少ないため","慢性期・療養病床の割合が多く、社会的入院も含まれるため","病院数が少ないため"],"a":2,"e":"OECD加盟国中、日本の平均在院日数は最長クラス。高齢者の社会的入院・慢性期病床の多さが主因。近年は短縮方向で推移。"},{"id":198110,"q":"「ICU（集中治療室）」と「HCU（高度治療室）」の違いはどれか？","c":["HCUは外来専用","まったく同じ施設","ICUは最重症・24時間看護師1対2体制、HCUはやや軽症・1対4体制で中間的な役割","ICUは小児専用"],"a":2,"e":"ICUは看護師1人対患者2人の高密度体制。HCUはICUと一般病棟の中間。SCU（脳卒中ケアユニット）なども同様の位置づけ。"}]},{"section":"97. 精神科医療","questions":[{"id":198111,"q":"「任意入院」「医療保護入院」「措置入院」のうち、本人の同意なく入院できるのはどれか？","c":["医療保護入院と措置入院","任意入院のみ","措置入院のみ","どの入院形態も同意が必要"],"a":0,"e":"医療保護入院は家族等の同意＋精神保健指定医1名の診察。措置入院は2名以上の指定医が診察し都道府県知事が命令。"},{"id":198112,"q":"「精神保健福祉法」の主な目的はどれか？","c":["精神疾患の根治","精神障害者の医療・保護・社会復帰・自立・社会参加の促進","精神科医の育成","精神科病院の経営支援"],"a":1,"e":"1950年制定（旧精神衛生法を改称）。入院形態の規定・精神保健指定医・措置入院・退院請求などを規定する法律。"},{"id":198113,"q":"「精神保健指定医」の主な役割はどれか？","c":["精神科薬の処方権","措置入院・医療保護入院の判定・行動制限の許可など強制措置に関わる判断","精神科病院の院長に就任する資格","精神鑑定の唯一の資格"],"a":1,"e":"厚生労働大臣が指定する精神科専門医。強制入院・身体拘束・隔離の判断には指定医の資格が必要。"},{"id":198114,"q":"「ACT（包括型地域生活支援）」とは何か？","c":["救急搬送システム","抗精神病薬の新しい投与方法","精神科入院の簡略化手続き","重篤な精神疾患を持つ人が地域で生活できるよう多職種チームが支援するプログラム"],"a":3,"e":"Assertive Community Treatment。多職種チーム（医師・看護師・PSW・作業療法士等）が24時間対応で地域生活を支える。"},{"id":198115,"q":"日本の精神科病床数の特徴として国際的に見て正しいのはどれか？","c":["世界最多水準（人口比）","世界最少水準","OECD平均と同程度","急速に減少中"],"a":0,"e":"日本の精神科病床数は人口比で世界最多水準。長期入院・社会的入院の問題が指摘されており、地域移行が政策課題。"},{"id":198116,"q":"「デイケア（精神科）」の目的として正しいのはどれか？","c":["手術後のリハビリ","夜間の入院管理","精神疾患患者の社会復帰・生活リズム回復を外来通院で支援する","薬物療法のみの外来治療"],"a":2,"e":"精神科デイケアは週5日程度の日中活動プログラム。生活リズム回復・対人関係スキル・就労準備などを支援する。"},{"id":198117,"q":"「統合失調症」の主な治療として正しいのはどれか？","c":["手術","抗精神病薬による薬物療法と精神科リハビリテーション","電気けいれん療法のみ","抗うつ薬のみ"],"a":1,"e":"統合失調症の主な治療は抗精神病薬（D2受容体遮断）＋社会生活技能訓練（SST）・作業療法等のリハビリ。早期発見・早期治療が予後に影響。"},{"id":198118,"q":"「PSW（精神保健福祉士）」の役割として正しいのはどれか？","c":["精神科医の補助のみ","入院の可否判断","薬の処方","精神障害者の相談・地域生活支援・福祉サービス調整・退院支援"],"a":3,"e":"精神保健福祉士法に基づく国家資格。社会的支援（退院後の生活・就労・福祉サービス等）を担うソーシャルワーカー。"},{"id":198119,"q":"「強度行動障害」への対応として正しいのはどれか？","c":["専門的な支援者による行動分析・環境調整と福祉サービスの組み合わせ","精神科入院のみで対応","手術療法","薬物療法のみ"],"a":0,"e":"自傷・他傷・こだわり等の強い行動障害。応用行動分析（ABA）・環境調整・専門的な介護支援が有効とされる。"},{"id":198120,"q":"「精神科救急」の特徴として正しいのはどれか？","c":["救急搬送の必要はない","外来のみで対応可能","自傷・他害・急性精神病状態など緊急の精神科的対応が必要な患者への24時間体制の医療","警察が単独で対応する"],"a":2,"e":"精神科救急情報センターと救急病院が連携。措置入院・任意入院・医療保護入院の判断が必要。警察・救急との連携が重要。"}]},{"section":"98. 医療と介護の連携","questions":[{"id":198121,"q":"「ケアマネジャー（介護支援専門員）」の主な役割はどれか？","c":["介護施設の経営管理","利用者のケアプラン作成と介護・医療サービスの調整","医師の診療補助","薬の管理のみ"],"a":1,"e":"介護保険法に基づく専門職。利用者の状態をアセスメントしケアプランを作成。医療機関・訪問看護・ヘルパー等を調整する。"},{"id":198122,"q":"「医療・介護連携推進法」として2015年に整備された仕組みはどれか？","c":["介護保険の廃止","介護施設の国営化","医療費の無償化","医療介護総合確保推進法による地域医療・介護の一体的な整備"],"a":3,"e":"「地域における医療及び介護の総合的な確保を推進するための関係法律の整備等に関する法律」。地域包括ケア推進の法的根拠。"},{"id":198123,"q":"「退院支援・退院調整」において病院が連携する主な相手はどれか？","c":["法務局","地域の介護事業所・ケアマネジャー・訪問看護・かかりつけ医","警察署","学校"],"a":1,"e":"入院中から退院後の生活を想定してケアマネ・訪問看護・訪問診療・介護施設と連携するのが退院支援コーディネーターの役割。"},{"id":198124,"q":"「地域包括支援センター」の主な機能はどれか？","c":["高齢者の総合相談・権利擁護・ケアマネ支援・介護予防ケアマネジメントの地域拠点","高度急性期医療の提供","精神科医療の窓口","障害者手帳の発行"],"a":0,"e":"市町村が設置する地域の高齢者支援の中核機関。社会福祉士・保健師・主任ケアマネが配置され、介護・医療・生活の総合相談を受ける。"},{"id":198125,"q":"「施設サービス」と「居宅サービス」の違いとして正しいのはどれか？","c":["施設サービスは特養・老健・療養等への入所、居宅サービスは自宅・グループホームでの生活を支えるサービス","施設サービスは予防給付のみ","居宅サービスは医療のみ","まったく同じサービス"],"a":0,"e":"介護保険の給付は施設（入所）と居宅（在宅）に大別される。特養・老健・介護療養などが施設サービスの代表。"},{"id":198126,"q":"「老健（介護老人保健施設）」の主な目的として正しいのはどれか？","c":["重篤な急性疾患の治療","終身入所が前提","急性期後から在宅復帰を目指す中間施設としてリハビリと医療管理を提供","精神科専門施設"],"a":2,"e":"老健は「在宅復帰・在宅療養支援機能」が目的の中間施設。医師・看護師・理学療法士等が常勤し、在宅復帰率が評価指標。"},{"id":198127,"q":"「多職種連携（IPW）」が医療介護連携で重視される理由はどれか？","c":["コスト削減のため","専門職の数を減らすため","医師・看護師・薬剤師・介護士・MSW等が連携することで複合的なニーズへの包括的対応が可能なため","報酬が上がるため"],"a":2,"e":"高齢者の複合的な医療・生活課題には一職種だけでは対応できない。IPW（Inter-Professional Work）はチーム医療・地域連携の基本概念。"},{"id":198128,"q":"「サービス担当者会議」とは何か？","c":["病院の経営会議","行政の許認可会議","ケアプランに関わる全サービス事業者・家族・本人が集まるカンファレンス","介護報酬の審査会議"],"a":2,"e":"ケアマネが主催。ケアプラン作成・更新時に関係する全サービス提供者が集まり情報共有・連携方針を確認する会議。"},{"id":198129,"q":"「MSW（医療ソーシャルワーカー）」の役割として正しいのはどれか？","c":["手術の補助","患者・家族の経済的・社会的問題への相談支援と退院後の生活支援調整","薬の処方","医師免許なしで診断"],"a":1,"e":"Medical Social Worker。社会福祉士等が担う。入院中の生活・経済的問題・退院先の調整・介護保険申請支援など幅広い相談対応。"},{"id":198130,"q":"「看取りの場」として今後増加が見込まれる場所はどれか？","c":["大病院のICU","産婦人科","救急病院","自宅・介護施設・グループホームなど病院以外の場所"],"a":3,"e":"団塊世代の死亡数が増加する「多死社会」を迎え、病院だけでは対応できない。自宅・特養・グループホーム等での看取り整備が急務。"}]},{"section":"99. クリニック・診療所の種類","questions":[{"id":198131,"q":"「有床診療所」の定義として正しいのはどれか？","c":["1〜19床の入院設備を持つ診療所","20床以上の入院設備を持つ診療所","入院設備がない診療所","救急専門の診療所"],"a":0,"e":"医療法上、19床以下の入院設備を持つ診療所を有床診療所という。夜間の急変対応・手術後管理などに活用される。"},{"id":198132,"q":"「無床診療所（クリニック）」の特徴として正しいのはどれか？","c":["往診のみ行う施設","20床以上の病床を持つ","救急専門の施設","入院設備がなく外来診療が中心"],"a":3,"e":"入院設備を持たない診療所。外来診療が中心で日本の診療所の約9割が無床。専門クリニックから総合内科まで多様。"},{"id":198133,"q":"「在宅療養支援診療所（在支診）」に求められる要件はどれか？","c":["専門医が3名以上","24時間往診・訪問看護提供体制と緊急入院連携","病床数50床以上","外来のみで対応"],"a":1,"e":"在宅医療の拠点として24時間体制が必要。強化型在支診・機能強化型在支診では複数医師体制などの追加要件あり。"},{"id":198134,"q":"「内科クリニック」と「総合内科クリニック」の違いとして正しいのはどれか？","c":["まったく同じ","総合内科は入院専門","総合内科は複数の内科領域をカバーし、臓器別に分けない幅広い診療を行う","内科クリニックは処方ができない"],"a":2,"e":"臓器別専門の内科（消化器・循環器等）に対し、総合内科は「どこが悪いかわからない」患者の初期対応・慢性疾患管理を包括的に担う。"},{"id":198135,"q":"「美容クリニック」の特徴として正しいのはどれか？","c":["保険診療のみ","医師免許不要で開設できる","公的補助が多い","自由診療が中心で、価格設定・集患マーケティングが経営の鍵"],"a":3,"e":"美容外科・美容皮膚科は自由診療中心。保険外で収益性が高い反面、広告・SNSマーケティング・患者獲得競争が激しい。"},{"id":198136,"q":"「産婦人科クリニック（分娩取り扱い）」が減少している主な理由はどれか？","c":["分娩リスク・訴訟リスクの高さと当直負担から撤退する産婦人科医が増加しているため","患者が減ったから","医療機器が高すぎるため","保険点数が高すぎるため"],"a":0,"e":"分娩取り扱いは訴訟リスク・24時間対応・当直負担が大きく、外来のみに絞るクリニックが増加。産科医療補償制度の創設も背景にある。"},{"id":198137,"q":"「メンタルクリニック（精神科・心療内科クリニック）」が増加している背景はどれか？","c":["精神科医が過剰供給されているため","うつ病・適応障害・発達障害への認知向上と受診ハードルの低下","保険点数が高いため","開業規制が廃止されたため"],"a":1,"e":"メンタルヘルス問題の増加・社会的認知向上・待ち時間の短いクリニックへのニーズから増加。軽症〜中等症の外来中心で需要が高い。"},{"id":198138,"q":"「専門クリニック（眼科・皮膚科・耳鼻科等）」の経営上の特徴はどれか？","c":["患者単価が低く経営が困難","入院収入が主な収益源","処置・手術・定期通院患者が多く、効率的な外来運営が可能","保険適用が少ない"],"a":2,"e":"眼科・皮膚科・耳鼻科は比較的患者数が多く外来回転率が高い。白内障手術・レーザー治療など処置収入も安定しやすい。"},{"id":198139,"q":"「訪問専門クリニック」の特徴として正しいのはどれか？","c":["外来診療が中心","救急専門の診療所","入院病床を持つ","外来を持たず在宅・施設の訪問診療のみを行うクリニック"],"a":3,"e":"在宅医療特化型のクリニック。複数医師・看護師体制で多くの在宅患者を担当。在支診の届出が必須で24時間対応が求められる。"},{"id":198140,"q":"「予防医療クリニック」が提供するサービスとして正しいのはどれか？","c":["手術専門","がん検診・生活習慣病予防・ワクチン・健康増進など疾患予防を中心とした診療","急性疾患の治療のみ","感染症治療専門"],"a":1,"e":"予防・アンチエイジング・健康増進を専門にするクリニックが増加中。自費サービス（各種検診・点滴・ワクチン）が主な収益源。"}]},{"section":"100. 医療機器・医療材料","questions":[{"id":198141,"q":"「薬機法（旧薬事法）」において医療機器はいくつのクラスに分類されているか？","c":["2クラス","3クラス","4クラス","6クラス"],"a":2,"e":"クラスⅠ（一般医療機器）〜クラスⅣ（高度管理医療機器）の4段階。クラスが高いほどリスクが高く規制が厳しい。"},{"id":198142,"q":"「MRI（磁気共鳴画像診断装置）」の特徴として正しいのはどれか？","c":["X線を使って撮影する","血液検査に使う機器","内視鏡を使う装置","強い磁場と電波を使い放射線被曝なしに体内を画像化する"],"a":3,"e":"放射線を使わないため被曝リスクがない。脳・脊椎・関節・腫瘍の診断に優れる。ペースメーカー装着者は注意が必要。"},{"id":198143,"q":"「内視鏡（消化器）」の世界最大手メーカーはどこか？","c":["オリンパス（日本）","フィリップス（オランダ）","シーメンス（ドイツ）","GEヘルスケア（米国）"],"a":0,"e":"オリンパスは消化器内視鏡の世界シェア約70%。日本の医療機器産業の代表企業。2023年に医療機器専業会社に再編。"},{"id":198144,"q":"「ディスポーザブル（使い捨て）医療材料」が普及した最大の理由はどれか？","c":["感染リスクの低減と滅菌コスト・手間の削減","コスト削減","デザインが良い","法律で義務化されたため"],"a":0,"e":"注射器・カテーテル・手袋等のディスポ化は院内感染防止に大きく貢献。交差感染リスクの排除と滅菌コスト削減が主目的。"},{"id":198145,"q":"「ロボット手術（ダヴィンチ）」の特徴として正しいのはどれか？","c":["医師なしで自動的に手術する","薬物投与システム","放射線治療の一種","医師が操作するロボットアームで精密な低侵襲手術を行う"],"a":3,"e":"Intuitive Surgical社のda Vinci。医師がコンソールから操作。手ブレ除去・3D視野・精密操作が特徴。前立腺がん等で保険適用。"},{"id":198146,"q":"「在宅医療で使われる医療機器」として正しいのはどれか？","c":["在宅酸素療法（HOT）・在宅人工呼吸器・輸液ポンプ","CT・MRI","手術ロボット","放射線治療機"],"a":0,"e":"在宅医療では在宅酸素・人工呼吸器・輸液・血糖測定器などが使われる。機器のレンタル・メンテナンスを行う業者も関わる。"},{"id":198147,"q":"「SPD（Supply Processing and Distribution）」とは何か？","c":["手術の種類の略称","専門医資格の種類","病院内の医療材料・医薬品の一元管理・供給システム","電子カルテの規格"],"a":2,"e":"院内物流管理システム。使用した材料の自動補充・在庫管理・コスト管理を行う。医療材料メーカーや卸が運営に関わるケースも多い。"},{"id":198148,"q":"「医療機器の添付文書」に記載されている最重要事項はどれか？","c":["製造会社の沿革","使用目的・禁忌・警告・使用方法などの安全情報","価格表","製造工場の所在地"],"a":1,"e":"医療機器添付文書には禁忌・警告・使用上の注意・保管条件等が記載。薬機法に基づき作成が義務づけられている。"},{"id":198149,"q":"「ウェアラブル医療機器」として保険適用が進んでいるものはどれか？","c":["スマートウォッチ（一般消費者向け）","一般的なフィットネストラッカー","ゲーム機器","持続血糖測定器（CGM）・植込み型心臓モニター等"],"a":3,"e":"CGM（フリースタイルリブレ等）は糖尿病患者に保険適用。24時間の血糖値トレンドをモニタリングできる画期的な機器。"},{"id":198150,"q":"「医療機器の治験（臨床試験）」が薬の治験と異なる点はどれか？","c":["動物実験のみで承認される","医薬品とは別の承認制度（医療機器は性能・安全性・有効性の確認が中心）","治験が不要","医師会が審査する"],"a":1,"e":"医療機器の承認は性能試験・臨床試験・添付文書審査が中心。薬の治験より期間が短いケースも多いが、PMDAによる審査は必要。"}]}];

const DAILY_QUESTIONS = {"1": {"id": 1, "section": "1. 医学部について", "q": "医学部は全国に何校あるか？", "c": ["62校", "82校", "72校", "92校"], "a": 1, "e": "国公立51校、私立31校の合計82校。"}, "2": {"id": 2, "section": "1. 医学部について", "q": "医学部4〜5年進級時に受ける試験は？", "c": ["医師国家試験", "TOEFL・IELTS", "CBTとOSCE", "MATとGRE"], "a": 2, "e": "CBT（Computer Based Testing）とOSCE（客観的臨床能力試験）の2つ。"}, "3": {"id": 3, "section": "1. 医学部について", "q": "医師国家試験はいつ実施されるか？", "c": ["4年の10月", "6年の2月", "5年の6月", "6年の12月"], "a": 1, "e": "医学部6年の2月に毎年実施される。"}, "4": {"id": 4, "section": "1. 医学部について", "q": "医師国家試験の合格率はおおよそ何%か？", "c": ["約70〜72%", "約80〜82%", "約90〜92%", "約95〜97%"], "a": 2, "e": "毎年概ね90〜92%程度。"}, "5": {"id": 5, "section": "1. 医学部について", "q": "私立医学部6年間の学費の目安は？", "c": ["約500〜1000万円", "約1000〜1500万円", "約2000〜4500万円", "約5000万円以上"], "a": 2, "e": "国公立は約350万円。私立は約2000〜4500万円と大きな差がある。"}, "6": {"id": 6, "section": "1. 医学部について", "q": "産業医科大学の管轄省庁はどこか？", "c": ["文部科学省", "厚生労働省", "防衛省", "総務省"], "a": 1, "e": "産業医科大学＝厚生労働省、防衛医科大学校＝防衛省、自治医科大学＝総務省。"}, "7": {"id": 7, "section": "1. 医学部について", "q": "川崎医科大学はどの県にあるか？", "c": ["広島県", "神奈川県", "岡山県", "愛媛県"], "a": 2, "e": "岡山県倉敷市に所在。"}, "8": {"id": 8, "section": "1. 医学部について", "q": "弘前大学はどこにあるか？", "c": ["秋田県", "青森県", "岩手県", "山形県"], "a": 1, "e": "青森県弘前市。東北の国立大学医学部の一つ。"}, "90001": {"id": 90001, "section": "1. 医学部について", "q": "国立大学医学部の6年間の学費の目安はどれか？", "c": ["約300〜400万円", "約500〜600万円", "約1000〜1500万円", "約2000万円以上"], "a": 0, "e": "国立大学の学費は約350万円（授業料約54万×6年＋入学金28万円）。私立医学部の2000〜4000万円と比べて大幅に安い。"}, "90002": {"id": 90002, "section": "1. 医学部について", "q": "医学部入学定員が最も多い大学はどれか？", "c": ["東京大学", "日本大学", "順天堂大学", "慶應義塾大学"], "a": 1, "e": "日本大学医学部は入学定員が多い私立医大の一つ。定員は約130名。"}, "10": {"id": 10, "section": "2. 医師の臨床研修制度", "q": "医師臨床研修制度が義務化されたのはいつか？", "c": ["1990年", "1998年", "2004年", "2010年"], "a": 2, "e": "2004年（平成16年）から義務化。それ以前は努力義務だった。"}, "11": {"id": 11, "section": "2. 医師の臨床研修制度", "q": "臨床研修制度の必修科目として含まれないものはどれか？", "c": ["内科・外科", "小児科・産婦人科", "精神科・救急科", "眼科・皮膚科"], "a": 3, "e": "必修7科目は内科・外科・小児科・産婦人科・精神科・救急科・地域医療。眼科・皮膚科は含まれない。"}, "12": {"id": 12, "section": "2. 医師の臨床研修制度", "q": "臨床研修制度の地域偏在とはどういう問題か？", "c": ["地方に研修医が集中する", "都市部に研修医が集中し地方が不足する", "特定の診療科に偏る", "外国人医師が都市に集中する"], "a": 1, "e": "東京・大阪など都市部に研修医が集中し、地方病院で医師不足が生じる問題。"}, "13": {"id": 13, "section": "2. 医師の臨床研修制度", "q": "診療科偏在の説明として正しいものはどれか？", "c": ["外科・産婦人科に人気が偏っている", "眼科・皮膚科などQOLの高い科に人気が偏り外科・産婦人科等が不足", "内科・外科のみが不足", "地域によって偏在は存在しない"], "a": 1, "e": "眼科・皮膚科・放射線科などが人気。外科・産婦人科・救急科が不足傾向。"}, "90010": {"id": 90010, "section": "2. 医師の臨床研修制度", "q": "初期臨床研修の期間は何年間か？", "c": ["1年間", "2年間", "3年間", "4年間"], "a": 1, "e": "初期臨床研修は2年間。その後、後期研修（専攻医）に進む。"}, "90011": {"id": 90011, "section": "2. 医師の臨床研修制度", "q": "臨床研修病院のうち「基幹型」とはどういう病院か？", "c": ["大学病院のみを指す", "研修プログラムの主体となる病院", "協力型病院の別名", "地域医療を担う診療所"], "a": 1, "e": "基幹型研修病院はプログラムの主体。協力型病院と組み合わせて研修を行う。"}, "90012": {"id": 90012, "section": "2. 医師の臨床研修制度", "q": "研修医のマッチング制度とは何か？", "c": ["医学部入試の制度", "研修病院と研修医の希望を調整する制度", "専門医資格の取得制度", "医師免許の更新制度"], "a": 1, "e": "マッチングとは研修医と病院の双方の希望をコンピューターで調整する制度。毎年秋に結果発表。"}, "90013": {"id": 90013, "section": "2. 医師の臨床研修制度", "q": "初期研修終了後に進む「後期研修」の別名はどれか？", "c": ["インターン", "レジデント", "専攻医", "フェロー"], "a": 2, "e": "後期研修医は「専攻医」とも呼ばれる。新専門医制度のもと各基本領域で専門研修を行う。"}, "90014": {"id": 90014, "section": "2. 医師の臨床研修制度", "q": "研修医の給与として一般的な月収の目安はどれか？", "c": ["月5〜10万円", "月15〜20万円", "月30〜40万円", "月60万円以上"], "a": 2, "e": "初期研修医の月収は病院によるが、一般的に月30〜40万円程度が目安。当直手当含む。"}, "90015": {"id": 90015, "section": "2. 医師の臨床研修制度", "q": "臨床研修で必修とされる「地域医療」研修の目的として正しいものはどれか？", "c": ["離島勤務の経験を積む", "地域の医療ニーズや医院経営を学ぶ", "農村での農業体験をする", "行政機関での勤務を経験する"], "a": 1, "e": "地域医療研修は診療所・中小病院での実践を通じ、地域の実情や医院経営・プライマリケアを学ぶ。"}, "15": {"id": 15, "section": "3. 暗記用語集", "q": "OT・PT・STの正しい組み合わせはどれか？", "c": ["OT=理学療法士 PT=作業療法士 ST=言語聴覚士", "OT=作業療法士 PT=理学療法士 ST=言語聴覚士", "OT=言語聴覚士 PT=作業療法士 ST=理学療法士", "OT=作業療法士 PT=言語聴覚士 ST=理学療法士"], "a": 1, "e": "OT=作業療法士、PT=理学療法士、ST=言語聴覚士。"}, "16": {"id": 16, "section": "3. 暗記用語集", "q": "「ウロ」とは何科のことか？", "c": ["脳神経外科", "泌尿器科", "循環器内科", "耳鼻咽喉科"], "a": 1, "e": "Urologyの略。泌尿器科のこと。"}, "17": {"id": 17, "section": "3. 暗記用語集", "q": "「プシコ」とは何科のことか？", "c": ["形成外科", "整形外科", "精神科", "放射線科"], "a": 2, "e": "Psychoの略。精神科のこと。"}, "18": {"id": 18, "section": "3. 暗記用語集", "q": "「ラパロ」とは何を意味するか？", "c": ["内視鏡検査", "腹腔鏡手術", "血管造影検査", "開胸手術"], "a": 1, "e": "Laparoscopyの略。腹腔鏡手術のこと。"}, "19": {"id": 19, "section": "3. 暗記用語集", "q": "「ゾロ薬」とは何か？", "c": ["先発医薬品", "ジェネリック医薬品", "漢方薬", "抗生物質の総称"], "a": 1, "e": "先発品の特許切れ後にゾロゾロ出てくることからジェネリック医薬品の俗称。"}, "20": {"id": 20, "section": "3. 暗記用語集", "q": "「DPC」とは何か？", "c": ["医師の専門医資格制度", "診断群分類別包括評価", "大学病院の教育プログラム", "地域医療計画"], "a": 1, "e": "Diagnosis Procedure Combination。疾患ごとに1日あたり定額で計算する入院費の仕組み。"}, "21": {"id": 21, "section": "3. 暗記用語集", "q": "「ジッツ」とは何か？", "c": ["医師免許の更新制度", "大学医局が医師を派遣する関連病院", "救急外来の当直体制", "フリーランス医師の求人サイト"], "a": 1, "e": "ドイツ語のSitz（席）から。医局が医師を派遣する先の関連病院のこと。"}, "22": {"id": 22, "section": "3. 暗記用語集", "q": "CTとMRIの違いとして正しいものはどれか？", "c": ["CTは磁気・MRIはX線を使う", "CTはX線・MRIは磁気と電波を使う", "両方ともX線を使う", "両方とも磁気を使う"], "a": 1, "e": "CT＝X線使用で短時間。MRI＝磁気と電波で軟部組織の描出に優れるが時間がかかる。"}, "90020": {"id": 90020, "section": "3. 暗記用語集", "q": "「オペ室」とは何の略称か？", "c": ["外来診察室", "手術室", "集中治療室", "処置室"], "a": 1, "e": "オペ室はOperation Room（手術室）の略称。「オペ」はオペレーション（手術）の略で現場でよく使われる。"}, "90021": {"id": 90021, "section": "3. 暗記用語集", "q": "「コメディカル」とは何を指すか？", "c": ["医師の補助をする事務職", "医師・歯科医師以外の医療専門職の総称", "病院の経営管理職", "医学部の教授陣"], "a": 1, "e": "コメディカルは看護師・薬剤師・理学療法士など医師以外の医療専門職の総称。"}, "28": {"id": 28, "section": "4. 新専門医制度", "q": "新専門医制度が本格始動したのはいつか？", "c": ["2010年", "2014年", "2018年", "2022年"], "a": 2, "e": "2018年（平成30年）に本格始動。"}, "29": {"id": 29, "section": "4. 新専門医制度", "q": "新専門医制度を運営する機構の名前は？", "c": ["日本医師会", "日本専門医機構", "厚生労働省医事課", "中央社会保険医療協議会"], "a": 1, "e": "日本専門医機構が認定・管理を行う。"}, "30": {"id": 30, "section": "4. 新専門医制度", "q": "新専門医制度の基本領域はいくつあるか？", "c": ["12領域", "15領域", "19領域", "23領域"], "a": 2, "e": "内科・外科・小児科など19の基本領域がある。"}, "90030": {"id": 90030, "section": "4. 新専門医制度", "q": "新専門医制度における「サブスペシャルティ領域」とはどれか？", "c": ["基本19領域のこと", "基本領域の上に積み上げる細分化された専門領域", "初期研修の選択科目", "診療科の別名"], "a": 1, "e": "サブスペシャルティ領域は基本領域取得後に取得できる細分化された専門領域（例：消化器内科・循環器内科など）。"}, "90031": {"id": 90031, "section": "4. 新専門医制度", "q": "専門医取得のために必要な研修期間は一般的に何年か？", "c": ["1年", "2年", "3年以上", "5年以上"], "a": 2, "e": "専攻医として専門研修を3〜4年経て専門医試験を受験するのが一般的。領域により異なる。"}, "90032": {"id": 90032, "section": "4. 新専門医制度", "q": "専門医制度で問題となった「地域偏在」とはどういう問題か？", "c": ["専門医が都市部の大病院に集中し地方が不足", "専門医が地方に集中し都市部が不足", "専門医の数が多すぎる", "専門医の試験が難しすぎる"], "a": 0, "e": "専門医取得には大病院での症例数が必要なため都市集中が起こりやすく、地方の医師不足が深刻化する懸念がある。"}, "90033": {"id": 90033, "section": "4. 新専門医制度", "q": "内科専門医の研修プログラムの特徴として正しいものはどれか？", "c": ["内科のみで完結する", "総合内科・各サブ科をローテーションする", "外科研修が必須含まれる", "1年で取得できる"], "a": 1, "e": "内科専門医プログラムは消化器・循環器・呼吸器など各内科をローテーションして幅広い内科力を養う。"}, "90034": {"id": 90034, "section": "4. 新専門医制度", "q": "新専門医制度導入の主な目的はどれか？", "c": ["医師の給与水準を統一する", "専門医の質を担保し国民に分かりやすい専門医制度を構築する", "医師数を減らして医療費を抑制する", "外国人医師の受け入れを拡大する"], "a": 1, "e": "旧来の学会ごとにバラバラだった専門医制度を統一し、質の担保と国民への分かりやすさを目指した。"}, "90035": {"id": 90035, "section": "4. 新専門医制度", "q": "外科専門医取得に必要な手術件数の目安はどれか？", "c": ["50件以上", "100件以上", "200件以上", "500件以上"], "a": 2, "e": "外科専門医には200件以上の術者経験が必要。症例の多様性も審査される。"}, "90036": {"id": 90036, "section": "4. 新専門医制度", "q": "専門医制度における「指導医」の役割はどれか？", "c": ["専攻医の給与を決定する", "専攻医の研修を指導・評価する", "病院の経営を管理する", "専攻医の就職先を決める"], "a": 1, "e": "指導医は専攻医の日常的な研修指導・症例フィードバック・評価を行う役割を担う。"}, "31": {"id": 31, "section": "5. 病院の種類と病棟", "q": "病院と診療所の違いはどれか？", "c": ["病院は10床以上・診療所は9床以下", "病院は20床以上・診療所は19床以下または無床", "病院は50床以上・診療所は49床以下", "規模の違いはなく名称の違いだけ"], "a": 1, "e": "医療法上、病院＝20床以上。診療所＝19床以下または無床。"}, "32": {"id": 32, "section": "5. 病院の種類と病棟", "q": "病棟の種類として含まれないものはどれか？", "c": ["一般病棟", "療養病棟", "回復期リハビリテーション病棟", "美容病棟"], "a": 3, "e": "主な病棟は一般・療養・回復期リハビリ・地域包括ケア・精神の5種類。美容病棟は存在しない。"}, "90040": {"id": 90040, "section": "5. 病院の種類と病棟", "q": "特定機能病院の認定要件として正しいものはどれか？", "c": ["病床数100床以上", "高度医療の提供・研修機能・400床以上など", "救急指定を受けていること", "訪問診療を行っていること"], "a": 1, "e": "特定機能病院は高度医療・研修機能・400床以上・集中治療室設置などの要件を満たす必要がある。"}, "90041": {"id": 90041, "section": "5. 病院の種類と病棟", "q": "地域医療支援病院の主な役割はどれか？", "c": ["地域の診療所からの紹介患者を受け入れる", "離島・へき地の診療所を運営する", "美容外科・自費診療を専門とする", "訪問看護を主体とする"], "a": 0, "e": "地域医療支援病院は紹介患者の受け入れ・逆紹介・共同利用・救急医療を担い地域連携の拠点となる。"}, "90042": {"id": 90042, "section": "5. 病院の種類と病棟", "q": "回復期リハビリテーション病棟の対象となる主な疾患はどれか？", "c": ["悪性腫瘍・がん治療", "脳卒中・大腿骨骨折などのリハビリ", "感染症の隔離治療", "精神疾患の長期入院"], "a": 1, "e": "回復期リハビリ病棟は脳卒中・骨折などの術後患者に集中リハビリを提供し在宅復帰を目指す。"}, "90043": {"id": 90043, "section": "5. 病院の種類と病棟", "q": "療養病棟に入院する患者の特徴として正しいものはどれか？", "c": ["急性期の手術が必要な患者", "長期療養が必要な慢性期・安定期の患者", "精神科的治療が必要な患者", "出産・分娩を控えた患者"], "a": 1, "e": "療養病棟は長期入院が必要な慢性疾患・医療依存度の高い患者を受け入れる。急性期病棟より診療報酬が低い。"}, "90044": {"id": 90044, "section": "5. 病院の種類と病棟", "q": "DPC対象病院の特徴として正しいものはどれか？", "c": ["出来高払いで全て算定する病院", "診断群分類による1日定額払いを採用している急性期病院", "訪問診療専門の病院", "透析専門クリニック"], "a": 1, "e": "DPC対象病院は診断群分類（DPC）に基づく包括払いを採用する急性期病院。全国に約1800病院が指定されている。"}, "90045": {"id": 90045, "section": "5. 病院の種類と病棟", "q": "大学病院の主な役割として含まれないものはどれか？", "c": ["高度医療・最先端治療の提供", "医学生・研修医の教育", "医学研究・臨床試験", "一般企業の健康診断のみを行う"], "a": 3, "e": "大学病院は高度医療・教育・研究の三機能を担う。健康診断は行うが主目的ではない。"}, "90046": {"id": 90046, "section": "5. 病院の種類と病棟", "q": "ICU（集中治療室）とHCU（高度治療室）の違いはどれか？", "c": ["ICUは外科専用、HCUは内科専用", "ICUは最重症患者、HCUはICUより状態が安定した患者向け", "両者は同じ施設を指す", "HCUは小児専用の集中治療室"], "a": 1, "e": "ICUは最重症・集中管理が必要な患者向け。HCUはICUより状態が安定しているが一般病棟より管理が必要な患者向け。"}, "90047": {"id": 90047, "section": "5. 病院の種類と病棟", "q": "緩和ケア病棟（ホスピス）の主な対象はどれか？", "c": ["急性期の手術患者", "がんや難病などで治癒が困難な患者の苦痛緩和・QOL向上を目的とした入院", "透析患者", "精神疾患の長期入院患者"], "a": 1, "e": "緩和ケア病棟はがんや難病で根治が困難な患者の身体的・精神的苦痛を和らげQOLを高めることを目的とする。"}, "33": {"id": 33, "section": "6. 医師の働き方改革", "q": "医師への働き方改革が適用開始されたのはいつか？", "c": ["2019年4月", "2022年4月", "2024年4月", "2026年4月"], "a": 2, "e": "一般労働者は2019年4月〜。医師は5年間の猶予を経て2024年4月〜適用。"}, "34": {"id": 34, "section": "6. 医師の働き方改革", "q": "医師のA水準の時間外労働上限は？", "c": ["年480時間以下", "年720時間以下", "年960時間以下", "年1860時間以下"], "a": 2, "e": "A水準＝年960時間以下。B・C水準は年1860時間以下。"}, "90050": {"id": 90050, "section": "6. 医師の働き方改革", "q": "医師の時間外労働「B水準」が適用される施設はどれか？", "c": ["一般的な診療所", "地域医療確保のため必要と認められた病院", "美容外科クリニック", "訪問診療専門の診療所"], "a": 1, "e": "B水準は地域医療確保のため必要と認められた病院に適用。上限は年1860時間。"}, "90051": {"id": 90051, "section": "6. 医師の働き方改革", "q": "医師の働き方改革で新設された「連続勤務時間制限」の内容はどれか？", "c": ["連続24時間以上の勤務は禁止", "28時間超連続勤務後は9時間以上の休息を確保", "48時間勤務後に24時間休息", "勤務間インターバルは最低6時間"], "a": 1, "e": "長時間勤務後の疲労回復のため、28時間超の連続勤務後は9時間以上のインターバルが義務化。"}, "90052": {"id": 90052, "section": "6. 医師の働き方改革", "q": "医師の働き方改革が医師紹介に与える影響として正しいものはどれか？", "c": ["常勤医師の需要が減少する", "当直・オンコール対応ができる医師の需要が高まる", "アルバイト求人が消滅する", "医師の給与が一律に下がる"], "a": 1, "e": "時間外制限により人手不足が深刻化。特に当直・オンコール対応可能な常勤・非常勤医師の需要が増加。"}, "90053": {"id": 90053, "section": "6. 医師の働き方改革", "q": "医師の時間外労働が年960時間を超える場合に必要な対応はどれか？", "c": ["自動的に解雇となる", "労働局への届け出と医師への面接指導が必要", "罰金のみが科せられる", "特段の対応は不要"], "a": 1, "e": "960時間超の場合、産業医等による面接指導の実施が義務付けられている。医師の健康確保が目的。"}, "90054": {"id": 90054, "section": "6. 医師の働き方改革", "q": "「宿日直許可」とは何か？", "c": ["医師が自由に休日を取れる制度", "労働基準監督署の許可を得た軽度の業務に限定した待機当直", "病院が独自に定める当直規則", "医師の残業を無制限に許可する制度"], "a": 1, "e": "宿日直許可とは、通常業務でなく待機・軽度な対応のみを行う当直に適用される特例。時間外労働に算入されない。"}, "90055": {"id": 90055, "section": "6. 医師の働き方改革", "q": "医師の副業・アルバイトと働き方改革の関係として正しいものはどれか？", "c": ["副業は全面禁止となった", "副業先の労働時間も通算して上限管理が必要", "副業の時間は上限に含まれない", "副業は大学病院のみ認められる"], "a": 1, "e": "医師の副業・兼業先の時間外労働も通算される。複数の病院で勤務する場合も合計で上限を管理する必要がある。"}, "90056": {"id": 90056, "section": "6. 医師の働き方改革", "q": "働き方改革により医師が減少しやすい勤務形態はどれか？", "c": ["日勤のみの外来診療", "夜間・休日の当直や長時間手術", "在宅勤務・遠隔診療", "行政職・産業医"], "a": 1, "e": "時間外規制により夜間当直・長時間手術などの勤務が制限されやすく、対応できる病院の医師確保が課題。"}, "90057": {"id": 90057, "section": "6. 医師の働き方改革", "q": "医師の働き方改革における「タスクシフト・シェア」とはどれか？", "c": ["医師の業務を看護師等他職種に移管・共有すること", "医師の給与を各診療科でシェアすること", "患者の診療記録を共有すること", "病院間で医師を派遣しあうこと"], "a": 0, "e": "タスクシフト・シェアは医師の業務を看護師・薬剤師・臨床工学技士等に移管し医師の負担を軽減する取り組み。"}, "36": {"id": 36, "section": "7. 消化器内科・内視鏡", "q": "消化器内科が対象とする臓器として含まれないものはどれか？", "c": ["食道・胃・大腸", "肝臓・胆嚢・膵臓", "心臓・肺", "小腸・十二指腸"], "a": 2, "e": "消化器内科は消化管（食道〜大腸）と消化器臓器（肝・胆・膵）を診る。心肺は対象外。"}, "37": {"id": 37, "section": "7. 消化器内科・内視鏡", "q": "内視鏡のシェアトップメーカーはどこか？", "c": ["富士フイルム", "HOYA", "オリンパス", "ニコン"], "a": 2, "e": "オリンパスが世界シェア約70%でトップ。次いで富士フイルム、HOYA。"}, "38": {"id": 38, "section": "7. 消化器内科・内視鏡", "q": "上部・下部内視鏡のアルファベット略称として正しいものはどれか？", "c": ["上部=CF/CS・下部=GF/EGD", "上部=GF/EGD・下部=CF/CS", "上部=ESD・下部=EMR", "上部=ERCP・下部=TUR"], "a": 1, "e": "上部＝GF/EGD（胃カメラ）、下部＝CF/CS（大腸カメラ）。"}, "39": {"id": 39, "section": "7. 消化器内科・内視鏡", "q": "ESDとは何か？", "c": ["内視鏡的粘膜切除術", "内視鏡的粘膜下層剥離術", "経皮的冠動脈インターベンション", "内視鏡的逆行性胆管膵管造影"], "a": 1, "e": "ESD＝内視鏡的粘膜下層剥離術。より広範な病変を一括切除できる高度な手技。"}, "40": {"id": 40, "section": "7. 消化器内科・内視鏡", "q": "セデーションとは何か？", "c": ["内視鏡のメーカー名", "手術後の管理方法", "内視鏡検査時に鎮静剤を投与し苦痛を軽減すること", "内視鏡洗浄の手順"], "a": 2, "e": "Sedation（鎮静）。検査中の苦痛を軽減するため鎮静剤を使用すること。"}, "304": {"id": 304, "section": "7. 消化器内科・内視鏡", "q": "ERCPとは何か？", "c": ["体外衝撃波結石破砕術", "内視鏡的逆行性胆管膵管造影", "電気けいれん療法", "経皮的冠動脈インターベンション"], "a": 1, "e": "Endoscopic Retrograde Cholangiopancreatography。胆管・膵管の検査・治療に用いる高難度手技。"}, "91001": {"id": 91001, "section": "7. 消化器内科・内視鏡", "q": "ポリペクトミーとは何か？", "c": ["内視鏡的な粘膜切除術", "内視鏡を使ったポリープ切除術", "胃の切除手術", "腸の洗浄処置"], "a": 1, "e": "ポリペクトミーは内視鏡でポリープをスネアで切除する手術。大腸ポリープの切除に多用される。"}, "91002": {"id": 91002, "section": "7. 消化器内科・内視鏡", "q": "消化器内科における「H.pylori」とは何か？", "c": ["肝炎ウイルス", "ヘリコバクター・ピロリ菌", "大腸菌の一種", "消化酵素の名称"], "a": 1, "e": "H.pylori（ヘリコバクター・ピロリ）は胃潰瘍・胃がんの主要原因菌。除菌療法が標準治療。"}, "91003": {"id": 91003, "section": "7. 消化器内科・内視鏡", "q": "肝硬変の主な原因として最も多いものはどれか？", "c": ["過食・肥満のみ", "B型・C型肝炎ウイルス感染やアルコール", "ストレスと睡眠不足", "薬剤性肝障害のみ"], "a": 1, "e": "肝硬変の主因はB型・C型肝炎ウイルスとアルコール性肝障害。近年は非アルコール性脂肪肝も増加。"}, "91004": {"id": 91004, "section": "7. 消化器内科・内視鏡", "q": "消化器内科クリニックで需要の高い処置として正しいものはどれか？", "c": ["冠動脈カテーテル検査", "定期的な上部・下部内視鏡検査", "MRI撮影", "人工透析"], "a": 1, "e": "消化器内科クリニックでは上部（胃カメラ）・下部（大腸カメラ）の定期的な内視鏡検査が収益の柱。"}, "41": {"id": 41, "section": "8. 循環器内科", "q": "循環器内科が主に診る部位はどれか？", "c": ["肺・気管支", "心臓と血管", "消化管全般", "脳・神経系"], "a": 1, "e": "心臓と血管を中心とした循環器系全般。"}, "42": {"id": 42, "section": "8. 循環器内科", "q": "PCI（経皮的冠動脈インターベンション）とは何か？", "c": ["心臓弁の手術", "カテーテルで狭窄した冠動脈を広げる治療", "人工心肺を使った手術", "心臓移植手術"], "a": 1, "e": "細いカテーテルを血管内に挿入し、バルーンやステントで冠動脈の狭窄を治療する。"}, "43": {"id": 43, "section": "8. 循環器内科", "q": "カテーテルを挿入する主な部位はどれか？", "c": ["首の静脈・腹部動脈", "手首の橈骨動脈や足の付け根の大腿動脈", "膝の動脈・肩の静脈", "背部の静脈"], "a": 1, "e": "橈骨動脈（手首）や大腿動脈（足の付け根）から挿入するのが一般的。"}, "306": {"id": 306, "section": "8. 循環器内科", "q": "循環器内科で確認するホルター検査とは何か？", "c": ["12誘導心電図", "24時間ホルター心電図", "運動負荷心電図", "心臓MRI"], "a": 1, "e": "24時間装着して心電図を記録するホルター心電図。不整脈の診断に有効。"}, "307": {"id": 307, "section": "8. 循環器内科", "q": "ABI/PWV検査とは何の検査か？", "c": ["肺機能検査", "動脈硬化検査", "腎機能検査", "脳血流検査"], "a": 1, "e": "ABI＝足関節上腕血圧比、PWV＝脈波伝播速度。動脈硬化の程度を評価する。"}, "91010": {"id": 91010, "section": "8. 循環器内科", "q": "心房細動のカテーテル治療として正しいものはどれか？", "c": ["PCI", "CABG", "アブレーション", "TAVI"], "a": 2, "e": "アブレーションは心房細動の原因部位をカテーテルで焼灼する治療。根治を目指せる。"}, "91011": {"id": 91011, "section": "8. 循環器内科", "q": "TAVIとは何の治療か？", "c": ["冠動脈のバイパス術", "カテーテルによる大動脈弁置換術", "心臓ペースメーカーの植え込み", "心房中隔欠損の閉鎖術"], "a": 1, "e": "TAVI（経カテーテル大動脈弁植え込み術）は開胸せずカテーテルで大動脈弁を置換する低侵襲治療。"}, "91012": {"id": 91012, "section": "8. 循環器内科", "q": "循環器内科医の求人で確認すべきカテーテル件数として適切なものはどれか？", "c": ["年間件数・緊急対応の有無", "外来患者数のみ", "訪問診療の件数", "ICU管理日数"], "a": 0, "e": "カテーテル治療経験が豊富かを確認するため、年間件数と緊急PCIの有無は必須確認事項。"}, "91013": {"id": 91013, "section": "8. 循環器内科", "q": "ICD（植え込み型除細動器）の目的はどれか？", "c": ["血圧を自動で管理する", "致死性不整脈を感知し電気ショックで停止させる", "心臓の拡張を補助する", "ペースメーカーの別名"], "a": 1, "e": "ICDは致死性不整脈（心室細動など）を感知し自動的に電気ショックを与えて正常リズムに戻す装置。"}, "91014": {"id": 91014, "section": "8. 循環器内科", "q": "心不全の急性増悪時に最初に行う処置はどれか？", "c": ["即時カテーテル検査", "酸素投与・利尿剤などの内科的管理", "冠動脈バイパス手術", "透析導入"], "a": 1, "e": "急性心不全では酸素投与・利尿剤・血管拡張薬などの内科的管理が第一選択。状態安定後に精査。"}, "45": {"id": 45, "section": "9. 呼吸器科", "q": "呼吸器外科が対象とする臓器として含まれないものはどれか？", "c": ["肺・気管・気管支", "胸膜・縦隔", "食道・胃", "肺がんの外科治療"], "a": 2, "e": "呼吸器外科は肺・気管・気管支・胸膜・縦隔が対象。食道・胃は消化器外科。"}, "46": {"id": 46, "section": "9. 呼吸器科", "q": "肺がん手術で使われるロボット名は何か？", "c": ["ROBODOC", "MAKO", "da Vinci", "Mazor X"], "a": 2, "e": "da Vinci（Intuitive Surgical社製）が代表的な手術支援ロボット。"}, "311": {"id": 311, "section": "9. 呼吸器科", "q": "呼吸器内科の気管支鏡検査として含まれないものはどれか？", "c": ["BAL", "TBLB", "膀胱鏡検査", "気管支擦過細胞診"], "a": 2, "e": "膀胱鏡は泌尿器科の手技。気管支鏡は気道・肺の検査に使用。"}, "313": {"id": 313, "section": "9. 呼吸器科", "q": "呼吸器内科クリニックでCPAP管理外来を持つ意義はどれか？", "c": ["透析収益の向上", "SAS患者の継続管理で安定外来収益", "美容施術の提供", "分娩管理のため"], "a": 1, "e": "SAS患者はCPAP装置を継続使用するため、定期的な外来受診が必要で安定収益につながる。"}, "91020": {"id": 91020, "section": "9. 呼吸器科", "q": "COPD（慢性閉塞性肺疾患）の最大の危険因子はどれか？", "c": ["花粉症", "喫煙", "運動不足", "睡眠時無呼吸"], "a": 1, "e": "COPDの最大危険因子は喫煙。長年の喫煙により気道が慢性的に炎症・狭窄する疾患。"}, "91021": {"id": 91021, "section": "9. 呼吸器科", "q": "肺がんの診断に最もよく使われる検査はどれか？", "c": ["血液検査のみ", "CT検査・気管支鏡・PET-CT", "X線のみ", "MRIのみ"], "a": 1, "e": "肺がんの診断にはCT・気管支鏡による組織採取・PET-CTが主に用いられる。"}, "91022": {"id": 91022, "section": "9. 呼吸器科", "q": "呼吸器内科医が専門とする主な疾患として含まれないものはどれか？", "c": ["肺炎・気管支炎", "喘息・COPD", "肺がん", "心筋梗塞"], "a": 3, "e": "心筋梗塞は循環器内科の専門領域。呼吸器内科は肺・気道・胸膜の疾患を専門とする。"}, "91023": {"id": 91023, "section": "9. 呼吸器科", "q": "SAS（睡眠時無呼吸症候群）の標準治療はどれか？", "c": ["手術のみ", "CPAP療法", "抗生剤投与", "抗アレルギー薬の内服"], "a": 1, "e": "中等症以上のSASには夜間のCPAP（持続陽圧呼吸）療法が標準治療。呼吸器科・内科が管理する。"}, "91024": {"id": 91024, "section": "9. 呼吸器科", "q": "胸腔鏡手術（VATS）の特徴として正しいものはどれか？", "c": ["開胸して行う大きな手術", "内視鏡を使った低侵襲な肺・胸膜手術", "腹腔鏡の別名", "ロボット手術のみを指す"], "a": 1, "e": "VATS（胸腔鏡補助下手術）は小切開で内視鏡を挿入する低侵襲手術。術後回復が早い。"}, "91025": {"id": 91025, "section": "9. 呼吸器科", "q": "喘息の長期管理薬として第一選択となるものはどれか？", "c": ["抗生剤", "吸入ステロイド薬", "利尿剤", "抗血小板薬"], "a": 1, "e": "喘息の長期管理には吸入ステロイド薬が第一選択。気道の炎症を抑制し発作を予防する。"}, "47": {"id": 47, "section": "10. 心臓血管外科", "q": "CABGとは何の手術か？", "c": ["大動脈弁置換術", "冠動脈バイパス手術", "心臓移植手術", "心房細動のアブレーション"], "a": 1, "e": "CABG＝Coronary Artery Bypass Grafting。狭窄した冠動脈をバイパスする手術。"}, "48": {"id": 48, "section": "10. 心臓血管外科", "q": "オフポンプ手術とは何か？", "c": ["人工心肺を使いながら行う手術", "人工心肺を使わず心臓を動かしたまま行う手術", "ロボット支援手術", "内視鏡を使った心臓手術"], "a": 1, "e": "Off-pump CABG。人工心肺なしで行う冠動脈バイパス手術。合併症リスクが低い。"}, "49": {"id": 49, "section": "10. 心臓血管外科", "q": "上皇さまの冠動脈バイパス手術を執刀した医師は誰か？", "c": ["福島孝徳医師", "天野篤医師", "渡辺剛医師", "小林純人医師"], "a": 1, "e": "天野篤医師。順天堂大学教授。2012年に上皇さまの手術を執刀。"}, "91030": {"id": 91030, "section": "10. 心臓血管外科", "q": "大動脈瘤の手術適応となる胸部大動脈瘤の直径の目安はどれか？", "c": ["3cm以上", "5cm以上", "8cm以上", "10cm以上"], "a": 1, "e": "胸部大動脈瘤は直径5cm以上（部位により異なる）が手術適応の目安。破裂リスクが高まる。"}, "91031": {"id": 91031, "section": "10. 心臓血管外科", "q": "心臓血管外科で使用する人工心肺の役割はどれか？", "c": ["麻酔を管理する", "心臓・肺の機能を代替し体外循環を維持する", "血圧を自動調整する", "感染を予防する"], "a": 1, "e": "人工心肺は手術中に心臓と肺の機能を代行し、全身に酸素を送り続ける体外循環装置。"}, "91032": {"id": 91032, "section": "10. 心臓血管外科", "q": "EVAR（血管内大動脈修復術）とは何か？", "c": ["開胸による大動脈弁置換", "カテーテルを使ったステントグラフトによる大動脈瘤治療", "冠動脈バイパス術の一種", "心臓移植手術"], "a": 1, "e": "EVARはカテーテルでステントグラフトを留置し大動脈瘤を修復する低侵襲手術。開腹・開胸不要。"}, "91033": {"id": 91033, "section": "10. 心臓血管外科", "q": "心臓血管外科医のスキルチェックで確認すべき手術件数はどれか？", "c": ["外来患者数", "CABG・弁膜症手術などの年間執刀件数", "当直回数", "学会発表数"], "a": 1, "e": "心臓血管外科医の技量はCABG・弁置換・大動脈手術等の年間執刀件数が最重要の確認項目。"}, "91034": {"id": 91034, "section": "10. 心臓血管外科", "q": "弁膜症手術のうち「弁形成術」と「弁置換術」の違いはどれか？", "c": ["弁形成は人工弁を使う・弁置換は自己弁を修復", "弁形成は自己弁を修復・弁置換は人工弁に取り替える", "両者は同じ手術の別名", "弁形成は内科的治療を指す"], "a": 1, "e": "弁形成術は自分の弁を修復して残す手術。弁置換術は機械弁・生体弁に入れ替える手術。"}, "91035": {"id": 91035, "section": "10. 心臓血管外科", "q": "心臓移植の適応となる主な疾患はどれか？", "c": ["安定した狭心症", "末期心不全・拡張型心筋症など", "軽度の心房細動", "高血圧のみ"], "a": 1, "e": "心臓移植は末期心不全・拡張型心筋症など内科的治療が困難な重症例が対象。日本では待機期間が長い。"}, "91036": {"id": 91036, "section": "10. 心臓血管外科", "q": "心臓血管外科の緊急手術で最も多い疾患はどれか？", "c": ["慢性心不全", "急性大動脈解離・急性心筋梗塞の合併症", "慢性弁膜症", "安定狭心症"], "a": 1, "e": "急性大動脈解離（特にA型）は生命直結の緊急手術。AMIの機械的合併症も緊急手術となる。"}, "52": {"id": 52, "section": "11. グループ病院", "q": "代表的な医療グループとして含まれないものはどれか？", "c": ["徳洲会", "IMSグループ", "TMG", "テスラグループ"], "a": 3, "e": "テスラはEV自動車メーカー。医療グループは徳洲会・IMS・TMG・AMGなどが有名。"}, "53": {"id": 53, "section": "11. グループ病院", "q": "グループ病院のデメリットはどれか？", "c": ["福利厚生が充実している", "グループ内異動が可能", "転勤の可能性・組織のルールに縛られる", "研修制度が整っている"], "a": 2, "e": "グループ内での転勤・異動がある点と、給与の個別交渉が難しい点がデメリット。"}, "92001": {"id": 92001, "section": "11. グループ病院", "q": "徳洲会グループの特徴として正しいものはどれか？", "c": ["外来専門のクリニックのみ運営", "365日24時間救急対応を理念とする病院グループ", "美容外科専門グループ", "訪問診療専門グループ"], "a": 1, "e": "徳洲会は「いつでも、どこでも、誰でも最善の医療を提供する」を理念に24時間救急対応を行う大型
