・医局長が関連病院への赴任・ポスト決定を主導する日本特有の仕組み。"},{"id":94041,"q":"医局を離脱した医師が直面しやすい問題はどれか？","c":["給与が即座に上がる","医局ネットワーク・情報・ポストへのアクセスが失われる","医師免許が失効する","専門医資格が剥奪される"],"a":1,"e":"医局離脱後は医局ネットワーク・関連病院情報・教育機会が失われるリスクがある。医師紹介の需要が高まる場面。"},{"id":94042,"q":"大学院（医学大学院）に進学する医師の主な目的はどれか？","c":["給与を上げるため","医学博士号の取得・研究スキルの習得","専門医資格の取得","開業のための資金調達"],"a":1,"e":"大学院では医学博士号取得・研究スキル習得が主目的。アカデミアでのキャリアを志す医師が多い。"},{"id":94043,"q":"「ジッツ」とは医局においてどういう意味か？","c":["医局の給与体系","医局が医師を派遣している関連病院（定位置）","医局の研究室","医師の専門資格"],"a":1,"e":"ジッツとはドイツ語のSitz（座席・定位置）から来た言葉で、医局が医師を派遣する関連病院を指す。"}]},{"section":"36. 商社","questions":[{"id":176,"q":"日本の3大商社として正しいものはどれか？","c":["三菱商事・三井物産・伊藤忠商事","住友商事・丸紅・豊田通商","伊藤忠商事・双日・丸紅","三菱商事・住友商事・丸紅"],"a":0,"e":"売上・利益・知名度いずれも三菱商事・三井物産・伊藤忠商事が3強。","_orig_ans":0,"_orig_choices":["三菱商事・三井物産・伊藤忠商事","住友商事・丸紅・豊田通商","伊藤忠商事・双日・丸紅","三菱商事・住友商事・丸紅"]},{"id":177,"q":"7大商社に含まれないものはどれか？","c":["丸紅","豊田通商","住友商事","ソフトバンク"],"a":3,"e":"7大商社は三菱・三井・伊藤忠・住友・丸紅・豊田通商・双日。ソフトバンクは通信・IT。","_orig_ans":1,"_orig_choices":["住友商事","ソフトバンク","丸紅","豊田通商"]},{"id":177201,"q":"伊藤忠商事が強みを持つ事業分野はどれか？","c":["鉄鋼・金属","航空機リース","繊維・ブランド・生活消費","医薬品製造"],"a":2,"e":"伊藤忠は繊維出身の総合商社で、ファミリーマートや食料・生活消費関連が主力事業。","_orig_ans":2,"_orig_choices":["鉄鋼・金属","航空機リース","繊維・ブランド・生活消費","医薬品製造"]},{"id":177202,"q":"双日の前身となった合併はどれか？","c":["伊藤忠・丸紅","トーメン・兼松","住友・三井","ニチメン・日商岩井"],"a":3,"e":"双日は2004年にニチメンと日商岩井が合併して誕生した総合商社。","_orig_ans":3,"_orig_choices":["伊藤忠・丸紅","トーメン・兼松","住友・三井","ニチメン・日商岩井"]},{"id":177203,"q":"豊田通商の筆頭株主はどこか？","c":["トヨタ自動車","三菱UFJ銀行","住友商事","伊藤忠商事"],"a":0,"e":"豊田通商はトヨタ自動車グループの総合商社。トヨタが筆頭株主。","_orig_ans":0,"_orig_choices":["トヨタ自動車","三菱UFJ銀行","住友商事","伊藤忠商事"]},{"id":177204,"q":"商社の収益モデルで近年最も拡大している分野はどれか？","c":["外国為替差益","広告・マーケティング収入","輸出入の仲介手数料","事業投資・子会社からの配当"],"a":3,"e":"現代の商社はトレーディングより事業投資・子会社経営による配当収益が主要収益源。","_orig_ans":1,"_orig_choices":["輸出入の仲介手数料","事業投資・子会社からの配当","外国為替差益","広告・マーケティング収入"]},{"id":177205,"q":"丸紅が特に強みを持つ分野はどれか？","c":["自動車・モビリティ","航空機リース","電力・インフラ・再生可能エネルギー","医薬品流通"],"a":2,"e":"丸紅は電力事業・再生可能エネルギーを強みとし、世界各地で発電所の権益を保有。","_orig_ans":2,"_orig_choices":["自動車・モビリティ","航空機リース","電力・インフラ・再生可能エネルギー","医薬品流通"]},{"id":177206,"q":"三菱商事が属する企業グループはどれか？","c":["三井グループ","住友グループ","芙蓉グループ","三菱グループ"],"a":3,"e":"三菱商事は三菱グループの中核企業。三菱UFJ銀行・三菱重工などと同グループ。","_orig_ans":3,"_orig_choices":["三井グループ","住友グループ","芙蓉グループ","三菱グループ"]},{"id":177207,"q":"住友商事が本社を置く都市はどこか？","c":["東京都千代田区","大阪市","名古屋市","横浜市"],"a":0,"e":"住友商事の本社は東京都千代田区大手町。住友グループの中核企業の一つ。","_orig_ans":0,"_orig_choices":["東京都千代田区","大阪市","名古屋市","横浜市"]},{"id":177208,"q":"総合商社の機能として含まれないものはどれか？","c":["トレーディング","保険の直接引受","事業投資","金融・ファイナンス"],"a":1,"e":"商社は保険代理店として販売はするが、保険の直接引受は保険会社の業務。","_orig_ans":1,"_orig_choices":["トレーディング","保険の直接引受","事業投資","金融・ファイナンス"]}]},{"section":"37. ドクターヘリ","questions":[{"id":178,"q":"全国のドクターヘリの設置数はおおよそ何機か？","c":["約20機","約35機","約57機","約100機"],"a":2,"e":"2023年時点で全国に約57機が配備されている。"},{"id":179,"q":"日本初のドクターヘリ導入はどこか？","c":["東京都・日本医科大学","大阪府・大阪大学","岡山県・川崎医科大学附属病院","北海道・札幌医科大学"],"a":2,"e":"2001年4月に岡山県の川崎医科大学附属病院で日本初のドクターヘリが導入。"},{"id":94050,"q":"ドクターヘリに同乗する医療スタッフとして正しいものはどれか？","c":["医師のみ","医師と看護師が同乗する","パイロットと救急救命士のみ","薬剤師と臨床工学技士"],"a":1,"e":"ドクターヘリには医師と専任看護師が同乗。現場で高度な医療処置を行いながら搬送する。"},{"id":94051,"q":"ドクターヘリの要請ができる機関はどれか？","c":["患者本人のみ","消防・救急隊・医療機関からの要請","警察のみ","都道府県知事のみ"],"a":1,"e":"ドクターヘリは消防機関・救急隊・医療機関からの要請で出動。通常119番経由で連絡される。"},{"id":94052,"q":"ドクターヘリ導入の根拠となる法律はどれか？","c":["医療法","救急救命士法","航空法","救急医療用ヘリコプターを用いた救急医療の確保に関する特別措置法"],"a":3,"e":"ドクターヘリの運航根拠はドクターヘリ特措法（2007年）。都道府県が運航費用を補助する仕組み。"},{"id":94053,"q":"ドクターヘリの飛行可能な悪天候の条件として正しいものはどれか？","c":["どんな天候でも飛行できる","視界不良・強風・雷などでは安全のため飛行できない場合がある","夜間は必ず飛行できる","雨天でも全て飛行可能"],"a":1,"e":"ドクターヘリは視界不良・強風・雷などの悪天候時に飛行制限がかかる。夜間飛行も機体・拠点による。"},{"id":94054,"q":"ドクターヘリの拠点病院に求められる条件はどれか？","c":["一般のクリニックでも可能","救命救急センター等の高度救急医療機関であること","200床以上の病院","都道府県庁所在地にあること"],"a":1,"e":"ドクターヘリ拠点病院は救命救急センター等の高度救急医療を提供できる医療機関が要件。"},{"id":94055,"q":"ドクターヘリの年間出動件数は全国でおよそどのくらいか？","c":["約1000件","約5000件","約2万件以上","約10万件"],"a":2,"e":"全国のドクターヘリ出動件数は年間約2万件以上。導入拡大とともに件数も増加傾向にある。"},{"id":94056,"q":"ドクターヘリの配備基準として、基地病院に求められる主な要件はどれか？","c":["救急患者の受け入れ拒否ゼロの実績","ICUを持つ高度救命救急センターまたは救命救急センター","医師数が100人以上の大規模病院","外傷専門科を持つ病院"],"a":2,"e":"ドクターヘリの基地病院は、高度救命救急センターまたは救命救急センターとして指定された病院であることが要件とされている。"},{"id":94057,"q":"ドクターヘリが特に有効な場面はどれか？","c":["市街地の軽症搬送","へき地・離島・交通渋滞地域での重症患者の迅速搬送","定期的な外来診察","長距離の患者転院搬送"],"a":1,"e":"ドクターヘリは交通渋滞・へき地・離島など陸路での搬送が困難な場合に特に威力を発揮する。"}]},{"section":"38. 眼科","questions":[{"id":180,"q":"眼科の主な手術として含まれないものはどれか？","c":["白内障手術","緑内障手術","硝子体手術","前立腺手術"],"a":3,"e":"前立腺手術は泌尿器科。眼科の3大手術は白内障・緑内障・硝子体手術。"},{"id":182,"q":"眼科に特化したコメディカル職種として正しいものはどれか？","c":["言語聴覚士","作業療法士","視能訓練士","理学療法士"],"a":2,"e":"視能訓練士（ORT）は眼科特有のコメディカル職種で、視力・眼圧・視野などの検査を担当する。"},{"id":183,"q":"OCTとは何か？","c":["眼科臨床試験","光干渉断層計","眼底カメラの一種","眼圧測定器"],"a":1,"e":"Optical Coherence Tomography（光干渉断層計）。網膜の断層像を撮影する。"},{"id":377,"q":"眼科スキルチェックで白内障手術の経験目安件数はどれか？","c":["100件以上","200件以上","500件以上","1000件以上"],"a":2,"e":"白内障手術は500件以上が一人前の目安とされることが多い。"},{"id":379,"q":"眼科求人で確認するレーザー機器の組み合わせとして正しいものはどれか？","c":["YAG・SLT","CO2・エルビウム","アレキサンドライト・ダイオード","フラクショナル・IPL"],"a":0,"e":"YAGレーザー（後発白内障治療）・SLT（緑内障治療）が眼科の代表的レーザー機器。"},{"id":94060,"q":"緑内障の主な原因として正しいものはどれか？","c":["水晶体の混濁","眼圧上昇等による視神経障害","網膜剥離","角膜の傷"],"a":1,"e":"緑内障は眼圧上昇などにより視神経が障害される疾患。日本の中途失明原因の第1位。"},{"id":94061,"q":"加齢黄斑変性（AMD）の主な治療はどれか？","c":["コルチコステロイド内服","白内障手術","抗VEGF薬の硝子体内注射","眼圧降下薬の点眼"],"a":2,"e":"滲出型加齢黄斑変性の主な治療は、抗VEGF薬（ラニビズマブ、アフリベルセプトなど）の硝子体内注射である。"},{"id":94062,"q":"コンタクトレンズ処方の際に行う主な検査はどれか？","c":["視野検査・眼底検査","視力・屈折・角膜形状・フィッティング検査","OCT・ERG","眼圧・視野・神経繊維層検査"],"a":1,"e":"コンタクトレンズ処方には視力・屈折・角膜曲率・フィッティング評価が必要。定期検診も重要。"},{"id":94063,"q":"眼科クリニックで収益性が高い自費診療として代表的なものはどれか？","c":["眼圧検査","眼底写真撮影","レーシック・ICLなどの屈折矯正手術","視野検査"],"a":2,"e":"レーシック（LASIK）やICL（眼内コンタクトレンズ）などの屈折矯正手術は、全額自費で高単価なため眼科クリニックの収益源となる。"},{"id":94064,"q":"眼科と美容医療の接点として正しいものはどれか？","c":["眼科医は美容施術を行えない","白内障手術は美容目的で行われる","眼瞼下垂手術は機能回復と美容を兼ねる場合がある","眼科の美容診療は保険適用が原則"],"a":2,"e":"眼瞼下垂の手術は視野改善という機能的目的と、上まぶたを持ち上げることで顔貌改善という美容的目的を兼ねることがある。"}]},{"section":"39. 日本の省庁","questions":[{"id":184,"q":"省庁の官僚トップの役職はどれか？","c":["事務次官","局長","審議官","官房長"],"a":0,"e":"事務次官が各省の官僚（行政）のトップ。政務は大臣・副大臣・政務官。","_orig_ans":0,"_orig_choices":["事務次官","局長","審議官","官房長"]},{"id":185,"q":"日本の省として含まれないものはどれか？","c":["厚生労働省・環境省","観光省・スポーツ省","外務省・財務省","防衛省・総務省"],"a":1,"e":"観光庁・スポーツ庁は存在するが省ではない。日本には現在11省がある。","_orig_ans":1,"_orig_choices":["厚生労働省・環境省","観光省・スポーツ省","外務省・財務省","防衛省・総務省"]},{"id":185201,"q":"厚生労働省の主な所管業務はどれか？","c":["外交・国際関係","国土整備・インフラ","医療・社会保障・労働","文化・スポーツ振興"],"a":2,"e":"厚生労働省は医療・介護・年金・労働・社会保障を所管。医師採用で最も関連する省庁。","_orig_ans":2,"_orig_choices":["外交・国際関係","国土整備・インフラ","医療・社会保障・労働","文化・スポーツ振興"]},{"id":185202,"q":"文部科学省の所管として正しいものはどれか？","c":["医師免許の発行","社会保険制度","道路・港湾整備","国公立大学・学校教育"],"a":3,"e":"文部科学省は教育・科学技術・文化・スポーツを所管。国公立大学も管轄。","_orig_ans":3,"_orig_choices":["医師免許の発行","社会保険制度","道路・港湾整備","国公立大学・学校教育"]},{"id":185203,"q":"日本の省の数は現在いくつか？","c":["11省","8省","14省","17省"],"a":0,"e":"日本には現在11省（総務・法務・外務・財務・文科・厚労・農水・経産・国交・環境・防衛）がある。","_orig_ans":0,"_orig_choices":["11省","8省","14省","17省"]},{"id":185204,"q":"経済産業省の前身となった省庁はどれか？","c":["大蔵省","通商産業省","建設省","労働省"],"a":1,"e":"経済産業省は2001年の省庁再編で通商産業省（通産省）から改称・再編された。","_orig_ans":1,"_orig_choices":["大蔵省","通商産業省","建設省","労働省"]},{"id":185205,"q":"医師免許を発行する省庁はどこか？","c":["文部科学省","内閣府","厚生労働省","総務省"],"a":2,"e":"医師免許は厚生労働省が発行。医師法に基づき厚生労働大臣が免許を交付する。","_orig_ans":2,"_orig_choices":["文部科学省","内閣府","厚生労働省","総務省"]},{"id":185206,"q":"総務省の主な所管業務はどれか？","c":["外交・ODA","農林水産業の振興","国防・自衛隊","地方行政・通信・消防"],"a":3,"e":"総務省は地方行政・選挙・情報通信・郵便・消防などを所管。旧自治省・郵政省・総務庁が統合。","_orig_ans":3,"_orig_choices":["外交・ODA","農林水産業の振興","国防・自衛隊","地方行政・通信・消防"]},{"id":185207,"q":"内閣府と省の関係として正しいものはどれか？","c":["内閣府は省より上位に位置し各省を総合調整する","内閣府は省の一つとして数えられる","内閣府は地方自治体を管轄する","内閣府は外務省と同じ権限を持つ"],"a":0,"e":"内閣府は省より上位の機関として内閣を補佐し、省庁横断的な重要政策を担う。","_orig_ans":0,"_orig_choices":["内閣府は省より上位に位置し各省を総合調整する","内閣府は省の一つとして数えられる","内閣府は地方自治体を管轄する","内閣府は外務省と同じ権限を持つ"]},{"id":185208,"q":"財務省の主な所管業務はどれか？","c":["外交・条約締結","農業政策・食料安全保障","社会保険・年金","国家予算・税制・国債管理"],"a":3,"e":"財務省は国家予算の編成・税制・国債管理・関税などを所管。旧大蔵省から2001年に改称。","_orig_ans":1,"_orig_choices":["社会保険・年金","国家予算・税制・国債管理","外交・条約締結","農業政策・食料安全保障"]}]},{"section":"40. 神経内科","questions":[{"id":186,"q":"脳神経内科の代表的な疾患として含まれないものはどれか？","c":["パーキンソン病","アルツハイマー型認知症","ALS","前立腺がん"],"a":3,"e":"前立腺がんは泌尿器科。脳神経内科はパーキンソン・認知症・ALS・てんかんなど。"},{"id":187,"q":"神経内科が改称した現在の診療科名はどれか？","c":["神経科","脳内科","脳神経内科","認知症内科"],"a":2,"e":"2018年に神経内科から脳神経内科に名称変更。脳神経外科との混同を防ぐため。"},{"id":94070,"q":"パーキンソン病の主な症状として正しいものはどれか？","c":["突然の意識消失発作","視力の急激な低下","安静時振戦・筋固縮・無動の三徴","激しい頭痛と項部硬直"],"a":2,"e":"パーキンソン病の三大症候は安静時振戦・筋固縮・無動（寡動）であり、これに姿勢反射障害を加えた四徴候が有名。"},{"id":94071,"q":"ALSとはどのような疾患か？","c":["多発性硬化症の別名","運動神経が変性し全身の筋肉が萎縮していく難病","アルツハイマー型認知症の別名","自己免疫性脳炎"],"a":1,"e":"ALS（筋萎縮性側索硬化症）は運動神経が変性し全身筋力が低下する難病。感覚・知能は保たれる。"},{"id":94072,"q":"認知症の最多原因はどれか？","c":["レビー小体型認知症","血管性認知症","前頭側頭型認知症","アルツハイマー型認知症"],"a":3,"e":"認知症の約60〜70%がアルツハイマー型。アミロイドβの蓄積が主な病因とされる。"},{"id":94073,"q":"多発性硬化症の特徴として正しいものはどれか？","c":["高齢男性に多い","若い女性に多く中枢神経の脱髄を繰り返す自己免疫疾患","遺伝性の筋疾患","感染症による神経炎"],"a":1,"e":"多発性硬化症は若い女性に多い中枢神経の自己免疫疾患。再発と寛解を繰り返す脱髄疾患。"},{"id":94074,"q":"脳神経内科での腰椎穿刺の主な目的はどれか？","c":["脊髄への薬物注入のみ","腰椎の骨折確認","髄液検査による中枢神経疾患（髄膜炎・くも膜下出血など）の診断","硬膜外麻酔の施行"],"a":2,"e":"腰椎穿刺で採取した髄液は、細胞数・蛋白・糖・培養検査などにより髄膜炎・脳炎・くも膜下出血・多発性硬化症などの診断に用いる。"},{"id":94075,"q":"脳神経内科クリニックの主な外来業務はどれか？","c":["脳腫瘍の外科的切除","緊急開頭手術","認知症・頭痛・めまい・てんかんの外来診療","脳血管内治療"],"a":2,"e":"脳神経内科クリニックの外来では認知症、頭痛（片頭痛など）、めまい、てんかん管理が中心となる。手術は脳神経外科の領域。"},{"id":94076,"q":"てんかんの治療として第一選択はどれか？","c":["脳外科手術","電気けいれん療法（ECT）","抗てんかん薬による薬物療法","高圧酸素療法"],"a":2,"e":"てんかんの治療は抗てんかん薬による薬物療法が第一選択。薬剤抵抗性の場合に外科的治療が検討される。"},{"id":94077,"q":"脳神経内科と脳神経外科の役割の違いはどれか？","c":["全く同じ診療科","脳神経内科は内科的管理・脳神経外科は手術が主な役割","脳神経外科は認知症専門","脳神経内科は手術も行う"],"a":1,"e":"脳神経内科は薬物療法等の内科的管理が主体。脳神経外科は手術的治療が主体。同じ疾患を異なる側面から担う。"}]},{"section":"41. ファクトフルネス","questions":[{"id":188,"q":"収入レベル4（1日32ドル以上）にいる人は世界で約何人か？","c":["約10億人","約1億人","約40億人","約70億人"],"a":0,"e":"ハンス・ロスリング著「ファクトフルネス」より。約10億人がレベル4。","_orig_ans":0,"_orig_choices":["約10億人","約1億人","約40億人","約70億人"]},{"id":190,"q":"世界の合計特殊出生率はおよそいくつか？","c":["1.2","2.3","3.5","4.8"],"a":1,"e":"世界平均は約2.3（2023年時点）。日本は約1.2と世界最低水準。","_orig_ans":1,"_orig_choices":["1.2","2.3","3.5","4.8"]},{"id":194,"q":"世界の平均寿命はおよそ何歳か？","c":["約53歳","約63歳","約73歳","約83歳"],"a":2,"e":"世界平均は約73歳（2023年）。50年前は約60歳だった。","_orig_ans":2,"_orig_choices":["約53歳","約63歳","約73歳","約83歳"]},{"id":197,"q":"麻疹の集団免疫に必要な2回接種率はどれか？","c":["約70%","約85%","約99%","約95%"],"a":3,"e":"麻疹は感染力が非常に強いため、集団免疫には95%以上の接種率が必要。","_orig_ans":3,"_orig_choices":["約70%","約85%","約99%","約95%"]},{"id":197201,"q":"「ファクトフルネス」の著者はだれか？","c":["マルコム・グラッドウェル","ユヴァル・ノア・ハラリ","ハンス・ロスリング","ピーター・ドラッカー"],"a":2,"e":"ハンス・ロスリングはスウェーデンの医師・統計学者。「ファクトフルネス」は世界的ベストセラー。","_orig_ans":0,"_orig_choices":["ハンス・ロスリング","ピーター・ドラッカー","マルコム・グラッドウェル","ユヴァル・ノア・ハラリ"]},{"id":197202,"q":"ファクトフルネスが指摘する人間の思い込みの傾向はどれか？","c":["世界は実際より良い状態だと過大評価する","世界は実際より悪い状態だと過大評価する","世界は実際より悪い状態だと過小評価する","データより感覚の方が正確だと信じる"],"a":1,"e":"人間はネガティブ本能により、世界を実際より悪く見がち。データで見ると世界は改善されている。","_orig_ans":1,"_orig_choices":["世界は実際より良い状態だと過大評価する","世界は実際より悪い状態だと過大評価する","世界は実際より悪い状態だと過小評価する","データより感覚の方が正確だと信じる"]},{"id":197203,"q":"ファクトフルネスで紹介される収入レベルの分類は何段階か？","c":["2段階","6段階","4段階","10段階"],"a":2,"e":"ハンス・ロスリングは収入を4つのレベルに分類。先進国・途上国の二分法を否定した。","_orig_ans":2,"_orig_choices":["2段階","6段階","4段階","10段階"]},{"id":197204,"q":"世界で極度の貧困（1日1.9ドル未満）にいる人の割合は過去20年でどう変化したか？","c":["約2倍に増加した","ほぼ変わらない","約4分の1に減少した","約半分に減少した"],"a":3,"e":"極度の貧困層の割合は過去20年で約半減。メディアは悪いニュースを取り上げやすいため改善が見えにくい。","_orig_ans":3,"_orig_choices":["約2倍に増加した","ほぼ変わらない","約4分の1に減少した","約半分に減少した"]},{"id":197205,"q":"ファクトフルネスが提唱する「ドラマチック本能」とは何か？","c":["物事を劇的・二項対立で捉えようとする本能","ドラマ・映画から知識を得ようとする傾向","感動的なエピソードを信じやすい傾向","悲劇的な結末を好む心理"],"a":0,"e":"ドラマチック本能とは物事を善悪・勝敗など二項対立で単純化して理解しようとする人間の傾向。","_orig_ans":0,"_orig_choices":["物事を劇的・二項対立で捉えようとする本能","ドラマ・映画から知識を得ようとする傾向","感動的なエピソードを信じやすい傾向","悲劇的な結末を好む心理"]},{"id":197206,"q":"世界の1歳児のうちワクチン接種を受けている割合はどれか？","c":["約23%","約88%","約54%","約76%"],"a":1,"e":"ロスリングによると世界の1歳児の約88%がワクチン接種済み。多くの人が過小評価している。","_orig_ans":1,"_orig_choices":["約20%","約88%","約50%","約70%"]}]},{"section":"42. 皮膚科","questions":[{"id":383,"q":"美容皮膚科特化クリニックの自費割合の目安はどれか？","c":["0〜10%","20〜50%","50〜70%","70〜100%"],"a":3,"e":"美容皮膚科特化型は自費が中心。70〜100%が目安。"},{"id":384,"q":"ダーモスコピーとは何か？","c":["皮膚病変の拡大観察装置","皮膚温度を測定する器具","皮膚の硬さを測るデバイス","皮膚への薬剤浸透を促進する装置"],"a":0,"e":"ダーモスコープで皮膚病変を10〜20倍に拡大。メラノーマ等の悪性腫瘍の早期発見に有効。"},{"id":386,"q":"AGA治療で国内承認済みの内服薬として正しいものはどれか？","c":["ミノキシジル内服","フィナステリド","デュタステリドのみ","承認薬は存在しない"],"a":1,"e":"フィナステリド（プロペシア）とデュタステリド（ザガーロ）が国内承認済み。ミノキシジル内服は未承認。"},{"id":387,"q":"アトピー性皮膚炎の生物学的製剤として代表的なものはどれか？","c":["デュピルマブ","インフリキシマブ","トラスツズマブ","ベバシズマブ"],"a":0,"e":"デュピルマブ（デュピクセント）はIL-4/IL-13を阻害するアトピー性皮膚炎の生物学的製剤。"},{"id":95001,"q":"皮膚科の三大疾患として含まれないものはどれか？","c":["アトピー性皮膚炎","乾癬","白内障","湿疹・皮膚炎"],"a":2,"e":"白内障は眼科疾患。皮膚科の頻度の高い疾患はアトピー性皮膚炎・乾癬・湿疹・皮膚炎・蕁麻疹など。"},{"id":95002,"q":"乾癬の治療で近年普及している生物学的製剤として代表的なものはどれか？","c":["セチリジン（抗ヒスタミン薬）","メトトレキサート（葉酸拮抗薬）","IL-17阻害薬・TNF阻害薬などの生物学的製剤","テトラサイクリン系抗菌薬"],"a":2,"e":"乾癬では近年TNF阻害薬（アダリムマブなど）やIL-17阻害薬（セクキヌマブ）、IL-23阻害薬などの生物学的製剤が普及し治療成績が向上した。"},{"id":95003,"q":"皮膚科の「ダーモスコピー」が特に有用な疾患はどれか？","c":["アトピー性皮膚炎","悪性黒色腫（メラノーマ）の早期診断","蕁麻疹","帯状疱疹"],"a":1,"e":"ダーモスコピーは皮膚病変を無侵襲で拡大観察。悪性黒色腫など色素性病変の早期診断に特に有用。"},{"id":95004,"q":"帯状疱疹の原因ウイルスはどれか？","c":["ヘルペスウイルス6型（HHV-6）","エプスタイン・バーウイルス（EBV）","水痘・帯状疱疹ウイルス（VZV）","サイトメガロウイルス（CMV）"],"a":2,"e":"帯状疱疹は水痘・帯状疱疹ウイルス（VZV）の再活性化により生じる。初感染では水痘（みずぼうそう）を発症する。"},{"id":95005,"q":"皮膚科クリニックと美容皮膚科クリニックの主な違いはどれか？","c":["皮膚科は手術を行わない","美容皮膚科は保険診療のみ行う","美容皮膚科は自費診療中心でシミ・しわなど審美目的、保険皮膚科は疾患治療が中心","皮膚科と美容皮膚科の診療内容は同じ"],"a":2,"e":"保険皮膚科は湿疹・乾癬・感染症など疾患治療が中心。美容皮膚科はシミ・しわ・脱毛など審美目的の自費診療中心で、収益構造が大きく異なる。"},{"id":95006,"q":"皮膚科専門医が美容クリニックに転職する際の強みはどれか？","c":["手術スキルが高い","皮膚の知識・レーザー・スキンケアの専門知識が直結する","内科知識が豊富","透析管理の経験がある"],"a":1,"e":"皮膚科専門医は皮膚の組織・病態・レーザー機器の知識が豊富で美容皮膚科への転職に強みを発揮する。"}]},{"section":"43. 健診・人間ドック","questions":[{"id":206,"q":"健診クリニックで働く医師の主な診療科はどれか？","c":["内科・消化器内科・循環器内科・放射線科など","外科・整形外科が中心","精神科・神経内科が中心","産婦人科・小児科が中心"],"a":0,"e":"健診は内科・消化器・循環器・放射線科が中心。読影医（放射線科）の需要が高い。"},{"id":207,"q":"高級会員制検診クリニックとして知られるものはどれか？","c":["東京大学医学部附属病院","グランドハイメディック倶楽部・ミッドタウンクリニックなど","国立国際医療研究センター","東京医療センター"],"a":1,"e":"富裕層向け会員制検診施設。PETや高精度MRIなど充実した設備が特徴。"},{"id":95010,"q":"特定健診（メタボ健診）の対象年齢はどれか？","c":["20〜39歳","60歳以上","40〜74歳","75歳以上"],"a":2,"e":"特定健診は40〜74歳の医療保険加入者を対象にメタボリックシンドロームの早期発見を目的とする。"},{"id":95011,"q":"人間ドックと健康診断の違いとして正しいものはどれか？","c":["全く同じ","健診の方が検査項目が多い","人間ドックは保険適用","健康診断は法定・人間ドックは任意の自費検査が中心"],"a":3,"e":"健診は労働安全衛生法等に基づく法定検査。人間ドックは任意で費用は自己負担が基本。検査項目も多い。"},{"id":95012,"q":"健診クリニックでの医師の主な業務はどれか？","c":["問診・身体所見・心電図・内視鏡・結果説明","緊急手術","透析管理","訪問診療"],"a":0,"e":"健診クリニックでの医師業務は問診・視診・聴診・心電図判読・内視鏡・エコー・結果説明など。"},{"id":95013,"q":"健診医のスキルチェックで最も重要な項目はどれか？","c":["手術件数","内視鏡・エコー・健診読影の経験・資格","当直回数","病棟管理経験"],"a":1,"e":"健診医求人では上部内視鏡・腹部エコー・健診読影（心電図・X線）の経験・資格が最重要確認項目。"},{"id":95014,"q":"がん検診の種類として含まれないものはどれか？","c":["胃がん検診","大腸がん検診","関節リウマチ検診","肺がん検診"],"a":2,"e":"国が推奨する5大がん検診は胃・大腸・肺・乳・子宮頸がん。関節リウマチはがん検診に含まれない。"},{"id":95015,"q":"健診業務のメリットとして医師から多く挙げられるものはどれか？","c":["緊急対応が多い","研究に集中できる","高度手術を多く経験できる","当直なし・日勤のみ・ワークライフバランスが整いやすい"],"a":3,"e":"健診業務は当直なし・日勤のみが多く、ワークライフバランスを重視する医師に人気が高い。"},{"id":95016,"q":"健診業務での「二次精査依頼」とは何か？","c":["健診で異常が見つかった受診者を専門医・医療機関に紹介すること","2回目の健診の予約","保険会社への報告","厚生労働省への届け出"],"a":0,"e":"健診で異常所見が見つかった場合、専門医療機関での精密検査を勧める紹介状を発行することを二次精査依頼という。"},{"id":95017,"q":"健診クリニックのアルバイト（スポット）求人の特徴はどれか？","c":["長期拘束・高い専門技術が必要","日帰り・単発・高時給が多く副業に活用しやすい","当直が必須","手術経験が必要"],"a":1,"e":"健診スポット求人は1日単位・日帰り・高時給が特徴。副業・非常勤として医師に人気のカテゴリ。"}]},{"section":"44. 美容外科・美容クリニック","questions":[{"id":389,"q":"美容外科スキルチェックの目元カテゴリに含まれないものはどれか？","c":["鼻中隔延長","眼瞼下垂","二重埋没","ハムラ法"],"a":0,"e":"鼻中隔延長は鼻のカテゴリ。目元は二重埋没・切開・眼瞼下垂・ハムラ法など。"},{"id":390,"q":"美容クリニック求人でインセンティブ確認時に最重要な事項はどれか？","c":["医師の出身大学","スタッフの人数","クリニックの内装","どの施術がインセンティブ計算に含まれるか"],"a":3,"e":"インセンティブの計算対象施術・金額・タイミングを具体的に確認することが重要。"},{"id":392,"q":"AGA治療で国内未承認の自費のみの内服薬はどれか？","c":["フィナステリド","デュタステリド","ミノキシジル内服","ミノキシジル外用薬"],"a":2,"e":"ミノキシジル内服は国内未承認。自費診療としてのみ処方可能。外用は承認済み。"},{"id":393,"q":"美容クリニックの事前リサーチで最も有効なツールはどれか？","c":["医師の出身大学検索","診療報酬点数表の確認","透析機器メーカー調査","Instagramや公式サイトでの施術・料金確認"],"a":3,"e":"SNS・公式サイトで施術メニュー・料金・症例写真・口コミを事前確認することが重要。"},{"id":95020,"q":"美容クリニックで「カウンセラー」が担う役割はどれか？","c":["患者の相談受付・施術提案・契約までの案内を担う","医師の代わりに施術を行う","手術室の管理","医療機器のメンテナンス"],"a":0,"e":"美容クリニックのカウンセラーは施術の説明・患者の不安解消・コース提案・契約締結を担う重要な役割。"},{"id":95021,"q":"美容クリニックの「モニター制度」とは何か？","c":["スタッフの勤務評価制度","新薬の臨床試験","施術前後の写真・口コミ提供を条件に割引で施術を受ける仕組み","患者の症例発表制度"],"a":2,"e":"モニター制度は症例写真・体験談の掲載許可を条件に割引価格で施術を受けられる制度。クリニックの宣伝に活用。"},{"id":95022,"q":"美容医療の広告規制として正しいものはどれか？","c":["何でも自由に広告できる","ビフォーアフター写真は必ず掲載すべき","SNS広告は規制対象外","医療法により誇大広告・比較広告・体験談の無制限掲載は規制されている"],"a":3,"e":"医療法改正により美容医療の誇大広告・根拠のない優良表示・体験談の無制限掲載等が規制されている。"},{"id":95023,"q":"美容外科・美容クリニック求人で「自費率」が高い施設の特徴はどれか？","c":["医師へのインセンティブ・給与水準が高くなりやすい","保険診療が中心で安定収益","患者数が少ない","医師の裁量が少ない"],"a":0,"e":"自費率が高いクリニックは診療単価が高く、医師のインセンティブ・給与も高くなる傾向がある。"},{"id":95024,"q":"美容クリニックへの転職を検討する医師に特に多い出身科はどれか？","c":["循環器内科・腎臓内科","脳神経外科・心臓外科","形成外科・皮膚科・産婦人科","精神科・麻酔科"],"a":2,"e":"美容クリニックへの転職は形成外科・皮膚科・産婦人科などの出身医師に多い。技術的親和性が高い。"},{"id":95025,"q":"美容クリニックで「研修医・若手医師」採用が増えている背景はどれか？","c":["早期から美容技術を習得させ長期戦力として育成したいクリニックが増えているため","専門医資格が不要なため","保険診療の義務があるため","医師不足が深刻なため"],"a":0,"e":"美容クリニックが増加し競争激化。若手医師を早期採用・育成し長期戦力とするクリニックが増えている。"}]},{"section":"45. 美容皮膚科","questions":[{"id":401,"q":"美容皮膚科と一般皮膚科の最大の違いはどれか？","c":["保険適用外の自費診療が中心で単価が高くカウンセリング力が重要","対象患者の年齢が異なる","医師の資格が異なる","診察時間が異なる"],"a":0,"e":"美容皮膚科は自由診療（全額自己負担）が中心。単価・接遇・カウンセリングが重要。"},{"id":402,"q":"美容皮膚科の代表的な施術3つとして正しいものはどれか？","c":["透析・内視鏡・白内障手術","分娩・帝王切開・人工授精","レーザー治療・ボトックス注入・ヒアルロン酸注入","白内障・緑内障・硝子体手術"],"a":2,"e":"美容皮膚科の3大施術はレーザー・ボトックス・ヒアルロン酸。非外科的治療が中心。"},{"id":403,"q":"ボトックスとヒアルロン酸の違いとして正しいものはどれか？","c":["ボトックス=ボリューム補填・ヒアルロン酸=筋肉抑制","両方ともボリュームを補填する","両方とも筋肉を弛緩させる","ボトックス=筋肉の動きを抑制・ヒアルロン酸=ボリューム補填"],"a":3,"e":"ボトックス（ボツリヌストキシン）は筋肉の収縮を抑制。ヒアルロン酸はゲル状でボリューム補填。"},{"id":405,"q":"美容未経験医師が最初に担当しやすい業務はどれか？","c":["高難度の注入施術","全身麻酔下の手術","脱毛問診・AGA問診・レーザー管理など","二重切開手術"],"a":2,"e":"脱毛問診やAGA問診はリスクが低く、未経験医師でも参入しやすい。"},{"id":406,"q":"美容皮膚科常勤医師（週5日）の年収目安として正しいものはどれか？","c":["1800〜2500万円前後","1000〜1500万円","500〜800万円","5000万円以上"],"a":0,"e":"週5日常勤で1,800〜2,500万円が相場。院長クラスは3,000万円超の例もある。"},{"id":408,"q":"売上志向が弱い医師への美容クリニック提案戦略として正しいものはどれか？","c":["売上連動型・院長候補ポジション","高インセンティブ型クリニックを優先","分院立ち上げ案件を優先","ノルマ緩め・固定給安定型・レーザー中心院を選定"],"a":3,"e":"売上へのプレッシャーが少なく固定給が安定しているクリニックが向いている。"},{"id":95030,"q":"美容皮膚科で使われるIPL（フォトフェイシャル）の主な適応はどれか？","c":["深いシワの改善","脂肪溶解","シミ・毛細血管拡張・くすみなどの肌全体の改善","二重まぶたの形成"],"a":2,"e":"IPL（光治療）はシミ・毛細血管拡張・くすみ・小じわなど肌全体を改善するフォトフェイシャル治療。"},{"id":95031,"q":"美容皮膚科でのピーリングの目的はどれか？","c":["古い角質を除去し肌のターンオーバーを促進する","脂肪を溶解する","筋肉の動きを抑制する","ボリュームを補填する"],"a":0,"e":"ピーリングは薬剤で古い角質を除去しターンオーバーを促進。ニキビ・シミ・くすみ改善に使用。"},{"id":95032,"q":"美容皮膚科の「ダウンタイム」とは何か？","c":["クリニックの休診日","施術の予約待ち時間","カウンセリングの所要時間","施術後の赤み・腫れ・かさぶたなどが回復するまでの期間"],"a":3,"e":"ダウンタイムは施術後の赤み・腫れ・内出血・かさぶたなどが落ち着くまでの回復期間。施術選択の重要指標。"},{"id":95033,"q":"美容皮膚科で「ヒアルロン酸注入」に使う針の特徴として正しいものはどれか？","c":["必ず太い針を使用する","注射針は使い回しが標準","先端が鈍いカニューレを使うことで内出血リスクを下げられる","太さは全員同じ"],"a":2,"e":"カニューレ（鈍針）は先端が丸く血管を傷つけにくいため、ヒアルロン酸注入の内出血リスク軽減に有効。"}]},{"section":"46. 美容外科","questions":[{"id":416,"q":"大手美容クリニックとして正しい組み合わせはどれか？","c":["東大病院・慶應病院・順天堂病院","徳洲会・IMS・TMG","湘南美容クリニック・品川美容外科・TCB","加藤レディスクリニック・英ウィメンズ・聖路加"],"a":2,"e":"湘南美容（SBC）・品川美容外科・TCBが美容外科の大手3チェーン。"},{"id":417,"q":"美容外科の代表的な施術3つとして正しいものはどれか？","c":["二重術・鼻整形・脂肪吸引","透析・内視鏡・白内障手術","分娩・帝王切開・人工授精","ECT・TMS・催眠療法"],"a":0,"e":"美容外科の3大術式は二重術・鼻整形・脂肪吸引。手術（メス）を使う点が特徴。"},{"id":418,"q":"二重術の2種類として正しいものはどれか？","c":["切除法・剥離法","注入法・照射法","縫合法・接着法","埋没法・切開法"],"a":3,"e":"埋没法はダウンタイムが短い。切開法は半永久的で腫れが長い。"},{"id":419,"q":"美容外科のリスクとして含まれないものはどれか？","c":["毛周期による効果のばらつき","左右差・修正手術","訴訟リスク","術後合併症・感染"],"a":0,"e":"毛周期は脱毛の話。美容外科リスクは合併症・感染・左右差・修正・訴訟など。"},{"id":420,"q":"美容外科常勤医師の年収として正しいものはどれか？","c":["300〜500万円","800〜1200万円","勤務医2000〜3000万円・売上連動型は5000万円以上も","10億円以上が標準"],"a":2,"e":"美容外科は医師の中でも最高水準。売上連動型で青天井になる場合もある。"},{"id":421,"q":"美容外科求人紹介で最初に確認すべき最重要ポイントはどれか？","c":["医師の出身大学","趣味・特技","勤務地の希望","現在どの施術を単独で執刀できるか"],"a":3,"e":"単独執刀できる術式の確認が最重要。技術レベルで紹介可能な求人が大きく変わる。"},{"id":422,"q":"若手医師が美容外科転職で最も失敗しやすいポイントはどれか？","c":["症例が積めると思って入職したが執刀機会が少なかった","給与が低すぎた","クリニックの場所が遠かった","スタッフとの関係が悪かった"],"a":0,"e":"ブランドや提示年収だけで判断すると、実際の執刀機会が少なくミスマッチになりやすい。"},{"id":423,"q":"若手美容外科医には大手と中小どちらが向いているか？","c":["中小クリニックの方が良い","どちらも同じ","原則大手","大学病院が最も良い"],"a":2,"e":"大手は症例数・指導体制が充実。中小は早期任用もあるが教育が不十分な場合がある。"},{"id":95040,"q":"美容外科で「修正手術」が多い施術はどれか？","c":["脱毛","ピーリング","ボトックス注入","二重手術・鼻手術など形態を変える施術"],"a":3,"e":"二重手術・鼻整形などは患者の希望と結果のギャップが生じやすく修正手術の需要が高い。"},{"id":95041,"q":"美容外科医のキャリアで「技術指導医」の役割はどれか？","c":["クリニックの経営を担当する","広告・SNSを担当する","若手医師に施術技術を直接指導する役割","採用面接を担当する"],"a":2,"e":"技術指導医は若手美容外科医の育成を担うポジション。給与・ポジション交渉のカードになりやすい。"}]},{"section":"47. 医療脱毛","questions":[{"id":431,"q":"医療脱毛とエステ脱毛の最大の違いはどれか？","c":["価格の違いのみ","医療脱毛は高出力レーザー・エステは出力が低い光脱毛","施術時間の違いのみ","使用するクリームの違い"],"a":1,"e":"医療脱毛は医師・看護師が行う高出力レーザー。永久脱毛（毛根破壊）が可能。"},{"id":432,"q":"医療脱毛で使われる代表的なレーザーとして含まれないものはどれか？","c":["アレキサンドライトレーザー","ダイオードレーザー","ヤグレーザー","CO2フラクショナルレーザー"],"a":3,"e":"CO2フラクショナルレーザーは美肌治療用。脱毛には使用しない。"},{"id":433,"q":"脱毛が複数回通う必要がある理由はどれか？","c":["クリニックの都合","毛周期があり、レーザーは成長期の毛のみに効果があるから","薬の効果が1回では弱いから","保険適用の制限があるから"],"a":1,"e":"毛周期（成長期・退行期・休止期）があり、レーザーは成長期の毛のみに効果がある。"},{"id":434,"q":"医療脱毛の平均的な通院回数の目安はどれか？","c":["1〜2回","3〜4回","5〜8回","15〜20回"],"a":2,"e":"5〜8回程度が目安。部位・毛質・個人差によって異なる。"},{"id":435,"q":"ヤグレーザーが向いている毛質・肌質はどれか？","c":["細い産毛・色白肌","根深い毛・男性のヒゲ・色黒肌","眉毛・まつ毛","白髪・金髪"],"a":1,"e":"ヤグレーザーは波長が長く表皮ダメージが少ない。色黒肌・男性ヒゲ・根深い毛に有効。"},{"id":436,"q":"脱毛クリニックで起きやすいクレームとして含まれないものはどれか？","c":["痛みが思ったより強い","効果の実感に個人差がある","予約が取りづらい","施術後の肌がきれいになった"],"a":3,"e":"肌がきれいになったのはクレームではなく喜び。痛み・効果差・予約困難がクレームの代表。"},{"id":437,"q":"医療脱毛で出力設定を一人ずつ調整する目的はどれか？","c":["時間を節約するため","肌トラブルを防ぎつつ効果を最大化するため","コスト削減のため","施術者の練習のため"],"a":1,"e":"肌の色・毛質・部位によってレーザーの適切な出力が異なるため個別調整が必要。"},{"id":438,"q":"男性脱毛市場が伸びている背景として含まれないものはどれか？","c":["美容意識の向上","ヒゲ脱毛ニーズ増加","清潔感を重視する社会傾向","男性への保険適用が拡大したから"],"a":3,"e":"医療脱毛は自費診療のため保険は関係ない。美容意識・清潔感志向・SNS影響が主な背景。"},{"id":439,"q":"脱毛クリニックの利益構造で重要なポイントとして含まれないものはどれか？","c":["リピート来院","稼働率","広告費コントロール","透析機器の導入"],"a":3,"e":"透析機器は脱毛クリニックには全く関係ない。リピート・稼働率・広告費が鍵。"},{"id":440,"q":"脱毛市場で最近増えている動きとして含まれないものはどれか？","c":["都度払いプランの増加","サブスク型サービス","男性専門クリニックの拡大","脱毛の保険適用化"],"a":3,"e":"脱毛は自由診療のため保険適用にはなっていない。都度払い・サブスク・男性専門が最新トレンド。"}]},{"section":"48. CONNECT CREDO（18の行動指針）","questions":[{"id":441,"q":"CONNECT CREDOの行動指針は全部で何個あるか？","c":["18個","9個","12個","15個"],"a":0,"e":"18の行動指針からなるCONNECT CREDO。"},{"id":442,"q":"指針01「仕事も遊びも（　）で」の空欄は？","c":["適度","全力","効率","冷静"],"a":1,"e":"全力。全てに本気で取り組むことで、人生がより豊かで充実したものになる。"},{"id":443,"q":"指針02の解説として正しいものはどれか？","c":["好奇心は危険であり慎むべき","知識は深めるより広げる方が重要","好奇心は学びの源泉。新しいことへの興味が成長を加速させる","義務感で行動することが大切"],"a":2,"e":"好奇心は学びの源泉。新しいことへの興味が成長を加速させる。"},{"id":444,"q":"指針03「ミスを恐れず（　）し、失敗と経験から学ぶ」の空欄は？","c":["計画","準備","報告","挑戦"],"a":3,"e":"挑戦。全力で挑戦した結果の失敗こそが価値を持つ。"},{"id":445,"q":"指針04「常に（　）について探求する」の空欄は？","c":["スピード","品質","コスト","利益"],"a":0,"e":"スピード。スピードは競争力の源。迅速な行動と判断が成功への近道となる。"},{"id":446,"q":"指針05の解説「（　）は成長の敵」の空欄は？","c":["失敗","満足","挑戦","好奇心"],"a":1,"e":"満足は成長の敵。常に向上心を持ち、次のステージを目指し続ける。"},{"id":447,"q":"指針06「決して（A）ない、（B）めない。迷ったら、まず挑む」のA・Bは？","c":["A=諦・B=逃げ","A=休ま・B=辞","A=逃げ・B=諦","A=怠け・B=諦"],"a":2,"e":"逃げない・諦めない。結果よりも、向き合ったこと自体に価値がある。"},{"id":448,"q":"指針07「常に（　）として場をつくる」の空欄は？","c":["ゲスト","リーダー","マネージャー","ホスト"],"a":3,"e":"ホスト。自責で考え、自ら動き、周囲を巻き込みながら前へ進める。"},{"id":449,"q":"指針08の解説として正しいものはどれか？","c":["他者の長所を認め学ぶことでお互いに高め合う関係を築く","他者の短所を指摘し改善させる","競争で勝つことが最優先","自分の強みだけを磨く"],"a":0,"e":"良いところを褒め学び成長。他者の長所を認め、学ぶことで、お互いに高め合う関係を築く。"},{"id":450,"q":"指針09「（　　　）から正しい行いをする」の空欄は？","c":["大きなこと","小さなこと","目立つこと","簡単なこと"],"a":1,"e":"小さなこと。日々の小さな誠実さが、大きな信頼と成果を生み出す。"}]},{"section":"101. 中東・エネルギー危機","questions":[{"id":300001,"q":"ホルムズ海峡が封鎖されると日本が特に困る理由はどれか？","c":["原油輸入の約90%が中東産でここを通るから","自動車輸出の主要航路がここを通り輸出できなくなるから","日本の主要漁場がこの海峡付近に集中しているから","海上自衛隊の重要な軍事拠点がここに置かれているから"],"a":0,"e":"日本はエネルギーの中東依存度が極めて高い。ホルムズ海峡封鎖→原油が来ない→ガソリン・電気・食品すべてが値上がりする。「対岸の火事」では済まない話。"},{"id":300002,"q":"OPECが原油の「減産」を決定すると、ガソリン価格はどうなるか？","c":["下がる","急落する","変わらない","上がる"],"a":3,"e":"OPEC減産→市場への石油供給が減少→需要>供給→原油価格上昇→ガソリン高。2023〜2024年のOPEC+減産でも日本のガソリン価格が1L170円超えが続いた。"},{"id":300003,"q":"1973年のオイルショックで日本のスーパーから消えた「あるもの」とは何か？","c":["米（コメ）の流通が完全に止まった","灯油・重油などの燃料全般","トイレットペーパー","電池・懐中電灯などの防災用品"],"a":2,"e":"第一次オイルショックでは「物資がなくなる」という噂からトイレットペーパーの買い占めが発生。エネルギー危機が身近な消費行動にまで波及した歴史的教訓。"},{"id":300004,"q":"フーシ派の紅海攻撃（2024年〜）が日本の物価に影響した理由はどれか？","c":["商船がアフリカ迂回に変更し輸送コストが急騰したから","日本がフーシ派に兵器を輸出していたとして制裁されたから","日本の大型商船が複数撃沈されたと各国メディアが報道したから","紅海の主要漁業資源が戦闘により激減したと報告されたから"],"a":0,"e":"スエズ運河ルートを避けてアフリカ南端（喜望峰）迂回に変更→輸送日数が2〜3週間延び、コンテナ運賃が数倍に。スーパーの輸入品値上げの原因のひとつ。"},{"id":300005,"q":"ガソリン価格が上がると「食品も値上がりする」理由として正しいのはどれか？","c":["食品メーカー各社が市況を見て競って一斉に値上げをするから","同時に円安が進行して輸入コストがさらに上乗せされるから","政府が食品向けの補助金・交付金を削減・廃止するから","農業・輸送・製造すべてで燃料コストが転嫁されるから"],"a":3,"e":"食品は農業（トラクター）→食品工場→トラック輸送→スーパーまですべての工程で石油を使う。原油高は食品・日用品の値上げ連鎖を引き起こす。"},{"id":300006,"q":"イランへの経済制裁が強化されると原油価格が上がりやすい理由はどれか？","c":["イランは世界有数の産油国で制裁により輸出量が減るから","制裁でイランがOPECを脱退して協調減産が崩れるから","イランの核施設攻撃リスクが高まり周辺油田も停止するから","制裁でイランの原油輸出が滞り供給が減少するから"],"a":3,"e":"イランは世界有数の産油国（世界7位前後）。制裁で輸出が滞ると市場の供給量が減り価格上昇。さらに地政学リスクが高まると投機的な買いも入り原油先物が跳ね上がる。"},{"id":300007,"q":"日本が「エネルギー安全保障」として進めている取り組みとして正しいのはどれか？","c":["中東産エネルギーへの依存度をさらに高めていく政策","再エネ拡大・LNG調達先多様化・原油備蓄強化","老朽化した石炭火力発電所をすべて廃止・閉鎖する","化石燃料の輸入量をゼロにして完全な自給自足を目指す政策"],"a":1,"e":"日本の戦略的石油備蓄は約240日分（民間含む）。さらに再エネ拡大・LNG調達先のオーストラリアや米国への分散でリスクを減らす取り組みが進む。"},{"id":300008,"q":"「資源が乏しい日本」にとって円安が特に痛い理由はどれか？","c":["外国人観光客の来日が大幅に減少して観光収入が激減するから","輸出企業の利益が国内に環流されず家計収入に反映されないから","輸入する石油・食料・原材料のコストが上がるから","日本株が外国人投資家に売られて株価が急落するから"],"a":2,"e":"原油はドル建て取引。円安→同じ量の原油を買うのに多くの円が必要→輸入コスト増→物価上昇。「円安＋原油高」は日本経済へのダブルパンチ。"},{"id":300009,"q":"ホルムズ海峡封鎖で「原油が1バレル150ドル超」と予想される根拠はどれか？","c":["OPECが増産を一切拒否して代替供給を妨害するから","世界供給の約2割が止まり代替調達が追いつかないから","アメリカが戦略石油備蓄を全て放出して市場を混乱させるから","ロシアが大幅増産して意図的に価格をつり上げようとするから"],"a":1,"e":"ホルムズ海峡封鎖で中東6カ国からの石油輸出が止まる。短期間で代替ルートや代替供給源はなく、需給ひっ迫で価格が急騰するシナリオ。日本のガソリンは2L超になる計算も。"},{"id":300010,"q":"エネルギー危機への備えとして個人・家庭でできることはどれか？","c":["節電・省エネ習慣の定着と日用品の適度な備蓄をすること","自宅の地下室などに大量の石油・ガソリンを確保して備えること","電力会社の独占に対して集団訴訟や法的措置を取ること","ガソリン車を早急に廃棄してすぐにEVに乗り換えること"],"a":0,"e":"政府も「家庭での備蓄（食料3日〜1週間分）」を推奨。むやみな買い占めは避け、日頃から節エネ意識と計画的な備蓄が大切。社会全体でパニックを防ぐことが重要。"}]},{"section":"102. 米中対立と経済安保","questions":[{"id":300011,"q":"アメリカが中国への半導体輸出を規制する主な理由はどれか？","c":["最先端半導体が軍事転用されて中国の軍事力が強化されるのを防ぐため","中国が低コストで半導体を量産してアメリカ企業の経営が圧迫されるから","半導体の製造過程で中国が日本の知的財産を無断で窃取しているから","中国の半導体工場が大量の環境汚染物質を排出しているとして問題化したから"],"a":0,"e":"先端半導体はAI・ミサイル・監視システムに使われる。バイデン→トランプ政権とも対中規制を強化。日本・オランダの半導体製造装置メーカーも規制対象に含まれた。"},{"id":300012,"q":"台湾有事が「日本の半導体産業」に直結する理由はどれか？","c":["台湾が日本への最大の観光客送り出し国であるという統計から","TSMCが世界の先端半導体の過半を生産しており有事で供給が止まるリスクがあるから","台湾ドルと日本円が為替市場で強く連動しているという二国間の経済的密接な関係から","台湾が日本の主要なEPA経済連携協定において最も重要な交渉相手国に位置づけられているから"],"a":1,"e":"TSMCは世界の先端チップの50〜60%を製造。スマホ・車・医療機器に不可欠。台湾有事→半導体不足→日本の製造業に壊滅的打撃。だからこそ熊本・北海道にTSMC工場誘致が進んでいる。"},{"id":300013,"q":"「チャイナプラスワン」戦略とはどういう意味か？","c":["中国に既存工場に加えてもう1拠点を建設・追加していく方針","中国政府と2国間で直接1対1の貿易交渉をする外交戦略","中国依存を減らし東南アジア等にも生産拠点を分散する戦略","中国人スタッフを各海外拠点に必ず1名以上配置する人事方針"],"a":2,"e":"中国でのリスク（地政学・コスト上昇・規制）が高まる中、ベトナム・インド・メキシコなどへの生産移転が加速。日本企業のサプライチェーン見直しの合言葉になった。"},{"id":300014,"q":"トランプ政権の「関税引き上げ」が日本企業に与える影響として正しいのはどれか？","c":["日本からアメリカへの輸出品コストが上がり競争力が低下する","関税が上がることでアメリカが日本製品を優遇して輸出量が増加する","関税収入がアメリカ経済を刺激して日本への需要が逆に拡大する","関税引き上げへの報復で日本が円高誘導政策を実施するから"],"a":0,"e":"関税引き上げ→日本車・電子部品などがアメリカ市場で割高に→販売減・現地生産シフトを迫られる。トヨタ・ホンダなど日本の製造業に直接影響する貿易問題。"},{"id":300015,"q":"「半導体は21世紀の石油」と言われる理由はどれか？","c":["半導体を特殊処理して燃焼させると石油と同等のエネルギーが得られるから","あらゆる産業・軍事・インフラに不可欠で供給停止で経済が麻痺するから","半導体の主要原材料が石油から精製・加工されて作られているから","半導体の市場取引価格が原油先物価格と強く連動して動くから"],"a":1,"e":"スマホ・車・電力網・病院・軍事システム──すべてに半導体が必要。1970年代の石油危機と同様、半導体の供給途絶は現代社会を止めるリスクがある。だから各国が自国生産を急ぐ。"},{"id":300016,"q":"中国が「レアアース」輸出規制を強化すると日本が困る理由はどれか？","c":["レアアースが食品の重要な添加物・原材料として広く使われているから","レアアースが日本の主力輸出品目の一つとして貿易黒字を支えているから","EV電池・半導体・防衛装備に不可欠で中国シェアが約60%だから","レアアースが不足すると日本銀行が通貨を発行できなくなるという規定があるから"],"a":2,"e":"レアアースはモーター・半導体・医療機器に使われる希少金属。中国が世界生産の約60%を占める。2010年の尖閣問題時も中国が輸出を制限し、日本の製造業が打撃を受けた。"},{"id":300017,"q":"日本の「経済安全保障推進法」（2022年）が目指すものはどれか？","c":["外国人労働者の受け入れを大幅に緩和して人手不足を解消すること","消費税率を段階的に引き下げて個人消費と需要を喚起すること","地方創生・地域経済の活性化を強力に推進すること","重要物資のサプライチェーン強靭化と先端技術の流出防止"],"a":3,"e":"半導体・蓄電池・医薬品など「特定重要物資」の国内生産・備蓄を支援。特許の非公開制度や基幹インフラ保護も盛り込まれた。経済安保は企業の採用・R&Dにも影響する。"},{"id":300018,"q":"「デカップリング」とは何か？","c":["電気自動車に採用されている新しい急速充電の規格のこと","AIの能力が人間の知性を超えるとされるシンギュラリティのこと","貿易収支の赤字が年々継続的に拡大し続けていく現象のこと","米中などの国が経済・技術面で切り離されていく動き"],"a":3,"e":"Decoupling（切り離し）。米中間でサプライチェーンや技術を分断する動き。日本企業も「中国依存のリスク」を見直し、生産拠点の分散（チャイナプラスワン）を進めている。"},{"id":300019,"q":"米中対立深化の中、日本外交の課題として正しいのはどれか？","c":["日中関係を意図的に悪化させて中国市場から完全に撤退すること","米中双方との関係を保ちながら自国利益を守るバランスが難しいこと","安全保障上の理由から中国との軍事同盟関係を強化すること","アメリカからの経済・安保上の要求をすべて拒否して独自外交を進めること"],"a":1,"e":"日本の最大の輸出相手国は中国（約20%）、安保の基軸は日米同盟。米中対立が深まるほど日本は「どちらにつくか」という踏み絵を迫られる構図。外交上の最大難題のひとつ。"},{"id":300020,"q":"日本のTSMC誘致（熊本工場）の主な目的として正しいのはどれか？","c":["台湾との観光・文化・経済交流をさらに拡大・深化させていくため","熊本県の地価上昇と周辺地域の雇用創出・経済活性化を図るため","TSMCの本社機能と研究開発拠点を将来的に日本へ移転させるため","台湾有事リスクへの備えと国内半導体サプライチェーン強化のため"],"a":3,"e":"2024年にTSMC熊本工場（JASM）が開所。第2工場も建設中。台湾一極集中リスクを分散しつつ、日本の製造業に不可欠なチップを国内調達できる体制づくりが狙い。"}]},{"section":"103. ベネズエラ・中南米情勢","questions":[{"id":300021,"q":"ベネズエラが「世界最大の原油埋蔵量」を持ちながら経済崩壊した主な原因はどれか？","c":["石油収入への依存・経済失政・米国制裁が重なったから","マグニチュード8以上の大地震が発生して主要な油田が壊滅したから","OPECから強制的に脱退させられて石油収入が一夜で激減したから","ブラジルとの国境紛争による軍事侵攻を受けて国内経済が崩壊したから"],"a":0,"e":"チャベス〜マドゥロ政権の社会主義政策で民間企業が衰退。石油価格下落・制裁・汚職で国家財政が破綻。ハイパーインフレと食料不足で700万人以上が国外へ脱出した。"},{"id":300022,"q":"「ハイパーインフレ」が起きると国民の生活はどうなるか？","c":["物価が下がって国民の生活が豊かになり消費が自然と拡大する","外国企業が投資機会を求めて一斉に殺到して急激に景気が回復する","お金の価値が急落して給料をもらっても物が買えなくなる","失業率が大幅に下がって国内の雇用が飛躍的に増加する"],"a":2,"e":"ベネズエラでは年率100万%超のハイパーインフレが起きた時期も。お金を持っていても「明日には価値がない」状態になる経済崩壊の最終段階。日本でも物価上昇ニュースを身近に感じよう。"},{"id":300023,"q":"ベネズエラからの難民流出が近隣国に起こした問題はどれか？","c":["難民が大量に流出したために近隣国の人口が大幅に減少した","難民の受け入れが近隣国の経済成長を後押しして豊かになった","コロンビア等が難民流入で社会インフラや雇用が圧迫された","近隣国がベネズエラに軍事侵攻して国土を占領・支配した"],"a":2,"e":"コロンビアだけで約290万人のベネズエラ難民を受け入れ。医療・教育・治安への負荷が問題に。難民問題は「隣の国の話」ではなく、地域全体の安定を揺るがす。"},{"id":300024,"q":"メキシコのカルテル問題がアメリカに深刻な社会問題を引き起こしている理由はどれか？","c":["フェンタニル等の合成麻薬が流入し年間10万人超が死亡しているから","カルテルがアメリカの連邦議会・大統領選挙に直接介入・工作しているから","カルテルがアメリカの大手銀行を次々と買収・支配しているから","メキシコ料理や食品の輸入がアメリカの法律により全面禁止されたから"],"a":0,"e":"フェンタニルは合成オピオイド系麻薬。原料は中国製でメキシコカルテルが精製・密輸。トランプ政権が関税をちらつかせてメキシコに取り締まり強化を迫った背景がここにある。"},{"id":300025,"q":"「資源の呪い」とはどういう意味か？","c":["資源豊富な国が逆に経済発展できず腐敗や独裁が起きやすい現象","資源が完全に枯渇したときに国家機能が自然に崩壊し滅亡していく現象","天然資源を大規模に採掘し続けると必然的に大規模な自然災害が増加する現象","資源を大量に輸出している国は必ず周辺国との戦争に巻き込まれる現象"],"a":0,"e":"ベネズエラ・ナイジェリア・コンゴなど資源大国が貧困・独裁に陥る逆説。石油収入を一部の権力者が独占し、産業多様化が進まず政治腐敗が慢性化する構造。"},{"id":300026,"q":"中南米で「左派政権」が相次いで誕生している背景として正しいのはどれか？","c":["アメリカが中南米の左派政権を積極的な資金・外交・軍事支援で後押ししているから","右派・保守政党が一斉に解散して選挙に立候補できなくなったから","中国がすべての国の選挙に介入して左派候補を当選させているから","格差拡大や新自由主義政策への不満が左派への支持を集めているから"],"a":3,"e":"ブラジル（ルラ）・チリ・コロンビア・メキシコなど左派・左中間の政権が増加。貧富の差・医療・教育への不満が背景。一方、資源国有化や反米路線による外国投資減少リスクも。"},{"id":300027,"q":"アマゾン熱帯雨林の破壊が「世界の気候変動」に直結する理由はどれか？","c":["アマゾンが世界最大の原油産地として膨大な量の石油を供給しているから","アマゾン川が世界の飲料水の大部分を流域の外へも供給しているから","アマゾンは地球のCO2吸収源として気候の安定に不可欠だから","アマゾンに生息する固有動物が地球全体の気温を大きく調節しているから"],"a":2,"e":"「地球の肺」とも呼ばれるアマゾン。大規模農地開発・牧場化で年間数百万ヘクタールが消失。CO2吸収能力の低下は世界全体の温暖化加速につながる。"},{"id":300028,"q":"ベネズエラの2024年大統領選挙で何が問題になったか？","c":["投票所が記録的な大雪・暴風雪により全国的に閉鎖され選挙が不成立になった","野党圧勝の開票データが隠蔽されマドゥロ政権が不正勝利を宣言した","野党・与党ともに全候補者が突然辞退して投票用紙が無効になった","政府が選挙を何度も一方的に延期して実施されることがなかった"],"a":1,"e":"野党候補が大差で勝利したとの独立的集計があるにもかかわらず、マドゥロ政権が勝利を宣言。野党支持者への弾圧が相次ぎ、米欧が選挙結果を認めず制裁を継続している。"},{"id":300029,"q":"中国が中南米への「インフラ投資」を積極的に進める目的として正しいのはどれか？","c":["中南米の貧困層を支援する純粋な人道的援助・ODA外交として","将来の中国人移民の新たな受け入れ先と移住先を確保するため","中南米の富裕層観光客を中国の観光地・リゾートに誘致するため","資源調達・影響力拡大・アメリカの「裏庭」への浸透のため"],"a":3,"e":"中国は港湾・道路・エネルギーインフラを融資で整備（債務の罠との批判も）。銅・大豆・石油などの資源調達とアメリカへの対抗軸として中南米への影響力を拡大中。"},{"id":300030,"q":"「ドル化」（自国通貨をドルに替える）政策をとった中南米の国はどれか？","c":["ブラジルが通貨危機後に対米輸出を増やすためドルを正式採用した","エクアドル・エルサルバドルなどがドルを法定通貨に採用した","メキシコが対米輸出増加と貿易摩擦回避を目的にドルを正式採用した","ベネズエラがハイパーインフレ対策として米ドルへの通貨切り替えを実施した"],"a":1,"e":"エクアドル（2000年）・エルサルバドルは正式にドルを法定通貨として採用。自国通貨の信頼性が低く、ハイパーインフレ対策として。アルゼンチンのミレイ大統領もドル化を主張。"}]},{"section":"104. ウクライナ・ロシアと安全保障","questions":[{"id":300031,"q":"ロシアのウクライナ侵攻（2022年〜）が日本の食料価格に影響した理由はどれか？","c":["ウクライナ・ロシアは世界の小麦輸出の約30%を占め戦争で激減したから","日本がウクライナから大量の農業機械・食料・兵器を輸入していたとされるから","日本のウクライナ向け食料支援や輸出が全面的に停止されたから","ロシアが日本の漁船を北方領土近海で次々と拿捕したため輸入が途絶えたから"],"a":0,"e":"ウクライナとロシアは合わせて世界の小麦輸出の約30%を担う「穀倉地帯」。侵攻後に小麦・食用油・トウモロコシが急騰し、日本のパン・食用油・飼料が値上がりした。"},{"id":300032,"q":"西側諸国のロシアへの経済制裁で最も打撃が大きかった措置はどれか？","c":["ロシアのサッカー・テニス・陸上チームをすべての国際大会から完全除外した","国際決済網（SWIFT）からロシアを排除し外貨準備資産を凍結した","ロシア製のウォッカ・食品・日用品を全品目で輸入禁止にした","ロシア人観光客・留学生のシェンゲンビザを全て無効・取り消しにした"],"a":1,"e":"SWIFTはドルなど外貨の国際送金インフラ。排除されるとロシアの輸出決済が困難に。さらに約3,000億ドルの外貨準備を西側が凍結。「経済核兵器」とも言われた強力な措置。"},{"id":300033,"q":"ロシアが「NATOの東方拡大」を侵攻の口実にした理由はどれか？","c":["NATOがロシア国内の複数の軍事基地・核施設に対して先制攻撃・爆撃を仕掛けていたから","ウクライナのNATO加盟で国境に西側軍事同盟が迫るとロシアが主張したから","NATOがロシア経済に対して先に大規模な経済制裁を発動していたから","ウクライナ政府がロシア系住民の居住・言語使用を法律で禁止したから"],"a":1,"e":"プーチン大統領は「NATOの東方不拡大」を要求。ウクライナのNATO加盟阻止を目的に侵攻。ただし侵攻後にフィンランド・スウェーデンがNATO加盟するという逆効果に。"},{"id":300034,"q":"ウクライナ戦争でドローン（無人機）が注目された理由はどれか？","c":["ドローンは核兵器と同等の爆発力・破壊力を持つとされているから","ドローンは実は揚力が不足していて空を飛ぶことができないと判明したから","安価なドローンが戦車や艦船に大打撃を与え戦争の形を変えたから","ドローンはカメラ撮影と偵察にしか技術的に使えないとされているから"],"a":2,"e":"数十万円の市販ドローンに爆薬を載せて数億円の戦車を破壊。「非対称戦争」の象徴に。日本の自衛隊もドローン対策・活用を急ピッチで進めており、防衛産業にも影響。"},{"id":300035,"q":"ロシアのウクライナ侵攻後ヨーロッパで起きたエネルギー問題はどれか？","c":["ロシアが天然ガスを大幅値下げして欧州各国を経済的に取り込もうとした","ヨーロッパの主要国が一斉に原子力発電所を廃止・閉鎖する決定をした","ロシア産ガス依存のドイツ等が供給停止リスクで電気代が急騰した","EU全体で石炭・天然ガスの使用を環境対策として全面禁止する法律が施行された"],"a":2,"e":"ドイツはロシア産ガスを約55%依存していた。侵攻後にガス供給が絞られ電気代が数倍に。脱ロシアのためLNG調達先を米国などに急転換。エネルギー政策の大転換を迫られた。"},{"id":300036,"q":"「経済制裁」の限界として指摘されていることはどれか？","c":["制裁は100%確実に有効で対象国の戦争行為を即座に停止させられる","制裁を発動した国の方が逆に経済的な恩恵を受けて豊かになるという歴史的事例が数多くある","制裁対象国が中国・インドを迂回ルートに使い効果が薄れるケースがある","そもそも経済制裁は国際法・国連憲章によって明確に禁止されている"],"a":2,"e":"ロシアへの制裁もインド・中国が参加せずロシア産石油を買い続けたため効果が限定的との批判も。「制裁の穴」問題は現代の安全保障上の重要課題。"},{"id":300037,"q":"「ハイブリッド戦争」とはどういう意味か？","c":["飛行機と潜水艦を組み合わせた新しい三次元の立体的戦術のこと","軍事・サイバー・偽情報・経済圧力を組み合わせた現代型の戦争","ハイブリッド車を爆発物搭載に改造して特攻に使用する新戦術のこと","陸・海・空の三軍が同時に全面攻撃を一斉に行う従来型の伝統的戦術"],"a":1,"e":"ロシアはウクライナへの軍事侵攻前から、サイバー攻撃・偽情報拡散・エネルギー圧力を組み合わせたハイブリッド戦を展開。現代の安全保障は「軍事だけ」では語れない。"},{"id":300038,"q":"日本の防衛費が「GDP比1%から2%へ」と増額された背景として正しいのはどれか？","c":["日本が独自の安全保障判断で他国への軍事侵攻を開始するための予算確保","深刻に不足している自衛隊員の給与・待遇を大幅に引き上げるため","中国・北朝鮮・ロシアの脅威増大への対応と日米同盟強化のため","アメリカ政府から強い圧力・要求を受けてやむを得ず決定したことへの対応"],"a":2,"e":"2022年の国家安全保障戦略で岸田政権が防衛費倍増を決定。北朝鮮のミサイル・中国の軍拡・ロシアの侵攻を受け、反撃能力（敵基地攻撃能力）保有も明記された。"},{"id":300039,"q":"北朝鮮がロシアに提供した「支援」として報告されているのはどれか？","c":["最先端の戦闘機や無人偵察機を大量に提供したとされる","砲弾・弾薬の大量供給と兵士の派遣をしたとされる","核ミサイルの設計図や製造技術を秘密裏に提供したとされる","不足している食料・医薬品・防寒具を大量に支援したとされる"],"a":1,"e":"欧米当局の分析で北朝鮮がロシアに大量の砲弾と兵士を提供したと報告。見返りにロシアの宇宙・軍事技術を得たとも。北朝鮮・ロシア・イランの「権威主義枢軸」への懸念が高まる。"},{"id":300040,"q":"ウクライナ戦争が長期化する中、日本が支援できる範囲として正しいのはどれか？","c":["憲法上の制約から人道・財政支援のみで殺傷兵器の提供はできない","自衛隊の戦闘員を現地に派遣して直接的な軍事支援・戦闘支援ができる","憲法と法律の制約によりいかなる形の人道・経済支援も一切行えない","核兵器や化学兵器を提供・貸与してウクライナの防衛を直接支援することができる"],"a":0,"e":"日本は憲法・法制の制約から殺傷兵器を直接提供できない。防弾チョッキ・発電機などの非致死的装備と財政支援（総額数千億円規模）を提供。G7の枠組みで制裁・支援に参加。"}]},{"section":"105. 世界経済と日本への影響","questions":[{"id":300041,"q":"「円安」が進むと日本の家庭にとって何が問題になるか？","c":["輸入食料品・エネルギーの価格が上がり生活費が増える","円安で海外旅行のコストが下がり誰でも気軽に旅行できるようになる","輸出が増えた企業の利益が従業員の給与に反映されて豊かになる","円安による株高で国民の金融資産が大幅に増えて豊かになる"],"a":0,"e":"円安→輸入品のコスト増→食料・ガソリン・電気代の値上げ。2022〜2024年の急激な円安で1世帯あたり年間数万円の家計負担増との試算も。「円安は輸出企業には追い風、家計には向かい風」。"},{"id":300042,"q":"アメリカの金利が上がると、なぜ円安になりやすいのか？","c":["米国株が暴落してリスク回避の動きから世界中の投資家が安全資産として円を一斉に買うから","日本銀行が市場安定のために円を大量に刷って供給するから","日本企業の輸出が大幅に増えてドルの需要が高まるから","日米金利差が広がり高利回りを求めてドルが買われ円が売られるから"],"a":3,"e":"「金利の高い通貨を買う」のが為替の基本原理。FRBが利上げすると米ドルの魅力が増し円が売られる。2022〜2023年の歴史的円安（1ドル=155円超）の主因がこの日米金利差。"},{"id":300043,"q":"「インフレ（物価上昇）」を抑えるために中央銀行がとる典型的な手段はどれか？","c":["お金を大量に市場へ供給して企業・家庭の消費を一気に活発化させる","政策金利を引き上げて借りにくくし消費・投資を抑制する","所得税・法人税を大幅に減税して企業や家庭の手取りを増やす","輸入品に高関税をかけて国内産品の需要を意図的に優遇する"],"a":1,"e":"金利上昇→住宅ローン・企業の借入コスト増→消費・投資の抑制→物価上昇が落ち着く。FRBが2022〜2023年に連続利上げ（0→5.5%）してインフレを鎮めたのが典型例。"},{"id":300044,"q":"「スタグフレーション」とは何か？","c":["景気が力強く拡大しながらインフレも同時進行するという理想的な好景気の状態","物価上昇率がゼロを下回りデフレが完全に解消されて経済が正常化した状態","景気が後退しているのにインフレも進む最悪の経済状態","株価と不動産価格が同時に急上昇するバブル経済の典型的な状態"],"a":2,"e":"Stagnation（停滞）＋Inflation（インフレ）の合成語。不況なのに物価が上がる最悪の状態。1970年代のオイルショック後に世界で発生。金利を上げると不況が悪化する難題。"},{"id":300045,"q":"日本銀行が2024年に「利上げ」を決定した背景として正しいのはどれか？","c":["賃金上昇を伴うインフレが定着しつつあると判断して約30年ぶりに政策転換したから","日本のGDPが世界1位に回復して長年続けてきた金融緩和の必要がなくなったから","アメリカ政府から為替・金利政策の変更を求める強い圧力を受けてやむなく決定したから","国内株価が歴史的な大幅下落を続けてマイナス金利政策が完全に機能しなくなったから"],"a":0,"e":"日銀は2024年3月・7月にマイナス金利解除・利上げを実施。約30年ぶりの政策転換。賃上げ→物価上昇という好循環の芽が出てきたと判断。円安是正の意味合いもあった。"},{"id":300046,"q":"世界的な食料価格上昇が「日本の食料安全保障」問題として注目される理由はどれか？","c":["日本が世界有数の食料輸出大国として多くの国に食料を供給しているから","急速な農業人口増加によって国内の食料生産体制が慢性的に不安定化しているから","日本には食料を長期間にわたって安全に保存・備蓄する技術が存在しないから","食料自給率が約38%と低く輸入停止で即座に食料危機になるから"],"a":3,"e":"日本の食料自給率（カロリーベース）は約38%でG7最低水準。小麦・大豆・トウモロコシはほぼ輸入依存。世界的な食料危機や輸出規制が起きると日本は直撃される脆弱な構造。"},{"id":300047,"q":"AI・生成AIの急速な普及が日本の「雇用」に与えるとされる影響はどれか？","c":["すべての職種・業種・地域でAIが人間の仕事を完全かつ一方的に奪い去るから","AI普及によって国内の失業者が激増して日本の失業率がゼロ近くになるから","定型業務の自動化が進み人間に求められるスキルが変わるから","日本の法規制・技術水準・インフラではAIが実用的にまだ使えないから"],"a":2,"e":"マッキンゼーの試算では全雇用の30〜40%がAIで代替可能に。一方で新しい職種も生まれる。「AIを使う人」と「使われる（代替される）人」の格差が広がるとも言われる。"},{"id":300048,"q":"「少子化・人口減少」が日本経済に与える影響として正しいのはどれか？","c":["若い労働力が大幅に増加してGDPが長期にわたって持続的に成長するから","人口が減少して需要も下がり物価が下落して逆説的に豊かになるから","企業の採用枠が大幅に縮小して若者・中高年の失業率が急上昇するから","労働力不足・社会保障費増大・内需縮小で経済縮小圧力が高まるから"],"a":3,"e":"2023年の出生数は70万人を下回り、想定より10年早いペースで減少中。労働力不足が深刻化し、医療・介護・建設・物流で人手不足が顕在化。移民政策・AI活用が急務に。"},{"id":300049,"q":"「BRICS拡大」（2024年）が世界秩序に与える意味はどれか？","c":["脱ドルの動きが加速し多極化した世界秩序の象徴となったこと","BRICSがNATOを事実上解散させて欧米主導の安全保障体制を完全に崩したこと","BRICS全加盟国が共同で核兵器の開発・保有・運用を公式に開始したこと","日本がBRICSに正式加盟して欧米との同盟・条約関係を全面的に見直したこと"],"a":0,"e":"BRICS拡大で世界GDPの約35%・世界人口の約45%を占める大集団に。脱ドル決済・資源国の連携強化が狙い。アメリカ主導の国際秩序への対抗軸として注目される。"},{"id":300050,"q":"「トランプ関税」が日本の製造業に与えた影響として正しいのはどれか？","c":["対米輸出コストが増して現地生産移転の検討が各社で加速した","関税の影響によって皮肉にもアメリカ向け輸出量が逆に大幅に増加した","高関税に耐えられず日本国内の主要製造工場が次々と閉鎖・撤退した","関税が障壁となってアメリカ向けの輸出が事実上完全にゼロになった"],"a":0,"e":"トランプ政権の高関税（自動車25%など）で日本の対米輸出に打撃。各社が関税回避のためアメリカ現地工場を増強する動きが加速。日米貿易交渉が外交上の最重要課題に。"}]},{"section":"49. IT基礎知識","questions":[{"id":451,"q":"世界最大のクラウドサービス（IaaS）シェアを持つ企業は？","c":["AWS","Microsoft Azure","Google Cloud","IBM Cloud"],"a":0,"e":"AWSが約32%でトップシェア。次いでAzure、Googleの順。","_orig_ans":0,"_orig_choices":["AWS","Microsoft Azure","Google Cloud","IBM Cloud"]},{"id":452,"q":"「SaaS」の正しい意味は？","c":["AIを活用した分析サービス","セキュリティ専門サービス","サーバーを貸し出すサービス","ソフトウェアをネット経由で提供するサービス"],"a":3,"e":"Software as a Service。ExcelのようなソフトをWebで使えるように
