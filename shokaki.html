<script>
/* ===== 参加メンバー（← ここの名前を今回の参加者に書き換えてください） ===== */

  {"key": "sato",     "name": "佐藤勇治",   "theme": "medical", "team": "B"},
  {"key": "nobe",     "name": "野辺純子",   "theme": "medical", "team": "B"},
  {"key": "kato",     "name": "加藤愛莉",   "theme": "medical", "team": ""},
  {"key": "nakahata", "name": "中畑麻奈",   "theme": "medical", "team": ""}
];
const TEAM_LABEL = { "A": "チームA", "B": "チームB" };

/* ===== 出題（消化器内科20問。正解はA〜D各5問ずつに均等配分） ===== */
const QUESTION_SETS = {
  medical: [
    {"section":"消化器内科の基礎","q":"消化器内科が扱う「肝胆膵（かんたんすい）」が指す3つの臓器の組み合わせはどれ？","options":["肝臓・胆道・膵臓","肝臓・胆のう・脾臓","肝臓・腎臓・膵臓","胆道・膵臓・脾臓"],"answer":0,"hint":"「肝胆膵」は肝臓・胆道・膵臓の3領域の総称。脾臓や腎臓は含みません。消化器内科の重要な守備範囲です。"},
    {"section":"内視鏡の用語","q":"一般に「胃カメラ」と呼ばれる上部消化管内視鏡で、通常観察するのはどこまで？","options":["食道・胃・空腸","食道・胃・十二指腸","咽頭・食道・胃のみ","胃・十二指腸・回腸"],"answer":1,"hint":"上部内視鏡は食道・胃・十二指腸まで。空腸・回腸（小腸の奥）は通常届かず、小腸はカプセル内視鏡やバルーン内視鏡で観察します。"},
    {"section":"内視鏡の施術","q":"食道静脈瘤の破裂を防ぐため、内視鏡で静脈瘤をゴムのバンドで縛る処置の略称はどれ？","options":["ESD","ERCP","EVL","PEG"],"answer":2,"hint":"EVLは静脈瘤を専用のゴムバンドで縛って血流を止める処置。硬化剤を注入するEIS（硬化療法）と並ぶ、静脈瘤の代表的な内視鏡治療です。"},
    {"section":"内視鏡の施術","q":"飲み込みが難しい患者さんのお腹に、内視鏡を使って栄養用の管（胃ろう）を作る処置の略称はどれ？","options":["EMR","EUS","GERD","PEG"],"answer":3,"hint":"PEG（ペグ）は内視鏡でお腹に小さな穴を開け、胃ろうカテーテルを留置して直接栄養を入れる処置。「胃ろう造設」として現場でよく使われる用語です。"},

async function fetchRemote(){
  const res = await fetch(JB_BASE + '/latest', { headers: { 'X-MASTER-KEY': MASTER_KEY, 'X-Bin-Meta': 'false' } });
  if(!res.ok) throw new Error('GET ' + res.status);
  const data = await res.json();
  const rec = (data && data.record !== undefined) ? data.record : data;
  return (rec && typeof rec === 'object') ? rec : {};
}
async function putRemote(obj){
  const res = await fetch(JB_BASE, { method:'PUT',
    headers:{ 'Content-Type':'application/json', 'X-MASTER-KEY': MASTER_KEY, 'X-Bin-Versioning':'false' },
    body: JSON.stringify(obj) });
  if(!res.ok) throw new Error('PUT ' + res.status);
  return true;
}
// 読み取り→自分の点数を足す→書き戻し（軽い再試行つき）
// 実際にサーバーへ保存できたかを読み直して確認する
async function verifySaved(name, score){
  try{
    const remote = await fetchRemote();
    return remote[name] === score;
  }catch(e){ return false; }
}
async function pushScore(name, score){
  let lastErr;
  for(let i=0;i<4;i++){
    try{
      const remote = await fetchRemote();
      remote[name] = score;
      await putRemote(remote);
      return true;
    }catch(e){
      lastErr = e;
      // 通信エラーに見えても実際は保存できている場合があるため、書き込み結果を確認する
      if(await verifySaved(name, score)) return true;
      await new Promise(r=>setTimeout(r, 600 + Math.random()*700));
    }
  }
  // 最後にもう一度だけ確認（他の人の送信と重なった直後などの取りこぼし対策）
  if(await verifySaved(name, score)) return true;
  throw lastErr;
}

function setScoreManual(name,val){ let v=parseInt(val,10); const s=loadScores(); if(isNaN(v)){ delete s[name]; } else { v=Math.max(0,Math.min(20,v)); s[name]=v; } try{ localStorage.setItem(STORE_KEY,JSON.stringify(s)); }catch(e){} }

function renderQuiz(){
  const body=document.getElementById('quiz-body'); let html='';
  questions.forEach((q,idx)=>{
    const opts=q.options.map((o,oi)=>`<button class="option-btn" id="opt-${idx}-${oi}" data-q="${idx}" data-o="${oi}">${LETTERS[oi]}．${o}</button>`).join('');

  });
  body.innerHTML=html;
  body.querySelectorAll('.option-btn').forEach(b=> b.addEventListener('click',()=> answer(parseInt(b.dataset.q,10), parseInt(b.dataset.o,10))));
  document.getElementById('result').classList.add('hidden'); updateProgress();
}

function answer(qIdx,optIdx){
  if(answered[qIdx]!==undefined) return; answered[qIdx]=optIdx;
  const q=questions[qIdx]; const ok=optIdx===q.answer;
  for(let i=0;i<q.options.length;i++){ const btn=document.getElementById(`opt-${qIdx}-${i}`); btn.disabled=true; if(i===q.answer) btn.classList.add('correct'); else if(i===optIdx&&!ok) btn.classList.add('wrong'); }
  const fb=document.getElementById(`fb-${qIdx}`); fb.className='feedback show '+(ok?'correct-fb':'wrong-fb');
  fb.innerHTML= ok ? `✅ <strong>正解！</strong> ${q.hint}` : `❌ <strong>不正解…</strong> 正解は「${LETTERS[q.answer]}．${q.options[q.answer]}」<br>${q.hint}`;
  updateProgress();
  if(Object.keys(answered).length===questions.length) showResult();
}

function updateProgress(){ const done=Object.keys(answered).length, total=questions.length; document.getElementById('prog-text').textContent=`${done} / ${total} 問回答済み`; document.getElementById('prog-fill').style.width=(done/total*100)+'%'; }

  const total=questions.length; let correct=0;

function tierOf(score){ return score>=14?{key:'pass',label:'合格',emoji:'🟢'}:score>=10?{key:'yellow',label:'イエローカード',emoji:'🟡'}:{key:'retake',label:'追試',emoji:'🔴'}; }

  document.getElementById('reveal-sub').textContent='参加 '+revealRows.length+' 名 ／ 全20問';
  let cp=0,cy=0,cr=0; revealRows.forEach(r=>{ const t=tierOf(r.score).key; if(t==='pass')cp++; else if(t==='yellow')cy++; else cr++; });
  document.getElementById('tier-summary').innerHTML='<span class="sc-pass">🟢 合格 '+cp+'</span><span class="sc-yellow">🟡 イエロー '+cy+'</span><span class="sc-retake">🔴 追試 '+cr+'</span>';
  const list=document.getElementById('rank-list'); list.innerHTML='';
  revealRows.forEach((r,i)=>{
    const t=tierOf(r.score);
    const cls=(r.rank===1?'top1':r.rank===2?'top2':r.rank===3?'top3':'')+' tier-'+t.key;
    const medal=r.rank===1?'🥇':r.rank===2?'🥈':r.rank===3?'🥉':(r.rank+'位');
    const div=document.createElement('div'); div.className='rank-row '+cls; div.id='rr-'+i; div.dataset.score=r.score;
    const teamTag = r.team ? `<span class="tier-pill" style="background:rgba(224,201,127,0.2);color:#f3e6bf;border:1px solid rgba(224,201,127,0.6);">🚩 ${TEAM_LABEL[r.team]}</span>` : '';
    div.innerHTML=`<div class="rank-medal">${medal}</div><div class="rank-name">${r.name}${teamTag}<span class="tier-pill ${t.key}">${t.emoji} ${t.label}</span></div><div class="rank-bar-wrap"><div class="rank-bar-bg"><div class="rank-bar-fill" id="bar-${i}"></div></div></div><div class="rank-score sc-${t.key}">${r.score}<small>/20</small></div>`;
    list.appendChild(div);
  });
  // 発表方向の選択
  const ctrl=document.getElementById('reveal-controls');
  ctrl.innerHTML='<button class="btn-gold" id="rv-bottom">👇 最下位から1人ずつ</button><button class="btn-gold" id="rv-top3">🏅 4位以下 → 3位・2位・1位</button><button class="btn-outline" id="rv-all2">✨ 一気に全員表示</button>'
    +'<div style="margin-top:14px;"><button class="btn-gold" id="rv-team">🚩 チーム対抗の結果を発表</button></div>';
  document.getElementById('rv-bottom').addEventListener('click',()=>beginReveal('bottomUp'));
  document.getElementById('rv-top3').addEventListener('click',beginRevealTop3);
  document.getElementById('rv-all2').addEventListener('click',revealAll);
  document.getElementById('rv-team').addEventListener('click',showTeamResult);
  document.getElementById('team-box').classList.add('hidden');
  show('reveal-screen');
}
/* ===== チーム対抗（合計点で勝負） ===== */
function computeTeams(){
  const res = {};
  ['A','B'].forEach(k=>{
    const roster = members.filter(m=>m.team===k);
    const done = revealRows.filter(r=>r.team===k);
    const total = done.reduce((s,r)=>s+r.score,0);
    res[k] = {
      key: k, label: TEAM_LABEL[k], roster: roster.length,
      done: done.length, total: total,
      avg: done.length ? (total/done.length) : 0,
      members: done.slice().sort((a,b)=>b.score-a.score)
    };
  });
  return res;
}
function showTeamResult(){
  const t = computeTeams();
  const box = document.getElementById('team-box');
  box.classList.remove('hidden');
  const win = t.A.total===t.B.total ? null : (t.A.total>t.B.total ? 'A' : 'B');
  const card = (d)=>{
    const isWin = win===d.key;
    const detail = d.members.map(m=>`${m.name}　${m.score}`).join('<br>') || '（未回答）';
    const pending = d.done < d.roster ? `<div style="font-size:0.72em;color:#ef9a9a;margin-top:6px;">※ ${d.roster - d.done}名 未回答</div>` : '';
    return `<div class="team-card${isWin?' win':''}" id="tc-${d.key}">
      <div class="tcrown">${isWin?'👑':''}</div>
      <div class="tname">🚩 ${d.label}</div>
      <div class="tmembers">${d.done} / ${d.roster} 名 回答済み</div>
      <div class="ttotal">${d.total}<small> 点</small></div>
      <div class="tavg">1人あたり平均 ${d.avg.toFixed(1)} 点</div>
      <div class="team-detail">${detail}</div>
      ${pending}
    </div>`;
  };
  const verdict = win
    ? `🎉 ${TEAM_LABEL[win]} の勝利！（${Math.abs(t.A.total-t.B.total)}点差）`
    : `🤝 同点！ ${t.A.total}点 対 ${t.B.total}点`;
  box.innerHTML = `<div class="team-head">🚩 チーム対抗 結果 🚩</div>
    <div class="team-cards">${card(t.A)}${card(t.B)}</div>
    <div class="team-verdict" id="team-verdict">${verdict}</div>`;
  setTimeout(()=>{ const a=document.getElementById('tc-A'); if(a) a.classList.add('shown'); },100);
  setTimeout(()=>{ const b=document.getElementById('tc-B'); if(b) b.classList.add('shown'); },500);
  setTimeout(()=>{ const v=document.getElementById('team-verdict'); if(v) v.classList.add('shown'); },1100);
  box.scrollIntoView({behavior:'smooth',block:'center'});
}
function resetRowsHidden(){
  revealRows.forEach((r,i)=>{ const row=document.getElementById('rr-'+i); if(row) row.classList.remove('shown'); const bar=document.getElementById('bar-'+i); if(bar) bar.style.width='0%'; });
}
function beginReveal(dir){
  revealDir='bottomUp'; resetRowsHidden();
  revealQueue = revealRows.map((r,i)=>i).reverse();
  const ctrl=document.getElementById('reveal-controls');
  ctrl.innerHTML='<button class="btn-gold" id="rv-next">👇 最下位から発表！</button><button class="btn-outline" id="rv-restart">↺ スタイルを選び直す</button>'
    +'<div style="margin-top:12px;"><button class="btn-outline" id="rv-team2">🚩 チーム対抗の結果</button></div>';
  document.getElementById('rv-next').addEventListener('click',revealNext);
  document.getElementById('rv-restart').addEventListener('click',startReveal);
  document.getElementById('rv-team2').addEventListener('click',showTeamResult);
}
function top3BtnText(idx){ return idx===2?'🥉 第3位を発表！':idx===1?'🥈 第2位を発表！':'🥇 第1位を発表！！'; }
function beginRevealTop3(){
  revealDir='top3'; resetRowsHidden();
  const n=revealRows.length;
  let delay=0;
  for(let i=n-1;i>=3;i--){ setTimeout(((idx)=>()=>revealRow(idx))(i), delay); delay+=380; }
  revealQueue=[2,1,0].filter(i=>i>=0 && i<n);
  const ctrl=document.getElementById('reveal-controls');
  ctrl.innerHTML='<button class="btn-gold" id="rv-next">'+top3BtnText(revealQueue[0])+'</button><button class="btn-outline" id="rv-restart">↺ スタイルを選び直す</button>'
    +'<div style="margin-top:12px;"><button class="btn-outline" id="rv-team3">🚩 チーム対抗の結果</button></div>';
  document.getElementById('rv-next').addEventListener('click',revealTop3Next);
  document.getElementById('rv-restart').addEventListener('click',startReveal);
  document.getElementById('rv-team3').addEventListener('click',showTeamResult);
}
function revealTop3Next(){
  if(revealQueue.length===0) return;
  const i=revealQueue.shift(); revealRow(i);
  const row=document.getElementById('rr-'+i); if(row) row.scrollIntoView({behavior:'smooth',block:'center'});
  const btn=document.getElementById('rv-next');
  if(revealQueue.length===0){ btn.textContent='🎉 発表おわり！おめでとう🎊'; btn.disabled=true; btn.style.opacity=0.6; }
  else { btn.textContent=top3BtnText(revealQueue[0]); }
}
function revealAll(){
  resetRowsHidden();
  const n=revealRows.length;
  revealRows.forEach((r,i)=> setTimeout(()=>revealRow(i),(n-1-i)*380));
  const ctrl=document.getElementById('reveal-controls');
  ctrl.innerHTML='<button class="btn-gold" id="rv-team4">🚩 チーム対抗の結果</button><button class="btn-outline" id="rv-restart2">↺ 方向を選び直す</button>';
  document.getElementById('rv-restart2').addEventListener('click',startReveal);
  document.getElementById('rv-team4').addEventListener('click',showTeamResult);
}
function revealRow(i){
  const row=document.getElementById('rr-'+i); if(!row) return; row.classList.add('shown');
  const bar=document.getElementById('bar-'+i); const score=parseInt(row.dataset.score,10);
  if(bar) setTimeout(()=>{ bar.style.width=(score/20*100)+'%'; },120);
}
function revealNext(){
  if(revealQueue.length===0) return;
  const i=revealQueue.shift(); revealRow(i);
  document.getElementById('rr-'+i).scrollIntoView({behavior:'smooth',block:'center'});
  const btn=document.getElementById('rv-next');
  if(revealQueue.length===0){ btn.textContent='🎉 発表おわり！'; btn.disabled=true; btn.style.opacity=0.6; }
  else if(revealDir==='bottomUp' && revealQueue.length===1){ btn.textContent='👑 いよいよ1位！'; }
  else { btn.textContent='▶ 次を発表（残り'+revealQueue.length+'人）'; }
}

document.getElementById('to-reveal').addEventListener('click',startReveal);
document.getElementById('to-board').addEventListener('click',showBoard);
document.getElementById('quiz-back').addEventListener('click',backToSelect);
document.getElementById('board-back').addEventListener('click',backToSelect);
document.getElementById('reveal-back').addEventListener('click',backToSelect);
document.getElementById('board-to-reveal').addEventListener('click',startReveal);
document.getElementById('reset-scores').addEventListener('click',resetScores);

function initApp(){
  buildNames();
  let u='';
  try{ u=(new URLSearchParams(location.search).get('user')||'').trim().toLowerCase(); }catch(e){}
  if(u){
    const m=members.find(x=> x.key.toLowerCase()===u);
    if(m){
      participantMode=true; participantMember=m;
      const qb=document.getElementById('quiz-back'); if(qb) qb.style.display='none';
      startQuiz(m); return;
    }
  }
  show('select-screen');
}
initApp();
</script>
