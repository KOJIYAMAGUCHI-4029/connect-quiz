人", "約1億人", "約40億人", "約70億人"], "a": 0, "e": "ハンス・ロスリング著「ファクトフルネス」より。約10億人がレベル4。"}, "190": {"id": 190, "section": "41. ファクトフルネス", "q": "世界の合計特殊出生率はおよそいくつか？", "c": ["1.2", "2.3", "3.5", "4.8"], "a": 1, "e": "世界平均は約2.3（2023年時点）。日本は約1.2と世界最低水準。"}, "194": {"id": 194, "section": "41. ファクトフルネス", "q": "世界の平均寿命はおよそ何歳か？", "c": ["約53歳", "約63歳", "約73歳", "約83歳"], "a": 2, "e": "世界平均は約73歳（2023年）。50年前は約60歳だった。"}, "197": {"id": 197, "section": "41. ファクトフルネス", "q": "麻疹の集団免疫に必要な2回接種率はどれか？", "c": ["約70%", "約85%", "約99%", "約95%"], "a": 3, "e": "麻疹は感染力が非常に強いため、集団免疫には95%以上の接種率が必要。"}, "197201": {"id": 197201, "section": "41. ファクトフルネス", "q": "「ファクトフルネス」の著者はだれか？", "c": ["マルコム・グラッドウェル", "ユヴァル・ノア・ハラリ", "ハンス・ロスリング", "ピーター・ドラッカー"], "a": 2, "e": "ハンス・ロスリングはスウェーデンの医師・統計学者。「ファクトフルネス」は世界的ベストセラー。"}, "197202": {"id": 197202, "section": "41. ファクトフルネス", "q": "ファクトフルネスが指摘する人間の思い込みの傾向はどれか？", "c": ["世界は実際より良い状態だと過大評価する", "世界は実際より悪い状態だと過大評価する", "世界は実際より悪い状態だと過小評価する", "データより感覚の方が正確だと信じる"], "a": 1, "e": "人間はネガティブ本能により、世界を実際より悪く見がち。データで見ると世界は改善されている。"}, "197203": {"id": 197203, "section": "41. ファクトフルネス", "q": "ファクトフルネスで紹介される収入レベルの分類は何段階か？", "c": ["2段階", "6段階", "4段階", "10段階"], "a": 2, "e": "ハンス・ロスリングは収入を4つのレベルに分類。先進国・途上国の二分法を否定した。"}, "197204": {"id": 197204, "section": "41. ファクトフルネス", "q": "世界で極度の貧困（1日1.9ドル未満）にいる人の割合は過去20年でどう変化したか？", "c": ["約2倍に増加した", "ほぼ変わらない", "約4分の1に減少した", "約半分に減少した"], "a": 3, "e": "極度の貧困層の割合は過去20年で約半減。メディアは悪いニュースを取り上げやすいため改善が見えにくい。"}, "197205": {"id": 197205, "section": "41. ファクトフルネス", "q": "ファクトフルネスが提唱する「ドラマチック本能」とは何か？", "c": ["物事を劇的・二項対立で捉えようとする本能", "ドラマ・映画から知識を得ようとする傾向", "感動的なエピソードを信じやすい傾向", "悲劇的な結末を好む心理"], "a": 0, "e": "ドラマチック本能とは物事を善悪・勝敗など二項対立で単純化して理解しようとする人間の傾向。"}, "197206": {"id": 197206, "section": "41. ファクトフルネス", "q": "世界の1歳児のうちワクチン接種を受けている割合はどれか？", "c": ["約23%", "約88%", "約54%", "約76%"], "a": 1, "e": "ロスリングによると世界の1歳児の約88%がワクチン接種済み。多くの人が過小評価している。"}, "383": {"id": 383, "section": "42. 皮膚科", "q": "美容皮膚科特化クリニックの自費割合の目安はどれか？", "c": ["0〜10%", "20〜50%", "50〜70%", "70〜100%"], "a": 3, "e": "美容皮膚科特化型は自費が中心。70〜100%が目安。"}, "384": {"id": 384, "section": "42. 皮膚科", "q": "ダーモスコピーとは何か？", "c": ["皮膚病変の拡大観察装置", "皮膚温度を測定する器具", "皮膚の硬さを測るデバイス", "皮膚への薬剤浸透を促進する装置"], "a": 0, "e": "ダーモスコープで皮膚病変を10〜20倍に拡大。メラノーマ等の悪性腫瘍の早期発見に有効。"}, "386": {"id": 386, "section": "42. 皮膚科", "q": "AGA治療で国内承認済みの内服薬として正しいものはどれか？", "c": ["ミノキシジル内服", "フィナステリド", "デュタステリドのみ", "承認薬は存在しない"], "a": 1, "e": "フィナステリド（プロペシア）とデュタステリド（ザガーロ）が国内承認済み。ミノキシジル内服は未承認。"}, "387": {"id": 387, "section": "42. 皮膚科", "q": "アトピー性皮膚炎の生物学的製剤として代表的なものはどれか？", "c": ["デュピルマブ", "インフリキシマブ", "トラスツズマブ", "ベバシズマブ"], "a": 0, "e": "デュピルマブ（デュピクセント）はIL-4/IL-13を阻害するアトピー性皮膚炎の生物学的製剤。"}, "95001": {"id": 95001, "section": "42. 皮膚科", "q": "皮膚科の三大疾患として含まれないものはどれか？", "c": ["アトピー性皮膚炎", "乾癬", "白内障", "湿疹・皮膚炎"], "a": 2, "e": "白内障は眼科疾患。皮膚科の頻度の高い疾患はアトピー性皮膚炎・乾癬・湿疹・皮膚炎・蕁麻疹など。"}, "95002": {"id": 95002, "section": "42. 皮膚科", "q": "乾癬の治療で近年普及している生物学的製剤はどれか？", "c": ["インスリン製剤", "抗TNF抗体・抗IL-17抗体などの生物学的製剤", "抗生剤", "降圧剤"], "a": 1, "e": "乾癬には抗TNF抗体・抗IL-17抗体・抗IL-23抗体などの生物学的製剤が有効。重症例に保険適用。"}, "95003": {"id": 95003, "section": "42. 皮膚科", "q": "皮膚科の「ダーモスコピー」が特に有用な疾患はどれか？", "c": ["アトピー性皮膚炎", "悪性黒色腫（メラノーマ）の早期診断", "蕁麻疹", "帯状疱疹"], "a": 1, "e": "ダーモスコピーは皮膚病変を無侵襲で拡大観察。悪性黒色腫など色素性病変の早期診断に特に有用。"}, "95004": {"id": 95004, "section": "42. 皮膚科", "q": "帯状疱疹の原因ウイルスはどれか？", "c": ["単純ヘルペスウイルス", "水痘・帯状疱疹ウイルス（VZV）", "HPV", "EBウイルス"], "a": 1, "e": "帯状疱疹は幼少期に感染した水痘ウイルス（VZV）が再活性化して発症。皮膚科・神経内科が担当。"}, "95005": {"id": 95005, "section": "42. 皮膚科", "q": "皮膚科クリニックと美容皮膚科クリニックの主な違いはどれか？", "c": ["全く同じ診療を行う", "皮膚科は保険診療中心・美容皮膚科は自費診療中心", "皮膚科は手術不可", "美容皮膚科は保険診療のみ"], "a": 1, "e": "一般皮膚科は保険診療中心で湿疹・皮膚炎等を診る。美容皮膚科はレーザー・注入等の自費診療が中心。"}, "95006": {"id": 95006, "section": "42. 皮膚科", "q": "皮膚科専門医が美容クリニックに転職する際の強みはどれか？", "c": ["手術スキルが高い", "皮膚の知識・レーザー・スキンケアの専門知識が直結する", "内科知識が豊富", "透析管理の経験がある"], "a": 1, "e": "皮膚科専門医は皮膚の組織・病態・レーザー機器の知識が豊富で美容皮膚科への転職に強みを発揮する。"}, "206": {"id": 206, "section": "43. 健診・人間ドック", "q": "健診クリニックで働く医師の主な診療科はどれか？", "c": ["内科・消化器内科・循環器内科・放射線科など", "外科・整形外科が中心", "精神科・神経内科が中心", "産婦人科・小児科が中心"], "a": 0, "e": "健診は内科・消化器・循環器・放射線科が中心。読影医（放射線科）の需要が高い。"}, "207": {"id": 207, "section": "43. 健診・人間ドック", "q": "高級会員制検診クリニックとして知られるものはどれか？", "c": ["東京大学医学部附属病院", "グランドハイメディック倶楽部・ミッドタウンクリニックなど", "国立国際医療研究センター", "東京医療センター"], "a": 1, "e": "富裕層向け会員制検診施設。PETや高精度MRIなど充実した設備が特徴。"}, "95010": {"id": 95010, "section": "43. 健診・人間ドック", "q": "特定健診（メタボ健診）の対象年齢はどれか？", "c": ["20〜39歳", "60歳以上", "40〜74歳", "75歳以上"], "a": 2, "e": "特定健診は40〜74歳の医療保険加入者を対象にメタボリックシンドロームの早期発見を目的とする。"}, "95011": {"id": 95011, "section": "43. 健診・人間ドック", "q": "人間ドックと健康診断の違いとして正しいものはどれか？", "c": ["全く同じ", "健診の方が検査項目が多い", "人間ドックは保険適用", "健康診断は法定・人間ドックは任意の自費検査が中心"], "a": 3, "e": "健診は労働安全衛生法等に基づく法定検査。人間ドックは任意で費用は自己負担が基本。検査項目も多い。"}, "95012": {"id": 95012, "section": "43. 健診・人間ドック", "q": "健診クリニックでの医師の主な業務はどれか？", "c": ["問診・身体所見・心電図・内視鏡・結果説明", "緊急手術", "透析管理", "訪問診療"], "a": 0, "e": "健診クリニックでの医師業務は問診・視診・聴診・心電図判読・内視鏡・エコー・結果説明など。"}, "95013": {"id": 95013, "section": "43. 健診・人間ドック", "q": "健診医のスキルチェックで最も重要な項目はどれか？", "c": ["手術件数", "内視鏡・エコー・健診読影の経験・資格", "当直回数", "病棟管理経験"], "a": 1, "e": "健診医求人では上部内視鏡・腹部エコー・健診読影（心電図・X線）の経験・資格が最重要確認項目。"}, "95014": {"id": 95014, "section": "43. 健診・人間ドック", "q": "がん検診の種類として含まれないものはどれか？", "c": ["胃がん検診", "大腸がん検診", "関節リウマチ検診", "肺がん検診"], "a": 2, "e": "国が推奨する5大がん検診は胃・大腸・肺・乳・子宮頸がん。関節リウマチはがん検診に含まれない。"}, "95015": {"id": 95015, "section": "43. 健診・人間ドック", "q": "健診業務のメリットとして医師から多く挙げられるものはどれか？", "c": ["緊急対応が多い", "研究に集中できる", "高度手術を多く経験できる", "当直なし・日勤のみ・ワークライフバランスが整いやすい"], "a": 3, "e": "健診業務は当直なし・日勤のみが多く、ワークライフバランスを重視する医師に人気が高い。"}, "95016": {"id": 95016, "section": "43. 健診・人間ドック", "q": "健診業務での「二次精査依頼」とは何か？", "c": ["健診で異常が見つかった受診者を専門医・医療機関に紹介すること", "2回目の健診の予約", "保険会社への報告", "厚生労働省への届け出"], "a": 0, "e": "健診で異常所見が見つかった場合、専門医療機関での精密検査を勧める紹介状を発行することを二次精査依頼という。"}, "95017": {"id": 95017, "section": "43. 健診・人間ドック", "q": "健診クリニックのアルバイト（スポット）求人の特徴はどれか？", "c": ["長期拘束・高い専門技術が必要", "日帰り・単発・高時給が多く副業に活用しやすい", "当直が必須", "手術経験が必要"], "a": 1, "e": "健診スポット求人は1日単位・日帰り・高時給が特徴。副業・非常勤として医師に人気のカテゴリ。"}, "389": {"id": 389, "section": "44. 美容外科・美容クリニック", "q": "美容外科スキルチェックの目元カテゴリに含まれないものはどれか？", "c": ["二重埋没", "眼瞼下垂", "鼻中隔延長", "ハムラ法"], "a": 2, "e": "鼻中隔延長は鼻のカテゴリ。目元は二重埋没・切開・眼瞼下垂・ハムラ法など。"}, "390": {"id": 390, "section": "44. 美容外科・美容クリニック", "q": "美容クリニック求人でインセンティブ確認時に最重要な事項はどれか？", "c": ["医師の出身大学", "どの施術がインセンティブ計算に含まれるか", "クリニックの内装", "スタッフの人数"], "a": 1, "e": "インセンティブの計算対象施術・金額・タイミングを具体的に確認することが重要。"}, "392": {"id": 392, "section": "44. 美容外科・美容クリニック", "q": "AGA治療で国内未承認の自費のみの内服薬はどれか？", "c": ["フィナステリド", "デュタステリド", "ミノキシジル内服", "ミノキシジル外用薬"], "a": 2, "e": "ミノキシジル内服は国内未承認。自費診療としてのみ処方可能。外用は承認済み。"}, "393": {"id": 393, "section": "44. 美容外科・美容クリニック", "q": "美容クリニックの事前リサーチで最も有効なツールはどれか？", "c": ["医師の出身大学検索", "Instagramや公式サイトでの施術・料金確認", "透析機器メーカー調査", "診療報酬点数表の確認"], "a": 1, "e": "SNS・公式サイトで施術メニュー・料金・症例写真・口コミを事前確認することが重要。"}, "95020": {"id": 95020, "section": "44. 美容外科・美容クリニック", "q": "美容クリニックで「カウンセラー」が担う役割はどれか？", "c": ["医師の代わりに施術を行う", "患者の相談受付・施術提案・契約までの案内を担う", "手術室の管理", "医療機器のメンテナンス"], "a": 1, "e": "美容クリニックのカウンセラーは施術の説明・患者の不安解消・コース提案・契約締結を担う重要な役割。"}, "95021": {"id": 95021, "section": "44. 美容外科・美容クリニック", "q": "美容クリニックの「モニター制度」とは何か？", "c": ["スタッフの勤務評価制度", "施術前後の写真・口コミ提供を条件に割引で施術を受ける仕組み", "新薬の臨床試験", "患者の症例発表制度"], "a": 1, "e": "モニター制度は症例写真・体験談の掲載許可を条件に割引価格で施術を受けられる制度。クリニックの宣伝に活用。"}, "95022": {"id": 95022, "section": "44. 美容外科・美容クリニック", "q": "美容医療の広告規制として正しいものはどれか？", "c": ["何でも自由に広告できる", "医療法により誇大広告・比較広告・体験談の無制限掲載は規制されている", "SNS広告は規制対象外", "ビフォーアフター写真は必ず掲載すべき"], "a": 1, "e": "医療法改正により美容医療の誇大広告・根拠のない優良表示・体験談の無制限掲載等が規制されている。"}, "95023": {"id": 95023, "section": "44. 美容外科・美容クリニック", "q": "美容外科・美容クリニック求人で「自費率」が高い施設の特徴はどれか？", "c": ["保険診療が中心で安定収益", "医師へのインセンティブ・給与水準が高くなりやすい", "患者数が少ない", "医師の裁量が少ない"], "a": 1, "e": "自費率が高いクリニックは診療単価が高く、医師のインセンティブ・給与も高くなる傾向がある。"}, "95024": {"id": 95024, "section": "44. 美容外科・美容クリニック", "q": "美容クリニックへの転職を検討する医師に特に多い出身科はどれか？", "c": ["循環器内科・腎臓内科", "形成外科・皮膚科・産婦人科", "脳神経外科・心臓外科", "精神科・麻酔科"], "a": 1, "e": "美容クリニックへの転職は形成外科・皮膚科・産婦人科などの出身医師に多い。技術的親和性が高い。"}, "95025": {"id": 95025, "section": "44. 美容外科・美容クリニック", "q": "美容クリニックで「研修医・若手医師」採用が増えている背景はどれか？", "c": ["専門医資格が不要なため", "早期から美容技術を習得させ長期戦力として育成したいクリニックが増えているため", "保険診療の義務があるため", "医師不足が深刻なため"], "a": 1, "e": "美容クリニックが増加し競争激化。若手医師を早期採用・育成し長期戦力とするクリニックが増えている。"}, "401": {"id": 401, "section": "45. 美容皮膚科", "q": "美容皮膚科と一般皮膚科の最大の違いはどれか？", "c": ["対象患者の年齢が異なる", "保険適用外の自費診療が中心で単価が高くカウンセリング力が重要", "医師の資格が異なる", "診察時間が異なる"], "a": 1, "e": "美容皮膚科は自由診療（全額自己負担）が中心。単価・接遇・カウンセリングが重要。"}, "402": {"id": 402, "section": "45. 美容皮膚科", "q": "美容皮膚科の代表的な施術3つとして正しいものはどれか？", "c": ["透析・内視鏡・白内障手術", "レーザー治療・ボトックス注入・ヒアルロン酸注入", "分娩・帝王切開・人工授精", "白内障・緑内障・硝子体手術"], "a": 1, "e": "美容皮膚科の3大施術はレーザー・ボトックス・ヒアルロン酸。非外科的治療が中心。"}, "403": {"id": 403, "section": "45. 美容皮膚科", "q": "ボトックスとヒアルロン酸の違いとして正しいものはどれか？", "c": ["ボトックス=ボリューム補填・ヒアルロン酸=筋肉抑制", "ボトックス=筋肉の動きを抑制・ヒアルロン酸=ボリューム補填", "両方とも筋肉を弛緩させる", "両方ともボリュームを補填する"], "a": 1, "e": "ボトックス（ボツリヌストキシン）は筋肉の収縮を抑制。ヒアルロン酸はゲル状でボリューム補填。"}, "405": {"id": 405, "section": "45. 美容皮膚科", "q": "美容未経験医師が最初に担当しやすい業務はどれか？", "c": ["高難度の注入施術", "脱毛問診・AGA問診・レーザー管理など", "全身麻酔下の手術", "二重切開手術"], "a": 1, "e": "脱毛問診やAGA問診はリスクが低く、未経験医師でも参入しやすい。"}, "406": {"id": 406, "section": "45. 美容皮膚科", "q": "美容皮膚科常勤医師（週5日）の年収目安として正しいものはどれか？", "c": ["500〜800万円", "1000〜1500万円", "1800〜2500万円前後", "5000万円以上"], "a": 2, "e": "週5日常勤で1,800〜2,500万円が相場。院長クラスは3,000万円超の例もある。"}, "408": {"id": 408, "section": "45. 美容皮膚科", "q": "売上志向が弱い医師への美容クリニック提案戦略として正しいものはどれか？", "c": ["売上連動型・院長候補ポジション", "ノルマ緩め・固定給安定型・レーザー中心院を選定", "分院立ち上げ案件を優先", "高インセンティブ型クリニックを優先"], "a": 1, "e": "売上へのプレッシャーが少なく固定給が安定しているクリニックが向いている。"}, "95030": {"id": 95030, "section": "45. 美容皮膚科", "q": "美容皮膚科で使われるIPL（フォトフェイシャル）の主な適応はどれか？", "c": ["深いシワの改善", "シミ・毛細血管拡張・くすみなどの肌全体の改善", "脂肪溶解", "二重まぶたの形成"], "a": 1, "e": "IPL（光治療）はシミ・毛細血管拡張・くすみ・小じわなど肌全体を改善するフォトフェイシャル治療。"}, "95031": {"id": 95031, "section": "45. 美容皮膚科", "q": "美容皮膚科でのピーリングの目的はどれか？", "c": ["脂肪を溶解する", "古い角質を除去し肌のターンオーバーを促進する", "筋肉の動きを抑制する", "ボリュームを補填する"], "a": 1, "e": "ピーリングは薬剤で古い角質を除去しターンオーバーを促進。ニキビ・シミ・くすみ改善に使用。"}, "95032": {"id": 95032, "section": "45. 美容皮膚科", "q": "美容皮膚科の「ダウンタイム」とは何か？", "c": ["クリニックの休診日", "施術後の赤み・腫れ・かさぶたなどが回復するまでの期間", "カウンセリングの所要時間", "施術の予約待ち時間"], "a": 1, "e": "ダウンタイムは施術後の赤み・腫れ・内出血・かさぶたなどが落ち着くまでの回復期間。施術選択の重要指標。"}, "95033": {"id": 95033, "section": "45. 美容皮膚科", "q": "美容皮膚科で「ヒアルロン酸注入」に使う針の特徴として正しいものはどれか？", "c": ["必ず太い針を使用する", "先端が鈍いカニューレを使うことで内出血リスクを下げられる", "注射針は使い回しが標準", "太さは全員同じ"], "a": 1, "e": "カニューレ（鈍針）は先端が丸く血管を傷つけにくいため、ヒアルロン酸注入の内出血リスク軽減に有効。"}, "416": {"id": 416, "section": "46. 美容外科", "q": "大手美容クリニックとして正しい組み合わせはどれか？", "c": ["東大病院・慶應病院・順天堂病院", "湘南美容クリニック・品川美容外科・TCB", "徳洲会・IMS・TMG", "加藤レディスクリニック・英ウィメンズ・聖路加"], "a": 1, "e": "湘南美容（SBC）・品川美容外科・TCBが美容外科の大手3チェーン。"}, "417": {"id": 417, "section": "46. 美容外科", "q": "美容外科の代表的な施術3つとして正しいものはどれか？", "c": ["透析・内視鏡・白内障手術", "二重術・鼻整形・脂肪吸引", "分娩・帝王切開・人工授精", "ECT・TMS・催眠療法"], "a": 1, "e": "美容外科の3大術式は二重術・鼻整形・脂肪吸引。手術（メス）を使う点が特徴。"}, "418": {"id": 418, "section": "46. 美容外科", "q": "二重術の2種類として正しいものはどれか？", "c": ["切除法・剥離法", "埋没法・切開法", "縫合法・接着法", "注入法・照射法"], "a": 1, "e": "埋没法はダウンタイムが短い。切開法は半永久的で腫れが長い。"}, "419": {"id": 419, "section": "46. 美容外科", "q": "美容外科のリスクとして含まれないものはどれか？", "c": ["術後合併症・感染", "左右差・修正手術", "訴訟リスク", "毛周期による効果のばらつき"], "a": 3, "e": "毛周期は脱毛の話。美容外科リスクは合併症・感染・左右差・修正・訴訟など。"}, "420": {"id": 420, "section": "46. 美容外科", "q": "美容外科常勤医師の年収として正しいものはどれか？", "c": ["300〜500万円", "800〜1200万円", "勤務医2000〜3000万円・売上連動型は5000万円以上も", "10億円以上が標準"], "a": 2, "e": "美容外科は医師の中でも最高水準。売上連動型で青天井になる場合もある。"}, "421": {"id": 421, "section": "46. 美容外科", "q": "美容外科求人紹介で最初に確認すべき最重要ポイントはどれか？", "c": ["医師の出身大学", "現在どの施術を単独で執刀できるか", "勤務地の希望", "趣味・特技"], "a": 1, "e": "単独執刀できる術式の確認が最重要。技術レベルで紹介可能な求人が大きく変わる。"}, "422": {"id": 422, "section": "46. 美容外科", "q": "若手医師が美容外科転職で最も失敗しやすいポイントはどれか？", "c": ["給与が低すぎた", "症例が積めると思って入職したが執刀機会が少なかった", "クリニックの場所が遠かった", "スタッフとの関係が悪かった"], "a": 1, "e": "ブランドや提示年収だけで判断すると、実際の執刀機会が少なくミスマッチになりやすい。"}, "423": {"id": 423, "section": "46. 美容外科", "q": "若手美容外科医には大手と中小どちらが向いているか？", "c": ["中小クリニックの方が良い", "原則大手", "どちらも同じ", "大学病院が最も良い"], "a": 1, "e": "大手は症例数・指導体制が充実。中小は早期任用もあるが教育が不十分な場合がある。"}, "95040": {"id": 95040, "section": "46. 美容外科", "q": "美容外科で「修正手術」が多い施術はどれか？", "c": ["脱毛", "二重手術・鼻手術など形態を変える施術", "ボトックス注入", "ピーリング"], "a": 1, "e": "二重手術・鼻整形などは患者の希望と結果のギャップが生じやすく修正手術の需要が高い。"}, "95041": {"id": 95041, "section": "46. 美容外科", "q": "美容外科医のキャリアで「技術指導医」の役割はどれか？", "c": ["クリニックの経営を担当する", "若手医師に施術技術を直接指導する役割", "広告・SNSを担当する", "採用面接を担当する"], "a": 1, "e": "技術指導医は若手美容外科医の育成を担うポジション。給与・ポジション交渉のカードになりやすい。"}, "431": {"id": 431, "section": "47. 医療脱毛", "q": "医療脱毛とエステ脱毛の最大の違いはどれか？", "c": ["価格の違いのみ", "医療脱毛は高出力レーザー・エステは出力が低い光脱毛", "施術時間の違いのみ", "使用するクリームの違い"], "a": 1, "e": "医療脱毛は医師・看護師が行う高出力レーザー。永久脱毛（毛根破壊）が可能。"}, "432": {"id": 432, "section": "47. 医療脱毛", "q": "医療脱毛で使われる代表的なレーザーとして含まれないものはどれか？", "c": ["アレキサンドライトレーザー", "ダイオードレーザー", "ヤグレーザー", "CO2フラクショナルレーザー"], "a": 3, "e": "CO2フラクショナルレーザーは美肌治療用。脱毛には使用しない。"}, "433": {"id": 433, "section": "47. 医療脱毛", "q": "脱毛が複数回通う必要がある理由はどれか？", "c": ["クリニックの都合", "毛周期があり、レーザーは成長期の毛のみに効果があるから", "薬の効果が1回では弱いから", "保険適用の制限があるから"], "a": 1, "e": "毛周期（成長期・退行期・休止期）があり、レーザーは成長期の毛のみに効果がある。"}, "434": {"id": 434, "section": "47. 医療脱毛", "q": "医療脱毛の平均的な通院回数の目安はどれか？", "c": ["1〜2回", "3〜4回", "5〜8回", "15〜20回"], "a": 2, "e": "5〜8回程度が目安。部位・毛質・個人差によって異なる。"}, "435": {"id": 435, "section": "47. 医療脱毛", "q": "ヤグレーザーが向いている毛質・肌質はどれか？", "c": ["細い産毛・色白肌", "根深い毛・男性のヒゲ・色黒肌", "眉毛・まつ毛", "白髪・金髪"], "a": 1, "e": "ヤグレーザーは波長が長く表皮ダメージが少ない。色黒肌・男性ヒゲ・根深い毛に有効。"}, "436": {"id": 436, "section": "47. 医療脱毛", "q": "脱毛クリニックで起きやすいクレームとして含まれないものはどれか？", "c": ["痛みが思ったより強い", "効果の実感に個人差がある", "予約が取りづらい", "施術後の肌がきれいになった"], "a": 3, "e": "肌がきれいになったのはクレームではなく喜び。痛み・効果差・予約困難がクレームの代表。"}, "437": {"id": 437, "section": "47. 医療脱毛", "q": "医療脱毛で出力設定を一人ずつ調整する目的はどれか？", "c": ["時間を節約するため", "肌トラブルを防ぎつつ効果を最大化するため", "コスト削減のため", "施術者の練習のため"], "a": 1, "e": "肌の色・毛質・部位によってレーザーの適切な出力が異なるため個別調整が必要。"}, "438": {"id": 438, "section": "47. 医療脱毛", "q": "男性脱毛市場が伸びている背景として含まれないものはどれか？", "c": ["美容意識の向上", "ヒゲ脱毛ニーズ増加", "清潔感を重視する社会傾向", "男性への保険適用が拡大したから"], "a": 3, "e": "医療脱毛は自費診療のため保険は関係ない。美容意識・清潔感志向・SNS影響が主な背景。"}, "439": {"id": 439, "section": "47. 医療脱毛", "q": "脱毛クリニックの利益構造で重要なポイントとして含まれないものはどれか？", "c": ["リピート来院", "稼働率", "広告費コントロール", "透析機器の導入"], "a": 3, "e": "透析機器は脱毛クリニックには全く関係ない。リピート・稼働率・広告費が鍵。"}, "440": {"id": 440, "section": "47. 医療脱毛", "q": "脱毛市場で最近増えている動きとして含まれないものはどれか？", "c": ["都度払いプランの増加", "サブスク型サービス", "男性専門クリニックの拡大", "脱毛の保険適用化"], "a": 3, "e": "脱毛は自由診療のため保険適用にはなっていない。都度払い・サブスク・男性専門が最新トレンド。"}};

function render() {
  const params = new URLSearchParams(location.search);
  let dateParam = params.get('date');
  
  // dateパラメータがなければ今日
  if (!dateParam) {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,'0');
    const d = String(now.getDate()).padStart(2,'0');
    dateParam = y + m + d;
  }
  
  const ids = SCHEDULE[dateParam];
  const labels = ['A','B','C','D'];
  const weekdays = ['日','月','火','水','木','金','土'];
  
  const y = dateParam.slice(0,4);
  const m = dateParam.slice(4,6);
  const d = dateParam.slice(6,8);
  const dt = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
  const displayDate = y + '年' + parseInt(m) + '月' + parseInt(d) + '日（' + weekdays[dt.getDay()] + '）';
  
  if (!ids) {
    document.getElementById('app').innerHTML = `
      <div class="hero"><div class="hero-title">🏥 回答・解説</div></div>
      <div class="error-box">
        <div style="font-size:40px;margin-bottom:16px;">📅</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:8px;">${displayDate}の問題は見つかりませんでした</div>
        <div style="font-size:13px;color:#9aa0a6;">土日・祝日はクイズをお休みしています</div>
      </div>
    `;
    return;
  }
  
  const cards = ids.map((id, idx) => {
    const q = QUESTIONS[String(id)];
    if (!q) return '';
    const choices = q.c.map((c, i) => {
      const isCorrect = i === q.a;
      return `<div class="choice${isCorrect ? ' correct' : ''}">
        <div class="choice-label">${labels[i]}</div>
        <span>${c}</span>
      </div>`;
    }).join('');
    return `<div class="card">
      <div class="q-header">
        <span class="q-number">問題 ${idx+1}</span>
        <span class="q-section">📂 ${q.section}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="choices">${choices}</div>
      <div class="explanation">💡 ${q.e}</div>
    </div>`;
  }).join('');
  
  document.getElementById('app').innerHTML = `
    <div class="hero">
      <div class="hero-title">🏥 今日のクイズ 回答・解説</div>
      <div class="hero-date">${displayDate}</div>
      <div class="hero-badge">医師紹介基礎知識 3問</div>
    </div>
    ${cards}
    <div style="text-align:center;padding:16px 0 8px;">
      <a class="app-btn" href="https://kojiyamaguchi-4029.github.io/connect-quiz/index.html?user=yamaguchi_koji">📚 クイズアプリで練習する</a>
    </div>
    <div class="footer">© CONNECT All Rights Reserved.</div>
  `;
}

render();
</script>
