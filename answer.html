ューレ（鈍針）は先端が丸く血管を傷つけにくいため、ヒアルロン酸注入の内出血リスク軽減に有効。", "s": "45. 美容皮膚科"}, "416": {"q": "大手美容クリニックとして正しい組み合わせはどれか？", "c": ["東大病院・慶應病院・順天堂病院", "湘南美容クリニック・品川美容外科・TCB", "徳洲会・IMS・TMG", "加藤レディスクリニック・英ウィメンズ・聖路加"], "a": 1, "e": "湘南美容（SBC）・品川美容外科・TCBが美容外科の大手3チェーン。", "s": "46. 美容外科"}, "417": {"q": "美容外科の代表的な施術3つとして正しいものはどれか？", "c": ["透析・内視鏡・白内障手術", "二重術・鼻整形・脂肪吸引", "分娩・帝王切開・人工授精", "ECT・TMS・催眠療法"], "a": 1, "e": "美容外科の3大術式は二重術・鼻整形・脂肪吸引。手術（メス）を使う点が特徴。", "s": "46. 美容外科"}, "418": {"q": "二重術の2種類として正しいものはどれか？", "c": ["切除法・剥離法", "埋没法・切開法", "縫合法・接着法", "注入法・照射法"], "a": 1, "e": "埋没法はダウンタイムが短い。切開法は半永久的で腫れが長い。", "s": "46. 美容外科"}, "419": {"q": "美容外科のリスクとして含まれないものはどれか？", "c": ["術後合併症・感染", "左右差・修正手術", "訴訟リスク", "毛周期による効果のばらつき"], "a": 3, "e": "毛周期は脱毛の話。美容外科リスクは合併症・感染・左右差・修正・訴訟など。", "s": "46. 美容外科"}, "420": {"q": "美容外科常勤医師の年収として正しいものはどれか？", "c": ["300〜500万円", "800〜1200万円", "勤務医2000〜3000万円・売上連動型は5000万円以上も", "10億円以上が標準"], "a": 2, "e": "美容外科は医師の中でも最高水準。売上連動型で青天井になる場合もある。", "s": "46. 美容外科"}, "421": {"q": "美容外科求人紹介で最初に確認すべき最重要ポイントはどれか？", "c": ["医師の出身大学", "現在どの施術を単独で執刀できるか", "勤務地の希望", "趣味・特技"], "a": 1, "e": "単独執刀できる術式の確認が最重要。技術レベルで紹介可能な求人が大きく変わる。", "s": "46. 美容外科"}, "422": {"q": "若手医師が美容外科転職で最も失敗しやすいポイントはどれか？", "c": ["給与が低すぎた", "症例が積めると思って入職したが執刀機会が少なかった", "クリニックの場所が遠かった", "スタッフとの関係が悪かった"], "a": 1, "e": "ブランドや提示年収だけで判断すると、実際の執刀機会が少なくミスマッチになりやすい。", "s": "46. 美容外科"}, "423": {"q": "若手美容外科医には大手と中小どちらが向いているか？", "c": ["中小クリニックの方が良い", "原則大手", "どちらも同じ", "大学病院が最も良い"], "a": 1, "e": "大手は症例数・指導体制が充実。中小は早期任用もあるが教育が不十分な場合がある。", "s": "46. 美容外科"}, "95040": {"q": "美容外科で「修正手術」が多い施術はどれか？", "c": ["脱毛", "二重手術・鼻手術など形態を変える施術", "ボトックス注入", "ピーリング"], "a": 1, "e": "二重手術・鼻整形などは患者の希望と結果のギャップが生じやすく修正手術の需要が高い。", "s": "46. 美容外科"}, "95041": {"q": "美容外科医のキャリアで「技術指導医」の役割はどれか？", "c": ["クリニックの経営を担当する", "若手医師に施術技術を直接指導する役割", "広告・SNSを担当する", "採用面接を担当する"], "a": 1, "e": "技術指導医は若手美容外科医の育成を担うポジション。給与・ポジション交渉のカードになりやすい。", "s": "46. 美容外科"}, "431": {"q": "医療脱毛とエステ脱毛の最大の違いはどれか？", "c": ["価格の違いのみ", "医療脱毛は高出力レーザー・エステは出力が低い光脱毛", "施術時間の違いのみ", "使用するクリームの違い"], 54": {"q": "「Magnificent 7（マグニフィセント・セブン）」に含まれる企業はどれ？", "c": ["IBM・Intel・Oracle等の旧世代IT", "Sony・Toyota・SoftBank等の日本企業", "Samsung・TSMC等の半導体企業", "Apple・Microsoft・Google・Amazon・Meta・Tesla・NVIDIA"], "a": 3, "e": "2023年以降の米国株式市場を牽引する7社。時価総額合計は日本株式市場全体を超える規模。", "s": "49. IT基礎知識"}, "455": {"q": "「API」とは何か？", "c": ["アプリ間でデータをやり取りする仕組み", "ウイルスを検出するソフト", "データを圧縮する技術", "ネットワークの速度を測る指標"], "a": 0, "e": "Application Programming Interface。異なるサービス同士が連携する際の窓口。", "s": "49. IT基礎知識"}, "456": {"q": "世界で最も使われているOSはどれ？（スマートフォン含む）", "c": ["Windows", "Android", "iOS", "Linux"], "a": 1, "e": "Androidが世界全体で約72%のシェア。スマホ市場の圧倒的多数。", "s": "49. IT基礎知識"}, "457": {"q": "「半導体」の世界最大の受託製造企業（ファウンドリ）は？", "c": ["Intel", "Samsung", "TSMC", "NVIDIA"], "a": 2, "e": "TSMC（台湾積体電路製造）。AppleやNVIDIAの半導体も製造。台湾の地政学的重要性の根拠。", "s": "49. IT基礎知識"}, "458": {"q": "Microsoftが約800億ドルで買収したゲーム企業は？", "c": ["EA", "Take-Two Interactive", "Ubisoft", "Activision Blizzard"], "a": 3, "e": "2023年完了。Microsoftのゲーム事業強化（Xbox・Game Pass）の大型買収。", "s": "49. IT基礎知識"}, "459": {"q": "「オープンソース」の説明として正しいのは？", "c": ["ソースコードが公開・改変可能なソフトウェア", "有料で提供されるソフトウェア", "クラウド専用のソフトウェア", "政府が管理するソフトウェア"], "a": 0, "e": "Linux・Pythonなどが代表例。MetaのLlamaもオープンソースのAIモデル。", "s": "49. IT基礎知識"}, "460": {"q": "「5G」の次世代規格として研究が進んでいるのは？", "c": ["4G LTE", "6G", "Wi-Fi 7", "WiMAX"], "a": 1, "e": "各国で2030年代の実用化を目指して研究中。日本・韓国・中国・米国が開発競争。", "s": "49. IT基礎知識"}, "461": {"q": "ChatGPTを開発した企業は？", "c": ["OpenAI", "Google", "Microsoft", "Meta"], "a": 0, "e": "OpenAI社が開発。2022年11月リリース後、史上最速で1億ユーザー達成。", "s": "50. AI・機械学習"}, "462": {"q": "OpenAIの最大出資者（約49%）はどこ？", "c": ["Apple", "Microsoft", "Amazon", "SoftBank"], "a": 1, "e": "MicrosoftがOpenAIに累計約130億ドルを投資。Copilot等に技術を組み込んでいる。", "s": "50. AI・機械学習"}, "463": {"q": "Anthropic（Claude開発元）の主要投資企業として正しいのは？", "c": ["Microsoft・Meta", "Apple・Netflix", "Google・Amazon", "SoftBank・Alibaba"], "a": 2, "e": "GoogleとAmazonがそれぞれ数十億ドルを投資。OpenAIへのMicrosoftの対抗馬として注目。", "s": "50. AI・機械学習"}, "464": {"q": "「LLM」とは何の略？", "c": ["Low Level Machine", "Linear Learning ication。知識・所持・生体の複数要素を組み合わせてセキュリティ強化。", "s": "51. サイバーセキュリティ"}, "475": {"q": "「DDoS攻撃」とは何か？", "c": ["データベースを不正操作する攻撃", "社員を騙して情報を聞き出す攻撃", "標的に大量アクセスを送りサービスを停止させる攻撃", "メールで悪意あるリンクを送る攻撃"], "a": 2, "e": "Distributed Denial of Service。多数のPCから一斉攻撃。ECサイトや病院システムも標的に。", "s": "51. サイバーセキュリティ"}, "476": {"q": "個人情報保護に関する日本の法律は？", "c": ["電子署名法", "不正アクセス禁止法", "不正競争防止法", "個人情報の保護に関する法律"], "a": 3, "e": "医療機関も当然適用対象。患者情報の適切な管理が義務。2022年に大幅改正。", "s": "51. サイバーセキュリティ"}, "477": {"q": "「エンドポイントセキュリティ」とは何を守るもの？", "c": ["サーバールーム", "インターネットの出入口", "PC・スマホ等の端末", "データセンター"], "a": 2, "e": "Endpoint（末端機器）のセキュリティ。テレワーク普及で重要性が増した分野。", "s": "51. サイバーセキュリティ"}, "478": {"q": "世界最大規模の個人情報流出事件を起こした企業は？（約30億件）", "c": ["Facebook", "LinkedIn", "Twitter", "Yahoo!"], "a": 3, "e": "2013〜2014年のYahoo!流出。全ユーザー（約30億人）分のアカウント情報が対象。", "s": "51. サイバーセキュリティ"}, "479": {"q": "サイバーセキュリティ市場でトップクラスの米国企業はどれ？", "c": ["Crowdstrike", "Zoom", "Slack", "Dropbox"], "a": 0, "e": "CrowdStrike。Falconプラットフォームが主力。2024年のアップデート障害で世界的に注目。", "s": "51. サイバーセキュリティ"}, "480": {"q": "日本でサイバーセキュリティ戦略を担う政府機関は？", "c": ["経済産業省", "内閣サイバーセキュリティセンター", "総務省", "警察庁"], "a": 1, "e": "NISC（National center of Incident readiness and Strategy for Cybersecurity）。2015年設立。", "s": "51. サイバーセキュリティ"}, "481": {"q": "「DX（デジタルトランスフォーメーション）」の提唱者として知られる研究者は？", "c": ["マイケル・ポーター", "ピーター・ドラッカー", "エリック・ストルターマン", "クレイトン・クリステンセン"], "a": 2, "e": "スウェーデンのウメオ大学教授。2004年に概念を提唱。単なるIT化ではなくビジネス変革が本質。", "s": "52. DX（デジタルトランスフォーメーション）"}, "482": {"q": "日本政府が警告した「2025年の崖」とは？", "c": ["少子化による労働力不足", "老朽化した基幹システムの刷新遅れによる経済損失", "財政赤字の拡大", "地方銀行の統廃合問題"], "a": 1, "e": "経産省が2018年に発表。年間最大12兆円の損失リスク。レガシーシステム刷新が急務。", "s": "52. DX（デジタルトランスフォーメーション）"}, "483": {"q": "医療DXとして日本で推進されている取り組みはどれ？", "c": ["病院の完全無人化", "AIによる手術の自動化", "マイナンバーカードと保険証の統合", "ロボットによる全診療"], "a": 2, "e": "マイナ保険証。電子処方箋・電子カルテ標準化も医療DXの柱。政府が2023年から本格推進。", "s": "52. DX（デジタルトランスフォーメーション）"}, "484": {"q": "「レガシーシステム」とは何か？", "c": ["最新のクラウドシステム", "海外製のソフトウェア", "オープンソースのシステム", "老朽化・複雑化した既存の情報システム"], "a": 3, "e": "企業内に長年存在する古いシステム。改修が難しく、D 務モデル", "議事録"], "a": 0, "e": "「デッキを作る」がコンサルの仕事の核心。スライド1枚にメッセージを明確に伝える技術が重要。", "s": "56. コンサルティング"}, "526": {"q": "マッキンゼーが提唱した「7Sフレームワーク」に含まれないのは？", "c": ["Strategy", "Sales", "Structure", "Skills"], "a": 1, "e": "7S = Strategy・Structure・Systems・Staff・Skills・Style・Shared Values。Salesは含まれない。", "s": "56. コンサルティング"}, "527": {"q": "「PMP」とは何の資格か？", "c": ["個人情報保護士", "公認会計士の米国版", "プロジェクトマネジメントの国際資格", "ITセキュリティの資格"], "a": 2, "e": "Project Management Professional。PMI（米国）が認定する国際資格。コンサル・IT業界で評価高い。", "s": "56. コンサルティング"}, "528": {"q": "「ITコンサルタント」と「戦略コンサルタント」の主な違いは？", "c": ["給与水準", "勤務時間", "出張の多さ", "扱う課題の性質"], "a": 3, "e": "戦略コンサルは経営課題を扱い、ITコンサルはシステム導入・DX支援が主。最近は融合傾向。", "s": "56. コンサルティング"}, "529": {"q": "コンサルティング業界の日本市場規模（2023年頃）はおよそ？", "c": ["約1兆円", "約500億円", "約3,000億円", "約5兆円"], "a": 0, "e": "約1兆円規模で拡大中。デジタル・DX需要が急増。外資系・国内系ともに採用を拡大。", "s": "56. コンサルティング"}, "530": {"q": "「ロジックツリー」の説明として正しいのは？", "c": ["収益構造を樹形図で示したもの", "問題・課題を階層的に分解して整理するフレームワーク", "組織の指揮命令系統図", "サプライチェーンの流れ図"], "a": 1, "e": "Why（原因）・What（要素）・How（手段）の3種類がある。MECEと組み合わせて使う。", "s": "56. コンサルティング"}, "531": {"q": "日本の「三大メガバンク」として正しいのは？", "c": ["みずほ・三菱UFJ・三井住友", "りそな・ゆうちょ・農林中金", "新生銀行・あおぞら・SBI", "横浜・千葉・静岡銀行"], "a": 0, "e": "三菱UFJ・三井住友・みずほの3グループ。いずれも世界でも上位の資産規模を持つ。", "s": "57. 金融・銀行"}, "532": {"q": "「投資銀行」の主な業務として正しいのは？", "c": ["個人向けローン・預金", "M&A仲介・株式引受・資金調達支援", "ATMの運営", "住宅ローンの審査"], "a": 1, "e": "企業の上場・M&Aを支援。ゴールドマン・サックス、JPモルガン等が世界的な投資銀行。", "s": "57. 金融・銀行"}, "533": {"q": "世界最大の資産運用会社はどこ？", "c": ["ゴールドマン・サックス", "JPモルガン", "ブラックロック", "バンガード"], "a": 2, "e": "ブラックロック（BlackRock）。運用資産約10兆ドル（約1,500兆円）。ETFのiSharesが有名。", "s": "57. 金融・銀行"}, "534": {"q": "「フィンテック（FinTech）」の説明として正しいのは？", "c": ["金融機関向けのIT機器", "証券取引の規制", "銀行の店舗システム", "金融とテクノロジーを融合した革新的サービス"], "a": 3, "e": "Finance＋Technology。スマホ決済（PayPay等）・ネット銀行・仮想通貨も含む。", "s": "57. 金融・銀行"}, "535": {"q": "日本銀行（日銀）の主な役割として正しいのは？", "c": ["通貨の発行・金融政策の実施", "個人向け融資", "税金の徴収", "株式市場の監視"], "a": 0, "e": "中央銀行。政策金利（0金利・マイナス金利）の設定、国債の売買、物価安定が主な役割。", "s": "57. 金融・銀行"}, "536": {"q": "「ROE」とは何を示す指標か？", "c": ["売上高利益率", "自己資本利益率", "総資産回転率", "負債比率"], "a": 1, "e": "Return on Equity。株主から預かったお金でどれだけ稼いだか。日本企業はROE改善が課題とされてきた。", "s": "57. 金融・銀行"}, "537": {"q": "「ゼロ金利政策」を長期間実施してきた国はどこ？", "c": ["米国", "中国", "日本", "ドイツ"], "a": 2, "e": "日銀が1999年から断続的に実施。2024年3月にマイナス金利を解除し、利上げ方向に転換。", "s": "57. 金融・銀行"}, "538": {"q": "世界最大の証券取引所はどれ？（時価総額ベース）", "c": ["東京証券取引所", "ロンドン証券取引所", "NASDAQ", "NYSE"], "a": 3, "e": "NYSE（ニューヨーク証券取引所）。時価総額は約25兆ドル超。NASDAQはテック企業が中心。", "s": "57. 金融・銀行"}, "539": {"q": "「SWIFT」とは何か？", "c": ["国際的な銀行間送金のメッセージシステム", "世界最大の送金アプリ", "米国の中央銀行", "暗号通貨の取引所"], "a": 0, "e": "Society for Worldwide Interbank Financial Telecommunication。各国の銀行が国際送金に利用。ロシアは制裁で排除。", "s": "57. 金融・銀行"}, "540": {"q": "「マイクロファイナンス」の説明として正しいのは？", "c": ["超大企業向けの大規模融資", "銀行口座を持てない低所得者向けの小口融資", "マイクロソフト系の金融サービス", "高金利の消費者ローン"], "a": 1, "e": "バングラデシュのグラミン銀行が有名。途上国の貧困削減・SDGsとも深く関連する。", "s": "57. 金融・銀行"}, "541": {"q": "世界のGDP（名目）ランキング1位〜3位の正しい順番は（2024年）？", "c": ["中国・米国・インド", "米国・EU・中国", "米国・中国・ドイツ", "米国・中国・日本"], "a": 2, "e": "2023〜24年に日本は4位に後退しドイツが3位に。1位米国・2位中国・3位ドイツ・4位日本・5位インド。", "s": "58. 株式・投資"}, "542": {"q": "「PER」とは何を示す株価指標か？", "c": ["株価を1株当たり純資産で割った値", "株価を1株当たり利益で割った値", "配当金を株価で割った値", "時価総額を売上高で割った値"], "a": 1, "e": "Price Earnings Ratio（株価収益率）。PERが低いほど割安とされるが業種による差異も大きい。", "s": "58. 株式・投資"}, "543": {"q": "「インデックス投資」の説明として正しいのは？", "c": ["個別株を厳選して投資する手法", "不動産に特化した投資", "市場全体に連動することを目指す投資手法", "為替差益を狙う投資"], "a": 2, "e": "S&P500・日経225などの指数に連動するETFや投信。低コストで分散投資でき長期積立に向く。", "s": "58. 株式・投資"}, "544": {"q": "「NISA」の説明として正しいのは？", "c": ["法人向けの税制優遇投資制度", "不動産投資信託の制度", "年金積立制度", "個人向けの少額投資非課税制度"], "a": 3, "e": "2024年から新NISAが開始。年間360万円・生涯1,800万円まで非課税。政府の資産形成支援策。", "s": "58. 株式・投資"}, "545": {"q": "「S&P500」に含まれる企業数は？", "c": ["500社", "30社", "100社", "225社"], "a": 0, "e": "米国代表500社。Apple・Microsoft・NVIDIAなどが上位。世界最も注目される株価指数のひとつ。", "s": "58. 株式・投資"}, "546": {"q": "日経平均株価が史上最高値を更新したのはいつ？", "c": ["2020年", "2024年", "2022年", "1989年のまま更新していない"], "a": 1, "e": "2024年2〜3月に約34年ぶりに更新（約4万円台）。バブル期（1989年末）以来の高値。", "s": "58. 株式・投資"}, "547": {"q": "「IPO」とは何か？", "c": ["企業が他社を買収すること", "株式を非公開にすること", "未公開企業が株式市場に新規上場すること", "倒産・廃業手続き"], "a": 2, "e": "Initial Public Offering（新規株式公開）。上場で資金調達し知名度も上がる。スタートアップの目標のひとつ。", "s": "58. 株式・投資"}, "548": {"q": "バフェットが実践する投資哲学として正しいのは？", "c": ["短期の値動きで売買するデイトレード", "先物・オプションを活用したヘッジ", "不動産と株を半々で持つ", "割安で優良な企業に長期投資するバリュー投資"], "a": 3, "e": "バリュー投資。「10年保有できない株は10分も持つな」という言葉が有名。日本の商社株にも大量投資。", "s": "58. 株式・投資"}, "549": {"q": "「ESG投資」のESGが示す3要素は？", "c": ["Environment・Social・Governance", "Economy・Society・Government", "Equity・Security・Growth", "Energy・Sustainability・Global"], "a": 0, "e": "環境・社会・ガバナンス。財務情報だけでなく非財務情報も考慮した投資手法。機関投資家に広がる。", "s": "58. 株式・投資"}, "550": {"q": "「ヘッジファンド」の特徴として正しいのは？", "c": ["元本保証の安全な投資", "規制が少なく多様な手法で高リターンを狙うファンド", "国が運営する年金ファンド", "個人向けの積立投資信託"], "a": 1, "e": "富裕層・機関投資家向け。空売り・レバレッジ等を駆使。運用報酬「2＆20」（管理報酬2%＋成功報酬20%）が多い。", "s": "58. 株式・投資"}, "551": {"q": "財務三表として正しい組み合わせは？", "c": ["事業計画書・予算書・実績報告書", "株主総会資料・有価証券報告書・監査報告書", "損益計算書・貸借対照表・キャッシュフロー計算書", "売上報告書・経費精算書・税務申告書"], "a": 2, "e": "PL（損益）・BS（貸借）・CF（キャッシュフロー）の3つ。経営の全体像を掴む必須知識。", "s": "59. 会計・財務"}, "552": {"q": "「営業利益」の計算式として正しいのは？", "c": ["売上高 − 売上原価", "売上総利益 − 販管費", "経常利益 − 特別損失", "純利益 + 減価償却費"], "a": 1, "e": "売上高 → 売上総利益（粗利）→ 営業利益 → 経常利益 → 純利益の順に差し引かれる。", "s": "59. 会計・財務"}, "553": {"q": "「ROA」とは何を示す指標か？", "c": ["自己資本利益率", "投資収益率", "総資産利益率", "売上高利益率"], "a": 2, "e": "Return on Assets（総資産利益率）。会社全体の資産をどれだけ効率的に使って稼いだかを示す。", "s": "59. 会計・財務"}, "554": {"q": "「EBITDA」に含まれないのはどれ？", "c": ["税引前利益", "支払利息", "減価償却費", "配当金"], "a": 3, "e": "EBITDA = Earnings Before Interest, Taxes, Depreciation and Amortization。配当金は含まない。M&A評価などに使われる。", "s": "59. 会計・財務"}, "555": {"q": "「減価償却」の説明として正しいのは？", "c": ["固定資産の取得費用を耐用年数にわたり費用計上すること", "不良在庫を廃棄すること", "借入金の返済", "売掛金の回収"], "a": 0, "e": "Depreciation。建物・設備・車等の固定資産を毎年少しずつ費用として計上する会計処理。", "s": "59. 会計・財務"}, "556": {"q": "「損益分岐点」とは何か？", "c": ["利益が最大になる売上高", "売上高と総費用が等しくなる点", "赤字から黒字に転換する株価", "税金が発生し始める所得水準"], "a": 1, "e": "Break Even Point。固定費÷（1-変動費率）で計算。経営分析の基本指標。", "s": "59. 会計・財務"}, "557": {"q": "「のれん（Goodwill）」とは何か？", "c": ["建物や設備などの有形固定資産", "特許や商標などの知的財産", "M&Aで支払った買収価格と純資産の差額", "長期借入金"], "a": 2, "e": "買収プレミアムの会計上の処理。日本基準では20年以内に償却。IFRSでは減損テスト方式。", "s": "59. 会計・財務"}, "558": {"q": "キャッシュフロー計算書の3区分として正しいのは？", "c": ["収益・費用・資本", "短期・中期・長期", "国内・海外・グループ", "営業・投資・財務"], "a": 3, "e": "営業CF（本業）・投資CF（設備投資等）・財務CF（借入・返済等）の3区分。本業のCFが重要。", "s": "59. 会計・財務"}, "559": {"q": "日本の会計基準として上場企業が使用できるのはどれ？", "c": ["J-GAAP・IFRS・US-GAAP", "J-GAAPのみ", "IFRSのみ", "US-GAAPのみ"], "a": 0, "e": "日本基準（J-GAAP）のほか、IFRS（国際財務報告基準）とUS-GAAPも上場企業は選択可能。", "s": "59. 会計・財務"}, "560": {"q": "「運転資本（WC）」の計算式として正しいのは？", "c": ["固定資産 − 固定負債", "流動資産 − 流動負債", "売上高 − 変動費", "純資産 − 負債"], "a": 1, "e": "Working Capital。短期的な支払い能力を示す。WCがマイナスだと資金繰りが危険なサイン。", "s": "59. 会計・財務"}, "561": {"q": "世界のGDP（名目）ランキング（2024年）として正しい順は？", "c": ["米国・中国・ドイツ・日本・インド・英国・フランス", "米国・中国・日本・インド・ドイツ・英国・仏国", "中国・米国・インド・ドイツ・日本・英国・仏国", "米国・EU・中国・インド・日本・英国・仏国"], "a": 0, "e": "1位米・2位中・3位独・4位日・5位印・6位英・7位仏。日本は2023年にドイツに抜かれ4位に後退。", "s": "60. 経済指標"}, "562": {"q": "「CPI（消費者物価指数）」が示すものは？", "c": ["企業の生産コストの変化", "一般消費者が購入する商品・サービスの価格変動", "株式市場の値動き", "貿易収支の変化"], "a": 1, "e": "Consumer Price Index。インフレの代表的指標。日銀の2%インフレ目標もCPIを基準に設定。", "s": "60. 経済指標"}, "563": {"q": "「GDP成長率」がマイナス2四半期連続となった状態を何という？", "c": ["スタグフレーション", "デフレスパイラル", "リセッション", "ハイパーインフレ"], "a": 2, "e": "Recession（景気後退）。2四半期連続マイナスが一般的な定義。日本も複数回経験している。", "s": "60. 経済指標"}, "564": {"q": "「PPP（購買力平価）」ベースのGDP世界1位はどこ（2024年）？", "c": ["米国", "欧州連合", "インド", "中国"], "a": 3, "e": "物価差を調整したPPPベースでは中国が首位。名目GDPでは米国が依然トップ。", "s": "60. 経済指標"}, "565": {"q": "「貿易収支」が黒字とはどういう状態か？", "c": ["輸出額が輸入額を上回っている", "輸入額が輸出額を上回っている", "外国為替が円高になっている", "経常収支が赤字の状態"], "a": 0, "e": "輸出＞輸入の状態。日本は資源輸入増加でかつての貿易黒字国から赤字傾向に転換している。", "s": "60. 経済指標"}, "566": {"q": "インドのGDP成長率（2023〜24年）はおよそ何%か？", "c": ["約1%", "約6〜7%", "約3%", "約10%以上"], "a": 1, "e": "世界最大規模の高成長。G7の先進国（1〜3%）を大きく上回る。2030年代には世界3位経済大国になるとも。", "s": "60. 経済指標"}, "567": {"q": "日本の国債残高（2024年）はおよそいくらか？", "c": ["約300兆円", "約600兆円", "約1,300兆円", "約1,000兆円"], "a": 2, "e": "約1,300兆円超。GDP比で約260%と先進国最悪水準。財政再建が長年の課題。", "s": "60. 経済指標"}, "568": {"q": "「円安」が日本経済に与える主なメリットはどれ？", "c": ["輸入品が安くなる", "海外旅行が安くなる", "物価が下がる", "輸出企業の収益が増加する"], "a": 3, "e": "円安だとトヨタ等の輸出企業の円換算収益が増える。一方で輸入物価上昇というデメリットもある。", "s": "60. 経済指標"}, "569": {"q": "「ビッグマック指数」とは何か？", "c": ["各国のビッグマック価格で通貨の購買力を比較する指標", "マクドナルドの世界売上ランキング", "食品インフレの国際比較指標", "米国の外食産業の景気指標"], "a": 0, "e": "英エコノミスト誌が発表。同一製品の各国価格を比べて為替の割高・割安を判断する指標。", "s": "60. 経済指標"}, "570": {"q": "「スタグフレーション」とは何か？", "c": ["高成長・高インフレの状態", "景気停滞とインフレが同時進行する状態", "急激なデフレと景気拡大が重なる状態", "金利ゼロとデフレが続く状態"], "a": 1, "e": "Stagflation = Stagnation＋Inflation。1970年代の石油ショック時に顕在化。対処が難しい経済状態。", "s": "60. 経済指標"}, "571": {"q": "「4P」のマーケティングミックスに含まれないのは？", "c": ["People", "Product", "Price", "Place"], "a": 0, "e": "4P = Product・Price・Place・Promotion。「People」は4Pではなく、サービスマーケの7Pに含まれる要素。", "s": "61. マーケティング"}, "572": {"q": "「NPS（ネットプロモータースコア）」が測定するものは？", "c": ["広告のクリック率", "顧客が他者に製品を薦める可能性", "従業員の満足度", "売上の前年比"], "a": 1, "e": "Net Promoter Score。「この会社を友人・同僚に薦めますか？」の0〜10点回答で算出。Apple・Amazonが高スコア。", "s": "61. マーケティング"}, "573": {"q": "「STP」のマーケティング戦略に含まれないのは？", "c": ["Segmentation", "Targeting", "Promotion", "Positioning"], "a": 2, "e": "STP = Segmentation・Targeting・Positioning。Promotionは4Pの要素。フィリップ・コトラーが提唱。", "s": "61. マーケティング"}, "574": {"q": "「コンテンツマーケティング」の説明として正しいのは？", "c": ["テレビCMによる大量告知", "展示会・イベントでの営業", "価格を下げて販売量を増やす手法", "有益なコンテンツを提供して顧客を引き寄せる手法"], "a": 3, "e": "ブログ・動画・SNS等で価値ある情報を提供し見込み顧客を獲得するインバウンド手法。", "s": "61. マーケティング"}, "575": {"q": "「カスタマージャーニー」とは何か？", "c": ["顧客が製品を知ってから購入・利用するまでの体験の流れ", "営業担当者の商談プロセス", "顧客が海外に行くこと", "CRMシステムの名称"], "a": 0, "e": "認知→興味→検討→購入→継続→推奨の流れ。各タッチポイントでの体験を設計する。", "s": "61. マーケティング"}, "576": {"q": "デジタルマーケティングの指標「CVR」とは何か？", "c": ["総広告費用", "サイト訪問者のうち購入・申込に至った割合", "動画の再生回数", "SNSのフォロワー増加数"], "a": 1, "e": "Conversion Rate。CVR改善はWebマーケの基本課題。ランディングページ最適化（LPO）等で向上を図る。", "s": "61. マーケティング"}, "577": {"q": "「ABMマーケティング」の説明として正しいのは？", "c": ["全ての顧客に同じアプローチをする手法", "AIによる自動化マーケティング", "特定の高価値企業を狙い打ちにしたBtoBマーケティング手法", "海外市場向けの広告手法"], "a": 2, "e": "Account Based Marketing。BtoB特有の手法。大口顧客候補を選定し、カスタマイズした施策を展開。", "s": "61. マーケティング"}, "578": {"q": "「インフルエンサーマーケティング」として正しいのは？", "c": ["有名人をCMに起用するテレビ広告", "検索エンジンへの広告出稿", "メールマガジンによる告知", "SNSで影響力を持つ人物を通じた製品PRや口コミ促進"], "a": 3, "e": "フォロワーを持つSNS発信者に製品を紹介してもらう手法。費用対効果が高い場合が多い。", "s": "61. マーケティング"}, "579": {"q": "医療業界でのマーケティング規制として正しいのは？", "c": ["医薬品・医療機器の広告は薬機法により厳しく規制されている", "特に規制はない", "医師免許があれば自由に広告できる", "患者向け広告は全面禁止"], "a": 0, "e": "薬機法（医薬品医療機器等法）。効能の誇大表現・比較広告等が禁止。医療機関の広告も規制あり。", "s": "61. マーケティング"}, "580": {"q": "「ROAS」とは何か？", "c": ["顧客生涯価値", "市場シェアの変化率", "SNSの投稿頻度指標", "広告費用対効果"], "a": 3, "e": "Return On Advertising Spend。広告1円あたり何円の売上を生んだかを示す。ROASが高いほど広告効率が良い。", "s": "61. マーケティング"}, "581": {"q": "「BANT」とは営業における何のフレームワークか？", "c": ["見込み客の評価基準", "プレゼンの構成手法", "交渉での心理テクニック", "契約書の確認項目"], "a": 0, "e": "Budget・Authority・Need・Timeline。この4要素を確認して見込み度を判断する営業の基本フレームワーク。", "s": "62. 営業・交渉術"}, "582": {"q": "「ソリューション営業」の説明として正しいのは？", "c": ["製品のスペックを説明する営業", "顧客の課題を解決する提案を行う営業スタイル", "価格を最優先にした値引き営業", "既存顧客への深耕営業のみ"], "a": 1, "e": "課題解決型営業。製品説明中心の「モノ売り」から、課題ヒアリング→提案→解決の「コト売り」へ。", "s": "62. 営業・交渉術"}, "583": {"q": "「SPIN営業」のSPINが示す4要素は？", "c": ["Speed・Price・Image・Network", "Sales・Plan・Insight・Negotiation", "Situation・Problem・Implication・Need-payoff", "Strategy・Position・Influence・Number"], "a": 2, "e": "状況質問→問題質問→示唆質問→解決策質問の順に進める。高額・複雑商材の営業に効果的。", "s": "62. 営業・交渉術"}, "584": {"q": "交渉で「BATNA」とは何か？", "c": ["最高の条件を引き出す交渉術", "相手を説得するための心理テクニック", "交渉の議事録", "交渉が決裂した場合の最善の代替案"], "a": 3, "e": "Best Alternative To a Negotiated Agreement。BATNAが強いほど交渉力が上がる。ハーバード交渉術の核心概念。", "s": "62. 営業・交渉術"}, "585": {"q": "「クロージング」とは営業において何を指す？", "c": ["契約・購入の合意を取り付ける最終段階", "顧客との初回接触", "提案書の作成", "競合との差別化説明"], "a": 0, "e": "営業の最終ステップ。「いつから始めますか？」など具体的な行動を促すクロージング質問が重要。", "s": "62. 営業・交渉術"}, "586": {"q": "「アップセル」と「クロスセル」の違いとして正しいのは？", "c": ["同じ意味", "アップセルは上位製品提案・クロスセルは関連製品提案", "アップセルは値下げ・クロスセルは値上げ", "アップセルは新規・クロスセルは既存顧客向け"], "a": 1, "e": "アップセル＝より高い商品へ誘導、クロスセル＝関連商品を追加提案。既存顧客への売上拡大の基本。", "s": "62. 営業・交渉術"}, "587": {"q": "医師紹介営業において最も重要な関係者（キーパーソン）はどれか？", "c": ["病院の清掃スタッフ", "病院の患者", "事務長・院長・診療科長など意思決定者", "薬剤師"], "a": 2, "e": "医療機関での決裁は院長・副院長・事務長・診療科長が主なキーパーソン。組織の意思決定構造を理解することが重要。", "s": "62. 営業・交渉術"}, "588": {"q": "「失注分析」で最も重要な理由はどれか？", "c": ["競合他社の悪口を言うため", "上司への言い訳をまとめるため", "顧客の個人情報を記録するため", "次の商談に活かす改善点を見つけるため"], "a": 3, "e": "失注の原因を分析することで提案・アプローチ・タイミングの改善につながる。成長の宝庫。", "s": "62. 営業・交渉術"}, "589": {"q": "「インサイドセールス」の説明として正しいのは？", "c": ["代理店を通じた間接営業", "展示会での営業活動", "電話・メール・オンラインで行う非訪問型営業", "社内向けの研修担当者"], "a": 2, "e": "Inside（内勤）Sales。コロナ以降急増。フィールドセールス（訪問）と役割分担して効率化する。", "s": "62. 営業・交渉術"}, "590": {"q": "「パレートの法則（80:20の法則）」とは営業においてどういう意味か？", "c": ["80%の見込み客は20%のキーパーソンで決まる", "売上の80%は顧客全体の20%から生まれる", "商談成功率は80%が最初の20分で決まる", "80%の営業は20%の努力で達成できる"], "a": 1, "e": "上位20%の顧客が売上の80%を占める経験則。重点顧客を特定して集中的にアプローチする戦略の根拠。", "s": "62. 営業・交渉術"}, "591": {"q": "「MECE」とは何か？", "c": ["会議の進め方の手法", "財務分析のフレームワーク", "漏れなく・重複なく物事を整理する考え方", "市場・環境・競合・評価の略語"], "a": 2, "e": "Mutually Exclusive, Collectively Exhaustive。マッキンゼーが広めた。ロジカルシンキングの基本原則。", "s": "63. ロジカルシンキング"}, "592": {"q": "「演繹法」の説明として正しいのは？", "c": ["複数の具体例から一般原則を導く", "一般的なルールを前提に結論を導く", "データを統計的に分析する", "感覚的に判断する"], "a": 1, "e": "三段論法が代表例（人間は死ぬ→ソクラテスは人間→ゆえに死ぬ）。前提が正しければ結論も正しい。", "s": "63. ロジカルシンキング"}, "593": {"q": "「帰納法」の説明として正しいのは？", "c": ["一般原則から結論を導く", "数式を用いて証明する", "複数の具体的事実から共通原則を導き出す", "AIが自動で分析する"], "a": 2, "e": "多くの事例を観察して一般的な法則を導く。科学的調査に多用。ただし反例があると崩れる弱点も。", "s": "63. ロジカルシンキング"}, "594": {"q": "「ピラミッドストラクチャー」とは何か？", "c": ["階層的な組織図", "価格設定のフレームワーク", "マーケティングの4P", "結論を頂点に根拠を積み上げる論理構造"], "a": 3, "e": "バーバラ・ミント（マッキンゼー）が考案。「結論→理由→根拠」の順で伝える「So What」の構造。", "s": "63. ロジカルシンキング"}, "595": {"q": "「相関関係」と「因果関係」の違いとして正しいのは？", "c": ["相関は一緒に動く関係・因果は原因と結果の関係", "同じ意味", "相関は定量・因果は定性的", "因果関係があれば必ず相関する"], "a": 0, "e": "「アイスが売れると水難事故が増える」は相関だが因果ではない（共通原因は夏の暑さ）。", "s": "63. ロジカルシンキング"}, "596": {"q": "「仮説思考」の説明として正しいのは？", "c": ["全データを集めてから分析する", "仮の結論を先に立て検証しながら進める", "直感だけで判断する", "過去の成功事例を踏襲する"], "a": 1, "e": "コンサルの基本思考。全情報を集める前に仮説を立て、効率的に検証・修正を繰り返す。", "s": "63. ロジカルシンキング"}, "597": {"q": "「So What?（だから何？）」はロジカルシンキングで何を問う？", "c": ["情報の正確さ", "費用対効果", "情報・事実から導かれる結論・示唆", "データの出典"], "a": 2, "e": "事実の羅列で終わらず「だから何が言えるか」を常に問う姿勢。コンサル的思考の核心。", "s": "63. ロジカルシンキング"}, "598": {"q": "「イシュー」とは何か？", "c": ["会議のアジェンダ", "顧客からのクレーム", "財務上の問題", "本当に答えるべき本質的な問い・課題"], "a": 3, "e": "安宅和人氏「イシューからはじめよ」でも有名。問題解決の前に、本当に解くべき問いを特定することが重要。", "s": "63. ロジカルシンキング"}, "599": {"q": "「クリティカルシンキング」の説明として正しいのは？", "c": ["情報や主張を客観的・論理的に吟味・評価する思考", "相手を批判する思考法", "ネガティブな結果を想定する思考", "スピード重視の直感的判断"], "a": 0, "e": "批判的思考（批判≠否定）。「本当にそうか？」「根拠は何か？」と問い続ける態度。AIの時代に特に重要。", "s": "63. ロジカルシンキング"}, "600": {"q": "「ゼロベース思考」の説明として正しいのは？", "c": ["過去の成功体験を最大限活用する", "既存の前提・慣習を取り払い根本から考える", "コストをゼロにすることを目指す", "リスクを排除した保守的な判断"], "a": 1, "e": "「なぜこのやり方なのか？」と根本から問い直す。DXやビジネス改革に欠かせない思考法。", "s": "63. ロジカルシンキング"}, "601": {"q": "「WBS（Work Breakdown Structure）」とは何か？", "c": ["プロジェクトの作業を階層的に分解した構造図", "週次の業績報告書", "予算配分の計画書", "リスク管理のチェックリスト"], "a": 0, "e": "プロジェクトを細かいタスクに分解し可視化するツール。タスクの漏れ防止と担当割当に使う。", "s": "64. プロジェクト管理"}, "602": {"q": "「アジャイル開発」の代表的な手法はどれ？", "c": ["ウォーターフォール", "スクラム", "PMBOK", "PERT"], "a": 1, "e": "Scrum（スクラム）。スプリント（短期サイクル）・デイリースタンドアップ・レトロスペクティブが特徴。", "s": "64. プロジェクト管理"}, "603": {"q": "「クリティカルパス」とは何か？", "c": ["プロジェクトで最も費用がかかる工程", "最も重要なステークホルダー", "遅延するとプロジェクト全体が遅れる最長経路", "リスクが最も高いタスク"], "a": 2, "e": "Critical Path。この経路上のタスクが遅れると納期全体が遅れる。PM試験の頻出概念。", "s": "64. プロジェクト管理"}, "604": {"q": "「KPI（重要業績評価指標）」の説明として正しいのは？", "c": ["最終目標そのもの", "部門別の予算配分", "人事評価の基準", "目標達成度を測るための定量的な指標"], "a": 3, "e": "Key Performance Indicator。KGI（最終目標）を達成するための中間指標。数値で追える必要がある。", "s": "64. プロジェクト管理"}, "605": {"q": "「ガントチャート」とは何か？", "c": ["タスクと時間軸を組み合わせたスケジュール管理図", "組織の階層図", "コスト管理のグラフ", "リスク評価のマトリクス"], "a": 0, "e": "横軸が時間・縦軸がタスクのバーチャート。プロジェクト管理の最基本ツール。Excelやツールで作成可能。", "s": "64. プロジェクト管理"}, "606": {"q": "スクラム開発における「スプリント」とは何か？", "c": ["年間開発計画", "1〜4週間単位の短い開発サイクル", "バグ修正の作業", "リリース後のテスト期間"], "a": 1, "e": "Sprintは短期の反復開発単位。スプリントの終わりに成果物を出しフィードバックを受ける。", "s": "64. プロジェクト管理"}, "607": {"q": "「PMO（Project Management Office）」の役割として正しいのは？", "c": ["個々のプロジェクトを直接実行する", "財務管理専門の部署", "組織全体のプロジェクト管理を標準化・支援する部門", "IT開発専門のチーム"], "a": 2, "e": "PMOは個別プロジェクトのPMとは別に、PM手法の標準化・ガバナンス・支援を担う組織機能。", "s": "64. プロジェクト管理"}, "608": {"q": "「ステークホルダー」とは何か？", "c": ["株主のみ", "経営者と従業員のみ", "顧客と取引先のみ", "プロジェクトや事業に関係・影響を持つ全ての関係者"], "a": 3, "e": "Stakeholder。株主・顧客・従業員・地域社会・取引先など幅広い関係者。利害が異なることを前提に管理する。", "s": "64. プロジェクト管理"}, "609": {"q": "プロジェクトのリスク管理で「リスク移転」の具体例はどれ？", "c": ["保険に加入して損失リスクを移す", "リスクを無視する", "問題が起きてから対処する", "プロジェクトを中止する"], "a": 0, "e": "Risk Transfer。保険・外注・契約等でリスクを第三者に移転する戦略。リスク対応の4戦略のひとつ。", "s": "64. プロジェクト管理"}, "610": {"q": "「5W1H」のプロジェクト管理での活用として正しいのは？", "c": ["英語学習の基礎", "プロジェクトの目的・対象・期間・担当・方法を明確にする", "5回「なぜ」を繰り返す問題分析法", "5段階の品質評価基準"], "a": 1, "e": "Who・What・When・Where・Why・How。プロジェクト要件定義やタスク指示を明確にする基本フレーム。", "s": "64. プロジェクト管理"}, "611": {"q": "日本の人材紹介業の許可を出す機関はどこ？", "c": ["厚生労働省", "経済産業省", "総務省", "内閣府"], "a": 0, "e": "有料職業紹介事業者として厚生労働大臣の許可が必要。医師紹介業も同様（医療法人は除く）。", "s": "65. 人材・HR業界"}, "612": {"q": "「ヘッドハンティング」の説明として正しいのは？", "c": ["求人広告に応募してくる候補者を選ぶ", "企業が直接ターゲットを選定してスカウトする採用手法", "ハローワークを通じた採用", "新卒採用のこと"], "a": 1, "e": "Headhunting（エグゼクティブサーチ）。高い専門性・実績を持つ人材を直接アプローチして獲得する。", "s": "65. 人材・HR業界"}, "613": {"q": "日本の医師数（2022年頃）はおよそ何人か？", "c": ["約10万人", "約20万人", "約33万人", "約50万人"], "a": 2, "e": "約33万人（令和2年医師・歯科医師・薬剤師統計）。人口10万人あたり約270人。", "s": "65. 人材・HR業界"}, "614": {"q": "「エンゲージメント」とはHR用語で何を指す？", "c": ["婚約・結婚", "顧客との契約", "SNSの反応率", "従業員の組織への愛着・やる気・貢献意欲"], "a": 3, "e": "Employee Engagement。エンゲージメントが高いと生産性・定着率が上がることが各種調査で判明。", "s": "65. 人材・HR業界"}, "615": {"q": "「タレントマネジメント」の説明として正しいのは？", "c": ["社員の能力・スキルを戦略的に管理・育成・活用する取り組み", "芸能人のマネジメント", "採用コストの削減", "リストラ計画の立案"], "a": 0, "e": "Talent Management。人材データを活用し、適材適所・後継者育成・スキル開発を体系的に行う。", "s": "65. 人材・HR業界"}, "616": {"q": "「リファラル採用」の説明として正しいのは？", "c": ["ヘッドハンターを使った採用", "社員の紹介・推薦による採用", "新卒のみを対象とした採用", "海外人材の採用"], "a": 1, "e": "Referral（紹介）採用。採用コストが低く定着率も高い傾向。社員への紹介インセンティブ制度を設ける企業も多い。", "s": "65. 人材・HR業界"}, "617": {"q": "「人的資本経営」として正しいのは？", "c": ["人件費削減を最優先する経営", "AIで人材を代替する経営", "人材を資本と捉えて投資・育成する経営", "外部委託を中心とした経営"], "a": 2, "e": "2023年から上場企業に人的資本の情報開示が義務化。人材への投資が企業価値に直結するという考え方。", "s": "65. 人材・HR業界"}, "618": {"q": "日本の有効求人倍率（2024年頃）はおよそ何倍か？", "c": ["0.5倍", "1.0倍", "2.5倍", "1.2〜1.3倍"], "a": 3, "e": "1.2倍前後で推移。1倍を超えると求人数が求職者数を上回る売り手市場。医療・介護職は特に高い。", "s": "65. 人材・HR業界"}, "619": {"q": "「オンボーディング」とは何か？", "c": ["新入社員・中途入社者を組織に馴染ませる受け入れプロセス", "船に乗り込むこと", "海外赴任の準備", "退職者の引継ぎ"], "a": 0, "e": "On Boarding（乗船）が語源。初期定着・戦力化を加速するプロセス。早期離職防止に直結。", "s": "65. 人材・HR業界"}, "620": {"q": "医師の「フリーランス（スポット・非常勤）」需要が高まっている背景はどれ？", "c": ["医学部の閉鎖", "保険制度の廃止", "医師数の増加", "医師の働き方改革による病院の人件費削減と柔軟な雇用ニーズ"], "a": 3, "e": "2024年の医師働き方改革で残業規制が強化。病院は常勤だけでなく非常勤・スポットで柔軟にシフトを組む必要が増した。", "s": "65. 人材・HR業界"}, "621": {"q": "「コンプライアンス」の説明として正しいのは？", "c": ["顧客満足度の向上", "財務諸表の作成", "法令・社内規定・倫理を遵守すること", "競合他社に勝つための戦略"], "a": 2, "e": "Compliance（法令遵守）。法律だけでなく社会的倫理・企業の行動規範も含む広い概念。", "s": "66. 法律・コンプライアンス"}, "622": {"q": "「労働基準法」で定める法定労働時間（週）は？", "c": ["35時間", "40時間", "45時間", "60時間"], "a": 1, "e": "週40時間・1日8時間。36協定を結べば残業可能だが、医師は2024年から上限規制（年960時間等）が適用。", "s": "66. 法律・コンプライアンス"}, "623": {"q": "「独占禁止法」が禁止する行為として正しいのは？", "c": ["新規参入", "値引き販売", "カルテル・談合などの不正な競争制限", "広告宣伝"], "a": 2, "e": "公正取引委員会が監督。企業間の価格カルテル・入札談合・優越的地位の濫用等を規制。", "s": "66. 法律・コンプライアンス"}, "624": {"q": "「GDPRはどの地域の個人情報保護規則か？", "c": ["米国", "中国", "日本", "EU"], "a": 3, "e": "General Data Protection Regulation。2018年施行。EU市民のデータを扱う全世界の企業が対象。違反は最大売上高4%の制裁金。", "s": "66. 法律・コンプライアンス"}, "625": {"q": "医療機関が遵守すべき「守秘義務」の根拠法として正しいのは？", "c": ["刑法・医師法", "労働基準法", "景品表示法", "独占禁止法"], "a": 0, "e": "刑法134条「秘密漏示罪」と医師法により患者情報の守秘義務が課される。違反は刑事罰も。", "s": "66. 法律・コンプライアンス"}, "626": {"q": "「インサイダー取引」の説明として正しいのは？", "c": ["競合他社の情報収集", "従業員持株制度", "社内の業務改善活動", "未公開の重要情報を利用した株取引"], "a": 3, "e": "金融商品取引法で禁止。上場企業の内部情報を使った株売買は重大な違法行為。", "s": "66. 法律・コンプライアンス"}, "627": {"q": "「公益通報者保護法」が守るものは？", "c": ["会社の機密情報", "顧客の個人情報", "不正を内部告発した従業員", "特許・商標"], "a": 2, "e": "2006年施行・2022年改正で保護強化。不正を告発した内部告発者への不利益取扱いを禁止。", "s": "66. 法律・コンプライアンス"}, "628": {"q": "薬機法（旧・薬事法）が規制する対象はどれ？", "c": ["医師の診療行為", "病院の建設・運営", "医療従事者の労働条件", "医薬品・医療機器・化粧品の製造・販売・広告"], "a": 3, "e": "医薬品医療機器等法。薬の承認制度・広告規制・販売規制を定める。医療人材業にも広告規制で関連。", "s": "66. 法律・コンプライアンス"}, "629": {"q": "「ステルスマーケティング（ステマ）」が問題になる法的根拠は？", "c": ["景品表示法", "著作権法", "個人情報保護法", "労働基準法"], "a": 0, "e": "2023年10月から景品表示法で規制強化。SNSでの広告表示義務（#PR等）が明確化。", "s": "66. 法律・コンプライアンス"}, "630": {"q": "「利益相反（COI）」の説明として正しいのは？", "c": ["競合他社との競争", "個人・組織の利益が相反する状況", "株主と従業員の対立", "価格競争"], "a": 1, "e": "Conflict of Interest。医療分野では医師への製薬会社からの利益供与が問題になるケースも多い。", "s": "66. 法律・コンプライアンス"}, "631": {"q": "「BRICs」として正しい組み合わせは？", "c": ["ブラジル・ロシア・インド・中国", "ベルギー・ルーマニア・イラン・チリ", "ブラジル・ルーマニア・インドネシア・コロンビア", "英国・ロシア・インド・中国"], "a": 0, "e": "Goldman Sachsのジム・オニール氏が2001年に提唱。高成長新興国4か国。現在はSouth Africa加えてBRICSと表記することも。", "s": "67. グローバルビジネス"}, "632": {"q": "世界最大の人口を持つ国（2023年以降）はどこ？", "c": ["中国", "インド", "米国", "インドネシア"], "a": 1, "e": "2023年にインドが中国を抜いて世界1位（約14.2億人）に。インドの人口は今後も増加見込み。", "s": "67. グローバルビジネス"}, "633": {"q": "「ASEAN」に加盟していない国はどれ？", "c": ["タイ", "ベトナム", "インド", "インドネシア"], "a": 2, "e": "ASEANは東南アジア10か国。インドは加盟していない。ASEAN+3（日中韓）という枠組みもある。", "s": "67. グローバルビジネス"}, "634": {"q": "「G7（主要7カ国）」に含まれない国はどれ？", "c": ["フランス", "日本", "カナダ", "ロシア"], "a": 3, "e": "G7=米・日・英・独・仏・伊・加。ロシアは1998年にG8入りしたが、2014年のクリミア併合後に除名。", "s": "67. グローバルビジネス"}, "635": {"q": "世界の人口（2024年）はおよそ何人か？", "c": ["約80億人", "約60億人", "約70億人", "約100億人"], "a": 0, "e": "2024年時点で約82億人。国連予測では2050年頃に約97億人に達するとされている。", "s": "67. グローバルビジネス"}, "636": {"q": "「TPP（環太平洋パートナーシップ）」から離脱した国は？", "c": ["日本", "米国", "カナダ", "オーストラリア"], "a": 1, "e": "トランプ大統領（第1次政権）が2017年に離脱。残11か国でCPTPPとして発効。英国が2023年に加入。", "s": "67. グローバルビジネス"}, "637": {"q": "「ダボス会議」を主催する機関はどこ？", "c": ["国連", "IMF", "世界経済フォーラム", "OECD"], "a": 2, "e": "World Economic Forum。毎年1月にスイスのダボスで開催。世界の政財界リーダーが集まる。", "s": "67. グローバルビジネス"}, "638": {"q": "日本の最大の貿易相手国（輸出入合計）はどこか（2023年）？", "c": ["米国", "欧州連合", "韓国", "中国"], "a": 3, "e": "中国が首位。ただし安全保障の観点からの脱中国依存（デカップリング）の動きも強まっている。", "s": "67. グローバルビジネス"}, "639": {"q": "「為替リスク」のヘッジ手段として正しいのは？", "c": ["不動産に投資する", "金を買う", "為替予約・通貨オプションを利用する", "株式を購入する"], "a": 2, "e": "輸出入企業は将来の為替変動リスクを回避するため、銀行との為替予約（先物）やオプション取引を活用。", "s": "67. グローバルビジネス"}, "640": {"q": "「EPA（経済連携協定）」と「FTA（自由貿易協定）」の違いとして正しいのは？", "c": ["同じ意味", "EPAはFTAより幅広く投資・人材移動なども含む", "FTAの方が対象範囲が広い", "EPAは農業分野のみ"], "a": 1, "e": "FTAは主に関税撤廃。EPAはFTAを含み加えて投資・知的財産・人材移動など幅広い分野を対象とする。", "s": "67. グローバルビジネス"}, "641": {"q": "SDGsの目標数は何個か？", "c": ["17個", "10個", "15個", "20個"], "a": 0, "e": "17の目標・169のターゲット。2015年の国連サミットで採択。2030年までの達成を目指す。", "s": "68. SDGs・ESG"}, "642": {"q": "SDGsが採択された年はいつか？", "c": ["2010年", "2015年", "2018年", "2020年"], "a": 1, "e": "2015年9月、ニューヨークの国連本部で採択。MDGs（ミレニアム開発目標）の後継として誕生。", "s": "68. SDGs・ESG"}, "643": {"q": "「ESG投資」でGが示すものは？", "c": ["Growth", "Government", "Governance", "Gender"], "a": 2, "e": "Governance（ガバナンス）。取締役会の独立性・情報開示・株主への説明責任等を評価する。", "s": "68. SDGs・ESG"}, "644": {"q": "「カーボンニュートラル」とは何か？", "c": ["化石燃料の使用をゼロにすること", "原子力発電に切り替えること", "電気自動車のみを使用すること", "CO2排出量と吸収量を差し引きゼロにすること"], "a": 3, "e": "排出量から森林吸収・技術的吸収を引いてゼロにする概念。再エネ導入・省エネ・植林等の組み合わせで達成を目指す。", "s": "68. SDGs・ESG"}, "645": {"q": "日本政府が掲げるカーボンニュートラル達成目標年は？", "c": ["2050年", "2030年", "2040年", "2060年"], "a": 0, "e": "2050年カーボンニュートラル。2030年には2013年比46%削減の中間目標を設定。", "s": "68. SDGs・ESG"}, "646": {"q": "「パリ協定」の主な目標として正しいのは？", "c": ["核兵器の廃絶", "世界の平均気温上昇を1.5〜2℃以内に抑える", "海洋プラスチックをゼロにする", "2030年までに再エネ100%にする"], "a": 1, "e": "2015年採択・2016年発効。各国が自主的に排出削減目標（NDC）を設定・更新する仕組み。", "s": "68. SDGs・ESG"}, "647": {"q": "「TCFD」とは何か？", "c": ["国連の環境プログラム", "再生可能エネルギーの国際機関", "気候変動に関連した財務情報を開示する国際的な枠組み", "途上国への環境援助基金"], "a": 2, "e": "Task Force on Climate-related Financial Disclosures。日本の上場企業にも開示が義務化・推奨されている。", "s": "68. SDGs・ESG"}, "648": {"q": "SDGsの目標3「すべての人に健康と福祉を」に最も関連するのは？", "c": ["教育の普及", "飢餓の撲滅", "海洋保全", "ユニバーサル・ヘルス・カバレッジ"], "a": 3, "e": "UHC = 全ての人が質の高い医療サービスを受けられること。医師紹介事業も医療提供体制の維持に貢献。", "s": "68. SDGs・ESG"}, "649": {"q": "「サステナビリティレポート」を発行する主な目的は？", "c": ["環境・社会・ガバナンスへの取り組みをステークホルダーに開示する", "決算報告の代わり", "採用活動のための広報", "税務申告のため"], "a": 0, "e": "CSR報告書・統合報告書とも呼ばれる。投資家・顧客・社員等に対するESGへの取組の透明化が目的。", "s": "68. SDGs・ESG"}, "650": {"q": "ESG評価機関として代表的なものはどれ？", "c": ["日経・Bloomberg・Reuters", "MSCI・Sustainalytics・ISS", "S&P・Moody's・Fitch", "東証・NYSE・NASDAQ"], "a": 1, "e": "MSCI・Sustainalytics・ISSがESG評価の代表機関。信用格付け（S&P等）とは別。機関投資家の投資判断に影響。", "s": "68. SDGs・ESG"}, "96001": {"q": "イーロン・マスクが創業・経営するEV自動車会社はどれか？", "c": ["Tesla", "Ford", "Rivian", "Lucid"], "a": 0, "e": "テスラはイーロン・マスクが率いるEV・エネルギー企業。世界のEV市場をリードし時価総額はトップ級。", "s": "69. 現代の偉人（世界）"}, "96002": {"q": "イーロン・マスクが設立した宇宙開発企業はどれか？", "c": ["Blue Origin", "SpaceX", "Virgin Galactic", "Boeing Defense"], "a": 1, "e": "SpaceXはマスクが2002年に設立。再使用可能ロケットFalcon 9・宇宙船Starshipで宇宙産業を変革中。", "s": "69. 現代の偉人（世界）"}, "96003": {"q": "Facebookを創業したのは誰か？", "c": ["ラリー・ペイジ", "ジェフ・ベゾス", "マーク・ザッカーバーグ", "ジャック・ドーシー"], "a": 2, "e": "マーク・ザッカーバーグはハーバード大在学中の2004年にFacebook（現Meta）を創業。SNS帝国を築いた。", "s": "69. 現代の偉人（世界）"}, "96004": {"q": "Googleを共同創業した2人として正しいのはどれか？", "c": ["スティーブ・ジョブズとビル・ゲイツ", "ジャック・ドーシーとノア・グラス", "ジェフ・ベゾスとアンディ・ジャシー", "ラリー・ペイジとサーゲイ・ブリン"], "a": 3, "e": "ラリー・ペイジとサーゲイ・ブリンはスタンフォード大の博士課程在学中に1998年Googleを共同創業。", "s": "69. 現代の偉人（世界）"}, "96005": {"q": "Amazonを創業したのは誰か？", "c": ["ジェフ・ベゾス", "ティム・クック", "サティア・ナデラ", "アンディ・ジャシー"], "a": 0, "e": "ジェフ・ベゾスは1994年にAmazonを創業。EC・クラウド（AWS）・物流で世界最大級の企業に育て上げた。", "s": "69. 現代の偉人（世界）"}, "96006": {"q": "Microsoftの現CEOは誰か？", "c": ["ビル・ゲイツ", "サティア・ナデラ", "スティーブ・バルマー", "ブラッド・スミス"], "a": 1, "e": "サティア・ナデラは2014年にMicrosoftのCEOに就任。クラウド（Azure）・AI戦略でMicrosoftを復活させた。", "s": "69. 現代の偉人（世界）"}, "96007": {"q": "OpenAIを共同創業し後にCEOとなった人物はどれか？", "c": ["イーロン・マスク", "グレッグ・ブロックマン", "サム・アルトマン", "デミス・ハサビス"], "a": 2, "e": "サム・アルトマンはOpenAIのCEO。ChatGPTの爆発的普及を牽引し生成AI時代の象徴的な経営者。", "s": "69. 現代の偉人（世界）"}, "96008": {"q": "Warren Buffett（ウォーレン・バフェット）の投資スタイルとして正しいものはどれか？", "c": ["高頻度取引・デイトレード", "短期投機・FX取引", "ヘッジファンド型空売り戦略", "長期バリュー投資・割安優良株への集中投資"], "a": 3, "e": "バフェットはバークシャー・ハサウェイを率いる「オマハの賢人」。長期バリュー投資で世界有数の富豪に。", "s": "69. 現代の偉人（世界）"}, "96009": {"q": "Appleを創業し「Think Different」を体現した人物は誰か？", "c": ["スティーブ・ジョブズ", "スティーブ・ウォズニアック", "ジョナサン・アイブ", "ティム・クック"], "a": 0, "e": "スティーブ・ジョブズはAppleを創業。Mac・iPod・iPhone・iPadでデジタル革命を起こしたビジョナリー。", "s": "69. 現代の偉人（世界）"}, "96010": {"q": "Anthropic（Claudeの開発会社）を設立したのは誰か？", "c": ["サム・アルトマン", "ダリオ・アモデイとダニエラ・アモデイ兄妹", "イーロン・マスク", "デミス・ハサビス"], "a": 1, "e": "Anthropicは2021年にOpenAI出身のダリオ・アモデイ（CEO）とダニエラ・アモデイ（社長）兄妹が設立。AIの安全性研究を重視。", "s": "69. 現代の偉人（世界）"}, "96011": {"q": "ソフトバンクグループを創業した人物は誰か？", "c": ["孫正義", "三木谷浩史", "柳井正", "永守重信"], "a": 0, "e": "孫正義はソフトバンクを創業し通信・IT・投資（ビジョンファンド）で日本を代表するテック起業家に。", "s": "70. 現代の偉人（日本）"}, "96012": {"q": "ユニクロ（ファーストリテイリング）の創業者・会長は誰か？", "c": ["鈴木敏文", "柳井正", "三木谷浩史", "永守重信"], "a": 1, "e": "柳井正はユニクロを擁するファーストリテイリングの創業者。「服を変え、常識を変え、世界を変えていく」が信条。", "s": "70. 現代の偉人（日本）"}, "96013": {"q": "楽天グループを創業した人物は誰か？", "c": ["孫正義", "藤田晋", "三木谷浩史", "南場智子"], "a": 2, "e": "三木谷浩史は1997年に楽天市場を創業。EC・金融・通信・スポーツなど多角的に事業を展開。", "s": "70. 現代の偉人（日本）"}, "96014": {"q": "DeNAを共同創業し現在も経営に関わる人物はどれか？", "c": ["藤田晋", "笠原健治", "古川健介", "南場智子"], "a": 3, "e": "南場智子はDeNA創業者。マッキンゼー出身で日本を代表する女性起業家。横浜DeNAベイスターズオーナーも務める。", "s": "70. 現代の偉人（日本）"}, "96015": {"q": "サイバーエージェントを創業した人物は誰か？", "c": ["藤田晋", "南場智子", "三木谷浩史", "堀江貴文"], "a": 0, "e": "藤田晋は1998年にサイバーエージェントを創業。AbemaTV・Ameba・ゲーム事業で独自の地位を確立。", "s": "70. 現代の偉人（日本）"}, "96016": {"q": "日本電産（現ニデック）を創業した「モーターの鬼」と呼ばれる人物はどれか？", "c": ["柳井正", "永守重信", "孫正義", "出井伸之"], "a": 1, "e": "永守重信は日本電産（現ニデック）を創業しモーター世界トップに育て上げた。「すぐやる・必ずやる・できるまでやる」で有名。", "s": "70. 現代の偉人（日本）"}, "96017": {"q": "メルカリを創業した人物は誰か？", "c": ["古川健介", "笠原健治", "山田進太郎", "南場智子"], "a": 2, "e": "山田進太郎はフリマアプリ「メルカリ」を2013年に創業。日本発のユニコーン企業として米国にも展開。", "s": "70. 現代の偉人（日本）"}, "96018": {"q": "「1兆円企業」を目指すSmartHRを創業した人物はどれか？", "c": ["山田進太郎", "佐藤光紀", "倉富佑也", "宮田昇始"], "a": 3, "e": "宮田昇始はSmartHRを創業。クラウド人事労務ソフトで日本のHRテック市場をリードするユニコーン企業。", "s": "70. 現代の偉人（日本）"}, "96019": {"q": "「すべての人に、チャンスを。」を掲げるヘイ（BASE・STORES）の起業家として正しいのはどれか？", "c": ["鶴岡裕太", "古川健介", "笠原健治", "前田裕二"], "a": 0, "e": "鶴岡裕太はECプラットフォームBASEを創業。個人・小規模事業者のネットショップ開設を民主化した。", "s": "70. 現代の偉人（日本）"}, "96020": {"q": "大谷翔平選手が示した「マンダラチャート」の目標設定で有名な概念はどれか？", "c": ["OKR（目標と主要結果）", "目標達成のための8×8の思考整理ツール", "KPI管理", "バランス・スコアカード"], "a": 1, "e": "マンダラチャートは8×8マスで目標と達成要素を整理する思考ツール。大谷選手が高校時代に活用し注目を集めた。", "s": "70. 現代の偉人（日本）"}, "97001": {"q": "日本の四大財閥として正しい組み合わせはどれか？", "c": ["三菱・三井・住友・安田", "三菱・三井・住友・トヨタ", "三菱・住友・日立・富士", "三井・住友・安田・ソニー"], "a": 0, "e": "戦前の四大財閥は三菱・三井・住友・安田。GHQにより解体されたが、戦後は企業グループとして再結集した。", "s": "71. 日本の財閥企業"}, "97002": {"q": "三菱グループの総帥企業として中核に位置するのはどれか？", "c": ["三菱自動車", "三菱UFJ銀行・三菱商事・三菱重工の3社", "三菱電機のみ", "三菱地所のみ"], "a": 1, "e": "三菱グループの三本柱は三菱UFJ銀行（金融）・三菱商事（商社）・三菱重工（製造）。毎月曜会で連携。", "s": "71. 日本の財閥企業"}, "97003": {"q": "三井グループの象徴的な金融機関はどれか？", "c": ["三菱UFJ銀行", "みずほ銀行", "三井住友銀行", "りそな銀行"], "a": 2, "e": "三井住友銀行は三井グループの中核金融機関。三井住友フィナンシャルグループとして国内第2位の規模。", "s": "71. 日本の財閥企業"}, "97004": {"q": "住友グループの代表的な企業として正しいものはどれか？", "c": ["住友自動車", "住友不動産のみ", "住友生命のみ", "住友商事・住友化学・住友電工"], "a": 3, "e": "住友グループは住友商事・住友化学・住友電工・住友金属鉱山・住友生命など多岐にわたる企業群。", "s": "71. 日本の財閥企業"}, "97005": {"q": "安田財閥を源流とする現在の金融グループはどれか？", "c": ["みずほフィナンシャルグループ", "三井住友フィナンシャルグループ", "三菱UFJフィナンシャルグループ", "りそなグループ"], "a": 0, "e": "安田財閥の安田銀行は戦後に富士銀行となり、第一勧業銀行・日本興業銀行と合併してみずほFGとなった。", "s": "71. 日本の財閥企業"}, "97006": {"q": "財閥解体を命じたのはどの機関か？", "c": ["日本政府", "GHQ（連合国軍最高司令官総司令部）", "国際連合", "アメリカ議会"], "a": 1, "e": "第二次大戦後、GHQが財閥の経済支配を解体。持株会社の禁止・財閥家族の公職追放などが行われた。", "s": "71. 日本の財閥企業"}, "97007": {"q": "「三菱」の社名・ブランドに共通するマークはどれか？", "c": ["桜・鶴・富士山", "三本の矢", "三つ菱（スリーダイヤモンド）", "三角形三つ"], "a": 2, "e": "三菱のスリーダイヤマークは創業者・岩崎弥太郎の土佐藩山内家の「三葉柏」と岩崎家の「三階菱」を組み合わせたもの。", "s": "71. 日本の財閥企業"}, "97008": {"q": "三井財閥の源流となった江戸時代の商家はどれか？", "c": ["鴻池家", "岩崎家", "住友家の銅吹き事業", "三井越後屋（呉服店）"], "a": 3, "e": "三井財閥の起源は江戸時代の三井越後屋呉服店（現・三越）と両替商。現金掛け値なしの商法で発展。", "s": "71. 日本の財閥企業"}, "97009": {"q": "住友財閥の起源として正しいものはどれか？", "c": ["江戸時代の銅の精錬・製錬業（住友家の別子銅山）", "江戸時代の呉服商", "明治時代の紡績業", "鎌倉時代の武家商法"], "a": 0, "e": "住友の起源は江戸初期の銅の精錬技術（南蛮吹き）と別子銅山（愛媛）の開発。300年以上の歴史を持つ。", "s": "71. 日本の財閥企業"}, "97010": {"q": "財閥系企業グループの結束を維持する「社長会」として三菱グループのものはどれか？", "c": ["二木会", "曜日会（月曜会）", "白水会", "芙蓉会"], "a": 1, "e": "三菱グループの社長会は「金曜会」（月曜会とも）。三井は「二木会」、住友は「白水会」、芙蓉会は富士グループ。", "s": "71. 日本の財閥企業"}, "97101": {"q": "2024年時点で日本の時価総額1位の企業はどれか？", "c": ["トヨタ自動車", "ソニーグループ", "NTT", "キーエンス"], "a": 0, "e": "トヨタ自動車は日本の時価総額トップ。世界販売台数でも世界首位を争うグローバル自動車メーカー。", "s": "72. 日本の主要企業・時価総額"}, "97102": {"q": "キーエンスの主な事業内容はどれか？", "c": ["自動車製造", "FAセンサー・計測・制御機器の開発・販売", "スマートフォン販売", "医薬品製造"], "a": 1, "e": "キーエンスは工場自動化（FA）向けセンサー・計測機器のトップ企業。高い利益率と社員の高年収で有名。", "s": "72. 日本の主要企業・時価総額"}, "97103": {"q": "ソニーグループの主力事業として現在最も利益が大きい分野はどれか？", "c": ["テレビ・家電", "スマートフォン", "ゲーム（PlayStation）・音楽・映画のエンタメ事業", "自動車部品"], "a": 2, "e": "ソニーはゲーム（PS）・音楽（Sony Music）・映画（Columbia Pictures）などエンタメ事業が収益の柱。", "s": "72. 日本の主要企業・時価総額"}, "97104": {"q": "三菱UFJフィナンシャル・グループの主な事業はどれか？", "c": ["自動車製造", "保険・不動産", "通信・インフラ", "銀行・信託・証券などの金融サービス"], "a": 3, "e": "MUFGは国内最大の金融グループ。三菱UFJ銀行を中核に信託・証券・海外展開も行うメガバンク。", "s": "72. 日本の主要企業・時価総額"}, "97105": {"q": "NTTグループの主な事業はどれか？", "c": ["通信インフラ・ドコモ・データセンター・ITサービス", "航空・物流", "エネルギー・電力", "自動車・モビリティ"], "a": 0, "e": "NTTは日本最大の通信グループ。NTTドコモ（携帯）・NTTデータ（IT）・NTT東西（固定回線）などを傘下に持つ。", "s": "72. 日本の主要企業・時価総額"}, "97106": {"q": "任天堂の主な事業と代表的な商品はどれか？", "c": ["スマートフォン製造", "ゲーム機・ゲームソフト（Switch・マリオ・ポケモン等）", "PC・サーバー販売", "半導体製造"], "a": 1, "e": "任天堂はゲーム機（Switch）とゲームソフト（マリオ・ゼルダ・ポケモン等）を主力とするエンタメ企業。", "s": "72. 日本の主要企業・時価総額"}, "97107": {"q": "信越化学工業の主な製品として正しいものはどれか？", "c": ["食品・飲料", "医薬品", "塩化ビニル樹脂・半導体シリコンウェーハ", "自動車部品"], "a": 2, "e": "信越化学は塩化ビニル樹脂（世界トップ）と半導体シリコンウェーハ（世界シェア首位）が主力製品。", "s": "72. 日本の主要企業・時価総額"}, "97108": {"q": "ファーストリテイリング（ユニクロ）のビジネスモデルの特徴はどれか？", "c": ["百貨店向けの高級ブランド展開", "ECのみで実店舗なし", "フランチャイズ展開のみ", "SPA（製造小売業）モデルで企画・製造・販売を一貫して行う"], "a": 3, "e": "ユニクロはSPA（製造小売）モデルを採用。自社で企画・素材開発・生産管理・販売まで一貫して行い高品質・低価格を実現。", "s": "72. 日本の主要企業・時価総額"}, "97109": {"q": "リクルートホールディングスの主な事業として正しいものはどれか？", "c": ["HR（人材）・販促メディア・転職サービスのプラットフォーム", "製造業・工場運営", "医薬品販売", "建設・不動産開発"], "a": 0, "e": "リクルートはHRテクノロジー（Indeed等）・転職メディア（リクナビ）・販促メディア（じゃらん・ホットペッパー）が主力。", "s": "72. 日本の主要企業・時価総額"}, "97110": {"q": "デンソーの主な事業内容はどれか？", "c": ["半導体の設計・販売", "自動車部品（エアコン・センサー・電子制御）の製造", "医療機器製造", "食品・農業機械"], "a": 1, "e": "デンソーはトヨタ系の自動車部品メーカー。カーエアコン・センサー・電子制御ユニットで世界トップ級のシェアを持つ。", "s": "72. 日本の主要企業・時価総額"}, "98001": {"q": "日本の高度経済成長期はおよそいつからいつか？", "c": ["1955年〜1973年", "1930年代〜1945年", "1980年〜1990年", "1990年〜2000年"], "a": 0, "e": "日本の高度経済成長期は1955年〜1973年。年平均10%前後の成長を続け、国民総生産が急拡大した。", "s": "73. 日本の経済史"}, "98002": {"q": "1985年のプラザ合意の内容として正しいものはどれか？", "c": ["日本が核廃棄を宣言した条約", "G5がドル高是正のため協調してドル安・円高誘導することで合意", "日米安保の改定", "貿易摩擦解消のための輸出自主規制"], "a": 1, "e": "プラザ合意はG5（米・英・仏・独・日）がドル高を是正するため協調介入に合意。円は急激に上昇した。", "s": "73. 日本の経済史"}, "98003": {"q": "バブル経済が崩壊した時期はいつか？", "c": ["1985年", "1997年", "1991年前後", "2001年"], "a": 2, "e": "日本のバブル経済は1986〜1991年頃。株価・地価が急騰後、1991年前後から崩壊し長期低迷へ。", "s": "73. 日本の経済史"}, "98004": {"q": "「失われた30年」とは何を指すか？", "c": ["明治時代の経済停滞", "昭和初期の不況", "戦後の復興遅れ", "バブル崩壊後の1990年代から続く日本の長期経済低迷"], "a": 3, "e": "失われた30年はバブル崩壊後の1990年代から続く日本の低成長・デフレ・賃金停滞の時代を指す。", "s": "73. 日本の経済史"}, "98005": {"q": "アベノミクスの「三本の矢」として正しいものはどれか？", "c": ["大胆な金融緩和・機動的な財政政策・成長戦略", "増税・規制強化・貿易制限", "緊縮財政・円高維持・輸出拡大", "民営化・規制緩和・外資誘致"], "a": 0, "e": "アベノミクスの三本の矢は①大胆な金融緩和②機動的な財政政策③民間投資を喚起する成長戦略。", "s": "73. 日本の経済史"}, "98006": {"q": "1997年のアジア通貨危機で最初に通貨が急落した国はどれか？", "c": ["日本", "タイ", "中国", "韓国"], "a": 1, "e": "1997年アジア通貨危機はタイバーツの急落から始まり、韓国・インドネシア・マレーシアなどに波及した。", "s": "73. 日本の経済史"}, "98007": {"q": "日本のデフレ脱却目標として日銀が設定した物価上昇率の目標はどれか？", "c": ["0%", "1%", "2%", "5%"], "a": 2, "e": "日本銀行は2013年以降、物価安定目標として消費者物価上昇率2%を掲げてきた。", "s": "73. 日本の経済史"}, "98008": {"q": "2008年のリーマン・ショックの主な原因はどれか？", "c": ["日本の財政破綻", "原油価格の急騰のみ", "中国経済の急落", "米国のサブプライムローン問題に端を発した金融危機"], "a": 3, "e": "リーマン・ショックは米国の低所得者向けサブプライムローンの焦げ付きが世界金融危機に発展した事件。", "s": "73. 日本の経済史"}, "98009": {"q": "日本の少子高齢化が経済に与える主な影響はどれか？", "c": ["労働力不足・社会保障費増大・経済縮小リスク", "労働力増加・税収増加", "消費拡大・GDP成長", "輸出増加・貿易黒字拡大"], "a": 0, "e": "少子高齢化は労働力不足・消費市場縮小・社会保障費増大を招き、日本経済の長期的な課題となっている。", "s": "73. 日本の経済史"}, "98010": {"q": "日本のGDPの世界順位（2023年時点）はどれか？", "c": ["1位", "3位（ドル建てでは4位に後退）", "2位", "5位"], "a": 1, "e": "日本のGDPは長らく世界3位だったが、2023年にドル建てでドイツに抜かれ4位に後退した。", "s": "73. 日本の経済史"}, "98011": {"q": "世界最大の株式取引所はどれか？", "c": ["NYSE（ニューヨーク証券取引所）", "ロンドン証券取引所", "JASDAQ（ジャスダック）", "上海証券取引所"], "a": 0, "e": "NYSEはニューヨーク証券取引所。上場企業の時価総額合計で世界最大。NASDAQと並び世界の金融の中心。", "s": "74. 世界の株式市場"}, "98012": {"q": "NASDAQの特徴として正しいものはどれか？", "c": ["農業・資源関連企業が中心", "テクノロジー・成長企業が多く上場する電子株式市場", "不動産専門の取引所", "アジア企業専門市場"], "a": 1, "e": "NASDAQはApple・Microsoft・Google・Amazonなどテクノロジー・成長企業が多く上場する電子取引所。", "s": "74. 世界の株式市場"}, "98013": {"q": "S&P500とは何か？", "c": ["米国の500の銀行の指数", "世界500社の指数", "米国の代表的な500社の株価指数", "ナスダック上場500社の指数"], "a": 2, "e": "S&P500は米国の主要500社の株価を時価総額加重平均した指数。米国経済の健全性を示す代表的な指標。", "s": "74. 世界の株式市場"}, "98014": {"q": "日経平均株価（日経225）とは何か？", "c": ["東証全銘柄の平均", "日銀が管理する金利指標", "日本の全上場企業の時価総額", "東証プライムに上場する225銘柄の株価指数"], "a": 3, "e": "日経平均は東証プライム上場の代表的225銘柄の株価指数。日本経済・株式市場の動向を示す代表指標。", "s": "74. 世界の株式市場"}, "98015": {"q": "PER（株価収益率）の説明として正しいものはどれか？", "c": ["株価を1株当たり純利益で割った値・割高・割安の目安", "企業の純資産に対する株価の比率", "配当金を株価で割った利回り", "売上高に対する株価の比率"], "a": 0, "e": "PER＝株価÷EPS（1株当たり純利益）。業界平均と比較して割高・割安を判断する指標。", "s": "74. 世界の株式市場"}, "98016": {"q": "「ブル相場」と「ベア相場」の違いはどれか？", "c": ["ブル=下落相場・ベア=上昇相場", "ブル=上昇相場・ベア=下落相場", "両方とも横ばい相場の別名", "ブルは債券・ベアは株式市場を指す"], "a": 1, "e": "ブル（雄牛）は角を下から上に突き上げることから上昇相場。ベア（熊）は爪を上から下に振り下ろすことから下落相場。", "s": "74. 世界の株式市場"}, "98017": {"q": "ETF（上場投資信託）の特徴として正しいものはどれか？", "c": ["1社の株のみに投資する商品", "元本保証の金融商品", "株式のように市場で売買できる分散投資型の投資信託", "銀行預金の一種"], "a": 2, "e": "ETFは株式市場に上場し取引所でリアルタイムに売買できる投資信託。指数連動型が多く分散投資に有効。", "s": "74. 世界の株式市場"}, "98018": {"q": "IPO（新規株式公開）とは何か？", "c": ["企業が倒産する手続き", "株式の非公開化（MBO）", "既上場企業の増資", "未上場企業が株式市場に初めて株式を公開すること"], "a": 3, "e": "IPOは未上場企業が証券取引所に株式を公開し、広く投資家から資金調達できるようにすること。", "s": "74. 世界の株式市場"}, "98019": {"q": "インデックス投資とアクティブ投資の違いはどれか？", "c": ["インデックスは指数に連動・アクティブは市場平均を超えることを目指す", "インデックスは個別株・アクティブは指数連動", "両者は同じ投資手法", "インデックスは債券のみ"], "a": 0, "e": "インデックス投資は市場指数に連動する低コスト運用。アクティブ投資は銘柄選択で市場平均超を狙う高コスト運用。", "s": "74. 世界の株式市場"}, "98020": {"q": "「時価総額」の計算式として正しいものはどれか？", "c": ["売上高×利益率", "株価×発行済株式数", "純資産÷株価", "売上高÷株価"], "a": 1, "e": "時価総額＝株価×発行済株式数。企業の市場での評価額を示す最も基本的な指標。", "s": "74. 世界の株式市場"}, "98021": {"q": "「ユニコーン企業」とは何か？", "c": ["時価総額10億ドル以上の未上場スタートアップ", "上場から10年以上経つ老舗企業", "100億円以上の売上を持つ中小企業", "従業員1000名以上のベンチャー"], "a": 0, "e": "ユニコーン企業は評価額10億ドル（約1000億円）以上の未上場スタートアップ。希少性からユニコーンと呼ぶ。", "s": "75. ベンチャー・スタートアップ用語"}, "98022": {"q": "VC（ベンチャーキャピタル）の役割はどれか？", "c": ["銀行から融資を受ける機関", "成長が期待されるスタートアップに出資し株式取得・投資リターンを得る投資会社", "国の補助金を分配する機関", "企業の上場手続きを代行する会社"], "a": 1, "e": "VCはスタートアップに資金提供し株式を取得。IPOやM&Aで株式を売却してリターンを得るビジネスモデル。", "s": "75. ベンチャー・スタートアップ用語"}, "98023": {"q": "「バーンレート」とは何か？", "c": ["株価の下落速度", "製品の欠陥率", "スタートアップが資金を消費するペース（月次の現金流出額）", "従業員の離職率"], "a": 2, "e": "バーンレートは月間の資金消費額。バーンレートと残資金からランウェイ（資金が尽きるまでの期間）を計算する。", "s": "75. ベンチャー・スタートアップ用語"}, "98024": {"q": "「シードラウンド」とは何か？", "c": ["企業が上場する最終段階", "IPO後の追加調達", "シリーズBの別名", "スタートアップの最初期の資金調達ラウンド"], "a": 3, "e": "シードラウンドはスタートアップの最初期の資金調達。プロダクト開発・市場検証前後の段階で行われることが多い。", "s": "75. ベンチャー・スタートアップ用語"}, "98025": {"q": "「PMF（プロダクトマーケットフィット）」とは何か？", "c": ["製品・サービスが市場のニーズと合致しスケールできる状態", "製品の価格設定完了", "特許申請の完了", "上場審査の通過"], "a": 0, "e": "PMFとは製品が市場のニーズにフィットし、ユーザーに強く求められている状態。スタートアップ成長の転換点。", "s": "75. ベンチャー・スタートアップ用語"}, "98026": {"q": "「エクイティ」と「デット」の違いはどれか？", "c": ["エクイティ=借金・デット=株式", "エクイティ=株式による資金調達・デット=借入による資金調達", "両者は同じ", "エクイティは国内・デットは海外からの調達"], "a": 1, "e": "エクイティは株式発行による調達（返済不要・株主に権利）。デットは借入（返済必要・利息発生）。", "s": "75. ベンチャー・スタートアップ用語"}, "98027": {"q": "「ピボット」とはスタートアップにおいて何を意味するか？", "c": ["会社を清算すること", "新しい社員を採用すること", "事業の方向性や戦略を大きく転換すること", "海外進出すること"], "a": 2, "e": "ピボットは市場の反応を見て事業モデル・ターゲット・製品を大きく転換すること。失敗から学ぶ重要な戦略判断。", "s": "75. ベンチャー・スタートアップ用語"}, "98028": {"q": "「MBO（マネジメント・バイアウト）」とは何か？", "c": ["経営会議の開催", "M&Aの反対語", "マーケティング戦略の一種", "経営陣が自社株を買い取り独立・非公開化する手法"], "a": 3, "e": "MBOは経営陣が投資ファンド等と組んで自社株を買い取り、親会社から独立・非公開化する手法。", "s": "75. ベンチャー・スタートアップ用語"}, "98029": {"q": "「デカコーン企業」とは何か？", "c": ["時価総額100億ドル（約1兆円）以上の未上場スタートアップ", "時価総額1億ドル以上の企業", "上場後10年以内の企業", "従業員1万人以上のスタートアップ"], "a": 0, "e": "デカコーンはユニコーンの10倍、評価額100億ドル以上の未上場企業。SpaceX・Stripe・ByteDanceなどが該当。", "s": "75. ベンチャー・スタートアップ用語"}, "98030": {"q": "「LTV（ライフタイムバリュー）」とは何か？", "c": ["企業の総資産価値", "顧客が生涯を通じて企業にもたらす累計収益", "特許の価値評価", "株主への配当総額"], "a": 1, "e": "LTVは1人の顧客が取引開始から終了までにもたらす累計収益。CAC（顧客獲得コスト）と比較しビジネスの健全性を判断。", "s": "75. ベンチャー・スタートアップ用語"}, "98031": {"q": "マーケティングの「4P」として正しい組み合わせはどれか？", "c": ["Product・Price・Place・Promotion", "People・Process・Physical・Profit", "Plan・Perform・Progress・Profit", "Purpose・Position・Power・Pull"], "a": 0, "e": "4PはProduct（製品）・Price（価格）・Place（流通）・Promotion（販促）。マーケティングミックスの基本フレームワーク。", "s": "76. マーケティング基礎"}, "98032": {"q": "「STP分析」のSTPとは何の略か？", "c": ["Sales・Target・Profit", "Segmentation・Targeting・Positioning", "Strategy・Tactics・Planning", "Search・Track・Promote"], "a": 1, "e": "STPはSegmentation（市場細分化）・Targeting（ターゲット選定）・Positioning（立ち位置の設定）の3ステップ。", "s": "76. マーケティング基礎"}, "98033": {"q": "「NPS（ネット・プロモーター・スコア）」とは何か？", "c": ["新聞広告の効果指標", "ネット広告のクリック率", "顧客が他者に推薦する意向を0〜10点で測る顧客ロイヤルティ指標", "売上成長率の指標"], "a": 2, "e": "NPSは「この製品・サービスを友人や同僚に勧めますか？」と聞き0〜10点で測る顧客ロイヤルティの指標。", "s": "76. マーケティング基礎"}, "98034": {"q": "「コンテンツマーケティング」の特徴はどれか？", "c": ["大量のテレビCMを放映する手法", "価格を下げて販売量を増やす手法", "競合他社の広告を買収する手法", "有益なコンテンツを提供し顧客との関係を構築するインバウンド型マーケティング"], "a": 3, "e": "コンテンツマーケティングはブログ・動画・SNSで有益な情報を発信し顧客を引き寄せる手法。広告より信頼性が高い。", "s": "76. マーケティング基礎"}, "98035": {"q": "「CAC（顧客獲得コスト）」の説明として正しいものはどれか？", "c": ["新規顧客1人を獲得するためにかかった総コスト", "商品の製造原価", "顧客1人当たりの年間収益", "広告の総予算"], "a": 0, "e": "CACは新規顧客1人を獲得するためのマーケティング・営業コストの合計。LTVと比較してビジネスの効率を評価する。", "s": "76. マーケティング基礎"}, "98036": {"q": "「ブランドポジショニング」とは何か？", "c": ["工場の立地選定", "競合と比較して自社ブランドをどこに位置づけるかを明確にすること", "株価の位置付け", "社員のポジション管理"], "a": 1, "e": "ポジショニングは顧客の頭の中に競合と差別化された自社ブランドの独自の位置を確立する戦略。", "s": "76. マーケティング基礎"}, "98037": {"q": "「オウンドメディア」とは何か？", "c": ["競合他社のメディア", "有料広告メディア", "企業が自社で保有・運営するウェブサイト・ブログ・SNSアカウント等", "テレビ・新聞などのマスメディア"], "a": 2, "e": "オウンドメディアは企業が自社で所有・運営するメディア。コーポレートサイト・オウンドブログ・SNS公式アカウントなど。", "s": "76. マーケティング基礎"}, "98038": {"q": "「バイラルマーケティング」の特徴はどれか？", "c": ["テレビCMを大量投下する手法", "値引きキャンペーンを大規模に行う手法", "競合他社を批判する広告手法", "消費者が口コミやSNSで自発的に情報を拡散する現象を活用するマーケティング"], "a": 3, "e": "バイラルマーケティングはウイルスのように情報が人から人へ広がる現象を活用する手法。SNS時代に重要性が増した。", "s": "76. マーケティング基礎"}, "98039": {"q": "「ペルソナ」とはマーケティングにおいて何を指すか？", "c": ["ターゲット顧客の典型的な人物像を具体的に設定したもの", "競合企業の経営者", "広告のキャラクターの法律上の権利", "商標登録されたブランド名"], "a": 0, "e": "ペルソナは年齢・職業・価値観・悩みなどを具体化した架空の顧客像。マーケティング施策の精度を上げるために使用。", "s": "76. マーケティング基礎"}, "98040": {"q": "「ROI（投資対効果）」の計算式として正しいものはどれか？", "c": ["売上÷社員数", "（利益－投資額）÷投資額×100%", "売上÷広告費", "純利益÷総資産"], "a": 1, "e": "ROI＝（利益－投資額）÷投資額×100%。投資に対してどれだけのリターンが得られたかを示す指標。", "s": "76. マーケティング基礎"}, "98041": {"q": "「PL（損益計算書）」で分かることはどれか？", "c": ["一定期間の売上・費用・利益の状況", "企業の資産・負債・純資産の状況", "現金の流れ", "株主構成"], "a": 0, "e": "PLは一定期間（1年間など）の経営成績を示す。売上高・売上原価・販管費・営業利益・最終利益が分かる。", "s": "77. 会計・財務の基礎"}, "98042": {"q": "「BS（貸借対照表）」で分かることはどれか？", "c": ["1年間の売上と利益", "ある時点の資産・負債・純資産（自己資本）の残高", "現金の収支", "経営者の報酬"], "a": 1, "e": "BSはある時点（決算日）の財政状態を示す。左側に資産、右側に負債と純資産が記載される。", "s": "77. 会計・財務の基礎"}, "98043": {"q": "「ROE（自己資本利益率）」の説明として正しいものはどれか？", "c": ["総資産に対する利益の割合", "売上高に対する利益の割合", "自己資本（純資産）に対してどれだけの利益を生んだかの割合", "株価に対する配当の割合"], "a": 2, "e": "ROE＝純利益÷自己資本×100%。株主が投じた資本をどれだけ効率よく使って利益を生んだかを示す指標。", "s": "77. 会計・財務の基礎"}, "98044": {"q": "「EBITDA」とは何か？", "c": ["純利益の別名", "キャッシュフローの別名", "売上総利益の別名", "利息・税金・減価償却費控除前利益。企業の本業の稼ぐ力を示す指標"], "a": 3, "e": "EBITDAは税引前利益に支払利息・減価償却費を加算したもの。M&Aや企業価値評価でよく使われる指標。", "s": "77. 会計・財務の基礎"}, "98045": {"q": "「CF（キャッシュフロー計算書）」の3区分として正しいものはどれか？", "c": ["営業CF・投資CF・財務CF", "売上・費用・利益", "資産・負債・純資産", "固定費・変動費・利益"], "a": 0, "e": "CF計算書は営業活動（本業の現金収支）・投資活動（設備投資等）・財務活動（借入・返済等）の3区分で構成される。", "s": "77. 会計・財務の基礎"}, "98046": {"q": "「粗利（売上総利益）」の計算式はどれか？", "c": ["売上高－販売管理費", "売上高－売上原価", "営業利益＋減価償却費", "経常利益＋特別利益"], "a": 1, "e": "粗利（売上総利益）＝売上高－売上原価。商品・サービスを提供する基本的な儲けを示す。", "s": "77. 会計・財務の基礎"}, "98047": {"q": "「減価償却」とは何か？", "c": ["不良債権を帳消しにすること", "売掛金の回収", "固定資産の取得費用を耐用年数にわたって費用として分割計上すること", "棚卸資産の評価損"], "a": 2, "e": "減価償却は建物・機械など長期使用する資産の取得費を使用年数に応じて毎年費用として計上する会計処理。", "s": "77. 会計・財務の基礎"}, "98048": {"q": "「営業利益」と「経常利益」の違いはどれか？", "c": ["全く同じ指標", "営業利益は税引後・経常利益は税引前", "経常利益の方が必ず小さい", "営業利益は本業の利益・経常利益は営業利益に金融損益等を加減したもの"], "a": 3, "e": "営業利益は本業での利益。経常利益は営業利益に受取利息・支払利息などの営業外損益を加減した利益。", "s": "77. 会計・財務の基礎"}, "98049": {"q": "「自己資本比率」が高い企業の特徴はどれか？", "c": ["借入に依存せず財務的に安定・倒産リスクが低い", "借入金が多く財務リスクが高い", "売上が大きい", "利益率が高い"], "a": 0, "e": "自己資本比率＝自己資本÷総資産×100%。高いほど借入依存度が低く財務的に安定した企業といえる。", "s": "77. 会計・財務の基礎"}, "98050": {"q": "医療法人の決算で特に重要な指標はどれか？", "c": ["株価", "医業収益・医業利益・現金預金残高・純資産の推移", "配当金", "株主資本コスト"], "a": 1, "e": "医療法人は医業収益（診療収入等）・医業利益・現金残高・純資産の推移が経営健全性の主要指標となる。", "s": "77. 会計・財務の基礎"}, "98051": {"q": "「3C分析」の3Cとは何か？", "c": ["Customer・Competitor・Company", "Cost・Customer・Channel", "Concept・Conduct・Control", "Communication・Cooperation・Commitment"], "a": 0, "e": "3C分析はCustomer（市場・顧客）・Competitor（競合）・Company（自社）の3要素で事業環境を分析するフレームワーク。", "s": "78. ビジネスフレームワーク"}, "98052": {"q": "「SWOT分析」の4要素として正しいものはどれか？", "c": ["Speed・Work・Output・Target", "Strengths・Weaknesses・Opportunities・Threats", "Sales・Win・Operations・Total", "Strategy・Way・Objective・Tactics"], "a": 1, "e": "SWOTはStrengths（強み）・Weaknesses（弱み）・Opportunities（機会）・Threats（脅威）。内部・外部環境を整理する。", "s": "78. ビジネスフレームワーク"}, "98053": {"q": "「MECE」とは何か？", "c": ["マーケティング効果検証の略", "会計基準の名称", "漏れなく・ダブりなく情報や要素を整理する考え方", "採用面接の評価手法"], "a": 2, "e": "MECEはMutually Exclusive Collectively Exhaustiveの略。ロジカルシンキングの基本で「漏れなくダブりなく」整理する手法。", "s": "78. ビジネスフレームワーク"}, "98054": {"q": "「ロジックツリー」の主な用途はどれか？", "c": ["組織図の作成", "採用計画の立案", "財務諸表の分析", "問題の原因分解・解決策の列挙を木構造で整理する思考ツール"], "a": 3, "e": "ロジックツリーは問題をMECEに分解し原因特定や解決策検討に使うフレームワーク。コンサルで多用される。", "s": "78. ビジネスフレームワーク"}, "98055": {"q": "「KPI」と「KGI」の違いはどれか？", "c": ["KGIは最終目標指標・KPIはKGI達成に向けた中間プロセス指標", "全く同じ指標", "KPIの方が重要", "KGIは財務指標のみ"], "a": 0, "e": "KGI（重要目標達成指標）は最終ゴール。KPI（重要業績評価指標）はKGI達成に向けた中間目標・行動指標。", "s": "78. ビジネスフレームワーク"}, "98056": {"q": "「PDCAサイクル」の4ステップとして正しいものはどれか？", "c": ["Prepare・Design・Create・Assess", "Plan・Do・Check・Action", "Perform・Direct・Control・Adjust", "Plan・Develop・Confirm・Achieve"], "a": 1, "e": "PDCAはPlan（計画）・Do（実行）・Check（評価）・Action（改善）の繰り返しで継続的に業務を改善するサイクル。", "s": "78. ビジネスフレームワーク"}, "98057": {"q": "「ファイブフォース分析」を提唱したのは誰か？", "c": ["ピーター・ドラッカー", "フィリップ・コトラー", "マイケル・ポーター", "クレイトン・クリステンセン"], "a": 2, "e": "マイケル・ポーターが提唱。業界の競争要因を①競合②新規参入③代替品④売り手交渉力⑤買い手交渉力の5つで分析。", "s": "78. ビジネスフレームワーク"}, "98058": {"q": "「バリューチェーン」とは何か？", "c": ["サプライヤーの評価基準", "ブランド価値の評価手法", "株主への価値提供", "製品・サービスが顧客に届くまでの各活動を連鎖として捉え価値創造を分析するフレームワーク"], "a": 3, "e": "バリューチェーンはポーターが提唱。調達・製造・物流・販売・サービスなど価値を生む活動の連鎖を分析する。", "s": "78. ビジネスフレームワーク"}, "98059": {"q": "「OKR」とは何か？", "c": ["目標（Objectives）と主要結果（Key Results）を設定し組織・個人の方向性を揃えるフレームワーク", "決算書の一種", "マーケティング効果指標", "採用評価基準"], "a": 0, "e": "OKRはObjectives（目標）とKey Results（主要結果）を設定する目標管理手法。Google・Intel等が導入し普及した。", "s": "78. ビジネスフレームワーク"}, "98060": {"q": "「イシューツリー」の使い方として正しいものはどれか？", "c": ["組織の人員配置を決める", "解くべき問題（イシュー）を特定し優先順位をつけるための分解ツール", "在庫管理に使う", "広告予算を配分する"], "a": 1, "e": "イシューツリーは解決すべき問題を構造的に分解し、本質的な課題を特定するためのロジカルシンキングツール。", "s": "78. ビジネスフレームワーク"}, "98061": {"q": "2024年時点で世界の時価総額1位の企業はどれか？", "c": ["Apple", "Tesla", "Amazon", "Microsoft"], "a": 0, "e": "Appleは時価総額で世界トップを争う。iPhone・Mac・サービス事業（App Store・Apple Music等）が収益の柱。", "s": "79. 世界の主要企業・ビジネス"}, "98062": {"q": "サウジアラムコの主な事業はどれか？", "c": ["自動車製造", "原油・天然ガスの採掘・精製・販売", "半導体製造", "金融サービス"], "a": 1, "e": "サウジアラムコはサウジアラビアの国営石油会社。世界最大の石油会社で時価総額でAppleと首位を争う。", "s": "79. 世界の主要企業・ビジネス"}, "98063": {"q": "McKinsey（マッキンゼー）・BCG・Bainの共通点はどれか？", "c": ["製薬会社", "会計事務所", "世界三大戦略コンサルティングファーム（MBB）", "投資銀行"], "a": 2, "e": "McKinsey・BCG・Bainは世界三大戦略コンサル（MBB）。経営戦略立案・組織変革・M&A支援などを行う。", "s": "79. 世界の主要企業・ビジネス"}, "98064": {"q": "「LVMH」はどのような企業か？", "c": ["世界最大の自動車メーカー", "世界最大の銀行グループ", "アメリカの軍事企業", "ルイ・ヴィトン・モエ・ヘネシーを傘下に持つ世界最大の高級品コングロマリット"], "a": 3, "e": "LVMHはルイ・ヴィトン・Dior・Givenchy・Moët & Chandonなど75以上の高級ブランドを擁するフランスの複合企業。", "s": "79. 世界の主要企業・ビジネス"}, "98065": {"q": "Teslaのビジネスモデルで他の自動車メーカーと異なる最大の特徴はどれか？", "c": ["直販モデル・ソフトウェアアップデート・エネルギー事業を組み合わせたテック企業的運営", "ディーラー網を通じた販売", "ガソリン車も同時製造", "製造を全て外注する"], "a": 0, "e": "TeslaはEV直販・OTAソフトウェア更新・太陽光・蓄電池事業を組み合わせたテック企業的ビジネスモデ const params = new URLSearchParams(location.search);
const ids = (params.get('ids') || params.get('id') || '').split(',').map(s => s.trim()).filter(Boolean);

const card = document.getElementById('card');

if (ids.length === 0) {
  card.innerHTML = '<div class="not-found"><div class="icon">🔍</div>問題IDが指定されていません</div>';
} else {
  const LABELS = ['A','B','C','D'];
  let html = '';

  ids.forEach((id, idx) => {
    const q = QUIZ_DATA[String(id)];
    if (!q) {
      html += `<div class="not-found"><div class="icon">❓</div>問題ID ${id} が見つかりません</div>`;
      return;
    }

    const choicesHtml = q.c.map((c, i) => {
      const isCorrect = i === q.a;
      return `<div class="choice ${isCorrect ? 'correct' : ''}">
        <div class="choice-label">${LABELS[i]}</div>
        <div>${c}</div>
        ${isCorrect ? '<div style="margin-left:auto">✅</div>' : ''}
      </div>`;
    }).join('');

    html += `
      <div class="card-header">
        <div class="section-name">${q.s}</div>
        <div class="q-number">Q${idx + 1}</div>
      </div>
      <div class="card-body">
        <div class="question">${q.q}</div>
        <div class="choices">${choicesHtml}</div>
        <div class="answer-badge">✅ 正解：${LABELS[q.a]}「${q.c[q.a]}」</div>
        ${q.e ? `<div class="explanation"><div class="explanation-title">💡 解説</div>${q.e}</div>` : ''}
      </div>
    `;

    if (idx < ids.length - 1) {
      html += '<hr style="border:none;border-top:1px solid #f1f5f9;">';
    }
  });

  card.innerHTML = html;
}
