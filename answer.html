97203, 95031, 57], "20260526": [316, 338, 94060], "20260527": [95023, 311, 91013], "20260528": [93021, 90031, 92006], "20260529": [91030, 402, 93050], "20260601": [90014, 93070, 21], "20260602": [94073, 127, 139], "20260603": [90002, 133, 93015], "20260604": [433, 90034, 94064], "20260605": [93016, 176, 67], "20260608": [94003, 63, 384], "20260609": [17, 94072, 93074], "20260610": [107, 28, 406], "20260611": [92043, 141, 18], "20260612": [326, 92002, 70], "20260615": [16, 93066, 92063], "20260616": [163, 46, 83], "20260617": [95025, 94017, 52], "20260618": [93030, 93004, 92070], "20260619": [377, 92052, 93016], "20260622": [2, 94011, 92001], "20260623": [177204, 95022, 92054], "20260624": [185207, 92004, 91010], "20260625": [95012, 90010, 367], "20260626": [93040, 94022, 440], "20260629": [94022, 91033, 432]};
const QUESTIONS = {"1": {"id": 1, "section": "1. 医学部について", "q": "医学部は全国に何校あるか？", "c": ["62校", "82校", "72校", "92校"], "a": 1, "e": "国公立51校、私立31校の合計82校。"}, "2": {"id": 2, "section": "1. 医学部について", "q": "医学部4〜5年進級時に受ける試験は？", "c": ["医師国家試験", "TOEFL・IELTS", "CBTとOSCE", "MATとGRE"], "a": 2, "e": "CBT（Computer Based Testing）とOSCE（客観的臨床能力試験）の2つ。"}, "3": {"id": 3, "section": "1. 医学部について", "q": "医師国家試験はいつ実施されるか？", "c": ["4年の10月", "6年の2月", "5年の6月", "6年の12月"], "a": 1, "e": "医学部6年の2月に毎年実施される。"}, "4": {"id": 4, "section": "1. 医学部について", "q": "医師国家試験の合格率はおおよそ何%か？", "c": ["約70〜72%", "約80〜82%", "約90〜92%", "約95〜97%"], "a": 2, "e": "毎年概ね90〜92%程度。"}, "5": {"id": 5, "section": "1. 医学部について", "q": "私立医学部6年間の学費の目安は？", "c": ["約500〜1000万円", "約1000〜1500万円", "約2000〜4500万円", "約5000万円以上"], "a": 2, "e": "国公立は約350万円。私立は約2000〜4500万円と大きな差がある。"}, "6": {"id": 6, "section": "1. 医学部について", "q": "産業医科大学の管轄省庁はどこか？", "c": ["文部科学省", "厚生労働省", "防衛省", "総務省"], "a": 1, "e": "産業医科大学＝厚生労働省、防衛医科大学校＝防衛省、自治医科大学＝総務省。"}, "7": {"id": 7, "section": "1. 医学部について", "q": "川崎医科大学はどの県にあるか？", "c": ["広島県", "神奈川県", "岡山県", "愛媛県"], "a": 2, "e": "岡山県倉敷市に所在。"}, "8": {"id": 8, "section": "1. 医学部について", "q": "弘前大学はどこにあるか？", "c": ["秋田県", "青森県", "岩手県", "山形県"], "a": 1, "e": "青森県弘前市。東北の国立大学医学部の一つ。"}, "90001": {"id": 90001, "section": "1. 医学部について", "q": "国立大学医学部の6年間の学費の目安はどれか？", "c": ["約300〜400万円", "約500〜600万円", "約1000〜1500万円", "約2000万円以上"], "a": 0, "e": "国立大学の学費は約350万円（授業料約54万×6年＋入学金28万円）。私立医学部の2000〜4000万円と比べて大幅に安い。"}, "90002": {"id": 90002, "section": "1. 医学部について", "q": "医学部入学定員が最も多い大学はどれか？", "c": ["東京大学", "日本大学", "順天堂大学", "慶應義塾大学"], "a": 1, "e": "日本大学医学部は入学定員が多い私立医大の一つ。定員は約130名。"}, "10": {"id": 10, "section": "2. 医師の臨床研修制度", "q": "医師臨床研修制度が義務化されたのはいつか？", "c": ["1990年", "1998年", "2004年", "2010年"], "a": 2, "e": "2004年（平成16年）から義務化。それ以前は努力義務だった。"}, "11": {"id": 11, "section": "2. 医師の臨床研修制度", "q": "臨床研修制度の必修科目として含まれないものはどれか？", "c": ["内科・外科", "小児科・産婦人科", "精神科・救急科", "眼科・皮膚科"], "a": 3, "e": "必修7科目は内科・外科・小児科・産婦人科・精神科・救急科・地域医療。眼科・皮膚科は含まれない。"}, "12": {"id": 12, "section": "2. 医師の臨床研修制度", "q": "臨床研修制度の地域偏在とはどういう問題か？", "c": ["地方に研修医が集中する", "都市部に研修医が集中し地方が不足する", "特定の診療科に偏る", "外国人医師が都市に集中する"], "a": 1, "e": "東京・大阪など都市部に研修医が集中し、地方病院で医師不足が生じる問題。"}, "13": {"id": 13, "section": "2. 医師の臨床研修制度", "q": "診療科偏在の説明として正しいものはどれか？", "c": ["外科・産婦人科に人気が偏っている", "眼科・皮膚科などQOLの高い科に人気が偏り外科・産婦人科等が不足", "内科・外科のみが不足", "地域によって偏在は存在しない"], "a": 1, "e": "眼科・皮膚科・放射線科などが人気。外科・産婦人科・救急科が不足傾向。"}, "90010": {"id": 90010, "section": "2. 医師の臨床研修制度", "q": "初期臨床研修の期間は何年間か？", "c": ["1年間", "2年間", "3年間", "4年間"], "a": 1, "e": "初期臨床研修は2年間。その後、後期研修（専攻医）に進む。"}, "90011": {"id": 90011, "section": "2. 医師の臨床研修制度", "q": "臨床研修病院のうち「基幹型」とはどういう病院か？", "c": ["大学病院のみを指す", "研修プログラムの主体となる病院", "協力型病院の別名", "地域医療を担う診療所"], "a": 1, "e": "基幹型研修病院はプログラムの主体。協力型病院と組み合わせて研修を行う。"}, "90012": {"id": 90012, "section": "2. 医師の臨床研修制度", "q": "研修医のマッチング制度とは何か？", "c": ["医学部入試の制度", "研修病院と研修医の希望を調整する制度", "専門医資格の取得制度", "医師免許の更新制度"], "a": 1, "e": "マッチングとは研修医と病院の双方の希望をコンピューターで調整する制度。毎年秋に結果発表。"}, "90013": {"id": 90013, "section": "2. 医師の臨床研修制度", "q": "初期研修終了後に進む「後期研修」の別名はどれか？", "c": ["インターン", "レジデント", "専攻医", "フェロー"], "a": 2, "e": "後期研修医は「専攻医」とも呼ばれる。新専門医制度のもと各基本領域で専門研修を行う。"}, "90014": {"id": 90014, "section": "2. 医師の臨床研修制度", "q": "研修医の給与として一般的な月収の目安はどれか？", "c": ["月5〜10万円", "月15〜20万円", "月30〜40万円", "月60万円以上"], "a": 2, "e": "初期研修医の月収は病院によるが、一般的に月30〜40万円程度が目安。当直手当含む。"}, "90015": {"id": 90015, "section": "2. 医師の臨床研修制度", "q": "臨床研修で必修とされる「地域医療」研修の目的として正しいものはどれか？", "c": ["離島勤務の経験を積む", "地域の医療ニーズや医院経営を学ぶ", "農村での農業体験をする", "行政機関での勤務を経験する"], "a": 1, "e": "地域医療研修は診療所・中小病院での実践を通じ、地域の実情や医院経営・プライマリケアを学ぶ。"}, "15": {"id": 15, "section": "3. 暗記用語集", "q": "OT・PT・STの正しい組み合わせはどれか？", "c": ["OT=理学療法士 PT=作業療法士 ST=言語聴覚士", "OT=作業療法士 PT=理学療法士 ST=言語聴覚士", "OT=言語聴覚士 PT=作業療法士 ST=理学療法士", "OT=作業療法士 PT=言語聴覚士 ST=理学療法士"], "a": 1, "e": "OT=作業療法士、PT=理学療法士、ST=言語聴覚士。"}, "16": {"id": 16, "section": "3. 暗記用語集", "q": "「ウロ」とは何科のことか？", "c": ["脳神経外科", "泌尿器科", "循環器内科", "耳鼻咽喉科"], "a": 1, "e": "Urologyの略。泌尿器科のこと。"}, "17": {"id": 17, "section": "3. 暗記用語集", "q": "「プシコ」とは何科のことか？", "c": ["形成外科", "整形外科", "精神科", "放射線科"], "a": 2, "e": "Psychoの略。精神科のこと。"}, "18": {"id": 18, "section": "3. 暗記用語集", "q": "「ラパロ」とは何を意味するか？", "c": ["内視鏡検査", "腹腔鏡手術", "血管造影検査", "開胸手術"], "a": 1, "e": "Laparoscopyの略。腹腔鏡手術のこと。"}, "19": {"id": 19, "section": "3. 暗記用語集", "q": "「ゾロ薬」とは何か？", "c": ["先発医薬品", "ジェネリック医薬品", "漢方薬", "抗生物質の総称"], "a": 1, "e": "先発品の特許切れ後にゾロゾロ出てくることからジェネリック医薬品の俗称。"}, "20": {"id": 20, "section": "3. 暗記用語集", "q": "「DPC」とは何か？", "c": ["医師の専門医資格制度", "診断群分類別包括評価", "大学病院の教育プログラム", "地域医療計画"], "a": 1, "e": "Diagnosis Procedure Combination。疾患ごとに1日あたり定額で計算する入院費の仕組み。"}, "21": {"id": 21, "section": "3. 暗記用語集", "q": "「ジッツ」とは何か？", "c": ["医師免許の更新制度", "大学医局が医師を派遣する関連病院", "救急外来の当直体制", "フリーランス医師の求人サイト"], "a": 1, "e": "ドイツ語のSitz（席）から。医局が医師を派遣する先の関連病院のこと。"}, "22": {"id": 22, "section": "3. 暗記用語集", "q": "CTとMRIの違いとして正しいものはどれか？", "c": ["CTは磁気・MRIはX線を使う", "CTはX線・MRIは磁気と電波を使う", "両方ともX線を使う", "両方とも磁気を使う"], "a": 1, "e": "CT＝X線使用で短時間。MRI＝磁気と電波で軟部組織の描出に優れるが時間がかかる。"}, "90020": {"id": 90020, "section": "3. 暗記用語集", "q": "「オペ室」とは何の略称か？", "c": ["外来診察室", "手術室", "集中治療室", "処置室"], "a": 1, "e": "オペ室はOperation Room（手術室）の略称。「オペ」はオペレーション（手術）の略で現場でよく使われる。"}, "90021": {"id": 90021, "section": "3. 暗記用語集", "q": "「コメディカル」とは何を指すか？", "c": ["医師の補助をする事務職", "医師・歯科医師以外の医療専門職の総称", "病院の経営管理職", "医学部の教授陣"], "a": 1, "e": "コメディカルは看護師・薬剤師・理学療法士など医師以外の医療専門職の総称。"}, "28": {"id": 28, "section": "4. 新専門医制度", "q": "新専門医制度が本格始動したのはいつか？", "c": ["2010年", "2014年", "2018年", "2022年"], "a": 2, "e": "2018年（平成30年）に本格始動。"}, "29": {"id": 29, "section": "4. 新専門医制度", "q": "新専門医制度を運営する機構の名前は？", "c": ["日本医師会", "日本専門医機構", "厚生労働省医事課", "中央社会保険医療協議会"], "a": 1, "e": "日本専門医機構が認定・管理を行う。"}, "30": {"id": 30, "section": "4. 新専門医制度", "q": "新専門医制度の基本領域はいくつあるか？", "c": ["12領域", "15領域", "19領域", "23領域"], "a": 2, "e": "内科・外科・小児科など19の基本領域がある。"}, "90030": {"id": 90030, "section": "4. 新専門医制度", "q": "新専門医制度における「サブスペシャルティ領域」とはどれか？", "c": ["基本19領域のこと", "基本領域の上に積み上げる細分化された専門領域", "初期研修の選択科目", "診療科の別名"], "a": 1, "e": "サブスペシャルティ領域は基本領域取得後に取得できる細分化された専門領域（例：消化器内科・循環器内科など）。"}, "90031": {"id": 90031, "section": "4. 新専門医制度", "q": "専門医取得のために必要な研修期間は一般的に何年か？", "c": ["1年", "2年", "3年以上", "5年以上"], "a": 2, "e": "専攻医として専門研修を3〜4年経て専門医試験を受験するのが一般的。領域により異なる。"}, "90032": {"id": 90032, "section": "4. 新専門医制度", "q": "専門医制度で問題となった「地域偏在」とはどういう問題か？", "c": ["専門医が都市部の大病院に集中し地方が不足", "専門医が地方に集中し都市部が不足", "専門医の数が多すぎる", "専門医の試験が難しすぎる"], "a": 0, "e": "専門医取得には大病院での症例数が必要なため都市集中が起こりやすく、地方の医師不足が深刻化する懸念がある。"}, "90033": {"id": 90033, "section": "4. 新専門医制度", "q": "内科専門医の研修プログラムの特徴として正しいものはどれか？", "c": ["内科のみで完結する", "総合内科・各サブ科をローテーションする", "外科研修が必須含まれる", "1年で取得できる"], "a": 1, "e": "内科専門医プログラムは消化器・循環器・呼吸器など各内科をローテーションして幅広い内科力を養う。"}, "90034": {"id": 90034, "section": "4. 新専門医制度", "q": "新専門医制度導入の主な目的はどれか？", "c": ["医師の給与水準を統一する", "専門医の質を担保し国民に分かりやすい専門医制度を構築する", "医師数を減らして医療費を抑制する", "外国人医師の受け入れを拡大する"], "a": 1, "e": "旧来の学会ごとにバラバラだった専門医制度を統一し、質の担保と国民への分かりやすさを目指した。"}, "90035": {"id": 90035, "section": "4. 新専門医制度", "q": "外科専門医取得に必要な手術件数の目安はどれか？", "c": ["50件以上", "100件以上", "200件以上", "500件以上"], "a": 2, "e": "外科専門医には200件以上の術者経験が必要。症例の多様性も審査される。"}, "90036": {"id": 90036, "section": "4. 新専門医制度", "q": "専門医制度における「指導医」の役割はどれか？", "c": ["専攻医の給与を決定する", "専攻医の研修を指導・評価する", "病院の経営を管理する", "専攻医の就職先を決める"], "a": 1, "e": "指導医は専攻医の日常的な研修指導・症例フィードバック・評価を行う役割を担う。"}, "31": {"id": 31, "section": "5. 病院の種類と病棟", "q": "病院と診療所の違いはどれか？", "c": ["病院は10床以上・診療所は9床以下", "病院は20床以上・診療所は19床以下または無床", "病院は50床以上・診療所は49床以下", "規模の違いはなく名称の違いだけ"], "a": 1, "e": "医療法上、病院＝20床以上。診療所＝19床以下または無床。"}, "32": {"id": 32, "section": "5. 病院の種類と病棟", "q": "病棟の種類として含まれないものはどれか？", "c": ["一般病棟", "療養病棟", "回復期リハビリテーション病棟", "美容病棟"], "a": 3, "e": "主な病棟は一般・療養・回復期リハビリ・地域包括ケア・精神の5種類。美容病棟は存在しない。"}, "90040": {"id": 90040, "section": "5. 病院の種類と病棟", "q": "特定機能病院の認定要件として正しいものはどれか？", "c": ["病床数100床以上", "高度医療の提供・研修機能・400床以上など", "救急指定を受けていること", "訪問診療を行っていること"], "a": 1, "e": "特定機能病院は高度医療・研修機能・400床以上・集中治療室設置などの要件を満たす必要がある。"}, "90041": {"id": 90041, "section": "5. 病院の種類と病棟", "q": "地域医療支援病院の主な役割はどれか？", "c": ["地域の診療所からの紹介患者を受け入れる", "離島・へき地の診療所を運営する", "美容外科・自費診療を専門とする", "訪問看護を主体とする"], "a": 0, "e": "地域医療支援病院は紹介患者の受け入れ・逆紹介・共同利用・救急医療を担い地域連携の拠点となる。"}, "90042": {"id": 90042, "section": "5. 病院の種類と病棟", "q": "回復期リハビリテーション病棟の対象となる主な疾患はどれか？", "c": ["悪性腫瘍・がん治療", "脳卒中・大腿骨骨折などのリハビリ", "感染症の隔離治療", "精神疾患の長期入院"], "a": 1, "e": "回復期リハビリ病棟は脳卒中・骨折などの術後患者に集中リハビリを提供し在宅復帰を目指す。"}, "90043": {"id": 90043, "section": "5. 病院の種類と病棟", "q": "療養病棟に入院する患者の特徴として正しいものはどれか？", "c": ["急性期の手術が必要な患者", "長期療養が必要な慢性期・安定期の患者", "精神科的治療が必要な患者", "出産・分娩を控えた患者"], "a": 1, "e": "療養病棟は長期入院が必要な慢性疾患・医療依存度の高い患者を受け入れる。急性期病棟より診療報酬が低い。"}, "90044": {"id": 90044, "section": "5. 病院の種類と病棟", "q": "DPC対象病院の特徴として正しいものはどれか？", "c": ["出来高払いで全て算定する病院", "診断群分類による1日定額払いを採用している急性期病院", "訪問診療専門の病院", "透析専門クリニック"], "a": 1, "e": "DPC対象病院は診断群分類（DPC）に基づく包括払いを採用する急性期病院。全国に約1800病院が指定されている。"}, "90045": {"id": 90045, "section": "5. 病院の種類と病棟", "q": "大学病院の主な役割として含まれないものはどれか？", "c": ["高度医療・最先端治療の提供", "医学生・研修医の教育", "医学研究・臨床試験", "一般企業の健康診断のみを行う"], "a": 3, "e": "大学病院は高度医療・教育・研究の三機能を担う。健康診断は行うが主目的ではない。"}, "90046": {"id": 90046, "section": "5. 病院の種類と病棟", "q": "ICU（集中治療室）とHCU（高度治療室）の違いはどれか？", "c": ["ICUは外科専用、HCUは内科専用", "ICUは最重症患者、HCUはICUより状態が安定した患者向け", "両者は同じ施設を指す", "HCUは小児専用の集中治療室"], "a": 1, "e": "ICUは最重症・集中管理が必要な患者向け。HCUはICUより状態が安定しているが一般病棟より管理が必要な患者向け。"}, "90047": {"id": 90047, "section": "5. 病院の種類と病棟", "q": "緩和ケア病棟（ホスピス）の主な対象はどれか？", "c": ["急性期の手術患者", "がんや難病などで治癒が困難な患者の苦痛緩和・QOL向上を目的とした入院", "透析患者", "精神疾患の長期入院患者"], "a": 1, "e": "緩和ケア病棟はがんや難病で根治が困難な患者の身体的・精神的苦痛を和らげQOLを高めることを目的とする。"}, "33": {"id": 33, "section": "6. 医師の働き方改革", "q": "医師への働き方改革が適用開始されたのはいつか？", "c": ["2019年4月", "2022年4月", "2024年4月", "2026年4月"], "a": 2, "e": "一般労働者は2019年4月〜。医師は5年間の猶予を経て2024年4月〜適用。"}, "34": {"id": 34, "section": "6. 医師の働き方改革", "q": "医師のA水準の時間外労働上限は？", "c": ["年480時間以下", "年720時間以下", "年960時間以下", "年1860時間以下"], "a": 2, "e": "A水準＝年960時間以下。B・C水準は年1860時間以下。"}, "90050": {"id": 90050, "section": "6. 医師の働き方改革", "q": "医師の時間外労働「B水準」が適用される施設はどれか？", "c": ["一般的な診療所", "地域医療確保のため必要と認められた病院", "美容外科クリニック", "訪問診療専門の診療所"], "a": 1, "e": "B水準は地域医療確保のため必要と認められた病院に適用。上限は年1860時間。"}, "90051": {"id": 90051, "section": "6. 医師の働き方改革", "q": "医師の働き方改革で新設された「連続勤務時間制限」の内容はどれか？", "c": ["連続24時間以上の勤務は禁止", "28時間超連続勤務後は9時間以上の休息を確保", "48時間勤務後に24時間休息", "勤務間インターバルは最低6時間"], "a": 1, "e": "長時間勤務後の疲労回復のため、28時間超の連続勤務後は9時間以上のインターバルが義務化。"}, "90052": {"id": 90052, "section": "6. 医師の働き方改革", "q": "医師の働き方改革が医師紹介に与える影響として正しいものはどれか？", "c": ["常勤医師の需要が減少する", "当直・オンコール対応ができる医師の需要が高まる", "アルバイト求人が消滅する", "医師の給与が一律に下がる"], "a": 1, "e": "時間外制限により人手不足が深刻化。特に当直・オンコール対応可能な常勤・非常勤医師の需要が増加。"}, "90053": {"id": 90053, "section": "6. 医師の働き方改革", "q": "医師の時間外労働が年960時間を超える場合に必要な対応はどれか？", "c": ["自動的に解雇となる", "労働局への届け出と医師への面接指導が必要", "罰金のみが科せられる", "特段の対応は不要"], "a": 1, "e": "960時間超の場合、産業医等による面接指導の実施が義務付けられている。医師の健康確保が目的。"}, "90054": {"id": 90054, "section": "6. 医師の働き方改革", "q": "「宿日直許可」とは何か？", "c": ["医師が自由に休日を取れる制度", "労働基準監督署の許可を得た軽度の業務に限定した待機当直", "病院が独自に定める当直規則", "医師の残業を無制限に許可する制度"], "a": 1, "e": "宿日直許可とは、通常業務でなく待機・軽度な対応のみを行う当直に適用される特例。時間外労働に算入されない。"}, "90055": {"id": 90055, "section": "6. 医師の働き方改革", "q": "医師の副業・アルバイトと働き方改革の関係として正しいものはどれか？", "c": ["副業は全面禁止となった", "副業先の労働時間も通算して上限管理が必要", "副業の時間は上限に含まれない", "副業は大学病院のみ認められる"], "a": 1, "e": "医師の副業・兼業先の時間外労働も通算される。複数の病院で勤務する場合も合計で上限を管理する必要がある。"}, "90056": {"id": 90056, "section": "6. 医師の働き方改革", "q": "働き方改革により医師が減少しやすい勤務形態はどれか？", "c": ["日勤のみの外来診療", "夜間・休日の当直や長時間手術", "在宅勤務・遠隔診療", "行政職・産業医"], "a": 1, "e": "時間外規制により夜間当直・長時間手術などの勤務が制限されやすく、対応できる病院の医師確保が課題。"}, "90057": {"id": 90057, "section": "6. 医師の働き方改革", "q": "医師の働き方改革における「タスクシフト・シェア」とはどれか？", "c": ["医師の業務を看護師等他職種に移管・共有すること", "医師の給与を各診療科でシェアすること", "患者の診療記録を共有すること", "病院間で医師を派遣しあうこと"], "a": 0, "e": "タスクシフト・シェアは医師の業務を看護師・薬剤師・臨床工学技士等に移管し医師の負担を軽減する取り組み。"}, "36": {"id": 36, "section": "7. 消化器内科・内視鏡", "q": "消化器内科が対象とする臓器として含まれないものはどれか？", "c": ["食道・胃・大腸", "肝臓・胆嚢・膵臓", "心臓・肺", "小腸・十二指腸"], "a": 2, "e": "消化器内科は消化管（食道〜大腸）と消化器臓器（肝・胆・膵）を診る。心肺は対象外。"}, "37": {"id": 37, "section": "7. 消化器内科・内視鏡", "q": "内視鏡のシェアトップメーカーはどこか？", "c": ["富士フイルム", "HOYA", "オリンパス", "ニコン"], "a": 2, "e": "オリンパスが世界シェア約70%でトップ。次いで富士フイルム、HOYA。"}, "38": {"id": 38, "section": "7. 消化器内科・内視鏡", "q": "上部・下部内視鏡のアルファベット略称として正しいものはどれか？", "c": ["上部=CF/CS・下部=GF/EGD", "上部=GF/EGD・下部=CF/CS", "上部=ESD・下部=EMR", "上部=ERCP・下部=TUR"], "a": 1, "e": "上部＝GF/EGD（胃カメラ）、下部＝CF/CS（大腸カメラ）。"}, "39": {"id": 39, "section": "7. 消化器内科・内視鏡", "q": "ESDとは何か？", "c": ["内視鏡的粘膜切除術", "内視鏡的粘膜下層剥離術", "経皮的冠動脈インターベンション", "内視鏡的逆行性胆管膵管造影"], "a": 1, "e": "ESD＝内視鏡的粘膜下層剥離術。より広範な病変を一括切除できる高度な手技。"}, "40": {"id": 40, "section": "7. 消化器内科・内視鏡", "q": "セデーションとは何か？", "c": ["内視鏡のメーカー名", "手術後の管理方法", "内視鏡検査時に鎮静剤を投与し苦痛を軽減すること", "内視鏡洗浄の手順"], "a": 2, "e": "Sedation（鎮静）。検査中の苦痛を軽減するため鎮静剤を使用すること。"}, "304": {"id": 304, "section": "7. 消化器内科・内視鏡", "q": "ERCPとは何か？", "c": ["体外衝撃波結石破砕術", "内視鏡的逆行性胆管膵管造影", "電気けいれん療法", "経皮的冠動脈インターベンション"], "a": 1, "e": "Endoscopic Retrograde Cholangiopancreatography。胆管・膵管の検査・治療に用いる高難度手技。"}, "91001": {"id": 91001, "section": "7. 消化器内科・内視鏡", "q": "ポリペクトミーとは何か？", "c": ["内視鏡的な粘膜切除術", "内視鏡を使ったポリープ切除術", "胃の切除手術", "腸の洗浄処置"], "a": 1, "e": "ポリペクトミーは内視鏡でポリープをスネアで切除する手術。大腸ポリープの切除に多用される。"}, "91002": {"id": 91002, "section": "7. 消化器内科・内視鏡", "q": "消化器内科における「H.pylori」とは何か？", "c": ["肝炎ウイルス", "ヘリコバクター・ピロリ菌", "大腸菌の一種", "消化酵素の名称"], "a": 1, "e": "H.pylori（ヘリコバクター・ピロリ）は胃潰瘍・胃がんの主要原因菌。除菌療法が標準治療。"}, "91003": {"id": 91003, "section": "7. 消化器内科・内視鏡", "q": "肝硬変の主な原因として最も多いものはどれか？", "c": ["過食・肥満のみ", "B型・C型肝炎ウイルス感染やアルコール", "ストレスと睡眠不足", "薬剤性肝障害のみ"], "a": 1, "e": "肝硬変の主因はB型・C型肝炎ウイルスとアルコール性肝障害。近年は非アルコール性脂肪肝も増加。"}, "91004": {"id": 91004, "section": "7. 消化器内科・内視鏡", "q": "消化器内科クリニックで需要の高い処置として正しいものはどれか？", "c": ["冠動脈カテーテル検査", "定期的な上部・下部内視鏡検査", "MRI撮影", "人工透析"], "a": 1, "e": "消化器内科クリニックでは上部（胃カメラ）・下部（大腸カメラ）の定期的な内視鏡検査が収益の柱。"}, "41": {"id": 41, "section": "8. 循環器内科", "q": "循環器内科が主に診る部位はどれか？", "c": ["肺・気管支", "心臓と血管", "消化管全般", "脳・神経系"], "a": 1, "e": "心臓と血管を中心とした循環器系全般。"}, "42": {"id": 42, "section": "8. 循環器内科", "q": "PCI（経皮的冠動脈インターベンション）とは何か？", "c": ["心臓弁の手術", "カテーテルで狭窄した冠動脈を広げる治療", "人工心肺を使った手術", "心臓移植手術"], "a": 1, "e": "細いカテーテルを血管内に挿入し、バルーンやステントで冠動脈の狭窄を治療する。"}, "43": {"id": 43, "section": "8. 循環器内科", "q": "カテーテルを挿入する主な部位はどれか？", "c": ["首の静脈・腹部動脈", "手首の橈骨動脈や足の付け根の大腿動脈", "膝の動脈・肩の静脈", "背部の静脈"], "a": 1, "e": "橈骨動脈（手首）や大腿動脈（足の付け根）から挿入するのが一般的。"}, "306": {"id": 306, "section": "8. 循環器内科", "q": "循環器内科で確認するホルター検査とは何か？", "c": ["12誘導心電図", "24時間ホルター心電図", "運動負荷心電図", "心臓MRI"], "a": 1, "e": "24時間装着して心電図を記録するホルター心電図。不整脈の診断に有効。"}, "307": {"id": 307, "section": "8. 循環器内科", "q": "ABI/PWV検査とは何の検査か？", "c": ["肺機能検査", "動脈硬化検査", "腎機能検査", "脳血流検査"], "a": 1, "e": "ABI＝足関節上腕血圧比、PWV＝脈波伝播速度。動脈硬化の程度を評価する。"}, "91010": {"id": 91010, "section": "8. 循環器内科", "q": "心房細動のカテーテル治療として正しいものはどれか？", "c": ["PCI", "CABG", "アブレーション", "TAVI"], "a": 2, "e": "アブレーションは心房細動の原因部位をカテーテルで焼灼する治療。根治を目指せる。"}, "91011": {"id": 91011, "section": "8. 循環器内科", "q": "TAVIとは何の治療か？", "c": ["冠動脈のバイパス術", "カテーテルによる大動脈弁置換術", "心臓ペースメーカーの植え込み", "心房中隔欠損の閉鎖術"], "a": 1, "e": "TAVI（経カテーテル大動脈弁植え込み術）は開胸せずカテーテルで大動脈弁を置換する低侵襲治療。"}, "91012": {"id": 91012, "section": "8. 循環器内科", "q": "循環器内科医の求人で確認すべきカテーテル件数として適切なものはどれか？", "c": ["年間件数・緊急対応の有無", "外来患者数のみ", "訪問診療の件数", "ICU管理日数"], "a": 0, "e": "カテーテル治療経験が豊富かを確認するため、年間件数と緊急PCIの有無は必須確認事項。"}, "91013": {"id": 91013, "section": "8. 循環器内科", "q": "ICD（植え込み型除細動器）の目的はどれか？", "c": ["血圧を自動で管理する", "致死性不整脈を感知し電気ショックで停止させる", "心臓の拡張を補助する", "ペースメーカーの別名"], "a": 1, "e": "ICDは致死性不整脈（心室細動など）を感知し自動的に電気ショックを与えて正常リズムに戻す装置。"}, "91014": {"id": 91014, "section": "8. 循環器内科", "q": "心不全の急性増悪時に最初に行う処置はどれか？", "c": ["即時カテーテル検査", "酸素投与・利尿剤などの内科的管理", "冠動脈バイパス手術", "透析導入"], "a": 1, "e": "急性心不全では酸素投与・利尿剤・血管拡張薬などの内科的管理が第一選択。状態安定後に精査。"}, "45": {"id": 45, "section": "9. 呼吸器科", "q": "呼吸器外科が対象とする臓器として含まれないものはどれか？", "c": ["肺・気管・気管支", "胸膜・縦隔", "食道・胃", "肺がんの外科治療"], "a": 2, "e": "呼吸器外科は肺・気管・気管支・胸膜・縦隔が対象。食道・胃は消化器外科。"}, "46": {"id": 46, "section": "9. 呼吸器科", "q": "肺がん手術で使われるロボット名は何か？", "c": ["ROBODOC", "MAKO", "da Vinci", "Mazor X"], "a": 2, "e": "da Vinci（Intuitive Surgical社製）が代表的な手術支援ロボット。"}, "311": {"id": 311, "section": "9. 呼吸器科", "q": "呼吸器内科の気管支鏡検査として含まれないものはどれか？", "c": ["BAL", "TBLB", "膀胱鏡検査", "気管支擦過細胞診"], "a": 2, "e": "膀胱鏡は泌尿器科の手技。気管支鏡は気道・肺の検査に使用。"}, "313": {"id": 313, "section": "9. 呼吸器科", "q": "呼吸器内科クリニックでCPAP管理外来を持つ意義はどれか？", "c": ["透析収益の向上", "SAS患者の継続管理で安定外来収益", "美容施術の提供", "分娩管理のため"], "a": 1, "e": "SAS患者はCPAP装置を継続使用するため、定期的な外来受診が必要で安定収益につながる。"}, "91020": {"id": 91020, "section": "9. 呼吸器科", "q": "COPD（慢性閉塞性肺疾患）の最大の危険因子はどれか？", "c": ["花粉症", "喫煙", "運動不足", "睡眠時無呼吸"], "a": 1, "e": "COPDの最大危険因子は喫煙。長年の喫煙により気道が慢性的に炎症・狭窄する疾患。"}, "91021": {"id": 91021, "section": "9. 呼吸器科", "q": "肺がんの診断に最もよく使われる検査はどれか？", "c": ["血液検査のみ", "CT検査・気管支鏡・PET-CT", "X線のみ", "MRIのみ"], "a": 1, "e": "肺がんの診断にはCT・気管支鏡による組織採取・PET-CTが主に用いられる。"}, "91022": {"id": 91022, "section": "9. 呼吸器科", "q": "呼吸器内科医が専門とする主な疾患として含まれないものはどれか？", "c": ["肺炎・気管支炎", "喘息・COPD", "肺がん", "心筋梗塞"], "a": 3, "e": "心筋梗塞は循環器内科の専門領域。呼吸器内科は肺・気道・胸膜の疾患を専門とする。"}, "91023": {"id": 91023, "section": "9. 呼吸器科", "q": "SAS（睡眠時無呼吸症候群）の標準治療はどれか？", "c": ["手術のみ", "CPAP療法", "抗生剤投与", "抗アレルギー薬の内服"], "a": 1, "e": "中等症以上のSASには夜間のCPAP（持続陽圧呼吸）療法が標準治療。呼吸器科・内科が管理する。"}, "91024": {"id": 91024, "section": "9. 呼吸器科", "q": "胸腔鏡手術（VATS）の特徴として正しいものはどれか？", "c": ["開胸して行う大きな手術", "内視鏡を使った低侵襲な肺・胸膜手術", "腹腔鏡の別名", "ロボット手術のみを指す"], "a": 1, "e": "VATS（胸腔鏡補助下手術）は小切開で内視鏡を挿入する低侵襲手術。術後回復が早い。"}, "91025": {"id": 91025, "section": "9. 呼吸器科", "q": "喘息の長期管理薬として第一選択となるものはどれか？", "c": ["抗生剤", "吸入ステロイド薬", "利尿剤", "抗血小板薬"], "a": 1, "e": "喘息の長期管理には吸入ステロイド薬が第一選択。気道の炎症を抑制し発作を予防する。"}, "47": {"id": 47, "section": "10. 心臓血管外科", "q": "CABGとは何の手術か？", "c": ["大動脈弁置換術", "冠動脈バイパス手術", "心臓移植手術", "心房細動のアブレーション"], "a": 1, "e": "CABG＝Coronary Artery Bypass Grafting。狭窄した冠動脈をバイパスする手術。"}, "48": {"id": 48, "section": "10. 心臓血管外科", "q": "オフポンプ手術とは何か？", "c": ["人工心肺を使いながら行う手術", "人工心肺を使わず心臓を動かしたまま行う手術", "ロボット支援手術", "内視鏡を使った心臓手術"], "a": 1, "e": "Off-pump CABG。人工心肺なしで行う冠動脈バイパス手術。合併症リスクが低い。"}, "49": {"id": 49, "section": "10. 心臓血管外科", "q": "上皇さまの冠動脈バイパス手術を執刀した医師は誰か？", "c": ["福島孝徳医師", "天野篤医師", "渡辺剛医師", "小林純人医師"], "a": 1, "e": "天野篤医師。順天堂大学教授。2012年に上皇さまの手術を執刀。"}, "91030": {"id": 91030, "section": "10. 心臓血管外科", "q": "大動脈瘤の手術適応となる胸部大動脈瘤の直径の目安はどれか？", "c": ["3cm以上", "5cm以上", "8cm以上", "10cm以上"], "a": 1, "e": "胸部大動脈瘤は直径5cm以上（部位により異なる）が手術適応の目安。破裂リスクが高まる。"}, "91031": {"id": 91031, "section": "10. 心臓血管外科", "q": "心臓血管外科で使用する人工心肺の役割はどれか？", "c": ["麻酔を管理する", "心臓・肺の機能を代替し体外循環を維持する", "血圧を自動調整する", "感染を予防する"], "a": 1, "e": "人工心肺は手術中に心臓と肺の機能を代行し、全身に酸素を送り続ける体外循環装置。"}, "91032": {"id": 91032, "section": "10. 心臓血管外科", "q": "EVAR（血管内大動脈修復術）とは何か？", "c": ["開胸による大動脈弁置換", "カテーテルを使ったステントグラフトによる大動脈瘤治療", "冠動脈バイパス術の一種", "心臓移植手術"], "a": 1, "e": "EVARはカテーテルでステントグラフトを留置し大動脈瘤を修復する低侵襲手術。開腹・開胸不要。"}, "91033": {"id": 91033, "section": "10. 心臓血管外科", "q": "心臓血管外科医のスキルチェックで確認すべき手術件数はどれか？", "c": ["外来患者数", "CABG・弁膜症手術などの年間執刀件数", "当直回数", "学会発表数"], "a": 1, "e": "心臓血管外科医の技量はCABG・弁置換・大動脈手術等の年間執刀件数が最重要の確認項目。"}, "91034": {"id": 91034, "section": "10. 心臓血管外科", "q": "弁膜症手術のうち「弁形成術」と「弁置換術」の違いはどれか？", "c": ["弁形成は人工弁を使う・弁置換は自己弁を修復", "弁形成は自己弁を修復・弁置換は人工弁に取り替える", "両者は同じ手術の別名", "弁形成は内科的治療を指す"], "a": 1, "e": "弁形成術は自分の弁を修復して残す手術。弁置換術は機械弁・生体弁に入れ替える手術。"}, "91035": {"id": 91035, "section": "10. 心臓血管外科", "q": "心臓移植の適応となる主な疾患はどれか？", "c": ["安定した狭心症", "末期心不全・拡張型心筋症など", "軽度の心房細動", "高血圧のみ"], "a": 1, "e": "心臓移植は末期心不全・拡張型心筋症など内科的治療が困難な重症例が対象。日本では待機期間が長い。"}, "91036": {"id": 91036, "section": "10. 心臓血管外科", "q": "心臓血管外科の緊急手術で最も多い疾患はどれか？", "c": ["慢性心不全", "急性大動脈解離・急性心筋梗塞の合併症", "慢性弁膜症", "安定狭心症"], "a": 1, "e": "急性大動脈解離（特にA型）は生命直結の緊急手術。AMIの機械的合併症も緊急手術となる。"}, "52": {"id": 52, "section": "11. グループ病院", "q": "代表的な医療グループとして含まれないものはどれか？", "c": ["徳洲会", "IMSグループ", "TMG", "テスラグループ"], "a": 3, "e": "テスラはEV自動車メーカー。医療グループは徳洲会・IMS・TMG・AMGなどが有名。"}, "53": {"id": 53, "section": "11. グループ病院", "q": "グループ病院のデメリットはどれか？", "c": ["福利厚生が充実している", "グループ内異動が可能", "転勤の可能性・組織のルールに縛られる", "研修制度が整っている"], "a": 2, "e": "グループ内での転勤・異動がある点と、給与の個別交渉が難しい点がデメリット。"}, "92001": {"id": 92001, "section": "11. グループ病院", "q": "徳洲会グループの特徴として正しいものはどれか？", "c": ["外来専門のクリニックのみ運営", "365日24時間救急対応を理念とする病院グループ", "美容外科専門グループ", "訪問診療専門グループ"], "a": 1, "e": "徳洲会は「いつでも、どこでも、誰でも最善の医療を提供する」を理念に24時間救急対応を行う大型グループ。"}, "92002": {"id": 92002, "section": "11. グループ病院", "q": "IMSグループの本拠地はどこか？", "c": ["大阪", "名古屋", "東京・埼玉を中心とした関東", "福岡"], "a": 2, "e": "IMSグループは東京・埼玉・神奈川を中心に展開する医療グループ。イムスとも呼ばれる。"}, "92003": {"id": 92003, "section": "11. グループ病院", "q": "グループ病院に就職するメリットはどれか？", "c": ["完全独立・自由診療が可能", "グループ内異動・キャリアパスが整いやすい", "当直が一切ない", "収入が最も高い"], "a": 1, "e": "グループ病院はキャリアアップのための異動・転籍が可能で、研修制度や福利厚生が整いやすい。"}, "92004": {"id": 92004, "section": "11. グループ病院", "q": "TMGグループの正式名称はどれか？", "c": ["東京メディカルグループ", "戸田中央メディカルケアグループ", "東海メディカルグループ", "東北メディカルグループ"], "a": 1, "e": "TMGは戸田中央メディカルケアグループの略。埼玉県を中心に多数の病院・施設を展開。"}, "92005": {"id": 92005, "section": "11. グループ病院", "q": "グループ病院への医師紹介において特に重要な確認事項はどれか？", "c": ["グループ内の転勤・異動の可能性", "病院の建物の築年数", "院長の出身大学", "駐車場の台数"], "a": 0, "e": "グループ病院への紹介では転勤・異動の可能性や範囲を必ず確認する。希望しない医師には重要な条件。"}, "92006": {"id": 92006, "section": "11. グループ病院", "q": "医療グループが拡大するメリットとして正しいものはどれか？", "c": ["各病院が完全に独立して経営できる", "購買・人材・システムのスケールメリットが得られる", "医師の給与が自動的に上がる", "診療科の制限がなくなる"], "a": 1, "e": "グループ化により医薬品の共同購入・人材の融通・ITシステムの共有などコスト効率が向上する。"}, "92007": {"id": 92007, "section": "11. グループ病院", "q": "グループ病院と単独病院の違いとして正しいものはどれか？", "c": ["グループ病院は必ず高収益", "単独病院は経営リスクが低い", "グループ病院は組織のルールがある分、個人の裁量が制限されやすい", "単独病院はグループより高度医療を提供できる"], "a": 2, "e": "グループ病院は組織ルール・方針に従う必要があり、個人の裁量が制限される場合がある。"}, "92008": {"id": 92008, "section": "11. グループ病院", "q": "日本で最大規模の医療法人グループはどれか？", "c": ["IMSグループ", "徳洲会グループ", "TMGグループ", "聖隷福祉事業団"], "a": 1, "e": "徳洲会は全国に70以上の病院を持つ日本最大規模の医療法人グループの一つ。"}, "57": {"id": 57, "section": "12. 形成外科", "q": "マイクロサージャリーとは何か？", "c": ["内視鏡を使った胃の手術", "顕微鏡下で微小な血管や神経を縫合する手術技法", "レーザーを使った皮膚治療", "ロボット支援による骨折手術"], "a": 1, "e": "顕微鏡下で0.5〜1mm以下の血管・神経を縫合する高度な手術技法。"}, "59": {"id": 59, "section": "12. 形成外科", "q": "形成外科が皮膚科と異なる最大の特徴はどれか？", "c": ["アレルギー疾患の診断・治療が中心", "薬物療法による皮膚炎治療が専門", "白癬・ウイルス感染症の治療が主業務", "外科的再建・機能回復を目的とした手術が中心"], "a": 3, "e": "皮膚科は薬・外用剤による内科的アプローチが中心。形成外科は腫瘍切除・瘢痕修正・再建手術など外科的手技が専門で、機能回復と整容が目的。"}, "92010": {"id": 92010, "section": "12. 形成外科", "q": "形成外科が担う主な疾患・治療として正しいものはどれか？", "c": ["心臓手術・冠動脈バイパス", "先天異常・外傷・腫瘍切除後の再建", "内視鏡手術全般", "透析アクセス管理"], "a": 1, "e": "形成外科は体表面の先天異常・外傷・腫瘍切除後の再建・瘢痕修正など広範に担う。"}, "92011": {"id": 92011, "section": "12. 形成外科", "q": "乳房再建手術を担う診療科として正しいものはどれか？", "c": ["循環器内科", "脳神経外科", "形成外科", "泌尿器科"], "a": 2, "e": "乳癌手術後の乳房再建は形成外科が担う。インプラント・自家組織など複数の方法がある。"}, "92012": {"id": 92012, "section": "12. 形成外科", "q": "遊離皮弁とは何か？", "c": ["皮膚のレーザー脱毛", "血管付きで切り取った組織を別の部位に移植する手術", "皮膚の一部を切除する処置", "脂肪吸引手術"], "a": 1, "e": "遊離皮弁はマイクロサージャリーを用いて血管ごと組織を切り取り別部位へ移植する再建法。"}, "92013": {"id": 92013, "section": "12. 形成外科", "q": "形成外科と整形外科の違いとして正しいものはどれか？", "c": ["形成外科は骨・関節が専門", "整形外科は体表面・皮膚が専門", "形成外科は体表・再建が専門・整形外科は骨格・運動器が専門", "両者は同一診療科の別名"], "a": 2, "e": "形成外科は体表面の形態回復・再建が専門。整形外科は骨・関節・筋肉などの運動器が専門。"}, "92014": {"id": 92014, "section": "12. 形成外科", "q": "熱傷（やけど）の専門的治療を担う診療科はどれか？", "c": ["消化器外科", "泌尿器科", "形成外科・救急外科", "呼吸器外科"], "a": 2, "e": "重症熱傷は形成外科・救急外科が連携して治療する。皮膚移植など形成外科的手技が必要。"}, "92015": {"id": 92015, "section": "12. 形成外科", "q": "形成外科医が美容外科クリニックに転職する際の利点はどれか？", "c": ["外科スキルを全く使わなくてよい", "形成外科の技術・知識が美容手術に直結する", "保険診療のみになる", "当直が増える"], "a": 1, "e": "形成外科医は縫合・組織操作などの高い技術を持ち、美容外科での手術スキルに直結する。"}, "92016": {"id": 92016, "section": "12. 形成外科", "q": "ケロイドと肥厚性瘢痕の違いとして正しいものはどれか？", "c": ["全く同じ疾患の別名", "ケロイドは傷の範囲を超えて増殖・肥厚性瘢痕は傷の範囲内に留まる", "肥厚性瘢痕の方が重症", "ケロイドは自然治癒する"], "a": 1, "e": "ケロイドは傷の範囲を超えて増殖し自然消退しにくい。肥厚性瘢痕は傷の範囲内で自然改善することがある。"}, "92017": {"id": 92017, "section": "12. 形成外科", "q": "形成外科専門医取得後に取得できるサブスペシャリティはどれか？", "c": ["循環器専門医", "美容外科専門医", "心臓血管外科専門医", "消化器外科専門医"], "a": 1, "e": "形成外科専門医取得後に美容外科専門医などのサブスペシャリティ取得が可能。"}, "60": {"id": 60, "section": "13. 整形外科", "q": "整形外科の主な専門分野として含まれないものはどれか？", "c": ["脊椎", "関節", "スポーツ整形", "消化器疾患"], "a": 3, "e": "整形外科の4大分野は脊椎・関節・外傷（骨折）・スポーツ整形。"}, "316": {"id": 316, "section": "13. 整形外科", "q": "整形外科スキルチェックで可能な外来として含まれないものはどれか？", "c": ["脊椎外来", "リウマチ外来", "透析外来", "スポーツ外来"], "a": 2, "e": "透析外来は腎臓内科・泌尿器科の分野。整形外科は脊椎・関節・スポーツ・リウマチなど。"}, "318": {"id": 318, "section": "13. 整形外科", "q": "整形外科クリニック求人で基本的にない業務はどれか？", "c": ["外来診療", "リハビリ", "手術・病棟管理・当直オンコール", "健診業務"], "a": 2, "e": "クリニックは外来・リハビリ中心。手術・病棟管理・当直はクリニックでは基本ない。"}, "320": {"id": 320, "section": "13. 整形外科", "q": "人工関節置換術の対象として最も多い関節はどれか？", "c": ["肩関節・肘関節", "股関節・膝関節", "足関節・手関節", "顎関節・指関節"], "a": 1, "e": "人工股関節・人工膝関節置換術が最多。高齢化に伴い件数が増加している。"}, "92020": {"id": 92020, "section": "13. 整形外科", "q": "脊椎手術の代表的な術式として正しいものはどれか？", "c": ["椎弓形成術・椎弓切除術", "椎間板摘出術・脊椎固定術", "骨移植術・スクリュー固定術", "脊椎神経剥離術"], "a": 1, "e": "脊椎手術には椎間板ヘルニア摘出・脊柱管狭窄症への除圧術・脊椎固定術などがある。"}, "92021": {"id": 92021, "section": "13. 整形外科", "q": "骨粗鬆症治療で使われる主な薬剤はどれか？", "c": ["インスリン製剤", "ビスホスホネート製剤", "抗生剤", "降圧剤"], "a": 1, "e": "骨粗鬆症の主な治療薬はビスホスホネート製剤・抗RANKL抗体・活性型ビタミンDなど。"}, "92022": {"id": 92022, "section": "13. 整形外科", "q": "スポーツ整形外科で多い靭帯損傷はどれか？", "c": ["大動脈靭帯損傷", "前十字靭帯・内側側副靭帯損傷", "橈骨神経損傷", "腹膜靭帯損傷"], "a": 1, "e": "スポーツ外傷で多いのは膝の前十字靭帯・内側側副靭帯損傷。ACL再建術は整形外科の代表手術。"}, "92023": {"id": 92023, "section": "13. 整形外科", "q": "整形外科クリニックで多い処置・検査はどれか？", "c": ["内視鏡検査・ポリペクトミー", "X線・MRI・関節注射・リハビリ処方", "心臓カテーテル・アブレーション", "透析・血液浄化"], "a": 1, "e": "整形外科クリニックではX線・MRI読影・関節内ステロイド注射・ヒアルロン酸注射・リハビリが主業務。"}, "92024": {"id": 92024, "section": "13. 整形外科", "q": "リウマチの治療で近年主流となっている薬剤はどれか？", "c": ["NSAIDs のみ", "ステロイドのみ", "生物学的製剤・JAK阻害薬", "ビタミン剤"], "a": 2, "e": "関節リウマチには生物学的製剤（TNF阻害薬など）やJAK阻害薬が主流。早期から積極治療が標準。"}, "92025": {"id": 92025, "section": "13. 整形外科", "q": "整形外科医が求人で確認すべき主要スキルはどれか？", "c": ["内視鏡技術", "執刀可能な手術の種類・件数と専門領域", "薬剤の処方歴", "精神科的対応力"], "a": 1, "e": "整形外科求人では脊椎・関節・外傷など専門領域と執刀可能な手術種類・経験件数の確認が必須。"}, "63": {"id": 63, "section": "14. 精神科", "q": "精神科医師が持つ特有の資格はどれか？", "c": ["緩和ケア研修修了証", "産業医資格", "精神保健指定医", "認知症サポート医"], "a": 2, "e": "精神保健指定医は精神科医師の国家資格。措置入院・医療保護入院の判定ができる。"}, "64": {"id": 64, "section": "14. 精神科", "q": "精神保健指定医が持つ権限はどれか？", "c": ["任意入院のみ判定できる", "本人の同意なしに入院させることができる", "手術の執刀ができる", "薬の処方を無制限に出せる"], "a": 1, "e": "指定医のみが措置入院・医療保護入院を判断できる。非指定医はできない。"}, "324": {"id": 324, "section": "14. 精神科", "q": "ECTとは何か？", "c": ["電子カルテのシステム名", "電気けいれん療法", "嚥下機能訓練", "緊急コールチーム"], "a": 1, "e": "Electroconvulsive Therapy（電気けいれん療法）。重篤なうつ病などに用いる。"}, "326": {"id": 326, "section": "14. 精神科", "q": "精神保健指定医の取得に必要な精神科経験年数は？", "c": ["1年以上", "3年以上", "5年以上", "10年以上"], "a": 1, "e": "おおむね3年以上の精神科経験と一定の症例（措置入院・医療保護入院等）が必要。"}, "327": {"id": 327, "section": "14. 精神科", "q": "医療観察法病棟に関係する省庁の組み合わせはどれか？", "c": ["文科省・環境省", "法務省・厚労省", "総務省・経産省", "国交省・財務省"], "a": 1, "e": "医療観察法は精神障害者の触法行為に関する法律。法務省と厚生労働省が管轄。"}, "328": {"id": 328, "section": "14. 精神科", "q": "精神科クリニックで近年増えている自費診療はどれか？", "c": ["白内障手術", "TMS療法", "腹腔鏡手術", "透析"], "a": 1, "e": "TMS療法はうつ病への非侵襲的な治療法。自費診療として普及しつつある。"}, "92030": {"id": 92030, "section": "14. 精神科", "q": "精神科病院の入院形態のうち「任意入院」とはどれか？", "c": ["家族の同意による入院", "本人の同意による自発的入院", "裁判所命令による入院", "警察による措置入院"], "a": 1, "e": "任意入院は本人の同意に基づく入院形態。精神科入院の中で最も多い形態。"}, "92031": {"id": 92031, "section": "14. 精神科", "q": "発達障害の診断・支援を行う精神科・心療内科での近年の傾向はどれか？", "c": ["患者数が減少傾向", "ASD・ADHDの診断需要が急増", "子供のみが対象", "薬物療法が禁止された"], "a": 1, "e": "近年ASD・ADHDの認知向上により成人発達障害の診断・支援需要が急増。クリニックでも増加傾向。"}, "92032": {"id": 92032, "section": "14. 精神科", "q": "精神科クリニックと精神科病院の主な違いはどれか？", "c": ["クリニックは入院機能を持つ", "病院は外来のみ", "クリニックは基本外来中心・病院は入院機能を持つ", "両者に違いはない"], "a": 2, "e": "精神科クリニックは外来診療が中心。精神科病院は入院・医療保護入院・措置入院などを担う。"}, "92033": {"id": 92033, "section": "14. 精神科", "q": "措置入院の権限を持つのは誰か？", "c": ["主治医のみ", "家族の代表者", "都道府県知事・政令市市長", "裁判所のみ"], "a": 2, "e": "措置入院は都道府県知事・政令市市長が2名の精神保健指定医の診察に基づき強制入院を命じる制度。"}, "65": {"id": 65, "section": "15. 放射線科", "q": "放射線科の2種類として正しいものはどれか？", "c": ["放射線診断科と放射線治療科", "放射線外科と放射線内科", "X線科と核医学科", "CT科とMRI科"], "a": 0, "e": "放射線診断科（画像診断）と放射線治療科（がんへの放射線照射）の2種類。"}, "66": {"id": 66, "section": "15. 放射線科", "q": "放射線科は新専門医制度における何か？", "c": ["サブスペシャリティ領域", "基本領域", "特定行為研修", "認定医制度"], "a": 1, "e": "放射線科は基本19領域の一つ。"}, "92040": {"id": 92040, "section": "15. 放射線科", "q": "IVRとは何か？", "c": ["静脈内注射", "画像下治療（カテーテルや針を使った低侵襲治療）", "インフルエンザウイルス検査", "集中治療室の略称"], "a": 1, "e": "IVR（Interventional Radiology）は画像ガイド下でカテーテルや針を使った低侵襲治療。放射線科が担う。"}, "92041": {"id": 92041, "section": "15. 放射線科", "q": "PET検査で使用される主な薬剤はどれか？", "c": ["ヨード造影剤", "FDG（フルオロデオキシグルコース）", "MRI造影剤", "超音波造影剤"], "a": 1, "e": "PET検査では主にFDG（放射性ブドウ糖）を投与。がん細胞への集積を画像化する。"}, "92042": {"id": 92042, "section": "15. 放射線科", "q": "放射線治療で使われるリニアックとは何か？", "c": ["MRI装置の一種", "直線加速器による放射線治療装置", "CT装置の別名", "核医学の検査装置"], "a": 1, "e": "リニアック（線形加速器）は放射線治療で最も広く使われる装置。X線・電子線でがんを照射。"}, "92043": {"id": 92043, "section": "15. 放射線科", "q": "放射線診断科医の主な業務はどれか？", "c": ["手術の執刀", "CT・MRI・X線などの画像読影・診断", "外来での患者診察のみ", "薬剤の処方"], "a": 1, "e": "放射線診断科医は画像読影・診断が主業務。IVR（画像下治療）も担当する。"}, "92044": {"id": 92044, "section": "15. 放射線科", "q": "核医学検査で使われるシンチグラフィとは何か？", "c": ["超音波を使った検査", "放射性同位体を投与して体内の機能を画像化する検査", "CT造影検査", "MRI拡散強調画像"], "a": 1, "e": "シンチグラフィは放射性同位体を投与し体内の機能・代謝を画像化する核医学検査。骨転移診断などに使用。"}, "92045": {"id": 92045, "section": "15. 放射線科", "q": "放射線治療科が対象とする主な疾患はどれか？", "c": ["骨折・外傷", "悪性腫瘍（がん）の放射線治療", "感染症の治療", "精神疾患"], "a": 1, "e": "放射線治療科はがんへの放射線照射が主業務。手術・薬物療法と並ぶがん治療の三本柱の一つ。"}, "92046": {"id": 92046, "section": "15. 放射線科", "q": "ガンマナイフとは何か？", "c": ["外科用メス", "脳腫瘍・脳動静脈奇形などへの放射線定位照射治療装置", "レーザー手術装置", "MRI誘導手術ロボット"], "a": 1, "e": "ガンマナイフは多方向からガンマ線を集中照射する定位放射線治療装置。脳腫瘍・転移性脳腫瘍に使用。"}, "92047": {"id": 92047, "section": "15. 放射線科", "q": "放射線科医が読影する画像として含まれないものはどれか？", "c": ["CT画像", "MRI画像", "X線画像", "心電図波形"], "a": 3, "e": "心電図は循環器内科・内科医が判読する。放射線科医はCT・MRI・X線・核医学などの画像を読影する。"}, "67": {"id": 67, "section": "16. 脳神経外科", "q": "脳血管障害の代表疾患として含まれないものはどれか？", "c": ["脳梗塞", "脳出血", "くも膜下出血", "心筋梗塞"], "a": 3, "e": "心筋梗塞は循環器内科。脳血管障害の3大疾患は脳梗塞・脳出血・くも膜下出血。"}, "68": {"id": 68, "section": "16. 脳神経外科", "q": "脳動脈瘤の治療として正しいものはどれか？", "c": ["コイル塞栓術と開頭クリッピング術", "バイパス手術と弁置換術", "脊椎固定術と椎間板摘出術", "腹腔鏡手術とロボット手術"], "a": 0, "e": "開頭クリッピング術（外科）またはコイル塞栓術（血管内治療）で治療。"}, "69": {"id": 69, "section": "16. 脳神経外科", "q": "神の手と呼ばれる脳神経外科医は誰か？", "c": ["天野篤医師", "福島孝徳医師", "渡辺剛医師", "森山紀之医師"], "a": 1, "e": "福島孝徳医師。キーホール（鍵穴）手術の世界的権威。"}, "330": {"id": 330, "section": "16. 脳神経外科", "q": "クリッピング術とは何の手術か？", "c": ["脳動脈瘤の外科的治療", "脳腫瘍の放射線治療", "脊髄の内視鏡手術", "頸動脈内膜剥離術"], "a": 0, "e": "開頭してクリップで動脈瘤の根元を挟み再破裂を防ぐ手術。"}, "334": {"id": 334, "section": "16. 脳神経外科", "q": "慢性硬膜下血腫の標準的な手術はどれか？", "c": ["開頭血腫除去術", "穿頭ドレナージ術", "コイル塞栓術", "ガンマナイフ治療"], "a": 1, "e": "慢性硬膜下血腫は穿頭（頭に小さな穴を開ける）してドレナージする比較的簡単な手術。"}, "92050": {"id": 92050, "section": "16. 脳神経外科", "q": "脳腫瘍の代表的な悪性腫瘍はどれか？", "c": ["髄膜腫", "神経鞘腫", "膠芽腫", "下垂体腺腫"], "a": 2, "e": "膠芽腫（グリオブラストーマ）は最も悪性度が高い脳腫瘍。予後不良で積極的な集学的治療が必要。"}, "92051": {"id": 92051, "section": "16. 脳神経外科", "q": "脳卒中の超急性期治療として正しいものはどれか？", "c": ["安静のみ", "tPA静注療法・血栓回収療法", "脳外科手術のみ", "透析"], "a": 1, "e": "脳梗塞超急性期にはtPA（血栓溶解薬）静注療法や血管内血栓回収療法が有効。時間が勝負。"}, "92052": {"id": 92052, "section": "16. 脳神経外科", "q": "脊髄腫瘍・椎間板ヘルニアを扱う診療科として正しいものはどれか？", "c": ["循環器内科のみ", "脳神経外科・整形外科", "泌尿器科", "消化器外科"], "a": 1, "e": "脊椎・脊髄疾患は脳神経外科と整形外科の両科が担う。施設により専門が異なる。"}, "92053": {"id": 92053, "section": "16. 脳神経外科", "q": "脳神経外科医が担う頸動脈内膜剥離術の目的はどれか？", "c": ["脳出血の止血", "頸動脈の狭窄を取り除き脳梗塞を予防する", "脳腫瘍の摘出", "頭蓋骨の形成"], "a": 1, "e": "頸動脈内膜剥離術（CEA）は頸動脈の動脈硬化プラークを除去し脳梗塞予防を目的とする手術。"}, "92054": {"id": 92054, "section": "16. 脳神経外科", "q": "脳神経外科クリニックで行われる主な外来業務はどれか？", "c": ["緊急手術が中心", "頭痛・めまい・認知症などの外来診療・MRI読影", "透析管理", "分娩・産科管理"], "a": 1, "e": "脳神経外科クリニックでは頭痛・めまい・認知症・脳ドック（MRI読影）が主な外来業務。"}, "70": {"id": 70, "section": "17. 糖尿病内科", "q": "糖尿病のアルファベット略称はどれか？", "c": ["HD", "DM", "DL", "HT"], "a": 1, "e": "Diabetes Mellitus（ダイアベティス・メリタス）。DMと略す。"}, "72": {"id": 72, "section": "17. 糖尿病内科", "q": "日本の糖尿病患者の約何%が2型糖尿病か？", "c": ["約50%", "約70%", "約80%", "約95%"], "a": 3, "e": "日本では約95%が2型（生活習慣型）。1型は自己免疫による膵β細胞破壊。"}, "73": {"id": 73, "section": "17. 糖尿病内科", "q": "糖尿病の3大合併症「し・め・じ」として正しいものはどれか？", "c": ["心筋梗塞・脳梗塞・壊疽", "神経障害・網膜症・腎症", "肝硬変・腎不全・失明", "高血圧・高脂血症・肥満"], "a": 1, "e": "し＝神経障害、め＝網膜症、じ＝腎症。「しめじ」と覚える。"}, "74": {"id": 74, "section": "17. 糖尿病内科", "q": "近年注目されているGLP-1受容体作動薬として正しいものはどれか？", "c": ["メトホルミン", "インスリン製剤", "オゼンピック", "アマリール"], "a": 2, "e": "オゼンピック（semaglutide）。2型糖尿病・肥満治療薬として世界的に注目。"}, "92060": {"id": 92060, "section": "17. 糖尿病内科", "q": "HbA1cとは何を示す指標か？", "c": ["空腹時血糖値", "過去1〜2ヶ月の平均血糖値", "インスリン分泌量", "腎機能の指標"], "a": 1, "e": "HbA1cは赤血球のヘモグロビンに結合した糖の割合。過去1〜2ヶ月の平均血糖コントロールを反映。"}, "92061": {"id": 92061, "section": "17. 糖尿病内科", "q": "1型糖尿病と2型糖尿病の違いとして正しいものはどれか？", "c": ["1型は生活習慣病・2型は自己免疫疾患", "1型は自己免疫によるインスリン分泌不全・2型は生活習慣が主因", "両者は同じ疾患", "1型は高齢者に多い"], "a": 1, "e": "1型はインスリン産生細胞への自己免疫攻撃が原因。2型は遺伝・肥満・運動不足などの生活習慣が主因。"}, "92062": {"id": 92062, "section": "17. 糖尿病内科", "q": "糖尿病の診断基準として正しいものはどれか？", "c": ["空腹時血糖110mg/dl以上", "空腹時血糖126mg/dl以上またはHbA1c 6.5%以上", "食後血糖140mg/dl以上のみ", "HbA1c 8.0%以上のみ"], "a": 1, "e": "糖尿病の診断基準は空腹時血糖126mg/dl以上またはHbA1c 6.5%以上（複数回確認など条件あり）。"}, "92063": {"id": 92063, "section": "17. 糖尿病内科", "q": "糖尿病腎症の進行で最終的に必要になる治療はどれか？", "c": ["手術", "放射線治療", "人工透析", "抗がん剤"], "a": 2, "e": "糖尿病腎症が進行し末期腎不全に至ると人工透析が必要になる。糖尿病は透析導入の最大原因疾患。"}, "92064": {"id": 92064, "section": "17. 糖尿病内科", "q": "インスリン療法の主な投与経路はどれか？", "c": ["経口投与", "皮下注射", "点眼", "筋肉注射"], "a": 1, "e": "インスリンは消化酵素で分解されるため経口投与不可。皮下注射が標準投与経路。"}, "92065": {"id": 92065, "section": "17. 糖尿病内科", "q": "糖尿病外来で連携が特に重要なコメディカルはどれか？", "c": ["臨床工学技士", "管理栄養士・糖尿病療養指導士", "言語聴覚士", "視能訓練士"], "a": 1, "e": "糖尿病管理では食事療法・生活指導が重要。管理栄養士・糖尿病療養指導士との連携が不可欠。"}, "75": {"id": 75, "section": "18. 訪問診療", "q": "訪問診療医の主な業務として含まれないものはどれか？", "c": ["定期訪問診療", "緊急往診", "看取り", "手術室での外科手術"], "a": 3, "e": "訪問診療の主な業務は定期訪問・緊急往診・看取り。手術室外科手術は含まない。"}, "77": {"id": 77, "section": "18. 訪問診療", "q": "訪問診療と往診の違いとして正しいものはどれか？", "c": ["訪問診療は患者の求めで随時・往診は計画的", "訪問診療は計画的・定期的・往診は患者の求めで随時", "両者は同じ意味", "往診は保険適用外"], "a": 1, "e": "訪問診療＝計画的・定期的訪問。往診＝患者・家族の要請で臨時に対応。"}, "79": {"id": 79, "section": "18. 訪問診療", "q": "要介護認定の段階数として正しいものはどれか？", "c": ["要支援1〜3・要介護1〜5の8段階", "要支援1〜2・要介護1〜5の合計7段階", "要支援1〜5・要介護1〜5の10段階", "要介護1〜10の10段階"], "a": 1, "e": "要支援1〜2（2段階）＋要介護1〜5（5段階）＝合計7段階。"}, "80": {"id": 80, "section": "18. 訪問診療", "q": "サ高住とは何か？", "c": ["差額ベッド代が高い病院", "サービス付き高齢者向け住宅", "在宅医療支援住居", "在宅酸素療法対応施設"], "a": 1, "e": "サービス付き高齢者向け住宅。生活相談・安否確認サービス付きのバリアフリー賃貸住宅。"}, "337": {"id": 337, "section": "18. 訪問診療", "q": "機能強化型在支診（単独型）の主要要件として正しいものはどれか？", "c": ["常勤医1名・緊急往診5件・看取り2件以上", "常勤医3名・緊急往診10件・看取り4件以上", "常勤医5名・緊急往診20件・看取り10件以上", "常勤医2名・緊急往診8件・看取り3件以上"], "a": 1, "e": "単独型在支診の主要要件。連携型は複数施設の合算でも可。"}, "338": {"id": 338, "section": "18. 訪問診療", "q": "訪問診療の診療圏として定められている距離はどれか？", "c": ["自院から半径5km以内", "自院から半径10km以内", "自院から半径16km以内", "制限なし"], "a": 2, "e": "訪問診療は自院から半径16km以内が診療圏の目安。"}, "342": {"id": 342, "section": "18. 訪問診療", "q": "在宅患者訪問診療料の基本月算定回数の上限は？", "c": ["月1回", "月2回", "月4回", "制限なし"], "a": 1, "e": "原則として月2回が上限。ただし特定疾患等で例外あり。"}, "92070": {"id": 92070, "section": "18. 訪問診療", "q": "在宅療養支援診療所の略称はどれか？", "c": ["在支病", "在支診", "訪診所", "在宅クリニック"], "a": 1, "e": "在宅療養支援診療所（在支診）は24時間対応・往診可能な在宅医療の拠点。診療報酬上の加算がある。"}, "92071": {"id": 92071, "section": "18. 訪問診療", "q": "訪問診療医が看取り後に作成する書類はどれか？", "c": ["診断書", "死亡診断書", "手術記録", "紹介状"], "a": 1, "e": "在宅での看取り後、訪問診療医は死亡診断書を作成する。在宅看取り加算も算定できる。"}, "92072": {"id": 92072, "section": "18. 訪問診療", "q": "訪問診療のビジネスモデルで収益の柱となるものはどれか？", "c": ["手術収益", "在宅医療管理料・訪問診療料の月次算定", "美容処置", "健康診断"], "a": 1, "e": "訪問診療は在宅時医学総合管理料などの月次算定が収益の柱。安定した定期収入が特徴。"}, "83": {"id": 83, "section": "19. 産婦人科・不妊治療", "q": "東京のお産御三家として正しいものはどれか？", "c": ["東大病院・慶應病院・東京医科大学", "山王病院・愛育病院・聖路加国際病院", "順天堂病院・日赤医療センター・虎の門病院", "北里病院・杏林病院・帝京病院"], "a": 1, "e": "山王病院・愛育病院・聖路加国際病院が東京の有名産院御三家。"}, "84": {"id": 84, "section": "19. 産婦人科・不妊治療", "q": "カイザーとは何のことか？", "c": ["自然分娩", "帝王切開", "無痛分娩", "水中分娩"], "a": 1, "e": "ドイツ語でKaiser（皇帝）→帝王切開の俗称。英語ではC-section。"}, "87": {"id": 87, "section": "19. 産婦人科・不妊治療", "q": "不妊治療の段階として正しい順序はどれか？", "c": ["体外受精→人工授精→タイミング法", "タイミング法→人工授精→体外受精→顕微授精", "顕微授精→体外受精→タイミング法", "人工授精→タイミング法→顕微授精"], "a": 1, "e": "タイミング法→人工授精（AIH）→体外受精（IVF）→顕微授精（ICSI）の順で進む。"}, "344": {"id": 344, "section": "19. 産婦人科・不妊治療", "q": "ARTとは何の略か？", "c": ["人工授精技術", "高度生殖補助医療", "抗生物質投与療法", "アレルギー反応試験"], "a": 1, "e": "Assisted Reproductive Technology（生殖補助医療）。体外受精・顕微授精などの総称。"}, "346": {"id": 346, "section": "19. 産婦人科・不妊治療", "q": "OHSSとは何か？", "c": ["卵巣過剰刺激症候群", "オーバーヒートサージャリーシステム", "卵子凍結保存術", "卵管閉塞症候群"], "a": 0, "e": "Ovarian Hyperstimulation Syndrome（卵巣過剰刺激症候群）。排卵誘発剤の副作用。"}, "349": {"id": 349, "section": "19. 産婦人科・不妊治療", "q": "ARTが保険適用になったのはいつか？", "c": ["2018年", "2020年", "2022年", "2024年"], "a": 2, "e": "2022年4月から体外受精・顕微授精（ART）が保険適用に。43歳未満が対象。"}, "92080": {"id": 92080, "section": "19. 産婦人科・不妊治療", "q": "子宮頸がんの主な原因はどれか？", "c": ["遺伝的要因のみ", "HPV（ヒトパピローマウイルス）感染", "喫煙のみ", "生活習慣病"], "a": 1, "e": "子宮頸がんの主因はHPV感染。HPVワクチン接種で予防可能。定期検診も重要。"}, "92081": {"id": 92081, "section": "19. 産婦人科・不妊治療", "q": "産婦人科の2つの専門領域として正しいものはどれか？", "c": ["産科と婦人科", "産科と小児科", "婦人科と内科", "産科と整形外科"], "a": 0, "e": "産婦人科は妊娠・出産を扱う「産科」と婦人科疾患を扱う「婦人科」の2領域から構成される。"}, "92082": {"id": 92082, "section": "19. 産婦人科・不妊治療", "q": "無痛分娩で使用される主な麻酔方法はどれか？", "c": ["全身麻酔", "硬膜外麻酔", "局所麻酔のみ", "笑気ガス吸入のみ"], "a": 1, "e": "無痛分娩では硬膜外麻酔が主に使用される。背中のカテーテルから持続的に麻酔薬を投与する。"}, "92083": {"id": 92083, "section": "19. 産婦人科・不妊治療", "q": "体外受精（IVF）の基本的な流れとして正しいものはどれか？", "c": ["採卵→受精→培養→胚移植", "胚移植→採卵→受精→培養", "受精→採卵→培養→胚移植", "培養→採卵→胚移植→受精"], "a": 0, "e": "IVFの流れは①排卵誘発②採卵③体外受精④培養⑤胚移植の順。確認が重要な知識。"}, "92": {"id": 92, "section": "20. 救急科", "q": "トリアージで最優先（生命危機）に使われる色はどれか？", "c": ["黒", "緑", "黄", "赤"], "a": 3, "e": "赤＝最優先、黄＝待機可能、緑＝軽症、黒＝救命困難の4色分類。"}, "93": {"id": 93, "section": "20. 救急科", "q": "三次救急医療機関として正しいものはどれか？", "c": ["一般病院の夜間外来", "救命救急センター・高度救命救急センター", "在宅医療機関", "診療所の時間外対応"], "a": 1, "e": "三次救急は重篤患者対応。救命救急センターがこれに当たる。"}, "95": {"id": 95, "section": "20. 救急科", "q": "ACLSとは何か？", "c": ["救急医療システム", "二次救命処置", "急性期ケアリスト", "地域救急連絡システム"], "a": 1, "e": "ACLS＝二次救命処置。BLSの上位に位置する高度な救命処置。"}, "96": {"id": 96, "section": "20. 救急科", "q": "DMATとは何か？", "c": ["デイタイム医療支援チーム", "災害派遣医療チーム", "薬剤師派遣チーム", "データ管理医療チーム"], "a": 1, "e": "大規模災害時に被災地に派遣される医療チーム。医師・看護師・業務調整員で構成。"}, "92090": {"id": 92090, "section": "20. 救急科", "q": "一次救急・二次救急・三次救急の違いとして正しいものはどれか？", "c": ["一次が最重症・三次が軽症", "一次は軽症・二次は中等症入院・三次は最重症生命危機", "全て同じ対応をする", "救急車の優先順位の違い"], "a": 1, "e": "一次救急は軽症（休日夜間診療所）、二次は入院要の中等症、三次は救命救急センターが対応する最重症。"}, "92091": {"id": 92091, "section": "20. 救急科", "q": "ショックの4大原因として正しい組み合わせはどれか？", "c": ["出血・感染・心原性・アナフィラキシー", "脳出血・骨折・肺炎・糖尿病", "高血圧・低血圧・貧血・脱水", "発熱・嘔吐・下痢・頭痛"], "a": 0, "e": "ショックの主な原因は出血性・感染性（敗血症）・心原性・アナフィラキシー（配分異常）の4種類。"}, "92092": {"id": 92092, "section": "20. 救急科", "q": "ERと救命救急センターの違いとして正しいものはどれか？", "c": ["全く同じ施設を指す", "ERは全ての救急患者を診る・救命救急センターは三次（最重症）専門", "ERは小児専用", "救命救急センターは外来のみ"], "a": 1, "e": "ERは軽症〜重症まで幅広く診る初期救急対応の場。救命救急センターは三次救急・最重症患者専門。"}, "92093": {"id": 92093, "section": "20. 救急科", "q": "救急科とICU（集中治療室）の役割の違いとして正しいものはどれか？", "c": ["救急科は初期診断・安定化が主役割・ICUは安定後の集中管理が主役割", "救急科は手術専門・ICUは内科的治療専門", "ICUは救急車で搬送された患者のみ対応", "救急科とICUは同一の診療科"], "a": 0, "e": "救急科は搬送直後の初期評価・蘇生・安定化を担い、ICUは安定後も集中的な管理が必要な重症患者を継続管理する。役割は連続しているが機能が異なる。"}, "92094": {"id": 92094, "section": "20. 救急科", "q": "心停止時の基本的な蘇生処置の順序として正しいものはどれか？", "c": ["気道確保→呼吸確認→胸骨圧迫", "反応確認→119番・AED手配→胸骨圧迫→AED", "AED→胸骨圧迫→119番", "薬剤投与→胸骨圧迫→AED"], "a": 1, "e": "BLSの基本は反応確認→119番・AED手配→胸骨圧迫30回→人工呼吸2回→AED装着の流れ。"}, "92095": {"id": 92095, "section": "20. 救急科", "q": "敗血症の定義として正しいものはどれか？", "c": ["単なる発熱状態", "感染に対する生体の過剰反応による臓器障害", "細菌性肺炎の別名", "白血球増多症のこと"], "a": 1, "e": "敗血症（Sepsis）は感染に対する生体反応が制御不能となり臓器障害をきたす致命的な状態。"}, "98": {"id": 98, "section": "21. 小児科", "q": "小児科が対象とする年齢として一般的なものはどれか？", "c": ["0歳〜10歳", "0歳〜15歳", "0歳〜20歳", "5歳〜15歳"], "a": 1, "e": "一般的には0〜15歳。施設によって18歳まで対応する場合もある。"}, "100": {"id": 100, "section": "21. 小児科", "q": "NICUとは何か？", "c": ["神経集中治療室", "新生児集中治療室", "核医学検査室", "神経内科外来"], "a": 1, "e": "早産児・低出生体重児・重篤な新生児を管理する集中治療室。"}, "350": {"id": 350, "section": "21. 小児科", "q": "NCPRとは何か？", "c": ["小児科専門医資格", "新生児蘇生法", "小児救急認定資格", "発達障害診断基準"], "a": 1, "e": "新生児蘇生法の国際標準プログラム。産婦人科・小児科医師に必須のスキル。"}, "352": {"id": 352, "section": "21. 小児科", "q": "小児科スキルで確認する迅速検査として含まれないものはどれか？", "c": ["RSウイルス検査", "インフルエンザ検査", "溶連菌検査", "PSA検査"], "a": 3, "e": "PSAは前立腺がんの腫瘍マーカー。小児科とは無関係。"}, "354": {"id": 354, "section": "21. 小児科", "q": "小児科クリニックの予防接種専門外来のメリットはどれか？", "c": ["入院管理ができる", "自費・任意接種で安定収益が見込める", "透析収益が上がる", "手術件数が増える"], "a": 1, "e": "任意接種（おたふく・ロタウイルスなど）は自費のため安定した収益源になる。"}, "93001": {"id": 93001, "section": "21. 小児科", "q": "小児科が扱う先天性心疾患の代表的な疾患はどれか？", "c": ["心筋梗塞", "心房中隔欠損・心室中隔欠損・ファロー四徴症", "高血圧性心疾患", "心房細動"], "a": 1, "e": "先天性心疾患の代表は心房中隔欠損・心室中隔欠損・ファロー四徴症など。小児循環器専門医が診る。"}, "93002": {"id": 93002, "section": "21. 小児科", "q": "子供の発熱で最も頻度が高い原因はどれか？", "c": ["細菌性肺炎", "ウイルス性上気道感染（かぜ）", "自己免疫疾患", "悪性腫瘍"], "a": 1, "e": "小児の発熱の最多原因はウイルス性上気道感染（かぜ症候群）。自然治癒することが多い。"}, "93003": {"id": 93003, "section": "21. 小児科", "q": "川崎病の特徴として正しいものはどれか？", "c": ["成人に多い感染症", "乳幼児に多い原因不明の全身性血管炎", "成人の自己免疫疾患", "遺伝性の血液疾患"], "a": 1, "e": "川崎病は主に5歳以下の乳幼児に発症する原因不明の全身性血管炎。冠動脈瘤が合併症として重要。"}, "93004": {"id": 93004, "section": "21. 小児科", "q": "小児の予防接種で定期接種に含まれないものはどれか？", "c": ["BCG", "ポリオ", "ロタウイルスワクチン", "狂犬病ワクチン"], "a": 3, "e": "狂犬病ワクチンは定期接種に含まれず任意接種。BCG・ポリオ・ロタウイルスなどは定期接種。"}, "93005": {"id": 93005, "section": "21. 小児科", "q": "小児科クリニックの求人で重要な確認事項はどれか？", "c": ["手術件数", "予防接種の種類・発達外来・夜間対応の有無", "透析の件数", "MRI読影件数"], "a": 1, "e": "小児科クリニック求人では予防接種ラインナップ・発達外来・乳幼児健診・夜間対応の有無が重要。"}, "105": {"id": 105, "section": "22. リハビリテーション科", "q": "ADLとは何か？", "c": ["医師免許の更新制度", "Activities of Daily Living", "抗利尿ホルモン", "急性期病棟管理指標"], "a": 1, "e": "Activities of Daily Living（日常生活動作）。食事・入浴・移動など日常的な動作の能力。"}, "107": {"id": 107, "section": "22. リハビリテーション科", "q": "リハビリテーション科は新専門医制度における何か？", "c": ["サブスペシャリティ", "基本領域", "認定医制度のみ", "特定行為研修"], "a": 1, "e": "リハビリテーション科は基本19領域の一つ。"}, "108": {"id": 108, "section": "22. リハビリテーション科", "q": "回復期リハビリテーション病院を多数運営する有名法人はどれか？", "c": ["徳洲会", "巨樹の会", "IMSグループ", "KKR"], "a": 1, "e": "巨樹の会は回復期リハビリテーション病院の運営で知られる大手医療法人。"}, "93010": {"id": 93010, "section": "22. リハビリテーション科", "q": "リハビリテーションの3分野として正しいものはどれか？", "c": ["PT・OT・医師", "理学療法・作業療法・言語聴覚療法", "運動療法・物理療法・薬物療法", "急性期・回復期・維持期リハビリ"], "a": 1, "e": "リハビリの3分野はPT（理学療法）・OT（作業療法）・ST（言語聴覚療法）。それぞれ専門職が担う。"}, "93011": {"id": 93011, "section": "22. リハビリテーション科", "q": "回復期リハビリテーション病棟の算定上限日数（脳卒中）はどれか？", "c": ["60日", "90日", "150日", "180日"], "a": 3, "e": "脳卒中の回復期リハビリ病棟の算定上限は180日。疾患により異なり骨折は90日が上限。"}, "93012": {"id": 93012, "section": "22. リハビリテーション科", "q": "嚥下リハビリを専門とするコメディカル職種はどれか？", "c": ["理学療法士", "作業療法士", "言語聴覚士", "臨床工学技士"], "a": 2, "e": "嚥下障害のリハビリは言語聴覚士（ST）が専門。摂食・嚥下機能の評価・訓練を担う。"}, "93013": {"id": 93013, "section": "22. リハビリテーション科", "q": "維持期リハビリテーションの主な目的はどれか？", "c": ["機能回復を最大化する", "現状の機能を維持し生活の質を保つ", "急性期の治療を行う", "手術後の初期回復を促す"], "a": 1, "e": "維持期リハビリは機能改善より現状維持・生活の質（QOL）の確保が目的。介護施設・在宅で行われる。"}, "93014": {"id": 93014, "section": "22. リハビリテーション科", "q": "リハビリテーション科医の主な役割はどれか？", "c": ["直接手術を行う", "障害の評価・リハビリ処方・チームマネジメント", "透析の管理", "内視鏡検査"], "a": 1, "e": "リハビリ科医は障害評価・リハビリプログラムの処方・多職種チームのマネジメントが主な役割。"}, "93015": {"id": 93015, "section": "22. リハビリテーション科", "q": "脳卒中後のリハビリで最も重要な時期はどれか？", "c": ["発症後1年以降", "発症直後から早期（急性期〜回復期）", "維持期のみ", "退院後のみ"], "a": 1, "e": "脳卒中リハビリは発症直後からの早期介入が重要。急性期・回復期の集中リハビリが機能回復に直結する。"}, "93016": {"id": 93016, "section": "22. リハビリテーション科", "q": "FIMとは何を評価するスケールか？", "c": ["痛みの強さ", "日常生活動作の自立度", "認知機能", "嚥下機能"], "a": 1, "e": "FIM（機能的自立度評価表）はリハビリでの日常生活動作の自立度を18項目で評価するスケール。"}, "109": {"id": 109, "section": "23. 診療報酬", "q": "診療報酬の1点は何円か？", "c": ["10円", "5円", "1円", "100円"], "a": 0, "e": "1点＝10円。例えば初診料288点なら2,880円。"}, "111": {"id": 111, "section": "23. 診療報酬", "q": "診療報酬を決める機関はどれか？", "c": ["日本医師会", "中央社会保険医療協議会", "厚生労働省医務局", "国会の厚生労働委員会"], "a": 1, "e": "中医協（支払側・診療側・公益の三者構成）が審議し、厚生労働大臣が最終決定。"}, "113": {"id": 113, "section": "23. 診療報酬", "q": "診療報酬改定は何年に1回か？", "c": ["毎年", "3年に1回", "2年に1回", "5年に1回"], "a": 2, "e": "2年に1回（偶数年の4月）に改定。薬価は毎年改定される。"}, "115": {"id": 115, "section": "23. 診療報酬", "q": "DPCとは日本語で何か？", "c": ["診療品質評価制度", "地域別医療計画", "診療情報提供制度", "診断群分類別包括評価"], "a": 3, "e": "DPC＝Diagnosis Procedure Combination。1日あたり定額で計算する入院費の仕組み。"}, "93020": {"id": 93020, "section": "23. 診療報酬", "q": "出来高払いとDPCの違いとして正しいものはどれか？", "c": ["出来高は行為ごとに算定・DPCは診断群分類による定額払い", "出来高は定額・DPCは行為ごとに算定", "両者は同じ支払い方式", "DPCは外来のみ適用"], "a": 0, "e": "出来高は検査・処置ごとに算定。DPCは診断群分類に基づく1日定額払い。入院に適用される。"}, "93021": {"id": 93021, "section": "23. 診療報酬", "q": "初診料と再診料の違いとして正しいものはどれか？", "c": ["初診料の方が低い", "初診料は初めて受診する際・再診料は2回目以降に算定", "両者は同額", "再診料は保険適用外"], "a": 1, "e": "初診料は新たな疾患で初めて受診する際に算定。再診料は同疾患での2回目以降の受診に算定。"}, "93022": {"id": 93022, "section": "23. 診療報酬", "q": "診療報酬の「加算」とは何か？", "c": ["基本点数から引かれるもの", "保険外の費用", "基本点数に上乗せされる追加点数", "薬剤費の別名"], "a": 2, "e": "加算とは基本診療料や処置料に特定の条件を満たした場合に上乗せされる追加点数のこと。"}, "93023": {"id": 93023, "section": "23. 診療報酬", "q": "レセプトとは何か？", "c": ["電子カルテの別名", "薬剤の処方箋", "患者への領収書", "医療機関が保険者に請求する診療報酬明細書"], "a": 3, "e": "レセプト（診療報酬明細書）は医療機関が健康保険組合などの保険者に提出する請求書。毎月審査される。"}, "93024": {"id": 93024, "section": "23. 診療報酬", "q": "地域包括ケア病棟の主な役割はどれか？", "c": ["急性期治療後の患者を受け入れ在宅復帰を支援", "急性期の手術対応", "終末期専門の緩和ケア", "透析専門病棟"], "a": 0, "e": "地域包括ケア病棟は急性期後の患者を受け入れ、在宅・施設への復帰を支援する役割を担う。"}, "93025": {"id": 93025, "section": "23. 診療報酬", "q": "診療報酬点数表の改定で近年重視されている方向性はどれか？", "c": ["入院日数の延長を推進", "在宅医療・地域連携・デジタル化の推進", "高額医療機器の購入推進", "外国人患者の受け入れ推進"], "a": 1, "e": "近年の診療報酬改定では在宅医療推進・地域連携強化・DX（デジタル化）推進の方向性が続いている。"}, "116": {"id": 116, "section": "24. 甲状腺内科", "q": "甲状腺の位置と形として正しいものはどれか？", "c": ["おへその下・円形", "喉仏の下・蝶が羽を広げた形", "耳の後ろ・楕円形", "鎖骨の上・三角形"], "a": 1, "e": "甲状腺は気管の前面（喉仏の下）に位置し、蝶のような形をしている。"}, "119": {"id": 119, "section": "24. 甲状腺内科", "q": "甲状腺の病気として含まれないものはどれか？", "c": ["機能亢進症", "機能低下症", "甲状腺腫瘍", "甲状腺単独疾患としての心房細動"], "a": 3, "e": "甲状腺の主な疾患は機能亢進症・機能低下症・腫瘍の3つ。心房細動は合併症。"}, "93030": {"id": 93030, "section": "24. 甲状腺内科", "q": "バセドウ病の主な症状として正しいものはどれか？", "c": ["体重増加・むくみ・倦怠感", "動悸・発汗・体重減少・眼球突出", "関節痛・皮疹・発熱", "高血圧・頭痛・視力障害"], "a": 1, "e": "バセドウ病は甲状腺機能亢進症。甲状腺ホルモン過剰により動悸・発汗・体重減少・眼球突出が起こる。"}, "93031": {"id": 93031, "section": "24. 甲状腺内科", "q": "橋本病とはどのような疾患か？", "c": ["甲状腺機能亢進症", "自己免疫による甲状腺機能低下症", "甲状腺がん", "副甲状腺の疾患"], "a": 1, "e": "橋本病は自己免疫により甲状腺が慢性炎症を起こし機能低下する疾患。女性に多い。"}, "93032": {"id": 93032, "section": "24. 甲状腺内科", "q": "甲状腺ホルモンの主な働きはどれか？", "c": ["血糖値の調整", "全身の代謝・体温・心拍数の調整", "血圧の調節", "血液凝固の促進"], "a": 1, "e": "甲状腺ホルモン（T3・T4）は全身の代謝亢進・体温上昇・心拍数増加・成長発育などを調節する。"}, "93033": {"id": 93033, "section": "24. 甲状腺内科", "q": "甲状腺がんの最も多い組織型はどれか？", "c": ["未分化がん", "髄様がん", "乳頭がん", "濾胞がん"], "a": 2, "e": "甲状腺がんの約90%が乳頭がん。進行が遅く予後良好なものが多い。"}, "93034": {"id": 93034, "section": "24. 甲状腺内科", "q": "甲状腺機能亢進症の治療として正しいものはどれか？", "c": ["甲状腺ホルモン補充療法", "抗甲状腺薬・放射性ヨード治療・手術", "インスリン療法", "ステロイド大量投与"], "a": 1, "e": "甲状腺機能亢進症（バセドウ病）の治療は抗甲状腺薬・放射性ヨード治療・手術の3つが主な選択肢。"}, "93035": {"id": 93035, "section": "24. 甲状腺内科", "q": "甲状腺疾患の診断に最もよく使われる画像検査はどれか？", "c": ["CT検査", "MRI検査", "超音波（エコー）検査", "PET検査"], "a": 2, "e": "甲状腺の形態・結節の性状評価には超音波（エコー）検査が第一選択。低侵襲で繰り返し可能。"}, "93036": {"id": 93036, "section": "24. 甲状腺内科", "q": "甲状腺機能低下症の主な症状はどれか？", "c": ["体重減少・動悸・発汗", "体重増加・むくみ・倦怠感・寒がり", "眼球突出・手の震え", "高血圧・頭痛"], "a": 1, "e": "甲状腺機能低下症では代謝が低下し体重増加・むくみ・倦怠感・寒がり・便秘などが起こる。"}, "93037": {"id": 93037, "section": "24. 甲状腺内科", "q": "副甲状腺（上皮小体）の主な機能はどれか？", "c": ["甲状腺ホルモンの産生", "カルシウム代謝の調節", "血糖値の調整", "性ホルモンの産生"], "a": 1, "e": "副甲状腺（上皮小体）はPTH（副甲状腺ホルモン）を分泌し血液中のカルシウム濃度を調節する。"}, "120": {"id": 120, "section": "25. 泌尿器科", "q": "ダ・ヴィンチ手術ロボットを製造している国はどこか？", "c": ["日本", "ドイツ", "アメリカ", "スウェーデン"], "a": 2, "e": "Intuitive Surgical社（アメリカ）が製造。FDA承認済みの手術支援ロボット。"}, "355": {"id": 355, "section": "25. 泌尿器科", "q": "TUR-Pとは何の手術か？", "c": ["経尿道的前立腺切除術", "体外衝撃波結石破砕術", "膀胱全摘術", "腹腔鏡下腎摘出術"], "a": 0, "e": "Transurethral Resection of the Prostate。前立腺肥大症の標準手術。"}, "357": {"id": 357, "section": "25. 泌尿器科", "q": "泌尿器科でのダ・ヴィンチ手術で最多の術式はどれか？", "c": ["腎移植", "前立腺全摘術", "膀胱鏡検査", "精管結紮術"], "a": 1, "e": "RARP（ロボット支援腹腔鏡下前立腺全摘術）が泌尿器科での最多ロボット手術。"}, "358": {"id": 358, "section": "25. 泌尿器科", "q": "ESWLとは何か？", "c": ["内視鏡的粘膜下層剥離術", "体外衝撃波結石破砕術", "電気けいれん療法", "経食道心エコー"], "a": 1, "e": "Extracorporeal Shock Wave Lithotripsy（体外衝撃波結石破砕術）。尿路結石の非侵襲的治療。"}, "359": {"id": 359, "section": "25. 泌尿器科", "q": "泌尿器科クリニックで近年増加している自費診療はどれか？", "c": ["透析導入", "分娩管理", "ED治療・AGA治療・包茎手術", "内視鏡検査"], "a": 2, "e": "メンズクリニック系でED・AGA・包茎の自費診療が急増している。"}, "93040": {"id": 93040, "section": "25. 泌尿器科", "q": "前立腺がんの腫瘍マーカーはどれか？", "c": ["CEA", "CA19-9", "AFP", "PSA"], "a": 3, "e": "PSA（前立腺特異抗原）は前立腺がんの腫瘍マーカー。スクリーニング・経過観察に使用される。"}, "93041": {"id": 93041, "section": "25. 泌尿器科", "q": "過活動膀胱の治療薬として使われる薬剤はどれか？", "c": ["抗生剤", "α1遮断薬", "抗コリン薬・β3作動薬", "利尿剤"], "a": 2, "e": "過活動膀胱には抗コリン薬（膀胱収縮抑制）またはβ3作動薬（ミラベグロン）が使われる。"}, "93042": {"id": 93042, "section": "25. 泌尿器科", "q": "泌尿器科で行う「TUL」とは何の手術か？", "c": ["経尿道的前立腺切除術", "経尿道的尿管砕石術", "体外衝撃波結石破砕術", "腹腔鏡下腎摘出術"], "a": 1, "e": "TUL（経尿道的尿管砕石術）は尿管結石に対し内視鏡でレーザー破砕する手術。日帰り〜短期入院で可能。"}, "93043": {"id": 93043, "section": "25. 泌尿器科", "q": "男性不妊症の診断で必ず行う検査はどれか？", "c": ["前立腺生検", "精液検査", "膀胱鏡検査", "PSA検査"], "a": 1, "e": "男性不妊の基本検査は精液検査。精子数・運動率・形態を評価する。泌尿器科・生殖医療科が担当。"}, "93044": {"id": 93044, "section": "25. 泌尿器科", "q": "泌尿器科クリニックで保険外（自費）の需要が高い治療はどれか？", "c": ["透析管理", "ED・AGAなどのメンズヘルス治療", "腹腔鏡手術", "内視鏡検査"], "a": 1, "e": "泌尿器科クリニックでED・AGA・包茎などのメンズヘルス自費診療の需要が増加中。収益性が高い。"}, "124": {"id": 124, "section": "26. 医療法・医療計画・医療圏", "q": "医療計画の見直し頻度はどれか？", "c": ["毎年", "3年ごと", "6年ごと", "10年ごと"], "a": 2, "e": "都道府県が策定する医療計画は6年ごとに見直される。"}, "126": {"id": 126, "section": "26. 医療法・医療計画・医療圏", "q": "5疾病として正しい組み合わせはどれか？", "c": ["がん・脳卒中・心血管疾患・糖尿病・精神疾患", "がん・骨折・透析・認知症・感染症", "高血圧・糖尿病・肥満・脂質異常症・痛風", "がん・ALS・難病・結核・AIDS"], "a": 0, "e": "5疾病＝がん・脳卒中・心血管疾患・糖尿病・精神疾患。医療計画の重点疾病。"}, "127": {"id": 127, "section": "26. 医療法・医療計画・医療圏", "q": "5事業として含まれないものはどれか？", "c": ["救急医療", "災害医療", "へき地医療", "美容医療"], "a": 3, "e": "5事業は救急・災害・へき地・周産期・小児（＋新興感染症対策が追加）。"}, "93050": {"id": 93050, "section": "26. 医療法・医療計画・医療圏", "q": "二次医療圏とは何か？", "c": ["国が定める全国単位の医療提供体制", "入院医療を中心に完結できる地域単位の医療圏", "訪問診療のみの対象圏域", "市区町村単位の医療圏"], "a": 1, "e": "二次医療圏は一般的な入院医療が完結できる地域単位。都道府県が設定し全国に300以上ある。"}, "93051": {"id": 93051, "section": "26. 医療法・医療計画・医療圏", "q": "三次医療圏とは何か？", "c": ["市区町村単位の医療圏", "二次医療圏内の特定地域", "都道府県単位で高度・特殊医療を提供する圏域", "国が指定する特定機能病院のみ"], "a": 2, "e": "三次医療圏は都道府県単位。特定機能病院など高度・特殊医療を提供する圏域として設定される。"}, "93052": {"id": 93052, "section": "26. 医療法・医療計画・医療圏", "q": "医療法に基づく病床の種類として含まれないものはどれか？", "c": ["一般病床", "療養病床", "精神病床", "美容病床"], "a": 3, "e": "医療法上の病床は一般・療養・精神・感染症・結核の5種類。美容病床という区分は存在しない。"}, "93053": {"id": 93053, "section": "26. 医療法・医療計画・医療圏", "q": "地域医療構想の目的はどれか？", "c": ["医師の給与を統一する", "2025年に向け病床機能の分化・連携を推進する", "外国人医師の受け入れを促進する", "医療費を増やす"], "a": 1, "e": "地域医療構想は2025年を目標に高度急性期・急性期・回復期・慢性期の病床機能分化・連携を推進する計画。"}, "93054": {"id": 93054, "section": "26. 医療法・医療計画・医療圏", "q": "医療法の目的として正しいものはどれか？", "c": ["医師の労働条件を規定する", "医療機関の開設・運営基準や病床規制などを定め国民の健康を守る", "保険料の徴収方法を定める", "薬剤の製造販売を規制する"], "a": 1, "e": "医療法は医療機関の開設・管理・施設基準・病床規制などを定め、適切な医療提供体制を確保する法律。"}, "93055": {"id": 93055, "section": "26. 医療法・医療計画・医療圏", "q": "病院の管理者（院長）になれる資格として正しいものはどれか？", "c": ["医師免許を持つ者であれば誰でも", "都道府県知事が認定した医師", "原則として医師または歯科医師", "看護師でも可能"], "a": 2, "e": "医療法上、病院の管理者は原則として医師または歯科医師でなければならない。"}, "93056": {"id": 93056, "section": "26. 医療法・医療計画・医療圏", "q": "医療計画で定める「4疾病」に追加されて「5疾病」となった疾患はどれか？", "c": ["認知症", "難病", "感染症", "精神疾患"], "a": 3, "e": "従来の4疾病（がん・脳卒中・心血管疾患・糖尿病）に精神疾患が追加され5疾病となった。"}, "128": {"id": 128, "section": "27. 医療法人の種類", "q": "旧医療法人（2007年改正前）の特徴はどれか？", "c": ["出資持分なし・非営利性徹底", "出資持分あり・解散時に残余財産を出資者に分配可能", "公益法人として非課税", "国立病院として運営"], "a": 1, "e": "旧医療法人は出資持分あり。2007年改正以降の新設は出資持分なしに統一。"}, "130": {"id": 130, "section": "27. 医療法人の種類", "q": "複数都道府県にまたがる医療法人の認可権者はどれか？", "c": ["都道府県知事", "市区町村長", "厚生労働大臣", "日本医師会会長"], "a": 2, "e": "広域医療法人（複数都道府県）は厚生労働大臣の認可が必要。単独都道府県は知事認可。"}, "93060": {"id": 93060, "section": "27. 医療法人の種類", "q": "社会医療法人の特徴として正しいものはどれか？", "c": ["営利目的の運営が可能", "公益性の高い医療を提供し税制上の優遇がある", "個人経営の診療所", "株式会社が設立できる法人"], "a": 1, "e": "社会医療法人は救急・災害・僻地医療など公益性の高い事業を行う法人。債券発行・収益事業が可能。"}, "93061": {"id": 93061, "section": "27. 医療法人の種類", "q": "医療法人を設立する際の認可権者はどれか？", "c": ["市区町村長", "厚生労働大臣（複数都道府県の場合）または都道府県知事", "日本医師会", "裁判所"], "a": 1, "e": "1都道府県内の医療法人は都道府県知事が認可。複数都道府県にまたがる場合は厚生労働大臣が認可。"}, "93062": {"id": 93062, "section": "27. 医療法人の種類", "q": "持分なし医療法人への移行が推進されている理由はどれか？", "c": ["経営者の利益を最大化するため", "医療法人の非営利性を徹底し継続的な医療提供を確保するため", "税金を増やすため", "医師の給与を下げるため"], "a": 1, "e": "持分なし法人への移行は医療の非営利性徹底・法人財産の医療への還元を目的とし、国が移行を推進している。"}, "93063": {"id": 93063, "section": "27. 医療法人の種類", "q": "個人立診療所と医療法人立の診療所の違いとして正しいものはどれか？", "c": ["個人立の方が税務上有利なことが多い", "医療法人立の方が事業承継・節税・融資面で有利なことが多い", "医療法人は開業できる診療科が制限される", "個人立は保険診療ができない"], "a": 1, "e": "医療法人化により役員報酬・退職金・事業承継などで節税メリットが生じやすく、融資も受けやすくなる。"}, "93064": {"id": 93064, "section": "27. 医療法人の種類", "q": "医療法人の理事長になれる資格は原則として何か？", "c": ["誰でもなれる", "医師または歯科医師", "弁護士・会計士", "看護師以上の医療資格者"], "a": 1, "e": "医療法人の理事長は原則として医師または歯科医師でなければならない（都道府県知事認定の例外あり）。"}, "93065": {"id": 93065, "section": "27. 医療法人の種類", "q": "MS法人（メディカルサービス法人）とは何か？", "c": ["医療法人の別名", "医療法人と取引を行う関連会社（株式会社等）", "社会医療法人のこと", "地域医療支援病院を運営する法人"], "a": 1, "e": "MS法人は医療法人の関連会社。医療機器のリース・不動産・物品販売などで医療法人と取引し節税効果を狙う。"}, "93066": {"id": 93066, "section": "27. 医療法人の種類", "q": "特定医療法人の特徴はどれか？", "c": ["営利目的の運営が可能", "国税庁の承認を受けた法人税軽減の優遇がある医療法人", "都道府県が設立する法人", "株式上場が可能な医療法人"], "a": 1, "e": "特定医療法人は国税庁の承認を受け、法人税の軽減税率（19%）が適用される医療法人。非営利性が厳格。"}, "93067": {"id": 93067, "section": "27. 医療法人の種類", "q": "医療法人の事業報告書の提出先はどれか？", "c": ["厚生労働省のみ", "都道府県知事（設立認可を受けた都道府県）", "日本医師会", "市区町村"], "a": 1, "e": "医療法人は毎年、設立認可を受けた都道府県知事に事業報告書を提出する義務がある。"}, "132": {"id": 132, "section": "28. 産業医", "q": "専属産業医が義務付けられる事業所の規模はどれか？", "c": ["常時30人以上", "常時50人以上", "常時500人・1000人以上", "常時100人以上"], "a": 2, "e": "専属産業医＝常時1,000人以上（有害業務は500人以上）。嘱託は50人以上。"}, "133": {"id": 133, "section": "28. 産業医", "q": "嘱託産業医が義務付けられる事業所の規模はどれか？", "c": ["常時10人以上", "常時30人以上", "常時50人以上", "常時100人以上"], "a": 2, "e": "50人以上の事業所に産業医の選任が義務付けられる（嘱託でも可）。"}, "135": {"id": 135, "section": "28. 産業医", "q": "産業医資格の認定機関はどれか？", "c": ["厚生労働省", "日本医師会", "日本産業医師会", "都道府県医師会"], "a": 1, "e": "日本医師会の産業医学基礎研修（50単位以上）を修了することで認定される。"}, "93070": {"id": 93070, "section": "28. 産業医", "q": "産業医の主な職務として含まれないものはどれか？", "c": ["健康診断の実施・事後措置", "職場巡視", "労働者の業務上の傷病の診断・治療", "ストレスチェックへの関与"], "a": 2, "e": "産業医は診断・治療は行わない。健康管理・職場環境改善・就業制限の意見具申が主な役割。"}, "93071": {"id": 93071, "section": "28. 産業医", "q": "ストレスチェック制度の義務対象事業所はどれか？", "c": ["常時10人以上", "常時30人以上", "常時50人以上", "常時100人以上"], "a": 2, "e": "ストレスチェックは常時50人以上の事業所に年1回実施が義務付けられている（50人未満は努力義務）。"}, "93072": {"id": 93072, "section": "28. 産業医", "q": "産業医が行う職場巡視の頻度はどれか？", "c": ["年1回", "月1回以上（条件により2ヶ月に1回）", "週1回", "半年に1回"], "a": 1, "e": "産業医の職場巡視は原則月1回。ただし一定の情報提供があれば2ヶ月に1回に変更可能（2017年改正）。"}, "93073": {"id": 93073, "section": "28. 産業医", "q": "長時間労働者への面接指導が義務となる時間外労働の目安はどれか？", "c": ["月40時間超", "月60時間超", "月80時間超", "月100時間超"], "a": 2, "e": "時間外・休日労働が月80時間超で申出がある場合、産業医による面接指導の実施が事業者に義務付けられる。"}, "93074": {"id": 93074, "section": "28. 産業医", "q": "産業医資格取得に必要な研修はどれか？", "c": ["特になし・医師免許のみ", "日本医師会の産業医学基礎研修50時間以上", "厚生労働省の認定試験合格", "産業医科大学の卒業"], "a": 1, "e": "産業医になるには日本医師会が認定する産業医学基礎研修（50時間）修了などが必要。"}, "93075": {"id": 93075, "section": "28. 産業医", "q": "「安全衛生委員会」における産業医の役割はどれか？", "c": ["委員会の議長を務める", "産業医として意見を述べる専門的助言者", "議事録の作成のみ", "委員会への出席は任意"], "a": 1, "e": "産業医は安全衛生委員会に出席し、健康管理・職場環境改善について専門的見地から助言する役割を担う。"}, "93076": {"id": 93076, "section": "28. 産業医", "q": "産業医が「就業制限」を勧告できる根拠となる法律はどれか？", "c": ["医師法", "労働基準法", "労働安全衛生法", "健康増進法"], "a": 2, "e": "産業医の就業制限の勧告は労働安全衛生法に基づく。事業者は産業医の意見を尊重する義務がある。"}, "136": {"id": 136, "section": "29. 麻酔科", "q": "厚生労働省が管轄する麻酔に関する資格はどれか？", "c": ["麻酔科専門医", "麻酔科認定医", "麻酔科標榜医", "ペインクリニック認定医"], "a": 2, "e": "麻酔科標榜医は厚労省が認定。これがないと麻酔科として標榜できない。"}, "138": {"id": 138, "section": "29. 麻酔科", "q": "疼痛ケアを専門とする外来名はどれか？", "c": ["リハビリ外来", "緩和ケア外来", "ペインクリニック", "アレルギー外来"], "a": 2, "e": "ペインクリニックは慢性疼痛・神経ブロックなどを専門とする外来。"}, "139": {"id": 139, "section": "29. 麻酔科", "q": "関東と関西の麻酔科医師の働き方の違いとして正しいものはどれか？", "c": ["関東はフリーランス・関西は医局派遣", "関東は医局派遣中心・関西はフリーランスが多い", "両地域とも全て医局派遣", "地域差はほとんどない"], "a": 1, "e": "関東は大学医局の派遣が中心。関西はフリーランス麻酔科医の文化が根強い。"}, "93080": {"id": 93080, "section": "29. 麻酔科", "q": "全身麻酔の3要素として正しいものはどれか？", "c": ["鎮痛・鎮静・筋弛緩", "鎮痛・昇圧・鎮静", "鎮静・抗生剤・利尿", "鎮痛・抗凝固・筋弛緩"], "a": 0, "e": "全身麻酔の3要素は鎮痛（痛みを取る）・鎮静（意識を消す）・筋弛緩（筋肉を弛緩させる）。"}, "93081": {"id": 93081, "section": "29. 麻酔科", "q": "硬膜外麻酔と脊椎麻酔の違いとして正しいものはどれか？", "c": ["硬膜外は脊髄くも膜下腔に投与・脊椎は硬膜外腔に投与", "硬膜外は硬膜外腔・脊椎麻酔はくも膜下腔に薬剤を投与", "両者は同じ", "硬膜外は全身麻酔の一種"], "a": 1, "e": "硬膜外麻酔は硬膜外腔にカテーテルで持続投与。脊椎麻酔はくも膜下腔に1回注入。効果範囲が異なる。"}, "93082": {"id": 93082, "section": "29. 麻酔科", "q": "術後の悪心・嘔吐（PONV）予防に使われる薬剤はどれか？", "c": ["NSAIDs", "制吐剤（オンダンセトロンなど）", "筋弛緩薬", "鎮静薬"], "a": 1, "e": "PONVはセロトニン拮抗薬（オンダンセトロンなど）やデキサメタゾンで予防・治療される。"}, "93083": {"id": 93083, "section": "29. 麻酔科", "q": "麻酔科医フリーランスが多い地域はどこか？", "c": ["関東", "東北", "関西", "北海道"], "a": 2, "e": "関西（特に大阪・兵庫）は麻酔科フリーランス文化が根付いており、非常勤・スポット勤務の医師が多い。"}, "93084": {"id": 93084, "section": "29. 麻酔科", "q": "麻酔科の求人で確認すべき主な項目はどれか？", "c": ["病棟管理の有無", "執刀可能な手術の種類", "手術件数・麻酔種別・当直の有無", "外来患者数"], "a": 2, "e": "麻酔科求人では年間麻酔件数・麻酔の種類（全身・区域）・当直・オンコールの有無が主要確認項目。"}, "93085": {"id": 93085, "section": "29. 麻酔科", "q": "ペインクリニックで主に行われる治療はどれか？", "c": ["がんの化学療法", "神経ブロック・薬物療法などの疼痛管理", "骨折の手術", "精神科的治療"], "a": 1, "e": "ペインクリニックは神経ブロック・薬物療法・物理療法などで慢性疼痛・神経痛を管理する専門外来。"}, "93086": {"id": 93086, "section": "29. 麻酔科", "q": "麻酔科標榜医と麻酔科専門医の違いはどれか？", "c": ["全く同じ資格", "標榜医は厚生労働省が認定・専門医は学会が認定する", "専門医の方が取得が容易", "標榜医は麻酔ができない"], "a": 1, "e": "麻酔科標榜医は厚生労働大臣の認定。麻酔科専門医は日本麻酔科学会が認定。専門医の方が高度な資格。"}, "140": {"id": 140, "section": "30. 医師プラットフォーム", "q": "m3.comの創業者と出身はどれか？", "c": ["孫正義・ソフトバンク創業", "谷村格・マッキンゼー出身・2000年設立", "三木谷浩史・楽天創業", "藤田晋・サイバーエージェント創業"], "a": 1, "e": "谷村格氏がマッキンゼーを経て2000年設立。医師専門ポータルサイトとして急成長。"}, "141": {"id": 141, "section": "30. 医師プラットフォーム", "q": "m3.comのサービスの特徴として正しいものはどれか？", "c": ["一般向け健康情報サイト", "医師向け会員制ポータルサイト", "薬剤師向け求人サイト", "病院向け電子カルテシステム"], "a": 1, "e": "医師向け会員制ポータルサイト。製薬情報・医師求人・医療ニュースなどを提供。"}, "93090": {"id": 93090, "section": "30. 医師プラットフォーム", "q": "m3.comの登録医師数はおよそ何名か？", "c": ["約12万名", "約19万名", "約27万名", "約33万名以上"], "a": 3, "e": "m3.comは日本の医師の約9割が登録する最大規模の医師向けプラットフォーム。登録医師数は33万名以上。"}, "93091": {"id": 93091, "section": "30. 医師プラットフォーム", "q": "メドピアの特徴として正しいものはどれか？", "c": ["薬剤師専用SNS", "医師が開設した医師向け情報共有・コミュニティサイト", "病院向け電子カルテ", "患者向け症状検索サイト"], "a": 1, "e": "メドピアは医師が設立した医師専用SNS・情報共有プラットフォーム。医師同士の症例・知識共有が特徴。"}, "93092": {"id": 93092, "section": "30. 医師プラットフォーム", "q": "CareNetの主なサービスはどれか？", "c": ["医師求人サイト", "医師向け医療動画・eラーニングプラットフォーム", "病院向けERPシステム", "患者向け病院検索サイト"], "a": 1, "e": "CareNetは医師向けの医療動画・eラーニング・医療ニュースを提供するプラットフォーム。"}, "93093": {"id": 93093, "section": "30. 医師プラットフォーム", "q": "日経メディカルの主なサービスはどれか？", "c": ["医師向け求人サイトのみ", "医師向け医療情報・ニュース・論文サービス", "薬剤師専用情報サイト", "一般向け健康情報サイト"], "a": 1, "e": "日経メディカルは日本経済新聞社が運営する医師向け医療情報サイト。ニュース・論文・求人情報を提供。"}, "93094": {"id": 93094, "section": "30. 医師プラットフォーム", "q": "医師プラットフォームを活用した医師紹介のメリットはどれか？", "c": ["プラットフォーム経由の採用は全て無料", "医師との接点を増やし転職潜在層にもアプローチできる", "即日採用が保証される", "医師の資格確認が不要になる"], "a": 1, "e": "医師プラットフォーム広告・スカウトを活用することで転職を積極的に考えていない潜在層にもアプローチ可能。"}, "93095": {"id": 93095, "section": "30. 医師プラットフォーム", "q": "MRTとは何の会社か？", "c": ["医療機器メーカー", "医師・看護師などの医療従事者向け人材紹介・派遣会社", "電子カルテ会社", "製薬会社"], "a": 1, "e": "MRTは医師・看護師・薬剤師などの医療従事者向け人材紹介・派遣を行う医療特化の人材会社。"}, "93096": {"id": 93096, "section": "30. 医師プラットフォーム", "q": "医師のSNS活用（X・Instagram等）が医師紹介に与える影響はどれか？", "c": ["影響はほとんどない", "SNSで医師の専門性・人柄を把握しリクルートの接点として活用できる", "SNS利用は医師に禁止されている", "SNS経由の採用は非合法"], "a": 1, "e": "医師のSNS発信は増加中。医師の専門性・考え方を把握しスカウトや接点づくりに活用するケースが増えている。"}, "93097": {"id": 93097, "section": "30. 医師プラットフォーム", "q": "JCHO（地域医療機能推進機構）とはどのような組織か？", "c": ["民間の医療グループ", "旧社会保険病院・厚生年金病院を引き継いだ独立行政法人", "都道府県立病院の総称", "医師会が運営する病院グループ"], "a": 1, "e": "JCHOは旧社会保険病院・厚生年金病院を承継した独立行政法人。全国に約60の病院を運営。"}, "143": {"id": 143, "section": "31. 製薬会社", "q": "世界的な外資系製薬企業として含まれないものはどれか？", "c": ["ファイザー", "ロシュ・ノバルティス", "武田薬品工業", "メルク"], "a": 2, "e": "武田薬品工業は日本最大の製薬企業。ファイザー・ロシュ・ノバルティス・MSDが外資大手。"}, "145": {"id": 145, "section": "31. 製薬会社", "q": "日本で売上高トップの製薬企業はどれか？", "c": ["アステラス製薬", "第一三共", "武田薬品工業", "エーザイ"], "a": 2, "e": "武田薬品工業が日本最大。シャイアー買収でグローバルトップ10入り。"}, "146": {"id": 146, "section": "31. 製薬会社", "q": "アラガン社の親会社はどれか？", "c": ["ファイザー", "ロシュ", "アッヴィ", "J&J"], "a": 2, "e": "2020年にアッヴィ（AbbVie）がアラガンを約630億ドルで買収。ボトックスがアラガンの主力製品。"}, "94001": {"id": 94001, "section": "31. 製薬会社", "q": "ファイザーの本社がある国はどこか？", "c": ["イギリス", "スイス", "アメリカ", "ドイツ"], "a": 2, "e": "ファイザーはアメリカ・ニューヨーク州に本社を置く世界最大規模の製薬企業。"}, "94002": {"id": 94002, "section": "31. 製薬会社", "q": "日本の製薬企業で初めてグローバル展開に成功した企業はどれか？", "c": ["エーザイ", "第一三共", "アステラス製薬", "武田薬品工業"], "a": 3, "e": "武田薬品工業はシャイアー買収などでグローバル展開を積極推進。日本最大の製薬企業。"}, "94003": {"id": 94003, "section": "31. 製薬会社", "q": "MRとはどのような職種か？", "c": ["医療機器の修理技術者", "製薬会社の医薬情報担当者（営業）", "医師のアシスタント", "病院の医療事務担当者"], "a": 1, "e": "MR（Medical Representative）は製薬会社の医薬情報担当者。医師・薬剤師に自社製品の情報提供を行う。"}, "94004": {"id": 94004, "section": "31. 製薬会社", "q": "バイオ医薬品とは何か？", "c": ["植物から抽出した天然薬", "生物（細胞・微生物等）を利用して製造する医薬品", "化学合成で作られる低分子薬", "漢方薬の別名"], "a": 1, "e": "バイオ医薬品は生物由来の技術で製造される抗体医薬・ワクチン等。低分子薬より高価だが高い効果を持つ。"}, "94005": {"id": 94005, "section": "31. 製薬会社", "q": "後発医薬品（ジェネリック）が発売できる条件はどれか？", "c": ["先発品が承認されれば即座に発売可能", "先発品の特許が切れた後に薬事承認を受けて発売", "医師会の許可が必要", "厚生労働大臣の個別承認が毎回必要"], "a": 1, "e": "ジェネリック医薬品は先発品の特許期間終了後、同等の品質・効果を証明し薬事承認を得て発売できる。"}, "94006": {"id": 94006, "section": "31. 製薬会社", "q": "ロシュ・ノバルティスの本社がある国はどこか？", "c": ["アメリカ", "ドイツ", "スイス", "イギリス"], "a": 2, "e": "ロシュ・ノバルティスはともにスイス・バーゼルに本社を置く世界的製薬企業。"}, "94007": {"id": 94007, "section": "31. 製薬会社", "q": "医師紹介と製薬会社の関係として正しいものはどれか？", "c": ["製薬会社は医師採用に一切関わらない", "製薬会社からのMR転職・製薬関連病院への紹介など接点がある", "製薬会社は医師の給与を決定する", "製薬会社への転職は医師にとって法律で禁止されている"], "a": 1, "e": "MR出身者のクリニック開業コンサルや製薬関連病院への医師紹介など製薬と医師紹介の接点は多い。"}, "147": {"id": 147, "section": "32. 耳鼻咽喉科", "q": "耳鼻咽喉科の対象部位として含まれないものはどれか？", "c": ["耳・鼻", "のど・頸部", "肺・気管支", "副鼻腔"], "a": 2, "e": "肺・気管支は呼吸器科の領域。耳鼻咽喉科は耳・鼻・咽喉・頸部が対象。"}, "149": {"id": 149, "section": "32. 耳鼻咽喉科", "q": "睡眠時無呼吸症候群（SAS）の治療装置はどれか？", "c": ["AED", "CPAP装置", "ネブライザー", "IVH輸液ポンプ"], "a": 1, "e": "CPAP＝Continuous Positive Airway Pressure。就寝時に気道を陽圧で保ち無呼吸を防ぐ。"}, "94010": {"id": 94010, "section": "32. 耳鼻咽喉科", "q": "耳鼻咽喉科が行う手術として含まれないものはどれか？", "c": ["鼻中隔矯正術", "扁桃摘出術", "副鼻腔内視鏡手術", "冠動脈バイパス術"], "a": 3, "e": "冠動脈バイパス術は心臓血管外科の手術。耳鼻科手術は鼻・副鼻腔・耳・咽頭・喉頭が対象。"}, "94011": {"id": 94011, "section": "32. 耳鼻咽喉科", "q": "耳鼻科で行う聴力検査で最も基本的なものはどれか？", "c": ["ABR検査", "純音聴力検査", "OAE検査", "MRI検査"], "a": 1, "e": "純音聴力検査はヘッドホンで音を聞かせ聴力を測定する最も基本的な聴力検査。"}, "94012": {"id": 94012, "section": "32. 耳鼻咽喉科", "q": "突発性難聴の標準的な治療薬はどれか？", "c": ["抗生剤", "抗ウイルス薬", "ステロイド薬", "降圧剤"], "a": 2, "e": "突発性難聴は原因不明の急性感音性難聴。ステロイド全身投与が標準治療。早期治療が重要。"}, "94013": {"id": 94013, "section": "32. 耳鼻咽喉科", "q": "アレルギー性鼻炎の根治治療として注目されているものはどれか？", "c": ["抗ヒスタミン薬の内服のみ", "手術のみ", "舌下免疫療法", "ステロイド注射のみ"], "a": 2, "e": "舌下免疫療法はアレルゲンを少量ずつ投与し免疫反応を変化させる根治的治療。スギ・ダニで保険適用。"}, "94014": {"id": 94014, "section": "32. 耳鼻咽喉科", "q": "メニエール病の主な症状はどれか？", "c": ["視力低下・眼痛", "反復するめまい・難聴・耳鳴り", "嚥下障害・嗄声", "鼻出血・鼻閉"], "a": 1, "e": "メニエール病は内リンパ水腫が原因で反復するめまい・難聴・耳鳴りが三主徴。耳鼻科が専門。"}, "94015": {"id": 94015, "section": "32. 耳鼻咽喉科", "q": "耳鼻科クリニックで多い処置として正しいものはどれか？", "c": ["内視鏡検査・ポリペクトミー", "鼻処置・ネブライザー・聴力検査・アレルギー治療", "透析・シャント管理", "骨折の整復・固定"], "a": 1, "e": "耳鼻科クリニックでは鼻処置・吸入療法・聴力検査・アレルギー検査・耳の処置が日常的な業務。"}, "94016": {"id": 94016, "section": "32. 耳鼻咽喉科", "q": "耳鼻科と頭頸部外科の関係として正しいものはどれか？", "c": ["全く別の診療科", "耳鼻咽喉科・頭頸部外科は同一の専門医制度の基本領域", "頭頸部外科は脳神経外科の一部", "頭頸部外科は形成外科の一部"], "a": 1, "e": "耳鼻咽喉科・頭頸部外科は新専門医制度では一つの基本領域。咽頭がん・喉頭がん等も担う。"}, "94017": {"id": 94017, "section": "32. 耳鼻咽喉科", "q": "補聴器の適合（フィッティング）を行うのは主に誰か？", "c": ["医師のみ", "言語聴覚士・認定補聴器技能者", "看護師", "臨床工学技士"], "a": 1, "e": "補聴器フィッティングは言語聴覚士や認定補聴器技能者が担う。医師は診断・処方を行う。"}, "150": {"id": 150, "section": "33. 透析", "q": "透析の2種類として正しいものはどれか？", "c": ["動脈透析・静脈透析", "血液透析・腹膜透析", "在宅透析・施設透析", "急性透析・慢性透析"], "a": 1, "e": "血液透析（HD）が約97%で主流。腹膜透析（PD）は自宅で行うことが多い。"}, "152": {"id": 152, "section": "33. 透析", "q": "シャントとは何か？", "c": ["透析用の薬剤名", "血液透析のために動脈と静脈を人工的につなぎ合わせた血管", "透析機器のフィルター部品", "腹膜透析用のカテーテル"], "a": 1, "e": "AVシャント（動静脈瘻）。透析に必要な十分な血流を確保するために造設する。"}, "153": {"id": 153, "section": "33. 透析", "q": "透析機器を扱う技師はどれか？", "c": ["診療放射線技師", "臨床検査技師", "臨床工学技士", "視能訓練士"], "a": 2, "e": "臨床工学技士（CE）が透析機器・人工心肺・呼吸器などを操作・管理する。"}, "155": {"id": 155, "section": "33. 透析", "q": "透析患者1人あたりの年間医療費の目安はどれか？", "c": ["約100万円", "約200万円", "約500万円", "約1000万円"], "a": 2, "e": "約500万円（月約40〜42万円）。日本の医療費の中でも大きな割合を占める。"}, "361": {"id": 361, "section": "33. 透析", "q": "透析スキルチェックで確認する種別として含まれないものはどれか？", "c": ["血液透析", "腹膜透析", "光線療法", "持続的血液濾過透析"], "a": 2, "e": "光線療法は皮膚科・新生児黄疸などに使用。透析の種別ではない。"}, "365": {"id": 365, "section": "33. 透析", "q": "透析クリニックの経営上の安定要因として正しいものはどれか？", "c": ["自費診療が多い", "患者が週3回通院する診療報酬の安定性", "外科手術で収益を得る", "美容施術を提供する"], "a": 1, "e": "透析患者は週3回・1回4〜5時間の通院が標準。安定した診療報酬が毎回発生する。"}, "94020": {"id": 94020, "section": "33. 透析", "q": "日本の透析患者数はおよそ何人か？", "c": ["約10万人", "約20万人", "約35万人", "約50万人"], "a": 2, "e": "日本の透析患者は約35万人（2023年）。世界的にも多く、糖尿病性腎症が最大の導入原因。"}, "94021": {"id": 94021, "section": "33. 透析", "q": "透析導入の最大原因疾患はどれか？", "c": ["慢性糸球体腎炎", "高血圧性腎硬化症", "糖尿病性腎症", "多発性嚢胞腎"], "a": 2, "e": "透析導入の最大原因は糖尿病性腎症。約40%を占め、生活習慣病対策が透析予防に直結する。"}, "94022": {"id": 94022, "section": "33. 透析", "q": "血液透析の1回あたりの標準的な施行時間はどれか？", "c": ["約1時間", "約2時間", "約4〜5時間", "約8時間"], "a": 2, "e": "血液透析は週3回・1回約4〜5時間が標準的。患者の日常生活に大きな負担を与える。"}, "94023": {"id": 94023, "section": "33. 透析", "q": "腹膜透析のメリットとして正しいものはどれか？", "c": ["施設に週3回通院が必要", "残腎機能の保護・在宅で実施可能", "血液透析より効率が高い", "シャント造設が必要"], "a": 1, "e": "腹膜透析は在宅で実施可能で残腎機能を温存しやすい。通院頻度を減らせるメリットがある。"}, "157": {"id": 157, "section": "34. 医師会", "q": "日本医師会の会員として最も多いのはどれか？", "c": ["大学病院の勤務医", "開業医", "研修医", "産業医"], "a": 1, "e": "日本医師会は開業医が中心。勤務医の加入率は比較的低い。"}, "159": {"id": 159, "section": "34. 医師会", "q": "医師会に入会するメリットとして含まれないものはどれか？", "c": ["医師賠償責任保険", "研修会参加・情報収集", "地域ネットワーク", "給与が自動的に上がる"], "a": 3, "e": "医師会加入で給与が上がるわけではない。保険・研修・ネットワークがメリット。"}, "162": {"id": 162, "section": "34. 医師会", "q": "医師会と政治のつながりについて正しいものはどれか？", "c": ["医師会は政治活動を一切禁止", "日本医師連盟を通じて政治活動・自民党との関係が深い", "医師会は野党を全面支持", "医師会は政治的に中立を義務付けられている"], "a": 1, "e": "日本医師連盟（日医連）が政治活動の窓口。自民党の支持団体として知られる。"}, "94030": {"id": 94030, "section": "34. 医師会", "q": "都道府県医師会の主な役割はどれか？", "c": ["医師の給与を決定する", "地域の医療政策・医師の研修・地域医療支援を担う", "病院の経営を管理する", "医師免許を発行する"], "a": 1, "e": "都道府県医師会は地域医療政策への提言・医師の生涯研修・地域医療支援・公衆衛生活動などを担う。"}, "94031": {"id": 94031, "section": "34. 医師会", "q": "日本医師会の会費を支払うことで加入できる主な保険はどれか？", "c": ["健康保険", "医師賠償責任保険", "火災保険", "生命保険"], "a": 1, "e": "日本医師会に入会すると医師賠償責任保険に加入できる。訴訟リスクに備えるため多くの医師が活用。"}, "94032": {"id": 94032, "section": "34. 医師会", "q": "医師会の「かかりつけ医機能」推進の目的はどれか？", "c": ["大病院への集中を促進する", "地域で患者を継続的に診る医師を育て医療の効率化を図る", "専門病院への紹介を禁止する", "救急医療を縮小する"], "a": 1, "e": "かかりつけ医機能の強化は患者の大病院集中を防ぎ、地域での継続的な医療提供・医療費適正化を目指す。"}, "94033": {"id": 94033, "section": "34. 医師会", "q": "日本医師会が定める「医の倫理綱領」の基本はどれか？", "c": ["医師の収入最大化", "患者の健康と福祉を最優先とし高い倫理性を保つ", "医師会員の利益優先", "医薬品会社との連携強化"], "a": 1, "e": "医の倫理綱領は患者の健康・人権の尊重・医学の発展・公衆衛生への貢献を基本理念とする。"}, "94034": {"id": 94034, "section": "34. 医師会", "q": "郡市区医師会の主な役割はどれか？", "c": ["全国の医療政策を立案する", "地域の救急当番・休日診療・健診などの地域医療活動を担う", "医師免許の更新を管理する", "製薬会社との契約を管理する"], "a": 1, "e": "郡市区医師会は地域密着の医師会。救急当番・休日診療・学校医・産業医など地域医療活動の中核。"}, "94035": {"id": 94035, "section": "34. 医師会", "q": "医師会が反対したことで有名な歴史的な政策はどれか？", "c": ["健康保険制度の創設", "医療法の制定", "新専門医制度の一部", "薬価基準の廃止"], "a": 2, "e": "新専門医制度導入時、医師会は地域医療への影響・医師の地方偏在深刻化を懸念し強く反対した。"}, "94036": {"id": 94036, "section": "34. 医師会", "q": "日本医師会の会長の選出方法はどれか？", "c": ["厚生労働大臣が任命", "都道府県医師会代表による選挙", "国会が承認", "医師全員の直接投票"], "a": 1, "e": "日本医師会の会長は都道府県医師会の代表者による代議員会での選挙で選出される。"}, "163": {"id": 163, "section": "35. 大学医局", "q": "全国の医局数はおおよそいくつか？", "c": ["約200〜300", "約500〜800", "約2000〜3000", "約10000以上"], "a": 2, "e": "全国の大学の各診療科に医局があり、合計で約2,000〜3,000程度とされる。"}, "164": {"id": 164, "section": "35. 大学医局", "q": "大学病院の主な3つの役割はどれか？", "c": ["診療・研究・教育", "診療・収益・広報", "研究・政治・広報", "教育・行政・地域支援"], "a": 0, "e": "大学病院の使命は①臨床（診療）②教育（医師養成）③研究の3つ。"}, "367": {"id": 367, "section": "35. 大学医局", "q": "医局の主な役割として最も適切なものはどれか？", "c": ["病院の経営管理部門", "医師の教育・人材育成・人事管理の拠点", "医薬品の管理部門", "患者相談窓口"], "a": 1, "e": "医局は大学の各診療科の組織。専門医教育・研究・関連病院への人材派遣を担う。"}, "369": {"id": 369, "section": "35. 大学医局", "q": "大学医局に所属するデメリットとして正しいものはどれか？", "c": ["専門分野の指導を受けられない", "研究や学位取得の機会がない", "勤務地を完全に自由に選べない", "給与が必ず低い"], "a": 2, "e": "医局人事で勤務地が決まるため、自分の希望が通りにくいことがある。"}, "373": {"id": 373, "section": "35. 大学医局", "q": "医局の教育・研究・人事を統括する責任者の役職はどれか？", "c": ["助教", "医員", "准教授", "教授"], "a": 3, "e": "教授が医局のトップ。准教授・講師が中核、助教・医員が実務を担う。"}, "375": {"id": 375, "section": "35. 大学医局", "q": "フリーランス志向の医師が増えている理由として含まれないものはどれか？", "c": ["働き方の多様化", "キャリア選択の自由度重視", "勤務地を自ら選びたい", "医局人事で高収入が保証されているから"], "a": 3, "e": "医局人事で高収入が保証されるわけではない。むしろ自由度・収入を求めてフリーへ。"}, "94040": {"id": 94040, "section": "35. 大学医局", "q": "医局人事とは何か？", "c": ["医局の給与体系", "教授・医局長が医師の赴任先・ポストを決定する慣行", "医師の採用試験", "医師免許の管理"], "a": 1, "e": "医局人事は教授・医局長が関連病院への赴任・ポスト決定を主導する日本特有の仕組み。"}, "94041": {"id": 94041, "section": "35. 大学医局", "q": "医局を離脱した医師が直面しやすい問題はどれか？", "c": ["給与が即座に上がる", "医局ネットワーク・情報・ポストへのアクセスが失われる", "医師免許が失効する", "専門医資格が剥奪される"], "a": 1, "e": "医局離脱後は医局ネットワーク・関連病院情報・教育機会が失われるリスクがある。医師紹介の需要が高まる場面。"}, "94042": {"id": 94042, "section": "35. 大学医局", "q": "大学院（医学大学院）に進学する医師の主な目的はどれか？", "c": ["給与を上げるため", "医学博士号の取得・研究スキルの習得", "専門医資格の取得", "開業のための資金調達"], "a": 1, "e": "大学院では医学博士号取得・研究スキル習得が主目的。アカデミアでのキャリアを志す医師が多い。"}, "94043": {"id": 94043, "section": "35. 大学医局", "q": "「ジッツ」とは医局においてどういう意味か？", "c": ["医局の給与体系", "医局が医師を派遣している関連病院（定位置）", "医局の研究室", "医師の専門資格"], "a": 1, "e": "ジッツとはドイツ語のSitz（座席・定位置）から来た言葉で、医局が医師を派遣する関連病院を指す。"}, "176": {"id": 176, "section": "36. 商社", "q": "日本の3大商社として正しいものはどれか？", "c": ["三菱商事・三井物産・伊藤忠商事", "住友商事・丸紅・豊田通商", "伊藤忠商事・双日・丸紅", "三菱商事・住友商事・丸紅"], "a": 0, "e": "売上・利益・知名度いずれも三菱商事・三井物産・伊藤忠商事が3強。"}, "177": {"id": 177, "section": "36. 商社", "q": "7大商社に含まれないものはどれか？", "c": ["丸紅", "豊田通商", "住友商事", "ソフトバンク"], "a": 3, "e": "7大商社は三菱・三井・伊藤忠・住友・丸紅・豊田通商・双日。ソフトバンクは通信・IT。"}, "177201": {"id": 177201, "section": "36. 商社", "q": "伊藤忠商事が強みを持つ事業分野はどれか？", "c": ["鉄鋼・金属", "航空機リース", "繊維・ブランド・生活消費", "医薬品製造"], "a": 2, "e": "伊藤忠は繊維出身の総合商社で、ファミリーマートや食料・生活消費関連が主力事業。"}, "177202": {"id": 177202, "section": "36. 商社", "q": "双日の前身となった合併はどれか？", "c": ["伊藤忠・丸紅", "トーメン・兼松", "住友・三井", "ニチメン・日商岩井"], "a": 3, "e": "双日は2004年にニチメンと日商岩井が合併して誕生した総合商社。"}, "177203": {"id": 177203, "section": "36. 商社", "q": "豊田通商の筆頭株主はどこか？", "c": ["トヨタ自動車", "三菱UFJ銀行", "住友商事", "伊藤忠商事"], "a": 0, "e": "豊田通商はトヨタ自動車グループの総合商社。トヨタが筆頭株主。"}, "177204": {"id": 177204, "section": "36. 商社", "q": "商社の収益モデルで近年最も拡大している分野はどれか？", "c": ["外国為替差益", "広告・マーケティング収入", "輸出入の仲介手数料", "事業投資・子会社からの配当"], "a": 3, "e": "現代の商社はトレーディングより事業投資・子会社経営による配当収益が主要収益源。"}, "177205": {"id": 177205, "section": "36. 商社", "q": "丸紅が特に強みを持つ分野はどれか？", "c": ["自動車・モビリティ", "航空機リース", "電力・インフラ・再生可能エネルギー", "医薬品流通"], "a": 2, "e": "丸紅は電力事業・再生可能エネルギーを強みとし、世界各地で発電所の権益を保有。"}, "177206": {"id": 177206, "section": "36. 商社", "q": "三菱商事が属する企業グループはどれか？", "c": ["三井グループ", "住友グループ", "芙蓉グループ", "三菱グループ"], "a": 3, "e": "三菱商事は三菱グループの中核企業。三菱UFJ銀行・三菱重工などと同グループ。"}, "177207": {"id": 177207, "section": "36. 商社", "q": "住友商事が本社を置く都市はどこか？", "c": ["東京都千代田区", "大阪市", "名古屋市", "横浜市"], "a": 0, "e": "住友商事の本社は東京都千代田区大手町。住友グループの中核企業の一つ。"}, "177208": {"id": 177208, "section": "36. 商社", "q": "総合商社の機能として含まれないものはどれか？", "c": ["トレーディング", "保険の直接引受", "事業投資", "金融・ファイナンス"], "a": 1, "e": "商社は保険代理店として販売はするが、保険の直接引受は保険会社の業務。"}, "178": {"id": 178, "section": "37. ドクターヘリ", "q": "全国のドクターヘリの設置数はおおよそ何機か？", "c": ["約20機", "約35機", "約57機", "約100機"], "a": 2, "e": "2023年時点で全国に約57機が配備されている。"}, "179": {"id": 179, "section": "37. ドクターヘリ", "q": "日本初のドクターヘリ導入はどこか？", "c": ["東京都・日本医科大学", "大阪府・大阪大学", "岡山県・川崎医科大学附属病院", "北海道・札幌医科大学"], "a": 2, "e": "2001年4月に岡山県の川崎医科大学附属病院で日本初のドクターヘリが導入。"}, "94050": {"id": 94050, "section": "37. ドクターヘリ", "q": "ドクターヘリに同乗する医療スタッフとして正しいものはどれか？", "c": ["医師のみ", "医師と看護師が同乗する", "パイロットと救急救命士のみ", "薬剤師と臨床工学技士"], "a": 1, "e": "ドクターヘリには医師と専任看護師が同乗。現場で高度な医療処置を行いながら搬送する。"}, "94051": {"id": 94051, "section": "37. ドクターヘリ", "q": "ドクターヘリの要請ができる機関はどれか？", "c": ["患者本人のみ", "消防・救急隊・医療機関からの要請", "警察のみ", "都道府県知事のみ"], "a": 1, "e": "ドクターヘリは消防機関・救急隊・医療機関からの要請で出動。通常119番経由で連絡される。"}, "94052": {"id": 94052, "section": "37. ドクターヘリ", "q": "ドクターヘリ導入の根拠となる法律はどれか？", "c": ["医療法", "救急救命士法", "航空法", "救急医療用ヘリコプターを用いた救急医療の確保に関する特別措置法"], "a": 3, "e": "ドクターヘリの運航根拠はドクターヘリ特措法（2007年）。都道府県が運航費用を補助する仕組み。"}, "94053": {"id": 94053, "section": "37. ドクターヘリ", "q": "ドクターヘリの飛行可能な悪天候の条件として正しいものはどれか？", "c": ["どんな天候でも飛行できる", "視界不良・強風・雷などでは安全のため飛行できない場合がある", "夜間は必ず飛行できる", "雨天でも全て飛行可能"], "a": 1, "e": "ドクターヘリは視界不良・強風・雷などの悪天候時に飛行制限がかかる。夜間飛行も機体・拠点による。"}, "94054": {"id": 94054, "section": "37. ドクターヘリ", "q": "ドクターヘリの拠点病院に求められる条件はどれか？", "c": ["一般のクリニックでも可能", "救命救急センター等の高度救急医療機関であること", "200床以上の病院", "都道府県庁所在地にあること"], "a": 1, "e": "ドクターヘリ拠点病院は救命救急センター等の高度救急医療を提供できる医療機関が要件。"}, "94055": {"id": 94055, "section": "37. ドクターヘリ", "q": "ドクターヘリの年間出動件数は全国でおよそどのくらいか？", "c": ["約1000件", "約5000件", "約2万件以上", "約10万件"], "a": 2, "e": "全国のドクターヘリ出動件数は年間約2万件以上。導入拡大とともに件数も増加傾向にある。"}, "94056": {"id": 94056, "section": "37. ドクターヘリ", "q": "ドクターカーとドクターヘリの違いとして正しいものはどれか？", "c": ["ドクターカーは空を飛ぶ", "ドクターカーは車両で出動・ドクターヘリはヘリコプターで出動", "両者は同じ", "ドクターカーは医師が乗らない"], "a": 1, "e": "ドクターカーは病院の車両に医師が同乗して現場に向かう仕組み。ドクターヘリより交通渋滞の影響を受けやすい。"}, "94057": {"id": 94057, "section": "37. ドクターヘリ", "q": "ドクターヘリが特に有効な場面はどれか？", "c": ["市街地の軽症搬送", "へき地・離島・交通渋滞地域での重症患者の迅速搬送", "定期的な外来診察", "長距離の患者転院搬送"], "a": 1, "e": "ドクターヘリは交通渋滞・へき地・離島など陸路での搬送が困難な場合に特に威力を発揮する。"}, "180": {"id": 180, "section": "38. 眼科", "q": "眼科の主な手術として含まれないものはどれか？", "c": ["白内障手術", "緑内障手術", "硝子体手術", "前立腺手術"], "a": 3, "e": "前立腺手術は泌尿器科。眼科の3大手術は白内障・緑内障・硝子体手術。"}, "182": {"id": 182, "section": "38. 眼科", "q": "眼科に特化したコメディカル職種はどれか？", "c": ["臨床工学技士", "視能訓練士", "言語聴覚士", "診療放射線技師"], "a": 1, "e": "視能訓練士（Orthoptist）は眼科専門の医療技術職。視力・視野検査などを担当。"}, "183": {"id": 183, "section": "38. 眼科", "q": "OCTとは何か？", "c": ["眼科臨床試験", "光干渉断層計", "眼底カメラの一種", "眼圧測定器"], "a": 1, "e": "Optical Coherence Tomography（光干渉断層計）。網膜の断層像を撮影する。"}, "377": {"id": 377, "section": "38. 眼科", "q": "眼科スキルチェックで白内障手術の経験目安件数はどれか？", "c": ["100件以上", "200件以上", "500件以上", "1000件以上"], "a": 2, "e": "白内障手術は500件以上が一人前の目安とされることが多い。"}, "379": {"id": 379, "section": "38. 眼科", "q": "眼科求人で確認するレーザー機器の組み合わせとして正しいものはどれか？", "c": ["YAG・SLT", "CO2・エルビウム", "アレキサンドライト・ダイオード", "フラクショナル・IPL"], "a": 0, "e": "YAGレーザー（後発白内障治療）・SLT（緑内障治療）が眼科の代表的レーザー機器。"}, "94060": {"id": 94060, "section": "38. 眼科", "q": "緑内障の主な原因として正しいものはどれか？", "c": ["水晶体の混濁", "眼圧上昇等による視神経障害", "網膜剥離", "角膜の傷"], "a": 1, "e": "緑内障は眼圧上昇などにより視神経が障害される疾患。日本の中途失明原因の第1位。"}, "94061": {"id": 94061, "section": "38. 眼科", "q": "加齢黄斑変性の主な治療はどれか？", "c": ["白内障手術", "抗VEGF薬の硝子体内注射", "緑内障点眼薬", "レーザー光凝固術のみ"], "a": 1, "e": "加齢黄斑変性（AMD）の標準治療は抗VEGF薬（ルセンティス・アイリーアなど）の硝子体内注射。"}, "94062": {"id": 94062, "section": "38. 眼科", "q": "コンタクトレンズ処方の際に行う主な検査はどれか？", "c": ["視野検査・眼底検査", "視力・屈折・角膜形状・フィッティング検査", "OCT・ERG", "眼圧・視野・神経繊維層検査"], "a": 1, "e": "コンタクトレンズ処方には視力・屈折・角膜曲率・フィッティング評価が必要。定期検診も重要。"}, "94063": {"id": 94063, "section": "38. 眼科", "q": "眼科クリニックで最も収益性が高い手術はどれか？", "c": ["結膜炎の点眼処置", "白内障手術（多焦点眼内レンズを含む）", "角膜異物除去", "麦粒腫切開"], "a": 1, "e": "白内障手術（特に多焦点眼内レンズを使った自費・混合診療）は眼科クリニックの主要収益源。"}, "94064": {"id": 94064, "section": "38. 眼科", "q": "眼科と美容医療の接点として正しいものはどれか？", "c": ["全く関係ない", "眼瞼下垂手術・二重手術など眼周囲の美容手術が接点となる", "眼科医は美容手術ができない", "レーシックは眼科とは別の資格が必要"], "a": 1, "e": "眼瞼下垂（保険・自費）・二重手術・目の周囲の美容手術は眼科医が担うことも多い。"}, "184": {"id": 184, "section": "39. 日本の省庁", "q": "省庁の官僚トップの役職はどれか？", "c": ["事務次官", "局長", "審議官", "官房長"], "a": 0, "e": "事務次官が各省の官僚（行政）のトップ。政務は大臣・副大臣・政務官。"}, "185": {"id": 185, "section": "39. 日本の省庁", "q": "日本の省として含まれないものはどれか？", "c": ["厚生労働省・環境省", "観光省・スポーツ省", "外務省・財務省", "防衛省・総務省"], "a": 1, "e": "観光庁・スポーツ庁は存在するが省ではない。日本には現在11省がある。"}, "185201": {"id": 185201, "section": "39. 日本の省庁", "q": "厚生労働省の主な所管業務はどれか？", "c": ["外交・国際関係", "国土整備・インフラ", "医療・社会保障・労働", "文化・スポーツ振興"], "a": 2, "e": "厚生労働省は医療・介護・年金・労働・社会保障を所管。医師採用で最も関連する省庁。"}, "185202": {"id": 185202, "section": "39. 日本の省庁", "q": "文部科学省の所管として正しいものはどれか？", "c": ["医師免許の発行", "社会保険制度", "道路・港湾整備", "国公立大学・学校教育"], "a": 3, "e": "文部科学省は教育・科学技術・文化・スポーツを所管。国公立大学も管轄。"}, "185203": {"id": 185203, "section": "39. 日本の省庁", "q": "日本の省の数は現在いくつか？", "c": ["11省", "8省", "14省", "17省"], "a": 0, "e": "日本には現在11省（総務・法務・外務・財務・文科・厚労・農水・経産・国交・環境・防衛）がある。"}, "185204": {"id": 185204, "section": "39. 日本の省庁", "q": "経済産業省の前身となった省庁はどれか？", "c": ["大蔵省", "通商産業省", "建設省", "労働省"], "a": 1, "e": "経済産業省は2001年の省庁再編で通商産業省（通産省）から改称・再編された。"}, "185205": {"id": 185205, "section": "39. 日本の省庁", "q": "医師免許を発行する省庁はどこか？", "c": ["文部科学省", "内閣府", "厚生労働省", "総務省"], "a": 2, "e": "医師免許は厚生労働省が発行。医師法に基づき厚生労働大臣が免許を交付する。"}, "185206": {"id": 185206, "section": "39. 日本の省庁", "q": "総務省の主な所管業務はどれか？", "c": ["外交・ODA", "農林水産業の振興", "国防・自衛隊", "地方行政・通信・消防"], "a": 3, "e": "総務省は地方行政・選挙・情報通信・郵便・消防などを所管。旧自治省・郵政省・総務庁が統合。"}, "185207": {"id": 185207, "section": "39. 日本の省庁", "q": "内閣府と省の関係として正しいものはどれか？", "c": ["内閣府は省より上位に位置し各省を総合調整する", "内閣府は省の一つとして数えられる", "内閣府は地方自治体を管轄する", "内閣府は外務省と同じ権限を持つ"], "a": 0, "e": "内閣府は省より上位の機関として内閣を補佐し、省庁横断的な重要政策を担う。"}, "185208": {"id": 185208, "section": "39. 日本の省庁", "q": "財務省の主な所管業務はどれか？", "c": ["外交・条約締結", "農業政策・食料安全保障", "社会保険・年金", "国家予算・税制・国債管理"], "a": 3, "e": "財務省は国家予算の編成・税制・国債管理・関税などを所管。旧大蔵省から2001年に改称。"}, "186": {"id": 186, "section": "40. 神経内科", "q": "脳神経内科の代表的な疾患として含まれないものはどれか？", "c": ["パーキンソン病", "アルツハイマー型認知症", "ALS", "前立腺がん"], "a": 3, "e": "前立腺がんは泌尿器科。脳神経内科はパーキンソン・認知症・ALS・てんかんなど。"}, "187": {"id": 187, "section": "40. 神経内科", "q": "神経内科が改称した現在の診療科名はどれか？", "c": ["神経科", "脳内科", "脳神経内科", "認知症内科"], "a": 2, "e": "2018年に神経内科から脳神経内科に名称変更。脳神経外科との混同を防ぐため。"}, "94070": {"id": 94070, "section": "40. 神経内科", "q": "パーキンソン病の主な症状として正しいものはどれか？", "c": ["視力低下・眼痛", "安静時振戦・固縮・無動・姿勢反射障害", "嚥下困難のみ", "高血圧・頭痛"], "a": 1, "e": "パーキンソン病の4大症状は安静時振戦・固縮（筋強剛）・無動・姿勢反射障害。ドパミン神経の変性が原因。"}, "94071": {"id": 94071, "section": "40. 神経内科", "q": "ALSとはどのような疾患か？", "c": ["多発性硬化症の別名", "運動神経が変性し全身の筋肉が萎縮していく難病", "アルツハイマー型認知症の別名", "自己免疫性脳炎"], "a": 1, "e": "ALS（筋萎縮性側索硬化症）は運動神経が変性し全身筋力が低下する難病。感覚・知能は保たれる。"}, "94072": {"id": 94072, "section": "40. 神経内科", "q": "認知症の最多原因はどれか？", "c": ["レビー小体型認知症", "血管性認知症", "前頭側頭型認知症", "アルツハイマー型認知症"], "a": 3, "e": "認知症の約60〜70%がアルツハイマー型。アミロイドβの蓄積が主な病因とされる。"}, "94073": {"id": 94073, "section": "40. 神経内科", "q": "多発性硬化症の特徴として正しいものはどれか？", "c": ["高齢男性に多い", "若い女性に多く中枢神経の脱髄を繰り返す自己免疫疾患", "遺伝性の筋疾患", "感染症による神経炎"], "a": 1, "e": "多発性硬化症は若い女性に多い中枢神経の自己免疫疾患。再発と寛解を繰り返す脱髄疾患。"}, "94074": {"id": 94074, "section": "40. 神経内科", "q": "脳神経内科での腰椎穿刺の主な目的はどれか？", "c": ["脊髄への薬剤投与のみ", "髄液検査による脳炎・髄膜炎・くも膜下出血等の診断", "骨髄検査", "透析アクセスの確保"], "a": 1, "e": "腰椎穿刺は髄液を採取し細胞数・蛋白・糖・細菌・ウイルスなどを調べる診断的検査。"}, "94075": {"id": 94075, "section": "40. 神経内科", "q": "脳神経内科クリニックの主な外来業務はどれか？", "c": ["緊急手術", "頭痛・めまい・認知症・パーキンソン病などの外来診療", "透析管理", "分娩管理"], "a": 1, "e": "脳神経内科クリニックでは頭痛・めまい・認知症外来・パーキンソン病・てんかん管理が主業務。"}, "94076": {"id": 94076, "section": "40. 神経内科", "q": "てんかんの治療として第一選択はどれか？", "c": ["手術のみ", "抗てんかん薬による薬物療法", "放射線治療", "電気けいれん療法"], "a": 1, "e": "てんかんの第一選択は抗てんかん薬による薬物療法。約70%は薬で発作コントロールが可能。"}, "94077": {"id": 94077, "section": "40. 神経内科", "q": "脳神経内科と脳神経外科の役割の違いはどれか？", "c": ["全く同じ診療科", "脳神経内科は内科的管理・脳神経外科は手術が主な役割", "脳神経外科は認知症専門", "脳神経内科は手術も行う"], "a": 1, "e": "脳神経内科は薬物療法等の内科的管理が主体。脳神経外科は手術的治療が主体。同じ疾患を異なる側面から担う。"}, "188": {"id": 188, "section": "41. ファクトフルネス", "q": "収入レベル4（1日32ドル以上）にいる人は世界で約何人か？", "c": ["約10億
