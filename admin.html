<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONNECT クイズ 管理者進捗ダッシュボード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', sans-serif; background: #f0f4f8; color: #1e293b; }

  .header {
    background: linear-gradient(135deg, #1e3a5f, #2563eb);
    color: white;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .header-icon { font-size: 32px; }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

  .summary-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .card {
    background: white;
    border-radius: 14px;
    padding: 18px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    text-align: center;
  }
  .card .num { font-size: 30px; font-weight: 800; color: #2563eb; }
  .card .label { font-size: 12px; color: #64748b; margin-top: 4px; }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: #1e293b;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .table-wrap {
    background: white;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    overflow: hidden;
    margin-bottom: 28px;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: linear-gradient(135deg, #1e3a5f, #2563eb); color: white; }
  thead th { padding: 13px 16px; text-align: left; font-size: 13px; font-weight: 600; }
  tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.15s; }
  tbody tr:hover { background: #f8faff; }
  tbody tr:last-child { border-bottom: none; }
  tbody td { padding: 13px 16px; font-size: 13px; vertical-align: middle; }

  .user-name { font-weight: 700; color: #1e3a5f; }
  .user-id { font-size: 11px; color: #94a3b8; }

  .progress-bar-wrap { display: flex; align-items: center; gap: 10px; }
  .progress-bar {
    flex: 1;
    height: 10px;
    background: #e2e8f0;
    border-radius: 99px;
    overflow: hidden;
    min-width: 80px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #3b82f6, #06b6d4);
    transition: width 0.6s ease;
  }
  .progress-text { font-size: 12px; color: #475569; white-space: nowrap; }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-green { background: #dcfce7; color: #16a34a; }
  .badge-yellow { background: #fef9c3; color: #a16207; }
  .badge-red { background: #fee2e2; color: #dc2626; }
  .badge-gray { background: #f1f5f9; color: #64748b; }

  .accuracy-cell { font-weight: 700; }
  .accuracy-high { color: #16a34a; }
  .accuracy-mid { color: #d97706; }
  .accuracy-low { color: #dc2626; }

  .refresh-btn {
    background: linear-gradient(135deg, #2563eb, #06b6d4);
    color: white;
    border: none;
    padding: 10px 22px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(37,99,235,0.25);
  }
  .refresh-btn:hover { opacity: 0.9; }

  .loading { text-align: center; padding: 40px; color: #64748b; font-size: 14px; }
  .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border: 3px solid #e2e8f0;
    border-top-color: #2563eb;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .last-updated { font-size: 11px; color: #94a3b8; margin-bottom: 16px; }
  .no-data { text-align: center; padding: 30px; color: #94a3b8; font-size: 13px; }

  /* セクション別テーブル */
  .section-table-wrap {
    background: white;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    overflow: auto;
    margin-bottom: 28px;
  }
  .section-table { border-collapse: collapse; min-width: 100%; }
  .section-table thead tr { background: linear-gradient(135deg, #0f766e, #14b8a6); color: white; }
  .section-table thead th { padding: 11px 12px; font-size: 11px; font-weight: 600; white-space: nowrap; text-align: center; }
  .section-table thead th:first-child { text-align: left; min-width: 160px; }
  .section-table tbody tr { border-bottom: 1px solid #f1f5f9; }
  .section-table tbody tr:hover { background: #f0fdfa; }
  .section-table tbody td { padding: 8px 12px; font-size: 12px; text-align: center; }
  .section-table tbody td:first-child { text-align: left; font-weight: 600; color: #1e3a5f; white-space: nowrap; }

  .cell-done { background: #dcfce7; color: #16a34a; font-weight: 700; border-radius: 6px; padding: 2px 6px; }
  .cell-partial { background: #fef9c3; color: #a16207; font-weight: 700; border-radius: 6px; padding: 2px 6px; }
  .cell-none { color: #cbd5e1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📊</div>
  <div>
    <h1>CONNECT クイズ 管理者ダッシュボード</h1>
    <p>全ユーザーの回答進捗・正解率をリアルタイム確認</p>
  </div>
</div>

<div class="container">
  <div id="lastUpdated" class="last-updated">読み込み中...</div>

  <button class="refresh-btn" onclick="loadAllData()">🔄 最新データに更新</button>

  <div class="summary-cards">
    <div class="card"><div class="num" id="sumUsers">-</div><div class="label">登録ユーザー数</div></div>
    <div class="card"><div class="num">800</div><div class="label">総問題数</div></div>
    <div class="card"><div class="num" id="sumAvgAnswered">-</div><div class="label">平均回答数</div></div>
    <div class="card"><div class="num" id="sumAvgAccuracy">-</div><div class="label">平均正解率</div></div>
    <div class="card"><div class="num" id="sumTotalAnswered">-</div><div class="label">総回答数（全員合計）</div></div>
  </div>

  <!-- ユーザー別一覧 -->
  <div class="section-title">👥 ユーザー別進捗一覧</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ユーザー</th>
          <th>回答数 / 800問</th>
          <th>進捗率</th>
          <th>正解数</th>
          <th>不正解数</th>
          <th>正解率</th>
          <th>ステータス</th>
        </tr>
      </thead>
      <tbody id="userTableBody">
        <tr><td colspan="7" class="loading"><div class="spinner"></div><br>データ取得中...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- セクション別 -->
  <div class="section-title">📚 セクション別・ユーザー別回答数</div>
  <div class="section-table-wrap">
    <table class="section-table">
      <thead id="sectionTableHead"></thead>
      <tbody id="sectionTableBody">
        <tr><td colspan="10" class="loading"><div class="spinner"></div><br>データ取得中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDr7cYBMeNcKgt2ZNZfmdtFlMDQwe2_yT4",
  authDomain: "connect-quiz-fa8d8.firebaseapp.com",
  projectId: "connect-quiz-fa8d8",
  storageBucket: "connect-quiz-fa8d8.firebasestorage.app",
  messagingSenderId: "627111669268",
  appId: "1:627111669268:web:36b13a9b504ced40a0c101"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const userNames = {
  'yamaguchi_koji': '山口 孝二',
  'takeuchi_chihiro': '竹内 ちひろ',
  'suzuki_hana': '鈴木 花',
  'adachi_rentaro': '安達 蓮太郎',
  'asami_ryunosuke': '浅見 隆之介',
  'izumi_keisuke': '和泉 圭祐',
  'kato_yuya': '加藤 優哉',
  'sato_yuji': '佐藤 勇治',
  'kato_airi': '加藤 愛莉',
  'yamada_kazuki': '山田 一樹',
  'machida_nobuhiro': '町田 信宏',
  'furukuchi_rina': '古口 里奈',
  'kase_hirohito': '加瀬 裕仁',
  'kamimura_tomoki': '上村 智識',
  'nobe_junko': '野辺 純子',
  'tanaka_kotaro': '田中 耕太郎',
  'yamaguchi': '山口',
  'default': 'デフォルト'
};

function getDisplayName(userId) {
  return userNames[userId] || userId;
}

// 80セクションの名前（短縮）
const sectionNames = [
  "1.医学部","2.臨床研修","3.暗記用語","4.新専門医","5.病院の種類",
  "6.働き方改革","7.消化器内科","8.循環器内科","9.呼吸器科","10.心臓血管外科",
  "11.グループ病院","12.形成外科","13.整形外科","14.精神科","15.放射線科",
  "16.脳神経外科","17.糖尿病内科","18.訪問診療","19.産婦人科","20.救急科",
  "21.小児科","22.リハビリ科","23.診療報酬","24.甲状腺内科","25.泌尿器科",
  "26.医療法","27.医療法人","28.産業医","29.麻酔科","30.医師PF",
  "31.製薬会社","32.耳鼻咽喉科","33.透析","34.医師会","35.大学医局",
  "36.商社","37.ドクターヘリ","38.眼科","39.日本の省庁","40.神経内科",
  "41.ファクトフル","42.皮膚科","43.健診","44.美容外科","45.美容皮膚科",
  "46.美容外科2","47.医療脱毛","48.CREDO","49.IT基礎","50.AI機械学習",
  "51.サイバー","52.DX","53.財閥","54.スタートアップ","55.外資系",
  "56.コンサル","57.金融銀行","58.株式投資","59.会計財務","60.経済指標",
  "61.マーケ","62.営業交渉","63.ロジカル","64.PJ管理","65.人材HR",
  "66.法律","67.グローバル","68.SDGs","69.偉人世界","70.偉人日本",
  "71.財閥企業","72.主要企業","73.経済史","74.株式市場","75.ベンチャー用語",
  "76.マーケ基礎","77.会計基礎","78.フレームワーク","79.世界企業","80.医療DX"
];

// 問題IDからセクションインデックス(0-79)を返す
function getSecIdx(idStr) {
  const id = parseInt(idStr);
  if (isNaN(id)) return -1;

  // 旧ID: 1〜140（1-10→sec0, 11-20→sec1, ...）
  if (id >= 1 && id <= 140) return Math.floor((id - 1) / 10);

  // 新ID 90000番台: 90000+secIdx*10+offset
  if (id >= 90000 && id < 98000) {
    // セクション0-68相当 (secIdx = floor((id-90000)/10))
    const si = Math.floor((id - 90000) / 10);
    if (si >= 0 && si < 80) return si;
  }

  // 新ID 98000番台: secIdx 72-79相当
  if (id >= 98000 && id < 99000) {
    const si = Math.floor((id - 98000) / 10) + 72;
    if (si >= 0 && si < 80) return si;
  }

  // 95000番台: sec41-46
  if (id >= 95000 && id < 95100) return 41 + Math.floor((id - 95000) / 10);

  // 96000番台: sec68-69
  if (id >= 96000 && id < 96100) return 68 + Math.floor((id - 96000) / 10);

  // 97000番台: sec70-71
  if (id >= 97000 && id < 97200) return 70 + Math.floor((id - 97000) / 100);

  return -1;
}

window.loadAllData = async function() {
  document.getElementById('userTableBody').innerHTML =
    '<tr><td colspan="7" class="loading"><div class="spinner"></div><br>データ取得中...</td></tr>';

  try {
    const snapshot = await getDocs(collection(db, 'quiz_results'));
    const users = [];

    snapshot.forEach(docSnap => {
      const userId = docSnap.id;
      const data = docSnap.data();
      const answered = data.answered || {};

      let correct = 0, wrong = 0;
      // 値: 1=正解, 2=不正解
      Object.values(answered).forEach(v => {
        if (v === 1) correct++;
        else if (v === 2) wrong++;
      });

      const total = correct + wrong;
      const accuracy = total > 0 ? Math.round(correct / total * 100) : 0;

      // セクション別集計
      const secCounts = new Array(80).fill(0);
      Object.keys(answered).forEach(k => {
        const si = getSecIdx(k);
        if (si >= 0 && si < 80) secCounts[si]++;
      });

      users.push({ userId, answered, correct, wrong, total, accuracy, secCounts });
    });

    // ===== ユーザーテーブル =====
    const tbody = document.getElementById('userTableBody');
    if (users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="no-data">データなし</td></tr>';
    } else {
      tbody.innerHTML = users.sort((a,b) => b.total - a.total).map(u => {
        const progress = Math.round(u.total / 800 * 100);
        const name = getDisplayName(u.userId);
        let badge = '';
        if (u.total === 0) badge = '<span class="badge badge-gray">未開始</span>';
        else if (progress < 30) badge = '<span class="badge badge-red">開始済</span>';
        else if (progress < 70) badge = '<span class="badge badge-yellow">進行中</span>';
        else badge = '<span class="badge badge-green">完了間近</span>';
        const accClass = u.accuracy >= 80 ? 'accuracy-high' : u.accuracy >= 60 ? 'accuracy-mid' : 'accuracy-low';

        return `<tr>
          <td><div class="user-name">${name}</div><div class="user-id">${u.userId}</div></td>
          <td><strong>${u.total}</strong> / 800問</td>
          <td>
            <div class="progress-bar-wrap">
              <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
              <span class="progress-text">${progress}%</span>
            </div>
          </td>
          <td>${u.correct}問</td>
          <td>${u.wrong}問</td>
          <td class="accuracy-cell ${accClass}">${u.total > 0 ? u.accuracy + '%' : '-'}</td>
          <td>${badge}</td>
        </tr>`;
      }).join('');
    }

    // ===== サマリー =====
    document.getElementById('sumUsers').textContent = users.length;
    const totalAns = users.reduce((s,u) => s + u.total, 0);
    document.getElementById('sumTotalAnswered').textContent = totalAns;
    document.getElementById('sumAvgAnswered').textContent =
      users.length > 0 ? Math.round(totalAns / users.length) : 0;
    const accs = users.filter(u => u.total > 0).map(u => u.accuracy);
    document.getElementById('sumAvgAccuracy').textContent =
      accs.length > 0 ? Math.round(accs.reduce((a,b)=>a+b,0)/accs.length) + '%' : '-';

    // ===== セクション別テーブル =====
    const sortedUsers = users.sort((a,b) => b.total - a.total);
    const thead = document.getElementById('sectionTableHead');
    const stbody = document.getElementById('sectionTableBody');

    thead.innerHTML = `<tr>
      <th>セクション</th>
      ${sortedUsers.map(u => `<th>${getDisplayName(u.userId).split(' ')[0]}</th>`).join('')}
    </tr>`;

    stbody.innerHTML = sectionNames.map((name, si) => {
      const cells = sortedUsers.map(u => {
        const cnt = u.secCounts[si];
        if (cnt === 0) return `<td class="cell-none">-</td>`;
        if (cnt >= 10) return `<td><span class="cell-done">✓ ${cnt}</span></td>`;
        return `<td><span class="cell-partial">${cnt}/10</span></td>`;
      }).join('');
      return `<tr><td>${name}</td>${cells}</tr>`;
    }).join('');

    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      `最終更新: ${now.toLocaleString('ja-JP')}`;

  } catch(e) {
    document.getElementById('userTableBody').innerHTML =
      `<tr><td colspan="7" class="no-data">❌ エラー: ${e.message}</td></tr>`;
    console.error(e);
  }
};

loadAllData();
</script>
</body>
</html>
