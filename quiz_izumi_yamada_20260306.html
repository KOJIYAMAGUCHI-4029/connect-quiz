<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医師紹介基礎知識テスト 2026.03.06</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    color: #fff;
    padding: 20px;
  }
  .container { max-width: 820px; margin: 0 auto; }
  .header {
    text-align: center;
    padding: 30px 0 20px;
  }
  .header h1 {
    font-size: 1.6em;
    letter-spacing: 2px;
    color: #e0c97f;
    text-shadow: 0 0 20px rgba(224,201,127,0.4);
    margin-bottom: 6px;
  }
  .header .subtitle {
    font-size: 0.85em;
    color: #aaa;
    letter-spacing: 1px;
  }
  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    justify-content: center;
  }
  .tab-btn {
    padding: 10px 32px;
    border: 2px solid #e0c97f;
    background: transparent;
    color: #e0c97f;
    border-radius: 30px;
    cursor: pointer;
    font-size: 1em;
    font-weight: bold;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .tab-btn.active, .tab-btn:hover {
    background: #e0c97f;
    color: #1a1a2e;
  }
  .quiz-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 22px 26px;
    margin-bottom: 16px;
    transition: transform 0.15s;
  }
  .quiz-card:hover { transform: translateY(-2px); }
  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }
  .q-num {
    background: linear-gradient(135deg, #e0c97f, #c8a84b);
    color: #1a1a2e;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 0.9em;
    flex-shrink: 0;
  }
  .q-text {
    font-size: 1.02em;
    line-height: 1.6;
    color: #f0f0f0;
    padding-top: 5px;
  }
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .option-btn {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.2);
    color: #ddd;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    font-size: 0.9em;
    line-height: 1.4;
    transition: all 0.15s;
  }
  .option-btn:hover:not(:disabled) {
    background: rgba(224,201,127,0.15);
    border-color: #e0c97f;
    color: #fff;
  }
  .option-btn.correct {
    background: rgba(76,175,80,0.25);
    border-color: #4caf50;
    color: #a5d6a7;
  }
  .option-btn.wrong {
    background: rgba(244,67,54,0.2);
    border-color: #f44336;
    color: #ef9a9a;
  }
  .feedback {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 0.88em;
    line-height: 1.6;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: rgba(76,175,80,0.15); border-left: 3px solid #4caf50; color: #c8e6c9; }
  .feedback.wrong-fb { background: rgba(244,67,54,0.1); border-left: 3px solid #f44336; color: #ffcdd2; }
  .result-section {
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 28px;
    margin-top: 24px;
    text-align: center;
    border: 1px solid rgba(224,201,127,0.3);
  }
  .score-display {
    font-size: 3.5em;
    font-weight: bold;
    color: #e0c97f;
    text-shadow: 0 0 30px rgba(224,201,127,0.5);
  }
  .score-label {
    font-size: 1em;
    color: #bbb;
    margin-bottom: 16px;
  }
  .verdict {
    font-size: 1.4em;
    font-weight: bold;
    padding: 14px 28px;
    border-radius: 12px;
    display: inline-block;
    margin: 12px 0;
    letter-spacing: 2px;
  }
  .verdict.pass { background: linear-gradient(135deg, #1b5e20, #2e7d32); color: #a5d6a7; border: 1px solid #4caf50; }
  .verdict.retry { background: linear-gradient(135deg, #e65100, #bf360c); color: #ffccbc; border: 1px solid #ff7043; }
  .verdict.red { background: linear-gradient(135deg, #7f0000, #b71c1c); color: #ffcdd2; border: 1px solid #f44336; }
  .verdict-comment {
    font-size: 0.95em;
    color: #ccc;
    margin-top: 10px;
    line-height: 1.7;
  }
  .reset-btn {
    margin-top: 18px;
    padding: 12px 36px;
    background: linear-gradient(135deg, #e0c97f, #c8a84b);
    color: #1a1a2e;
    border: none;
    border-radius: 30px;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .progress-bar {
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    height: 6px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #e0c97f, #c8a84b);
    border-radius: 8px;
    transition: width 0.3s;
  }
  .progress-text {
    text-align: right;
    font-size: 0.8em;
    color: #aaa;
    margin-bottom: 6px;
  }
  .section-badge {
    display: inline-block;
    background: rgba(224,201,127,0.15);
    border: 1px solid rgba(224,201,127,0.3);
    color: #e0c97f;
    font-size: 0.72em;
    padding: 2px 10px;
    border-radius: 20px;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .hidden { display: none; }
  @media (max-width: 520px) {
    .options { grid-template-columns: 1fr; }
    .header h1 { font-size: 1.3em; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🏥 医師紹介 基礎知識テスト</h1>
    <div class="subtitle">2026年3月6日 ／ 全10問</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchPerson('izumi')">💼 和泉さん</button>
    <button class="tab-btn" onclick="switchPerson('yamada')">📋 山田さん</button>
  </div>

  <div id="quiz-izumi" class="quiz-section"></div>
  <div id="quiz-yamada" class="quiz-section hidden"></div>
</div>

<script>
const quizData = {
  izumi: {
    name: "和泉",
    questions: [
      {
        section: "医師転職市場",
        q: "医師が転職を考える際、最も多い理由として正しいものはどれ？",
        options: ["給与・報酬の不満", "人間関係・職場環境", "専門性の追求・キャリアアップ", "家族の事情・ライフスタイル変化"],
        answer: 1,
        hint: "医師も人間。職場の人間関係は、どんなに給与が良くても離職を引き起こします。複数の調査でも人間関係が上位にきています。"
      },
      {
        section: "診療科知識",
        q: "内科の中で、消化器・循環器・呼吸器などを横断的に診る診療科の呼び方は？",
        options: ["総合内科", "地域医療科", "家庭医学科", "救急内科"],
        answer: 0,
        hint: "\"総合\"内科は専門分化が進んだ現代において、各臓器横断的に診る重要な診療科です。"
      },
      {
        section: "求人・報酬",
        q: "常勤医師の年収相場として、一般内科医（地方・中規模病院）の目安は？",
        options: ["800万円前後", "1,200〜1,500万円前後", "2,000万円以上", "500万円以下"],
        answer: 1,
        hint: "地方の一般内科常勤で1,200〜1,500万円が標準的なレンジ。都市部はやや低め、僻地・当直込みだと上振れします。"
      },
      {
        section: "非常勤・アルバイト",
        q: "医師のスポット（単発）アルバイトで、日当10万円以上になりやすい条件はどれ？",
        options: ["平日日中の外来のみ", "当直・夜間対応あり＋僻地", "大都市の有名病院", "短時間（4時間以内）"],
        answer: 1,
        hint: "当直＋僻地の組み合わせが高単価の王道。離島や山間部の当直は15〜20万円超えもあります。"
      },
      {
        section: "有料職業紹介",
        q: "医師紹介会社が医療機関から受け取る手数料（フィー）の計算方式として一般的なものは？",
        options: ["月額固定サブスク", "成功報酬型（年収の一定割合）", "求人掲載費のみ", "医師の自己負担"],
        answer: 1,
        hint: "成功報酬型が基本。年収の20〜35%が相場です。医師側の負担はゼロが大原則。"
      },
      {
        section: "労働法・規制",
        q: "医師の時間外労働上限規制（A水準）で定められた年間上限時間は？",
        options: ["720時間", "960時間", "1,200時間", "1,860時間"],
        answer: 1,
        hint: "A水準は年960時間。B・C水準（地域医療確保や研修医等）は年1,860時間まで認められます。"
      },
      {
        section: "医療機関",
        q: "特定機能病院として厚生労働大臣が承認する主な条件に該当しないものは？",
        options: ["高度な医療の提供", "400床以上の病床数", "10以上の診療科", "24時間救急対応"],
        answer: 3,
        hint: "特定機能病院の要件は①高度医療の提供・開発②400床以上③16診療科以上など。24時間救急は要件ではありません。"
      },
      {
        section: "採用・面談",
        q: "医師面談で「見学」を設定する主な目的として最も適切なものは？",
        options: ["医師のスケジュール確認", "病院側・医師双方のミスマッチ防止", "給与交渉の場として活用", "書類選考の代替"],
        answer: 1,
        hint: "見学は双方のミスマッチ防止が最大の目的。病院の雰囲気・スタッフとのフィーリングを確認する大切な機会です。"
      },
      {
        section: "競合・業界",
        q: "医師専門の求人・転職サービスとして業界最大手と言われる会社はどこ？",
        options: ["リクルートメディカルキャリア", "エムスリーキャリア（m3キャリア）", "マイナビDOCTOR", "ドクターズマガジン"],
        answer: 1,
        hint: "m3キャリアはm3.comの医師会員基盤（国内医師の90%超）を活かした最大手プラットフォームです。"
      },
      {
        section: "医師の資格",
        q: "医師が「産業医」として活動するために必要な資格の取得方法として正しいものは？",
        options: ["国家試験を新たに受験", "所定の研修50時間を修了後に認定", "大学院修了が必須", "特に資格不要・医師免許のみでOK"],
        answer: 1,
        hint: "産業医資格は日本医師会等が認定する研修（基礎研修50時間など）を修了することで取得できます。"
      }
    ]
  },
  yamada: {
    name: "山田",
    questions: [
      {
        section: "診療科知識",
        q: "循環器内科のカテーテル治療「PCI」の正式名称は？",
        options: ["経皮的冠動脈インターベンション", "経皮的心臓弁置換術", "経鼻的心臓カテーテル検査", "皮下冠動脈バイパス形成術"],
        answer: 0,
        hint: "PCIはPercutaneous Coronary Intervention。狭心症・心筋梗塞で詰まった冠動脈をバルーンやステントで広げる治療です。"
      },
      {
        section: "医療機関の種類",
        q: "「クリニック（診療所）」と「病院」の法律上の違いはどれ？",
        options: ["診療科目の数", "入院ベッド数（19床以下 vs 20床以上）", "診療時間の長さ", "院長の経験年数"],
        answer: 1,
        hint: "医療法上、19床以下が診療所（クリニック）、20床以上が病院。ベッド数が法律上の区分です。"
      },
      {
        section: "非常勤・アルバイト",
        q: "ドクターナビ等の求人サイトで「日給100,000円以上」の非常勤求人が多い診療科はどれ？",
        options: ["皮膚科・眼科", "精神科・心療内科（当直）", "小児科・救急（夜間対応）", "病理診断科"],
        answer: 2,
        hint: "小児科と救急の夜間・当直は医師不足が深刻で高単価。日当15〜20万超えも珍しくありません。"
      },
      {
        section: "転職エージェント",
        q: "医師転職エージェントにおいて「レジメ（職務経歴書）」作成を支援する主な理由は？",
        options: ["法律で義務付けられているから", "医師は文書作成が苦手だから", "書類の質が採用可否に直結するから", "医療機関側がエージェント作成を要求するから"],
        answer: 2,
        hint: "レジメの質＝第一印象。特に競合候補が複数いる場合、書類の完成度が面接機会を左右します。"
      },
      {
        section: "グループ病院",
        q: "「徳洲会グループ」の特徴として正しいものはどれ？",
        options: ["東京・大阪中心の都市型展開", "「生命だけは平等だ」理念による救急・僻地医療強化", "精神科・老人保健施設に特化", "製薬会社と一体運営"],
        answer: 1,
        hint: "徳洲会は「生命だけは平等だ」の理念のもと、離島・僻地を含む全国展開と24時間救急を特徴としています。"
      },
      {
        section: "医師の働き方",
        q: "「オンコール」とはどういう勤務形態？",
        options: ["完全在宅勤務のこと", "自宅待機しながら緊急時に呼び出される待機勤務", "外来のみ対応する軽易な勤務", "月1回の当直のこと"],
        answer: 1,
        hint: "オンコールは呼び出し待機勤務。実際に呼ばれなくても精神的拘束があるため、手当が支払われることが多いです。"
      },
      {
        section: "診療科知識",
        q: "外科手術における「da Vinci（ダ・ヴィンチ）」とは？",
        options: ["手術用抗生剤の商品名", "内視鏡手術支援ロボットシステム", "麻酔管理システム", "電子カルテのブランド名"],
        answer: 1,
        hint: "da Vinciはインテュイティブ・サージカル社の手術支援ロボット。前立腺・胃・肺など多くの術式で普及中。"
      },
      {
        section: "医師の資格・認定",
        q: "「専門医制度」において、専門医資格を認定・管理する機関は？",
        options: ["厚生労働省", "日本専門医機構（JMSB）", "日本医師会", "各診療科学会がバラバラに認定"],
        answer: 1,
        hint: "2018年から日本専門医機構（JMSB）が一元管理。ただし各学会との連携が前提で、まだ移行期にあります。"
      },
      {
        section: "面談・交渉",
        q: "医師の条件交渉で「年俸制 vs 日当×日数制」の違いとして正しいものは？",
        options: ["日当制の方が必ず収入が高い", "年俸制は安定・日当制は変動リスクがある", "どちらも法律上は同じ", "常勤は必ず年俸制でなければならない"],
        answer: 1,
        hint: "年俸制は安定収入が保証される一方、残業・当直の追加報酬が出にくい場合も。日当制は稼働量で上振れしますが保証がありません。"
      },
      {
        section: "業界知識",
        q: "「M3（エムスリー）」が医師向けサービスで強みを持つ最大の理由は？",
        options: ["医師専用SNSの運営", "国内医師の90%超にリーチする会員基盤", "製薬会社の子会社であること", "海外医師の紹介が得意"],
        answer: 1,
        hint: "m3.comの医師会員数は34万人超（国内医師の90%超）。この圧倒的会員基盤が求人・MR支援・キャリアすべての強みです。"
      }
    ]
  }
};

let currentPerson = 'izumi';
let answered = { izumi: {}, yamada: {} };

function switchPerson(person) {
  currentPerson = person;
  document.getElementById('quiz-izumi').classList.toggle('hidden', person !== 'izumi');
  document.getElementById('quiz-yamada').classList.toggle('hidden', person !== 'yamada');
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && person === 'izumi') || (i === 1 && person === 'yamada'));
  });
}

function renderQuiz(person) {
  const data = quizData[person];
  const container = document.getElementById(`quiz-${person}`);
  const totalQ = data.questions.length;

  let html = `
    <div class="progress-text" id="prog-text-${person}">0 / ${totalQ} 問回答済み</div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill-${person}" style="width:0%"></div></div>
  `;

  data.questions.forEach((q, idx) => {
    const opts = q.options.map((o, oi) =>
      `<button class="option-btn" id="opt-${person}-${idx}-${oi}" onclick="answer('${person}',${idx},${oi})">${['Ａ','Ｂ','Ｃ','Ｄ'][oi]}．${o}</button>`
    ).join('');

    html += `
      <div class="quiz-card" id="card-${person}-${idx}">
        <div class="section-badge">📚 ${q.section}</div>
        <div class="q-header">
          <div class="q-num">Q${idx+1}</div>
          <div class="q-text">${q.q}</div>
        </div>
        <div class="options">${opts}</div>
        <div class="feedback" id="fb-${person}-${idx}"></div>
      </div>
    `;
  });

  html += `<div class="result-section hidden" id="result-${person}"></div>`;
  container.innerHTML = html;
}

function answer(person, qIdx, optIdx) {
  if (answered[person][qIdx] !== undefined) return;
  answered[person][qIdx] = optIdx;

  const q = quizData[person].questions[qIdx];
  const isCorrect = optIdx === q.answer;

  // ボタンの色付け
  for (let i = 0; i < q.options.length; i++) {
    const btn = document.getElementById(`opt-${person}-${qIdx}-${i}`);
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === optIdx && !isCorrect) btn.classList.add('wrong');
  }

  // フィードバック表示
  const fb = document.getElementById(`fb-${person}-${qIdx}`);
  fb.className = `feedback show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = isCorrect
    ? `✅ <strong>正解！</strong> ${q.hint}`
    : `❌ <strong>不正解…</strong> 正解は「${['Ａ','Ｂ','Ｃ','Ｄ'][q.answer]}．${q.options[q.answer]}」<br>${q.hint}`;

  // プログレス更新
  const totalQ = quizData[person].questions.length;
  const doneCount = Object.keys(answered[person]).length;
  document.getElementById(`prog-text-${person}`).textContent = `${doneCount} / ${totalQ} 問回答済み`;
  document.getElementById(`prog-fill-${person}`).style.width = `${(doneCount/totalQ)*100}%`;

  // 全問回答したら結果表示
  if (doneCount === totalQ) showResult(person);
}

function showResult(person) {
  const data = quizData[person];
  const totalQ = data.questions.length;
  let correct = 0;
  for (let i = 0; i < totalQ; i++) {
    if (answered[person][i] === data.questions[i].answer) correct++;
  }

  let verdictClass, verdictText, comment;
  if (correct <= 4) {
    verdictClass = 'red';
    verdictText = '🔴 赤伝確定！';
    comment = `${data.name}さん、${correct}問正解…。\nこれは由々しき事態です😱\n医師紹介の基礎から、もう一度しっかり叩き直しましょう！\n山口社長より「赤伝」の通達が届きました。覚悟してください。`;
  } else if (correct <= 6) {
    verdictClass = 'retry';
    verdictText = '🟠 追試決定…';
    comment = `${data.name}さん、${correct}問正解。惜しい！でも合格ラインには届かず😅\n7問の壁は厚かった…。\n追試に向けて、苦手分野を重点的に復習してください！`;
  } else {
    verdictClass = 'pass';
    verdictText = '🟢 合格！おめでとう🎉';
    comment = `${data.name}さん、${correct}問正解！見事合格です！✨\n医師紹介のプロとしての知識、しっかり身についていますね。\nこの調子で、医療機関・医師双方に頼られるコンサルタントへ！`;
  }

  const resultEl = document.getElementById(`result-${person}`);
  resultEl.classList.remove('hidden');
  resultEl.innerHTML = `
    <div class="score-display">${correct} <span style="font-size:0.45em;color:#bbb">/ ${totalQ}</span></div>
    <div class="score-label">正解数</div>
    <div class="verdict ${verdictClass}">${verdictText}</div>
    <div class="verdict-comment" style="white-space:pre-line">${comment}</div>
    <div style="margin-top:16px;font-size:0.8em;color:#888;">
      ✅ 合格ライン：7問以上 ／ 🟠 追試：6問以下 ／ 🔴 赤伝：4問以下
    </div>
    <button class="reset-btn" onclick="resetQuiz('${person}')">🔄 もう一度チャレンジ</button>
  `;
  resultEl.scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz(person) {
  answered[person] = {};
  renderQuiz(person);
}

// 初期化
renderQuiz('izumi');
renderQuiz('yamada');
</script>
</body>
</html>
