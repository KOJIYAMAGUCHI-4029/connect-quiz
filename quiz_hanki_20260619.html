const LETTERS = ['Ａ','Ｂ','Ｃ','Ｄ'];
let currentName = '';
let currentTheme = 'medical';
let questions = [];
let answered = {};

(function initNames() {
  const grid = document.getElementById('name-grid');
  members.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'name-btn' + (m.theme === 'entertainment' ? ' ent' : '');
    btn.innerHTML = m.name + (m.theme === 'entertainment'
      ? '<span class="tag">🎀 ディズニー / 嵐 / Snow Man</span>'
      : '<span class="tag">💼 医師紹介 基礎知識</span>');
    btn.onclick = () => startQuiz(m);
    grid.appendChild(btn);
  });
})();

function startQuiz(m) {
  currentName = m.name;
  currentTheme = m.theme;
  questions = QUESTION_SETS[m.theme];
  answered = {};
  document.getElementById('select-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  document.getElementById('who-badge').textContent = '👤 ' + m.name + ' さん';
  renderQuiz();
  window.scrollTo({top:0, behavior:'smooth'});
}

function backToSelect() {
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('select-screen').classList.remove('hidden');
  document.getElementById('result').classList.add('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderQuiz() {
  const body = document.getElementById('quiz-body');
  const entCls = currentTheme === 'entertainment' ? ' ent' : '';
  let html = '';
  questions.forEach((q, idx) => {
    const opts = q.options.map((o, oi) =>
      `<button class="option-btn" id="opt-${idx}-${oi}" onclick="answer(${idx},${oi})">${LETTERS[oi]}．${o}</button>`
    ).join('');
    html += `
      <div class="quiz-card" id="card-${idx}">
        <div class="section-badge${entCls}">📚 ${q.section}</div>
        <div class="q-header">
          <div class="q-num">Q${idx+1}</div>
          <div class="q-text">${q.q}</div>
        </div>
        <div class="options">${opts}</div>
        <div class="feedback" id="fb-${idx}"></div>
      </div>`;
  });
  body.innerHTML = html;
  document.getElementById('result').classList.add('hidden');
  updateProgress();
}

function answer(qIdx, optIdx) {
  if (answered[qIdx] !== undefined) return;
  answered[qIdx] = optIdx;
  const q = questions[qIdx];
  const isCorrect = optIdx === q.answer;
  for (let i = 0; i < q.options.length; i++) {
    const btn = document.getElementById(`opt-${qIdx}-${i}`);
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === optIdx && !isCorrect) btn.classList.add('wrong');
  }
  const fb = document.getElementById(`fb-${qIdx}`);
  fb.className = `feedback show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = isCorrect
    ? `✅ <strong>正解！</strong> ${q.hint}`
    : `❌ <strong>不正解…</strong> 正解は「${LETTERS[q.answer]}．${q.options[q.answer]}」<br>${q.hint}`;
  updateProgress();
  if (Object.keys(answered).length === questions.length) showResult();
}

function updateProgress() {
  const done = Object.keys(answered).length;
  const total = questions.length;
  document.getElementById('prog-text').textContent = `${done} / ${total} 問回答済み`;
  document.getElementById('prog-fill').style.width = `${(done/total)*100}%`;
}

function showResult() {
  const total = questions.length;
  let correct = 0;
  for (let i = 0; i < total; i++) if (answered[i] === questions[i].answer) correct++;

  let vClass, vText, comment;
  const ent = currentTheme === 'entertainment';
  if (correct >= 14) {
    vClass = 'pass'; vText = '🟢 合格！おめでとう🎉';
    comment = ent
      ? `${currentName}さん、${correct}問正解！さすがの知識量です✨\n大好きなジャンル、ばっちりですね！\nCONNECTへようこそ。これからよろしくお願いします😊`
      : `${currentName}さん、${correct}問正解！見事合格です！✨\n医師紹介のプロとしての基礎、しっかり身についていますね。\nこの調子で、医療機関・医師双方に頼られるコンサルタントへ！`;
  } else if (correct >= 10) {
    vClass = 'retry'; vText = ent ? '🟠 あと一歩！' : '🟠 追試決定…';
    comment = ent
      ? `${currentName}さん、${correct}問正解。惜しい！あと一歩で完全制覇でした😆\n推し活パワーでリベンジしましょう！`
      : `${currentName}さん、${correct}問正解。惜しい！でも合格ラインには届かず😅\n14問の壁は厚かった…。\n追試に向けて、苦手分野を重点的に復習してください！`;
  } else {
    vClass = 'red'; vText = ent ? '🔵 ここからが伸びしろ！' : '🔴 赤伝確定！';
    comment = ent
      ? `${currentName}さん、${correct}問正解。ここからが伸びしろですね😉\nもう一度チャレンジしてみましょう！`
      : `${currentName}さん、${correct}問正解…。\nこれは由々しき事態です😱\n医師紹介の基礎から、もう一度しっかり叩き直しましょう！\n山口社長より「赤伝」の通達が届きました。覚悟してください。`;
  }

  const el = document.getElementById('result');
  el.classList.remove('hidden');
  el.innerHTML = `
    <div class="score-display">${correct} <span style="font-size:0.45em;color:#bbb">/ ${total}</span></div>
    <div class="score-label">${currentName} さんの正解数</div>
    <div class="verdict ${vClass}">${vText}</div>
    <div class="verdict-comment" style="white-space:pre-line">${comment}</div>
    <div style="margin-top:16px;font-size:0.8em;color:#888;">
      🟢 14問以上 ／ 🟠 10〜13問 ／ ${ent ? '🔵' : '🔴'} 9問以下
    </div>
    <button class="reset-btn" onclick="startQuiz(members.find(x=>x.name==='${currentName}'))">🔄 もう一度</button>
    <button class="reselect-btn" onclick="backToSelect()">👥 名前を選び直す</button>
  `;
  el.scrollIntoView({ behavior: 'smooth' });
}
</script>
