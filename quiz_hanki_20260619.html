  .section-badge { display:inline-block; background:rgba(224,201,127,0.15); border:1px solid rgba(224,201,127,0.3); color:#e0c97f; font-size:0.72em; padding:2px 10px; border-radius:20px; margin-bottom:8px; letter-spacing:1px; }
  .section-badge.ent { background:rgba(227,107,174,0.15); border-color:rgba(227,107,174,0.4); color:#f7a8d4; }

  .verdict-comment { font-size:0.95em; color:#ccc; margin-top:10px; line-height:1.7; }
  .btn-gold { padding:12px 30px; background:linear-gradient(135deg,#e0c97f,#c8a84b); color:#1a1a2e; border:none; border-radius:30px; font-size:0.95em; font-weight:bold; cursor:pointer; letter-spacing:1px; margin:8px 6px 0; }
  .btn-outline { padding:12px 30px; background:transparent; color:#e0c97f; border:1px solid #e0c97f; border-radius:30px; font-size:0.95em; font-weight:bold; cursor:pointer; letter-spacing:1px; margin:8px 6px 0; }
  .board-wrap { padding:6px 0 40px; }
  .board-title { text-align:center; font-size:1.5em; color:#e0c97f; margin:10px 0 6px; }
  .board-sub { text-align:center; color:#aaa; font-size:0.85em; margin-bottom:20px; }
  table.entry { width:100%; border-collapse:collapse; margin-bottom:20px; }
  table.entry th, table.entry td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.1); text-align:left; }
  table.entry th { color:#e0c97f; font-size:0.85em; }
  .entry-name { font-size:1.05em; }
  .mini { font-size:0.72em; color:#999; }
  .num-ctrl { display:flex; align-items:center; gap:8px; }
  .num-ctrl button { width:30px; height:30px; border-radius:50%; border:1px solid #e0c97f; background:transparent; color:#e0c97f; font-size:1.1em; cursor:pointer; }
  .num-ctrl input { width:60px; padding:6px; text-align:center; border-radius:8px; border:1px solid rgba(255,255,255,0.25); background:rgba(255,255,255,0.08); color:#fff; font-size:1em; }
  .board-actions { text-align:center; }
  .reveal-wrap { padding:4px 0 50px; }
  .reveal-title { text-align:center; font-size:2em; color:#ffd54f; text-shadow:0 0 24px rgba(255,213,79,0.5); margin:8px 0 4px; letter-spacing:3px; }

  .rank-row.shown { opacity:1; transform:translateY(0); }
  .rank-row.top1 { background:linear-gradient(135deg,rgba(255,213,79,0.25),rgba(255,143,0,0.18)); border-color:#ffd54f; box-shadow:0 0 28px rgba(255,213,79,0.35); }

  .tier-pill.yellow { background:rgba(255,193,7,0.25); color:#ffe082; border:1px solid #ffc107; }

  .sc-retake { color:#ef9a9a !important; }

</style>

<body>
<div class="container">
  <div class="header"><h1>🏆 半期表彰式クイズ</h1><div class="subtitle">CONNECT ／ 全20問</div></div>

  <div id="select-screen" class="select-screen">
    <div class="select-title">▼ 名前をタップしてスタート</div>
    <div class="name-grid" id="name-grid"></div>
    <div class="host-controls">
      <button class="host-btn" id="to-reveal">🏆 結果発表（司会用）</button>
      <button class="host-btn" id="to-board">📋 スコア手入力（司会用）</button>
    </div>
    <div class="tier-legend">
      <span class="tl pass">🟢 14問以上：合格</span>
      <span class="tl yellow">🟡 10〜13問：イエローカード</span>
      <span class="tl retake">🔴 9問以下：追試</span>
    </div>
    <div class="note">営業メンバーは「医師紹介 基礎知識」、🎀の方は別ジャンル。<br>各自プレイ後、スコアは自動で記録されます（このPC内に保存）。</div>
  </div>

  <div id="quiz-screen" class="hidden">
    <div class="back-bar"><button class="back-btn" id="quiz-back">← 名前選択にもどる</button><span class="who-badge" id="who-badge"></span></div>
    <div class="progress-text" id="prog-text">0 / 20 問回答済み</div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div id="quiz-body"></div>
    <div class="result-section hidden" id="result"></div>
  </div>

  <div id="board-screen" class="hidden board-wrap">
    <div class="back-bar"><button class="back-btn" id="board-back">← もどる</button></div>
    <div class="board-title">📋 スコア入力・確認</div>
    <div class="board-sub">自動記録された点数を確認・修正できます（スマホ受験分はここで手入力もOK）</div>
    <table class="entry"><thead><tr><th>名前</th><th>ジャンル</th><th>スコア（0〜20）</th></tr></thead><tbody id="entry-body"></tbody></table>
    <div class="board-actions">
      <button class="btn-gold" id="board-to-reveal">🏆 ランキング発表へ</button>
      <button class="btn-outline" id="reset-scores">🗑 スコアを全消去</button>
    </div>
  </div>

  <div id="reveal-screen" class="hidden reveal-wrap">
    <div class="back-bar"><button class="back-btn" id="reveal-back">← 名前選択へ</button></div>
    <div class="reveal-title">🏆 結果発表 🏆</div>
    <div class="reveal-sub" id="reveal-sub"></div>
    <div class="tier-summary" id="tier-summary"></div>
    <div class="rank-list" id="rank-list"></div>
    <div class="reveal-controls" id="reveal-controls"></div>
  </div>
</div>

const LETTERS = ['Ａ','Ｂ','Ｃ','Ｄ'];
const STORE_KEY = 'connect_hanki_scores_20260619';
let currentName='', currentTheme='medical', questions=[], answered={};

function loadScores(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY))||{}; }catch(e){ return {}; } }
function saveScore(name,score){ const s=loadScores(); s[name]=score; try{ localStorage.setItem(STORE_KEY,JSON.stringify(s)); }catch(e){} }
function setScoreManual(name,val){ let v=parseInt(val,10); const s=loadScores(); if(isNaN(v)){ delete s[name]; } else { v=Math.max(0,Math.min(20,v)); s[name]=v; } try{ localStorage.setItem(STORE_KEY,JSON.stringify(s)); }catch(e){} }

function show(id){ ['select-screen','quiz-screen','board-screen','reveal-screen'].forEach(s=> document.getElementById(s).classList.toggle('hidden', s!==id)); window.scrollTo({top:0,behavior:'smooth'}); }
function backToSelect(){ buildNames(); show('select-screen'); }

function buildNames(){
  const grid=document.getElementById('name-grid'); grid.innerHTML='';
  members.forEach(m=>{
    const btn=document.createElement('button');
    btn.className='name-btn'+(m.theme==='entertainment'?' ent':'');
    const tag=m.theme==='entertainment'?'🎀 ディズニー / 嵐 / Snow Man':'💼 医師紹介 基礎知識';
    btn.innerHTML=m.name+`<span class="tag">${tag}</span>`;
    btn.addEventListener('click',()=>startQuiz(m));
    grid.appendChild(btn);
  });
}

function startQuiz(m){ currentName=m.name; currentTheme=m.theme; questions=QUESTION_SETS[m.theme]; answered={}; document.getElementById('who-badge').textContent='👤 '+m.name+' さん'; renderQuiz(); show('quiz-screen'); }

function renderQuiz(){
  const body=document.getElementById('quiz-body'); const entCls=currentTheme==='entertainment'?' ent':''; let html='';
  questions.forEach((q,idx)=>{
    const opts=q.options.map((o,oi)=>`<button class="option-btn" id="opt-${idx}-${oi}" data-q="${idx}" data-o="${oi}">${LETTERS[oi]}．${o}</button>`).join('');
    html+=`<div class="quiz-card"><div class="section-badge${entCls}">📚 ${q.section}</div><div class="q-header"><div class="q-num">Q${idx+1}</div><div class="q-text">${q.q}</div></div><div class="options">${opts}</div><div class="feedback" id="fb-${idx}"></div></div>`;
  });
  body.innerHTML=html;
  body.querySelectorAll('.option-btn').forEach(b=> b.addEventListener('click',()=> answer(parseInt(b.dataset.q,10), parseInt(b.dataset.o,10))));
  document.getElementById('result').classList.add('hidden'); updateProgress();
}

function answer(qIdx,optIdx){
  if(answered[qIdx]!==undefined) return; answered[qIdx]=optIdx;
  const q=questions[qIdx]; const ok=optIdx===q.answer;
  for(let i=0;i<q.options.length;i++){ const btn=document.getElementById(`opt-${qIdx}-${i}`); btn.disabled=true; if(i===q.answer) btn.classList.add('correct'); else if(i===optIdx&&!ok) btn.classList.add('wrong'); }
  const fb=document.getElementById(`fb-${qIdx}`); fb.className='feedback show '+(ok?'correct-fb':'wrong-fb');
  fb.innerHTML= ok ? `✅ <strong>正解！</strong> ${q.hint}` : `❌ <strong>不正解…</strong> 正解は「${LETTERS[q.answer]}．${q.options[q.answer]}」<br>${q.hint}`;
  updateProgress();
  if(Object.keys(answered).length===questions.length) showResult();
}

function updateProgress(){ const done=Object.keys(answered).length, total=questions.length; document.getElementById('prog-text').textContent=`${done} / ${total} 問回答済み`; document.getElementById('prog-fill').style.width=(done/total*100)+'%'; }

function showResult(){
  const total=questions.length; let correct=0;
  for(let i=0;i<total;i++) if(answered[i]===questions[i].answer) correct++;
  saveScore(currentName,correct); // スコアは裏で記録のみ（本人には表示しない）
  const el=document.getElementById('result'); el.classList.remove('hidden');
  el.innerHTML=`<div style="font-size:3em;margin-bottom:8px;">🎉</div>
    <div style="font-size:1.4em;color:#e0c97f;font-weight:bold;margin-bottom:12px;">回答おつかれさまでした！</div>
    <div style="color:#ddd;line-height:1.9;">${currentName} さん、全${total}問おわりました。<br>ご回答ありがとうございました。<br>結果は後ほどの発表をお楽しみに🏆</div>
    <button class="btn-outline" id="back-top" style="margin-top:22px;">▶ 最初の画面にもどる</button>`;
  document.getElementById('back-top').addEventListener('click',backToSelect);
  el.scrollIntoView({behavior:'smooth'});
}

function showBoard(){
  const scores=loadScores(); const tb=document.getElementById('entry-body'); tb.innerHTML='';
  members.forEach(m=>{
    const val=scores[m.name];
    const tr=document.createElement('tr');
    const td1=document.createElement('td'); td1.className='entry-name'; td1.textContent=m.name;
    const td2=document.createElement('td'); td2.innerHTML=`<span class="mini">${m.theme==='entertainment'?'🎀 エンタメ':'💼 医師紹介'}</span>`;
    const td3=document.createElement('td');
    const wrap=document.createElement('div'); wrap.className='num-ctrl';
    const minus=document.createElement('button'); minus.textContent='−';
    const input=document.createElement('input'); input.type='number'; input.min='0'; input.max='20'; input.placeholder='未'; input.value=(val===undefined?'':val);
    const plus=document.createElement('button'); plus.textContent='＋';
    minus.addEventListener('click',()=>{ let v=parseInt(input.value,10); if(isNaN(v))v=0; v=Math.max(0,v-1); input.value=v; setScoreManual(m.name,v); });
    plus.addEventListener('click',()=>{ let v=parseInt(input.value,10); if(isNaN(v))v=-1; v=Math.min(20,v+1); input.value=v; setScoreManual(m.name,v); });
    input.addEventListener('input',()=> setScoreManual(m.name,input.value));
    wrap.appendChild(minus); wrap.appendChild(input); wrap.appendChild(plus); td3.appendChild(wrap);
    tr.appendChild(td1); tr.appendChild(td2); tr.appendChild(td3); tb.appendChild(tr);
  });
  show('board-screen');
}

function resetScores(){ if(!confirm('記録された全員のスコアを消去します。よろしいですか？')) return; try{ localStorage.removeItem(STORE_KEY); }catch(e){} showBoard(); }

let revealQueue=[], revealRows=[], revealDir='bottomUp';
function tierOf(score){ return score>=14?{key:'pass',label:'合格',emoji:'🟢'}:score>=10?{key:'yellow',label:'イエローカード',emoji:'🟡'}:{key:'retake',label:'追試',emoji:'🔴'}; }
function startReveal(){
  const scores=loadScores();
  revealRows=members.filter(m=>scores[m.name]!==undefined).map(m=>({name:m.name,theme:m.theme,score:scores[m.name]})).sort((a,b)=>b.score-a.score);
  if(revealRows.length===0){ alert('まだスコアが入力されていません。'); return; }
  let rank=0,prev=null; revealRows.forEach((r,i)=>{ if(r.score!==prev){ rank=i+1; prev=r.score; } r.rank=rank; });
  document.getElementById('reveal-sub').textContent='参加 '+revealRows.length+' 名 ／ 全20問';
  let cp=0,cy=0,cr=0; revealRows.forEach(r=>{ const t=tierOf(r.score).key; if(t==='pass')cp++; else if(t==='yellow')cy++; else cr++; });
  document.getElementById('tier-summary').innerHTML='<span class="sc-pass">🟢 合格 '+cp+'</span><span class="sc-yellow">🟡 イエロー '+cy+'</span><span class="sc-retake">🔴 追試 '+cr+'</span>';
  const list=document.getElementById('rank-list'); list.innerHTML='';
  revealRows.forEach((r,i)=>{
    const t=tierOf(r.score);
    const cls=(r.rank===1?'top1':r.rank===2?'top2':r.rank===3?'top3':'')+' tier-'+t.key;
    const medal=r.rank===1?'🥇':r.rank===2?'🥈':r.rank===3?'🥉':(r.rank+'位');
    const tag=r.theme==='entertainment'?'<span class="theme-tag">🎀</span>':'';
    const div=document.createElement('div'); div.className='rank-row '+cls; div.id='rr-'+i; div.dataset.score=r.score;
    div.innerHTML=`<div class="rank-medal">${medal}</div><div class="rank-name">${r.name}${tag}<span class="tier-pill ${t.key}">${t.emoji} ${t.label}</span></div><div class="rank-bar-wrap"><div class="rank-bar-bg"><div class="rank-bar-fill" id="bar-${i}"></div></div></div><div class="rank-score sc-${t.key}">${r.score}<small>/20</small></div>`;
    list.appendChild(div);
  });
  // 発表方向の選択
  const ctrl=document.getElementById('reveal-controls');
  ctrl.innerHTML='<button class="btn-gold" id="rv-bottom">👇 最下位から1人ずつ</button><button class="btn-gold" id="rv-top3">🏅 4位以下 → 3位・2位・1位</button><button class="btn-outline" id="rv-all2">✨ 一気に全員表示</button>';
  document.getElementById('rv-bottom').addEventListener('click',()=>beginReveal('bottomUp'));
  document.getElementById('rv-top3').addEventListener('click',beginRevealTop3);
  document.getElementById('rv-all2').addEventListener('click',revealAll);
  show('reveal-screen');
}
function resetRowsHidden(){
  revealRows.forEach((r,i)=>{ const row=document.getElementById('rr-'+i); if(row) row.classList.remove('shown'); const bar=document.getElementById('bar-'+i); if(bar) bar.style.width='0%'; });
}
function beginReveal(dir){
  revealDir='bottomUp'; resetRowsHidden();
  revealQueue = revealRows.map((r,i)=>i).reverse();
  const ctrl=document.getElementById('reveal-controls');
  ctrl.innerHTML='<button class="btn-gold" id="rv-next">👇 最下位から発表！</button><button class="btn-outline" id="rv-restart">↺ スタイルを選び直す</button>';
  document.getElementById('rv-next').addEventListener('click',revealNext);
  document.getElementById('rv-restart').addEventListener('click',startReveal);
}
function top3BtnText(idx){ return idx===2?'🥉 第3位を発表！':idx===1?'🥈 第2位を発表！':'🥇 第1位を発表！！'; }
function beginRevealTop3(){
  revealDir='top3'; resetRowsHidden();
  const n=revealRows.length;
  // 4位以下（index>=3）を最下位から順にカスケード表示
  let delay=0;
  for(let i=n-1;i>=3;i--){ setTimeout(((idx)=>()=>revealRow(idx))(i), delay); delay+=380; }
  // TOP3を3位→2位→1位の順で
  revealQueue=[2,1,0].filter(i=>i>=0 && i<n);
  const ctrl=document.getElementById('reveal-controls');
  const startMsg = (n>3) ? '（4位以下を表示中…）' : '';
  ctrl.innerHTML='<button class="btn-gold" id="rv-next">'+top3BtnText(revealQueue[0])+'</button><button class="btn-outline" id="rv-restart">↺ スタイルを選び直す</button>';
  document.getElementById('rv-next').addEventListener('click',revealTop3Next);
  document.getElementById('rv-restart').addEventListener('click',startReveal);
}
function revealTop3Next(){
  if(revealQueue.length===0) return;
  const i=revealQueue.shift(); revealRow(i);
  const row=document.getElementById('rr-'+i); if(row) row.scrollIntoView({behavior:'smooth',block:'center'});
  const btn=document.getElementById('rv-next');
  if(revealQueue.length===0){ btn.textContent='🎉 発表おわり！おめでとう🎊'; btn.disabled=true; btn.style.opacity=0.6; }
  else { btn.textContent=top3BtnText(revealQueue[0]); }
}
function revealAll(){
  resetRowsHidden();
  const n=revealRows.length;
  revealRows.forEach((r,i)=> setTimeout(()=>revealRow(i),(n-1-i)*380));
  const ctrl=document.getElementById('reveal-controls');
  ctrl.innerHTML='<button class="btn-outline" id="rv-restart2">↺ 方向を選び直す</button>';
  document.getElementById('rv-restart2').addEventListener('click',startReveal);
}
function revealRow(i){
  const row=document.getElementById('rr-'+i); if(!row) return; row.classList.add('shown');
  const bar=document.getElementById('bar-'+i); const score=parseInt(row.dataset.score,10);
  if(bar) setTimeout(()=>{ bar.style.width=(score/20*100)+'%'; },120);
}
function revealNext(){
  if(revealQueue.length===0) return;
  const i=revealQueue.shift(); revealRow(i);
  document.getElementById('rr-'+i).scrollIntoView({behavior:'smooth',block:'center'});
  const btn=document.getElementById('rv-next');
  if(revealQueue.length===0){ btn.textContent='🎉 発表おわり！'; btn.disabled=true; btn.style.opacity=0.6; }
  else if(revealDir==='bottomUp' && revealQueue.length===1){ btn.textContent='👑 いよいよ1位！'; }
  else { btn.textContent='▶ 次を発表（残り'+revealQueue.length+'人）'; }
}

document.getElementById('to-reveal').addEventListener('click',startReveal);
document.getElementById('to-board').addEventListener('click',showBoard);
document.getElementById('quiz-back').addEventListener('click',backToSelect);
document.getElementById('board-back').addEventListener('click',backToSelect);
document.getElementById('reveal-back').addEventListener('click',backToSelect);
document.getElementById('board-to-reveal').addEventListener('click',startReveal);
document.getElementById('reset-scores').addEventListener('click',resetScores);
buildNames();
</script>
