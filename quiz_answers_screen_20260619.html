  .options { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:18px; }

const LETTERS = ['Ａ','Ｂ','Ｃ','Ｄ'];
let currentSet = 'medical';
let allShown = false;

function switchSet(s) {
  currentSet = s; allShown = false;
  document.getElementById('tab-med').classList.toggle('active', s==='medical');
  document.getElementById('tab-ent').classList.toggle('active', s==='entertainment');
  const btn = document.getElementById('reveal-all');
  btn.textContent = '👁 全部の答えを表示'; btn.classList.add('hide-mode');
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function render() {
  const qs = SETS[currentSet];
  const entCls = currentSet==='entertainment' ? ' ent' : '';
  let html = '';
  qs.forEach((q, idx) => {
    const opts = q.options.map((o, oi) =>
      `<div class="opt" id="opt-${idx}-${oi}">${LETTERS[oi]}．${o}</div>`
    ).join('');
    html += `
      <div class="card">
        <span class="badge${entCls}">📚 ${q.section}</span>
        <div class="q-row">
          <div class="q-num">Q${idx+1}</div>
          <div class="q-text">${q.q}</div>
        </div>
        <div class="options">${opts}</div>
        <button class="reveal-btn hide-mode" style="margin-top:18px;font-size:0.95em;padding:8px 20px;" onclick="toggleOne(${idx})" id="btn-${idx}">▶ 答えを表示</button>
        <div class="answer-line" id="ans-${idx}">
          <span class="ans-label">正解</span>${LETTERS[q.answer]}．${q.options[q.answer]}
          <span class="exp">💡 ${q.hint}</span>
        </div>
      </div>`;
  });
  document.getElementById('list').innerHTML = html;
}

function showOne(idx, show) {
  const q = SETS[currentSet][idx];
  document.getElementById(`opt-${idx}-${q.answer}`).classList.toggle('correct', show);
  document.getElementById(`ans-${idx}`).classList.toggle('show', show);
  const b = document.getElementById(`btn-${idx}`);
  b.textContent = show ? '◀ 答えを隠す' : '▶ 答えを表示';
  b.classList.toggle('hide-mode', !show);
}

function toggleOne(idx) {
  const shown = document.getElementById(`ans-${idx}`).classList.contains('show');
  showOne(idx, !shown);
}

function toggleAll() {
  allShown = !allShown;
  const qs = SETS[currentSet];
  qs.forEach((q, idx) => showOne(idx, allShown));
  const btn = document.getElementById('reveal-all');
  btn.textContent = allShown ? '🙈 全部の答えを隠す' : '👁 全部の答えを表示';
  btn.classList.toggle('hide-mode', !allShown);
}

render();
</script>
